<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matrix Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap');

        :root {
            --matrix-green: #00ff00;
            --dark-background: #000000;
            --glow-shadow: 0 0 5px var(--matrix-green), 0 0 10px var(--matrix-green), 0 0 20px var(--matrix-green);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-background);
            color: var(--matrix-green);
            font-family: 'VT323', monospace; /* Monospaced font for terminal feel */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .matrix-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Rain Effect */
        .matrix-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-background);
            opacity: 0.8; /* Keep opacity for rain itself */
            z-index: 0;
            overflow: hidden;
        }

        .matrix-rain span {
            position: absolute;
            display: block;
            font-size: 16px;
            color: #00ff00; /* Green */
            animation: drop 3s infinite linear;
            opacity: 0; /* Initially hidden, will be revealed by JS */
            text-shadow: 0 0 5px var(--matrix-green); /* Add slight shadow to rain characters */
        }

        @keyframes drop {
            0% {
                transform: translateY(-20px);
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh);
                opacity: 0.2;
            }
        }

        /* Login Box */
        .login-box {
            position: relative;
            z-index: 1;
            /* --- Translucent Background --- */
            background-color: rgba(0, 0, 0, 0.1); /* Lowered opacity for more background visibility */
            padding: 40px;
            border-radius: 10px;
            box-shadow: var(--glow-shadow);
            text-align: center;
            border: 1px solid var(--matrix-green);
            backdrop-filter: blur(2mm); /* Increased blur for a softer background */
            -webkit-backdrop-filter: blur(8px); /* For Safari compatibility */
        }

        .login-header h1 {
            font-family: 'Orbitron', sans-serif; /* More futuristic font for titles */
            font-size: 3em;
            margin: 0;
            text-shadow: var(--glow-shadow);
            letter-spacing: 5px;
        }

        .login-header p {
            font-size: 1.2em;
            margin-top: 5px;
            text-transform: uppercase;
            color: var(--matrix-green);
            text-shadow: 0 0 3px var(--matrix-green);
        }

        .input-group {
            margin-top: 30px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
            color: var(--matrix-green);
            text-shadow: 0 0 3px var(--matrix-green);
        }

        .input-group input {
            width: calc(100% - 20px); /* Account for padding */
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: 'VT323', monospace;
            font-size: 1.2em;
            outline: none;
            box-shadow: inset var(--glow-shadow);
            transition: box-shadow 0.3s ease;
        }

        .input-group input:focus {
            box-shadow: inset 0 0 10px var(--matrix-green), 0 0 15px var(--matrix-green);
        }

        .matrix-button {
            margin-top: 30px;
            padding: 12px 30px;
            background-color: transparent;
            border: 2px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: var(--glow-shadow);
            transition: all 0.3s ease;
            outline: none;
        }

        .matrix-button:hover {
            background-color: var(--matrix-green);
            color: var(--dark-background);
            box-shadow: 0 0 15px var(--matrix-green), 0 0 25px var(--matrix-green), 0 0 35px var(--matrix-green);
        }

        .login-footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: rgba(0, 255, 0, 0.7); /* Slightly muted green for footer */
        }

        .login-footer p {
            margin: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="matrix-container">
        <div class="matrix-rain">
            <!-- This div will be filled by JavaScript -->
        </div>
        <div class="login-box">
            <div class="login-header">
                <h1>MATRIX</h1>
                <p>ACCESS GRANTED</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">USER ID</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="matrix-button">ENTER</button>
            </form>
            <div class="login-footer">
                <p>SYSTEM STATUS: ONLINE</p>
            </div>
        </div>
    </div>

    <script>
        const matrixRainContainer = document.querySelector('.matrix-rain');
        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アァカサタナハマヤャラワヰヱヲンヴヵヶ'; // Characters from The Matrix
        const fontSize = 16; // Should match CSS font-size for .matrix-rain span
        let columns, rows;

        function setupMatrixRain() {
            // Clear previous spans before re-calculating
            matrixRainContainer.innerHTML = '';

            columns = Math.floor(window.innerWidth / fontSize);
            rows = Math.floor(window.innerHeight / fontSize);

            // Calculate the total number of spans needed
            const totalSpans = columns * rows;

            for (let i = 0; i < totalSpans; i++) {
                const span = document.createElement('span');
                span.textContent = characters[Math.floor(Math.random() * characters.length)];
                span.style.left = `${(i % columns) * fontSize}px`;
                span.style.top = `${Math.floor(i / columns) * fontSize}px`;
                matrixRainContainer.appendChild(span);
            }

            const rainSpans = matrixRainContainer.querySelectorAll('span');
            rainSpans.forEach(span => {
                // Randomize animation properties for a more dynamic effect
                const delay = Math.random() * 15; // Longer potential delay for more spread
                const duration = Math.random() * 7 + 3; // Longer duration for slower drops
                const opacityStart = Math.random() * 0.3 + 0.2; // Varying start opacity
                const translateYStart = Math.random() * -100; // Varying start position

                span.style.animation = `drop ${duration}s infinite linear`;
                span.style.animationDelay = `-${delay}s`; // Start animation at a random point
                span.style.opacity = opacityStart;
                span.style.transform = `translateY(${translateYStart}px)`;
            });
        }

        // Initial setup when the page loads
        setupMatrixRain();

        // Adjust rain on window resize
        window.addEventListener('resize', setupMatrixRain);
    </script>
</body>
</html>
