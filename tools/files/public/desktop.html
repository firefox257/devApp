<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Material Icons OS</title>
  <link rel="stylesheet" href="desktop.css">
</head>
<body data-theme="default">
  <canvas id="themeCanvas" style="z-index: var(--z-canvas-back, 100) !important;"></canvas>
  <div id="mysticFrontLayer" class="mystic-front-layer" aria-hidden="true"></div>
  <div id="desktopIcons" class="desktop-area system-desktop__container system-desktop__grid">
    <div class="system-empty" id="appsLoading" style="grid-column: 1/-1; text-align: center; padding: 40px;">
      <span class="material-icons system-icon-lg" style="color: var(--system-border);">hourglass_empty</span>
      <p class="system-text-dim">Loading apps...</p>
    </div>
  </div>
  <div class="start-menu system-desktop-start-menu" id="startMenu">
    <div class="start-menu-header system-desktop-start-menu__header" id="startMenuHeader">
      <button class="start-menu-back system-btn-icon material-icons" id="startMenuBack" onclick="AppRegistry.navigateMenu('root')" aria-label="Back to categories" aria-hidden="true">more_horiz</button>
      <span class="start-menu-title system-text-large" id="startMenuTitle">
        <span class="material-icons start-menu-title-icon" id="startMenuTitleIcon">apps</span>
        <span id="startMenuTitleText">Start</span>
      </span>
      <button class="start-menu-close system-btn-icon material-icons" onclick="toggleStartMenu()" aria-label="Close Start Menu">close</button>
    </div>
    <div class="start-menu-content system-desktop-start-menu__content" id="startMenuContent">
      <!-- Populated dynamically -->
    </div>
  </div>
  <div id="windowsContainer" class="system-desktop__windows-container"></div>
  <div class="taskbar system-desktop-taskbar" style="z-index: var(--z-taskbar, 3000) !important;">
    <span class="start-btn system-desktop-taskbar__start-btn material-icons" id="startBtn" onclick="toggleStartMenu()">apps</span>
    <div class="taskbar-apps-wrapper system-desktop-taskbar__apps-wrapper">
      <span class="taskbar-scroll-btn system-desktop-taskbar__scroll-btn material-icons" id="scrollLeftBtn" onclick="appManager.scrollTaskbar(-200)">chevron_left</span>
      <div class="taskbar-apps system-desktop-taskbar__apps" id="taskbarApps"></div>
      <span class="taskbar-scroll-btn system-desktop-taskbar__scroll-btn material-icons" id="scrollRightBtn" onclick="appManager.scrollTaskbar(200)">chevron_right</span>
    </div>
    <div class="system-tray system-desktop-tray">
      <div class="clock system-desktop-clock">
        <span id="time">12:00</span>
        <span id="date">Oct 24</span>
      </div>
    </div>
  </div>
  <script src="/os-theme-bridge.js"></script>
  <!-- === THEME MANAGER v3.0 === -->
  <script>
    const ThemeManager = {
      configUrl: 'themes.json', baseUrl: '', currentTheme: null, themeConfig: null,
      activeCleanup: null, themeScriptEl: null,
      themeLinkEl: document.getElementById('theme-stylesheet'),
      canvas: document.getElementById('themeCanvas'),
      themeIntervals: [], themeTimeouts: [], themeAnimationFrames: [],
      getSystemVariables() {
        const root = document.documentElement; const style = getComputedStyle(root);
        const varNames = ['--system-bg','--system-window-bg','--system-header-bg','--system-accent','--system-accent-dim','--system-highlight','--system-text','--system-text-dim','--system-text-on-accent','--system-border','--system-border-hover','--system-menu-bg','--system-radius','--system-radius-lg','--system-shadow','--system-font','--system-font-mono','--system-taskbar-height','--system-safe-bottom','--system-success','--system-warning','--system-danger','--system-info','--system-icon-border','--system-icon-border-hover','--system-icon-bg','--system-icon-bg-hover','--system-taskbar-glow','--system-window-glow','--system-icon-glow','--system-start-menu-blur','--system-taskbar-blur','--system-start-menu-title-icon','--z-background','--z-canvas-back','--z-desktop-icons','--z-canvas-front','--z-windows-base','--z-windows-max','--z-taskbar','--z-context-menus','--z-modals'];
        const vars = {};
        for (const name of varNames) vars[name] = style.getPropertyValue(name).trim();
        return vars;
      },
      broadcastThemeToApps(themeId = this.currentTheme) {
        if (!themeId) return;
        const systemVars = this.getSystemVariables();
        document.querySelectorAll('iframe[data-os-app]').forEach(iframe => {
          try {
            const targetOrigin = iframe.src?.startsWith('http') ? new URL(iframe.src).origin : window.location.origin;
            iframe.contentWindow.postMessage({ type: 'themeUpdate', themeId, variables: systemVars, timestamp: Date.now(), appId: iframe.dataset.appId, instanceId: iframe.dataset.instanceId }, targetOrigin);
          } catch (e) { console.warn('⚠ Could not sync theme to iframe:', e); }
        });
      },
      registerIframeApp(iframe) {
        if (!iframe.hasAttribute('data-os-app')) iframe.setAttribute('data-os-app', 'true');
        setTimeout(() => this.broadcastThemeToApps(this.currentTheme), 100);
      },
      initAppMessageListener() {
        window.addEventListener('message', (e) => {
          if (e.data?.type === 'themeRequest') this.broadcastThemeToApps(this.currentTheme);
          if (e.data?.type === 'appReady' && e.data.appId) {
            const iframe = document.querySelector(`iframe[data-app-id="${e.data.appId}"]`);
            if (iframe) this.registerIframeApp(iframe);
          }
        });
      },
      async init() {
        console.log('🔧 ThemeManager.init() starting');
        try {
          const response = await fetch(this.configUrl, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          this.themeConfig = await response.json();
          console.log('✓ Theme config loaded:', Object.keys(this.themeConfig));
          const savedTheme = this.getSavedThemePreference();
          const urlParams = new URLSearchParams(window.location.search);
          const requestedTheme = urlParams.get('theme');
          const themeToApply = requestedTheme || (savedTheme && this.themeConfig[savedTheme] ? savedTheme : 'default');
          await this.apply(themeToApply);
          this.initAppMessageListener();
        } catch (error) {
          console.error('✗ Failed to load theme config:', error);
          this.applyFallback();
        }
      },
      async apply(themeId) {
        if (!this.themeConfig?.[themeId]) { console.warn(`✗ Theme "${themeId}" not found`); return false; }
        const theme = this.themeConfig[themeId];
        console.log(`→ Applying theme: ${theme.name} (${themeId})`);
        await this.cleanup();
        document.documentElement.setAttribute('data-theme', 'default');
        document.body.setAttribute('data-theme', 'default');
        document.body.style.background = '';
        document.body.style.backgroundColor = 'var(--system-bg)';
        void document.body.offsetHeight;
        document.documentElement.setAttribute('data-theme', themeId);
        document.body.setAttribute('data-theme', themeId);
        await this.loadCSS(theme.css);
        setTimeout(() => { document.body.style.background = ''; document.body.style.backgroundColor = 'var(--system-bg)'; }, 100);
        this.canvas.style.display = theme.canvas ? 'block' : 'none';
        const ctx = this.canvas.getContext('2d');
        if (ctx) { ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
        if (theme.script) {
          console.log(`→ Loading script: ${theme.script}`);
          this.activeCleanup = await this.loadScript(theme.script);
          console.log(`✓ Script loaded, cleanup ready`);
        } else { this.activeCleanup = null; }
        this.currentTheme = themeId;
        this.saveThemePreference(themeId);
        this.broadcastThemeToApps(themeId);
        window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: themeId, config: theme } }));
        console.log(`✓ Theme applied: ${theme.name}`);
        return true;
      },
      async loadCSS(cssPath) {
        return new Promise((resolve, reject) => {
          const oldLink = document.getElementById('theme-stylesheet');
          if (oldLink && oldLink.parentNode) { oldLink.parentNode.removeChild(oldLink); void document.body.offsetHeight; }
          if (!cssPath) { resolve(); return; }
          const newLink = document.createElement('link');
          newLink.id = 'theme-stylesheet'; newLink.rel = 'stylesheet'; newLink.href = this.baseUrl + cssPath + '?t=' + Date.now();
          newLink.onload = () => { this.themeLinkEl = newLink; setTimeout(resolve, 50); };
          newLink.onerror = reject;
          document.head.appendChild(newLink);
        });
      },
      async loadScript(scriptPath) {
        return new Promise(async (resolve) => {
          if (typeof this.activeCleanup === 'function' || typeof window.ThemeCleanup === 'function') {
            console.log('🧹 Waiting for previous script cleanup...');
            const cleanupConfirmed = new Promise((confirmResolve) => {
              let cleanupDone = false;
              const markDone = () => { if (!cleanupDone) { cleanupDone = true; confirmResolve(); } };
              if (typeof this.activeCleanup === 'function') { try { this.activeCleanup(); markDone(); } catch (e) { console.warn('⚠ activeCleanup error:', e); markDone(); } }
              if (typeof window.ThemeCleanup === 'function') { try { window.ThemeCleanup(); markDone(); } catch (e) { console.warn('⚠ window.ThemeCleanup error:', e); markDone(); } delete window.ThemeCleanup; }
              setTimeout(markDone, 100);
            });
            await cleanupConfirmed;
            console.log('✓ Previous script cleanup confirmed');
          }
          if (this.themeScriptEl) { this.themeScriptEl.remove(); this.themeScriptEl = null; }
          if (!scriptPath) { this.activeCleanup = null; resolve(null); return; }
          this.themeScriptEl = document.createElement('script');
          this.themeScriptEl.src = this.baseUrl + scriptPath + '?t=' + Date.now();
          this.themeScriptEl.async = true;
          this.themeScriptEl.onload = () => {
            let cleanupFn = null;
            if (typeof window.ThemeCleanup === 'function') { cleanupFn = window.ThemeCleanup; delete window.ThemeCleanup; }
            this.activeCleanup = cleanupFn;
            console.log('✓ New script loaded, cleanup function captured');
            resolve(cleanupFn);
          };
          this.themeScriptEl.onerror = () => { console.error(`❌ Failed to load script: ${scriptPath}`); this.activeCleanup = null; resolve(null); };
          document.head.appendChild(this.themeScriptEl);
        });
      },
      async cleanup() {
        console.log('🧹 ThemeManager.cleanup() starting');
        this.themeAnimationFrames.forEach(id => { try { cancelAnimationFrame(id); } catch(e) {} });
        this.themeAnimationFrames = [];
        this.themeIntervals.forEach(id => { try { clearInterval(id); } catch(e) {} });
        this.themeIntervals = [];
        this.themeTimeouts.forEach(id => { try { clearTimeout(id); } catch(e) {} });
        this.themeTimeouts = [];
        if (typeof this.activeCleanup === 'function') {
          console.log('🧹 Executing activeCleanup function...');
          try { this.activeCleanup(); } catch (e) { console.warn('⚠ Cleanup function error:', e); }
          this.activeCleanup = null;
        }
        if (typeof window.ThemeCleanup === 'function') {
          console.log('🧹 Executing window.ThemeCleanup...');
          try { window.ThemeCleanup(); } catch (e) { console.warn('⚠ window.ThemeCleanup error:', e); }
          delete window.ThemeCleanup;
        }
        if (this.themeScriptEl) { console.log('🧹 Removing theme script element'); this.themeScriptEl.remove(); this.themeScriptEl = null; }
        try { const ctx = this.canvas?.getContext('2d'); if (ctx && this.canvas) { ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); console.log('🧹 Canvas cleared'); } } catch (e) { console.warn('⚠ Canvas clear error:', e); }
        this.canvas.style.display = 'none';
        const inlineStyle = document.getElementById('theme-inline');
        if (inlineStyle) inlineStyle.textContent = '';
        const frontLayer = document.getElementById('mysticFrontLayer');
        if (frontLayer) frontLayer.style.display = 'none';
        void document.body.offsetHeight;
        console.log('🧹 ThemeManager.cleanup() complete');
      },
      registerCleanup(cleanupFn) { if (typeof cleanupFn === 'function') { if (!window.ThemeCleanupRegistry) window.ThemeCleanupRegistry = []; window.ThemeCleanupRegistry.push(cleanupFn); } },
      trackAnimation(id) { this.themeAnimationFrames.push(id); },
      trackInterval(id) { this.themeIntervals.push(id); },
      trackTimeout(id) { this.themeTimeouts.push(id); },
      applyFallback() { document.documentElement.setAttribute('data-theme', 'default'); document.body.setAttribute('data-theme', 'default'); this.canvas.style.display = 'none'; this.currentTheme = 'default'; },
      getAvailableThemes() { if (!this.themeConfig) return []; return Object.entries(this.themeConfig).map(([id, config]) => ({ id, name: config.name || id, description: config.description || '', canvas: config.canvas || false })); },
      async populateThemeSelector(selectElementId) { 
        const select = document.getElementById(selectElementId); 
        if (!select) return; 
        if (!this.themeConfig) { select.innerHTML = '<option value="">Loading themes...</option>'; setTimeout(() => this.populateThemeSelector(selectElementId), 500); return; } 
        select.innerHTML = ''; 
        for (const [id, config] of Object.entries(this.themeConfig)) { const opt = document.createElement('option'); opt.value = id; opt.textContent = config.name || id; if (id === this.currentTheme) opt.selected = true; select.appendChild(opt); } 
      },
      saveThemePreference(themeId) { try { localStorage.setItem('os-preferred-theme', themeId); } catch (e) { console.warn('⚠ Could not save theme:', e); } },
      getSavedThemePreference() { try { return localStorage.getItem('os-preferred-theme'); } catch (e) { return null; } },
      async refreshThemeConfig() { 
        try { const response = await fetch(this.configUrl + '?t=' + Date.now(), { cache: 'no-store' }); if (!response.ok) throw new Error(`HTTP ${response.status}`); this.themeConfig = await response.json(); this.populateThemeSelector('themeSelector'); return true; } catch (error) { alert('Could not reload themes. Check console.'); return false; } 
      }
    };
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ThemeManager.init()); } else { ThemeManager.init(); }
  </script>
  <!-- === DESKTOP MANAGER === -->
  <script>
    const DesktopManager = {
      STORAGE_KEY: 'os-desktop-items-v2',
      getItems() { try { const saved = localStorage.getItem(this.STORAGE_KEY); return saved ? JSON.parse(saved) : []; } catch (e) { console.warn('⚠ Could not load desktop items:', e); return []; } },
      saveItems(items) { try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(items)); return true; } catch (e) { console.warn('⚠ Could not save desktop items:', e); return false; } },
      addToDesktop(appId) { const items = this.getItems(); if (!items.includes(appId)) { items.push(appId); this.saveItems(items); console.log(`✓ Added ${appId} to desktop`); return true; } return false; },
      removeFromDesktop(appId) { const items = this.getItems().filter(id => id !== appId); this.saveItems(items); console.log(`✓ Removed ${appId} from desktop`); },
      isOnDesktop(appId) { return this.getItems().includes(appId); },
      clear() { localStorage.removeItem(this.STORAGE_KEY); }
    };
  </script>
  <!-- === LONG PRESS UTILITY === -->
  <script>
    function setupLongPress(element, callbacks, options = {}) {
      const { duration = 500, onLongPress, onShortPress, onMove, preventContextMenu = true } = callbacks;
      let timer = null; let isLongPress = false; let isPressed = false; let startX = 0, startY = 0; const moveThreshold = 10;
      const start = (e) => { if (element.dataset.longPressDisabled === 'true') return; isPressed = true; isLongPress = false; const point = e.type.includes('touch') ? e.touches[0] : e; startX = point.clientX; startY = point.clientY; timer = setTimeout(() => { if (isPressed) { isLongPress = true; if (onLongPress) onLongPress(e); if (navigator.vibrate) navigator.vibrate(10); } }, duration); };
      const end = (e) => { if (timer) clearTimeout(timer); timer = null; if (isPressed && !isLongPress) { if (onShortPress) onShortPress(e); } isPressed = false; isLongPress = false; };
      const cancel = () => { if (timer) clearTimeout(timer); timer = null; isPressed = false; isLongPress = false; };
      const move = (e) => { if (!isPressed || !timer) return; const point = e.type.includes('touch') ? e.touches[0] : e; const dx = Math.abs(point.clientX - startX); const dy = Math.abs(point.clientY - startY); if (dx > moveThreshold || dy > moveThreshold) { cancel(); if (onMove) onMove(e); } };
      element.addEventListener('mousedown', start); element.addEventListener('mouseup', end); element.addEventListener('mouseleave', cancel); element.addEventListener('mousemove', move); element.addEventListener('touchstart', start, { passive: true }); element.addEventListener('touchend', end); element.addEventListener('touchcancel', cancel); element.addEventListener('touchmove', move, { passive: true });
      if (preventContextMenu) { element.addEventListener('contextmenu', (e) => { if (isLongPress) { e.preventDefault(); e.stopPropagation(); return false; } }); }
      return () => { element.removeEventListener('mousedown', start); element.removeEventListener('mouseup', end); element.removeEventListener('mouseleave', cancel); element.removeEventListener('mousemove', move); element.removeEventListener('touchstart', start); element.removeEventListener('touchend', end); element.removeEventListener('touchcancel', cancel); element.removeEventListener('touchmove', move); };
    }
  </script>
  <!-- === CONTEXT MENU === -->
  <script>
    const ContextMenu = {
      currentMenu: null,
      show(x, y, items, onSelect, onClose) {
        this.hide();
        const menu = document.createElement('div');
        menu.className = 'system-menu desktop-context-menu';
        menu.style.cssText = `position: fixed; left: ${Math.min(x, window.innerWidth - 200)}px; top: ${Math.min(y, window.innerHeight - 100)}px; z-index: var(--z-context-menus, 3500); min-width: 180px; max-width: 95vw;`;
        menu.id = 'desktop-context-menu';
        items.forEach(item => {
          const el = document.createElement('div');
          el.className = 'system-menu-item';
          el.innerHTML = `<span class="material-icons" style="font-size:18px;color:var(--system-text-dim)">${item.icon || 'circle'}</span><span>${item.label}</span>`;
          if (item.danger) el.style.color = 'var(--system-danger)';
          el.onclick = (e) => { e.stopPropagation(); this.hide(); if (onSelect) onSelect(item.value, item); };
          menu.appendChild(el);
        });
        document.body.appendChild(menu);
        this.currentMenu = menu;
        const closeHandler = (e) => { if (e.key === 'Escape' || !menu.contains(e.target)) { this.hide(); if (onClose) onClose(); document.removeEventListener('click', closeHandler); document.removeEventListener('keydown', closeHandler); } };
        setTimeout(() => { document.addEventListener('click', closeHandler); document.addEventListener('keydown', closeHandler); }, 0);
        return menu;
      },
      hide() { if (this.currentMenu) { this.currentMenu.remove(); this.currentMenu = null; } }
    };
  </script>
  <!-- === APP REGISTRY === -->
  <script>
    const AppRegistry = {
      configUrl: 'apps.json', categories: [], apps: [], loaded: false, menuState: { currentView: 'root', history: [] },
      async init() {
        try {
          const response = await fetch(this.configUrl, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const config = await response.json();
          this.categories = config.categories || [];
          this.apps = config.apps || [];
          this.loaded = true;
          console.log(`✓ AppRegistry: Loaded ${this.categories.length} categories, ${this.apps.length} apps`);
          this.renderDesktop();
          this.renderStartMenu('root');
          window.addEventListener('themeChanged', () => this.renderDesktop());
        } catch (error) {
          console.error('✗ AppRegistry: Failed to load apps.json:', error);
          this.renderError();
        }
      },
      renderDesktop() {
        const container = document.getElementById('desktopIcons');
        const loadingEl = document.getElementById('appsLoading');
        if (!container) return;
        if (loadingEl) loadingEl.remove();
        container.innerHTML = '';
        const desktopItemIds = DesktopManager.getItems();
        const desktopApps = this.apps.filter(app => app.enabled && app.type !== 'category' && desktopItemIds.includes(app.id)).sort((a, b) => (a.order || 999) - (b.order || 999));
        if (desktopApps.length === 0) { container.innerHTML = ''; return; }
        desktopApps.forEach(app => {
          const icon = document.createElement('div');
          icon.className = 'icon system-desktop-icon';
          icon.dataset.appId = app.id;
          icon.setAttribute('role', 'button'); icon.setAttribute('tabindex', '0'); icon.setAttribute('aria-label', `${app.name}, long-press for options`);
          icon.innerHTML = `<span class="material-icons system-desktop-icon__icon">${app.icon}</span><span class="system-desktop-icon__label">${app.name}</span>`;
          const launch = () => this.launchApp(app);
          const onLongPress = (e) => {
            if (e) e.preventDefault();
            const point = e.type.includes('touch') ? e.touches[0] : e;
            const appConfig = AppRegistry.getAppById(app.id);
            const allowMultiple = appConfig?.allowMultipleInstances === true;
            const existingInstances = appManager.windows.filter(w => w.appId === app.id);
            const menuItems = [{ label: 'Remove from Desktop', icon: 'delete_outline', value: 'remove', danger: true }];
            if (allowMultiple) menuItems.unshift({ label: existingInstances.length > 0 ? `Open another ${app.name}` : `Open ${app.name}`, icon: 'flip_to_front', value: 'open-instance' });
            ContextMenu.show(point.clientX, point.clientY, menuItems, (action) => {
              if (action === 'remove') { DesktopManager.removeFromDesktop(app.id); this.renderDesktop(); } else if (action === 'open-instance') { this.launchApp(app); }
            });
          };
          const onShortPress = () => launch();
          setupLongPress(icon, { onLongPress, onShortPress, preventContextMenu: true });
          icon.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); launch(); } };
          container.appendChild(icon);
        });
      },
      renderStartMenu(view = 'root') {
        const content = document.getElementById('startMenuContent');
        const titleIcon = document.getElementById('startMenuTitleIcon');
        const titleText = document.getElementById('startMenuTitleText');
        const backBtn = document.getElementById('startMenuBack');
        const header = document.getElementById('startMenuHeader');
        if (!content) return;
        if (backBtn) { if (view === 'root') { backBtn.classList.remove('visible'); backBtn.setAttribute('aria-hidden', 'true'); } else { backBtn.classList.add('visible'); backBtn.setAttribute('aria-hidden', 'false'); } }
        if (view === 'root') {
          if (titleIcon) titleIcon.textContent = 'apps';
          if (titleText) titleText.textContent = 'Start';
          if (header) header.classList.remove('start-menu-header--category');
          this.menuState.currentView = 'root';
          this._renderRootMenu(content);
        } else {
          const category = this.categories.find(c => c.id === view);
          if (!category) { console.warn(`Category not found: ${view}`); return this.renderStartMenu('root'); }
          if (titleIcon) titleIcon.textContent = category.icon || 'folder';
          if (titleText) titleText.textContent = category.name;
          if (header) header.classList.add('start-menu-header--category');
          this.menuState.currentView = view;
          this._renderCategoryMenu(content, category);
        }
      },
      _renderRootMenu(container) {
        container.innerHTML = '';
        const sortedCategories = [...this.categories].sort((a, b) => (a.order || 999) - (b.order || 999));
        if (sortedCategories.length > 0) {
          const catHeader = document.createElement('div'); catHeader.className = 'start-menu-section-header'; catHeader.textContent = 'Categories'; container.appendChild(catHeader);
          sortedCategories.forEach(category => {
            const appCount = this.apps.filter(a => a.enabled && a.categoryId === category.id).length;
            if (appCount === 0) return;
            const item = document.createElement('div'); item.className = 'start-menu-category system-desktop-start-menu__category';
            item.onclick = (e) => { e.stopPropagation(); this.renderStartMenu(category.id); };
            item.innerHTML = `<span class="material-icons">${category.icon || 'folder'}</span><div class="start-menu-category-info"><div class="start-menu-category-name">${category.name}</div>${category.description ? `<div class="start-menu-category-desc">${category.description}</div>` : ''}</div><span class="start-menu-category-count">${appCount}</span><span class="material-icons" style="color: var(--system-text-dim); margin-left: 4px;">chevron_right</span>`;
            container.appendChild(item);
          });
        }
        const uncategorizedApps = this.apps.filter(app => app.enabled && !app.categoryId && app.type !== 'category').sort((a, b) => (a.order || 999) - (b.order || 999));
        if (uncategorizedApps.length > 0) {
          if (sortedCategories.length > 0) { const divider = document.createElement('hr'); divider.className = 'system-divider'; divider.style.cssText = 'margin: 12px 8px; border-color: var(--system-border);'; container.appendChild(divider); }
          const appHeader = document.createElement('div'); appHeader.className = 'start-menu-section-header'; appHeader.textContent = sortedCategories.length > 0 ? 'Other Apps' : 'Apps'; container.appendChild(appHeader);
          uncategorizedApps.forEach(app => { this._createAppMenuItem(app).forEach(el => container.appendChild(el)); });
        }
