<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Curved 3D Racer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e; /* Dark space background */
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc;
        }
        #start-screen, #game-over-screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        h1 { color: #fff; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #ccc; margin-bottom: 25px; font-size: 14px; }
        button {
            background: linear-gradient(45deg, #ff0055, #ff5500);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        
        /* Mobile instructions */
        .controls-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="score-board">Dist: 0m</div>
        
        <div id="start-screen">
            <h1>Neon Drift</h1>
            <p>Drag Left/Right to Steer<br>Stay on the track!</p>
            <button onclick="startGame()">Start Race</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1>Off Track!</h1>
            <p>Distance: <span id="final-score">0</span>m</p>
            <button onclick="resetGame()">Retry</button>
        </div>
        
        <div class="controls-hint" id="hint">Touch & Drag to Steer</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const CONFIG = {
            speed: 0.8,
            trackWidth: 6,
            segmentLength: 10,
            renderDistance: 40, // How many segments ahead to draw
            curveSpeed: 0.02, // How sharp the turns are
            colors: {
                track: 0x222222,
                trackBorder: 0x00ffcc,
                grass: 0x111111,
                car: 0xff0055
            }
        };

        // --- Global Variables ---
        let scene, camera, renderer;
        let car;
        let trackSegments = [];
        let obstacles = [];
        let score = 0;
        let isGameActive = false;
        let currentCurve = 0; // Current curvature of the track
        let targetCurve = 0;  // Where the curve is heading
        let trackZ = 0;       // Global Z position of the track generation
        
        // Input
        let inputX = 0; // -1 (left) to 1 (right)

        // --- Initialization ---
        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 4, 8);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // Add some point lights for neon effect
            const pLight = new THREE.PointLight(0x00ffcc, 1, 50);
            pLight.position.set(0, 5, 0);
            scene.add(pLight);

            createCar();
            
            // Initial Track Generation
            for(let i=0; i<CONFIG.renderDistance; i++) {
                spawnTrackSegment(i * CONFIG.segmentLength);
            }

            // Events
            window.addEventListener('resize', onWindowResize, false);
            const canvas = renderer.domElement;
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('mousemove', onMouseMove);

            animate();
        }

        // --- Object Creation ---
        function createCar() {
            const group = new THREE.Group();

            // Body
            const geo = new THREE.BoxGeometry(1.2, 0.5, 2.5);
            const mat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.colors.car, 
                roughness: 0.2,
                metalness: 0.8,
                emissive: 0x550022
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.5;
            mesh.castShadow = true;
            group.add(mesh);

            // Glow underneath
            const glowGeo = new THREE.PlaneGeometry(1.4, 2.7);
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: 0xff0055, 
                transparent: true, 
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.rotation.x = -Math.PI / 2;
            glow.position.y = 0.05;
            group.add(glow);

            car = group;
            scene.add(car);
        }

        function spawnTrackSegment(zOffset) {
            // 1. Calculate Curve
            // Randomly change target curve occasionally to create twists
            if (Math.random() < 0.05) {
                targetCurve = (Math.random() - 0.5) * 0.15; // Max curve strength
            }
            // Smoothly interpolate current curve to target
            currentCurve += (targetCurve - currentCurve) * 0.1;

            const zPos = trackZ + zOffset;
            
            // Calculate X offset based on accumulated curve
            // We approximate the curve by adding the current curve value * segment index
            // But for a true infinite runner, we track global X offset
            let xOffset = 0;
            
            // Simple procedural generation:
            // We store the "world position" of this segment center
            // For this simple version, we will just rotate the segment mesh
            
            const segmentGeo = new THREE.PlaneGeometry(CONFIG.trackWidth, CONFIG.segmentLength);
            
            // Create a material with grid lines to show movement
            const segmentMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.colors.track,
                roughness: 0.8,
                side: THREE.DoubleSide
            });
            
            const segment = new THREE.Mesh(segmentGeo, segmentMat);
            segment.rotation.x = -Math.PI / 2;
            segment.receiveShadow = true;
            
            // We need to position this segment relative to the PREVIOUS segment to make a chain
            // But simpler: We calculate absolute position based on a sine wave path
            const pathX = Math.sin(zPos * 0.05) * 20 + Math.sin(zPos * 0.01) * 40;
            const pathRot = Math.cos(zPos * 0.05) * 0.5; // Rotate segment to match curve

            segment.position.set(pathX, 0, zPos);
            segment.rotation.z = -pathRot; // Bank the road slightly

            // Add Neon Borders
            const borderGeo = new THREE.BoxGeometry(0.2, 0.2, CONFIG.segmentLength);
            const borderMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.trackBorder });
            
            const leftBorder = new THREE.Mesh(borderGeo, borderMat);
            leftBorder.position.set(-CONFIG.trackWidth/2 - 0.1, 0.1, 0);
            segment.add(leftBorder);

            const rightBorder = new THREE.Mesh(borderGeo, borderMat);
            rightBorder.position.set(CONFIG.trackWidth/2 + 0.1, 0.1, 0);
            segment.add(rightBorder);

            scene.add(segment);
            trackSegments.push({ mesh: segment, z: zPos, x: pathX });

            // Chance to spawn obstacle
            if (zOffset > 100 && Math.random() < 0.3) {
                spawnObstacle(pathX, zPos, pathRot);
            }
        }

        function spawnObstacle(trackX, trackZ, trackRot) {
            const geo = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0xffaa00, 
                emissive: 0xff4400,
                emissiveIntensity: 0.5
            });
            const obs = new THREE.Mesh(geo, mat);
            
            // Place randomly on left or right side of track
            const side = Math.random() > 0.5 ? 1 : -1;
            const offsetX = (Math.random() * 2 + 1) * side;
            
            obs.position.set(trackX + offsetX, 1, trackZ);
            obs.rotation.y = trackRot; // Align with road
            obs.castShadow = true;
            
            scene.add(obs);
            obstacles.push(obs);
        }

        // --- Input Handling ---
        function onTouchStart(e) {
            if(!isGameActive) return;
            onTouchMove(e);
        }

        function onTouchMove(event) {
            if (!isGameActive) return;
            event.preventDefault();
            const touch = event.touches[0];
            // Normalize -1 to 1
            inputX = (touch.clientX / window.innerWidth) * 2 - 1;
        }

        function onMouseMove(event) {
            if (!isGameActive) return;
            inputX = (event.clientX / window.innerWidth) * 2 - 1;
        }

        // --- Game Logic ---
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hint').classList.add('hidden');
            
            isGameActive = true;
            score = 0;
            trackZ = 0;
            currentCurve = 0;
            targetCurve = 0;
            
            // Reset Car
            car.position.set(0, 0, 0);
            car.rotation.set(0, 0, 0);
            
            // Clear old objects
            trackSegments.forEach(s => scene.remove(s.mesh));
            trackSegments = [];
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];

            // Rebuild initial track
            for(let i=0; i<CONFIG.renderDistance; i++) {
                spawnTrackSegment(i * CONFIG.segmentLength);
            }
        }

        function resetGame() {
            startGame();
        }

        function gameOver() {
            isGameActive = false;
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function updatePhysics() {
            if (!isGameActive) return;

            // 1. Move Car Forward
            car.position.z -= CONFIG.speed;
            score += CONFIG.speed;
            document.getElementById('score-board').innerText = "Dist: " + Math.floor(score) + "m";

            // 2. Steer Car (Local X movement)
            // We move the car left/right relative to its current rotation
            const steerSpeed = 0.15;
            const targetLocalX = inputX * (CONFIG.trackWidth / 2 - 1);
            
            // Smooth steering
            car.position.x += (targetLocalX - car.position.x) * 0.1;
            
            // Tilt car visually
            car.rotation.z = -inputX * 0.5;
            car.rotation.y = -inputX * 0.3;

            // 3. Camera Follow
            // Camera stays behind car, but we smooth it out
            const idealOffset = new THREE.Vector3(0, 4, 8);
            // Apply car's rotation to the offset so camera turns with car
            idealOffset.applyQuaternion(car.quaternion);
            idealOffset.add(car.position);
            
            camera.position.lerp(idealOffset, 0.1);
            camera.lookAt(car.position.x, car.position.y, car.position.z - 10);

            // 4. Infinite Track Logic
            // If car passes a segment threshold, generate new ones ahead and remove old ones
            const leadSegment = trackSegments[trackSegments.length - 1];
            if (car.position.z < leadSegment.z - (CONFIG.renderDistance * CONFIG.segmentLength) + CONFIG.segmentLength) {
                // Generate new segment ahead
                const newZ = leadSegment.z + CONFIG.segmentLength;
                spawnTrackSegment(newZ);
                
                // Remove old segment behind
                const oldSeg = trackSegments.shift();
                scene.remove(oldSeg.mesh);
            }

            // 5. Obstacle Cleanup & Collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if (obs.position.z > car.position.z + 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }

                // Simple Distance Collision
                const dist = car.position.distanceTo(obs.position);
                // Adjust collision box size
                if (dist < 2.0 && Math.abs(car.position.y - obs.position.y) < 1.5) {
                    gameOver();
                }
            }

            // 6. Fall off track detection
            // Find the track segment closest to the car
            // Since segments are sequential, we can just check the Z range
            // For this simple version, we check if car X is too far from 0 relative to curve
            // A more robust way: Raycast down. 
            // Simple way: Check distance to center of current segment
            
            // Find current segment index based on Z
            // This is approximate
            const segmentIndex = Math.floor(Math.abs(car.position.z) / CONFIG.segmentLength);
            // We need to map this index to our array. 
            // Since we shift the array, index 0 is the oldest visible segment.
            // Let's just check bounds roughly based on the sine wave function used in spawn
            const currentTrackX = Math.sin(car.position.z * 0.05) * 20 + Math.sin(car.position.z * 0.01) * 40;
            
            if (Math.abs(car.position.x - currentTrackX) > CONFIG.trackWidth / 2 + 1) {
                // Car is off the road
                // Optional: Make car fall? For now, just game over or slow down.
                // Let's do Game Over for difficulty
                // gameOver(); 
                // Actually, let's just slow them down and flash screen
                CONFIG.speed = 0.2;
                document.body.style.backgroundColor = "#330000";
            } else {
                CONFIG.speed = 0.8;
                document.body.style.backgroundColor = "#050510";
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }

        // Start
        init();
        window.startGame = startGame;
        window.resetGame = resetGame;

    </script>
</body>
</html>
