<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Timers</title>

<!-- FALLBACK THEME VARIABLES -->
<style>
:root {
    --system-bg: #1e1e1e;
    --system-text: #ffffff;
    --system-text-dim: #aaaaaa;
    --system-accent: #3b82f6;
    --system-accent-dim: rgba(59, 130, 246, 0.2);
    --system-danger: #ef4444;
    --system-success: #22c55e;
    --system-warning: #f59e0b;
    --system-highlight: #8b5cf6;
    --system-menu-bg: #2d2d2d;
    --system-border: rgba(255, 255, 255, 0.1);
    --system-radius: 8px;
    --system-radius-lg: 16px;
    --system-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    --system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --system-font-mono: "SF Mono", "Roboto Mono", monospace;
}
/* Premium sound indicator */
.system-select option[data-premium="true"] {
    color: var(--system-warning, #f59e0b);
    font-weight: 500;
}
</style>

<!-- REQUIRED: Bridge CSS/JS (Optional - kept for compatibility) -->
<link rel="stylesheet" href="/os-theme-bridge.css" />
<script src="/os-theme-bridge.js"></script>

<!-- REQUIRED: Material Icons Font -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<!-- Alarm Sounds Module (load before main script) -->
<script src="alarm-sounds.js"></script>

<style>
/* ============== TIMER APP STYLES ============== */
body { 
    margin: 0; 
    padding: 16px; 
    background: var(--system-bg); 
    color: var(--system-text); 
    font-family: var(--system-font); 
    min-height: 100dvh;
}

.system-app {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--system-radius-lg);
    border: 1px solid var(--system-border);
    box-shadow: var(--system-shadow);
    padding: 16px;
    min-height: calc(100dvh - 32px);
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
}

.timer-item.system-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid var(--system-border);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.2s ease;
    border-radius: var(--system-radius);
}
.timer-item.active { 
    border-color: var(--system-accent); 
    animation: pulseActive 2s infinite;
    background: rgba(59, 130, 246, 0.1);
}
.timer-item.alarming { 
    border-color: var(--system-danger); 
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); 
    animation: alarmPulse 0.5s infinite;
    background: rgba(239, 68, 68, 0.15);
}
.timer-item.ready { 
    border-color: var(--system-success);
    background: rgba(34, 197, 94, 0.1);
}

.timer-time {
    font-size: 28px; 
    font-weight: bold; 
    color: var(--system-accent);
    font-family: var(--system-font-mono); 
    letter-spacing: 1px;
    min-width: 110px; 
    text-align: center; 
    line-height: 1.2;
}

.timer-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--system-text);
    flex: 1; 
    max-width: 140px;
    overflow: hidden; 
    text-overflow: ellipsis; 
    white-space: nowrap;
}

.timer-controls { 
    display: flex; 
    gap: 6px; 
    flex-shrink: 0; 
}

.timer-btn {
    padding: 8px 12px; 
    border-radius: var(--system-radius); 
    min-width: 40px; 
    height: 40px;
    display: flex; 
    align-items: center;
    justify-content: center; 
    transition: all 0.2s ease; 
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--system-text);
    cursor: pointer;
}
.timer-btn:active { transform: scale(0.95); }

.timer-form.system-card {
    margin-bottom: 16px; 
    background: rgba(255, 255, 255, 0.05);
    padding: 16px;
    border: 1px solid var(--system-border);
    flex-shrink: 0;
    border-radius: var(--system-radius);
}

.timer-list-container { 
    flex: 1; 
    overflow-y: auto; 
    min-height: 0;
    padding-right: 4px;
    margin-bottom: 20px;
}

.empty-state.system-empty { 
    text-align: center; 
    padding: 60px 20px; 
    color: var(--system-text-dim);
    min-height: 200px;
}
.empty-state.system-empty .material-icons { 
    font-size: 64px; 
    opacity: 0.3; 
    margin-bottom: 16px; 
    display: block; 
}

.form-input-row { 
    display: flex; 
    gap: 12px; 
    align-items: flex-end; 
}

.time-input-group { 
    flex: 1; 
    min-width: 0; 
}

.presets-container.system-card { 
    margin-bottom: 16px; 
    flex-shrink: 0; 
    background: rgba(255, 255, 255, 0.05);
    padding: 16px;
    border: 1px solid var(--system-border);
    border-radius: var(--system-radius);
}

.presets-buttons { 
    display: flex; 
    gap: 8px; 
    flex-wrap: wrap; 
}

.preset-btn {
    padding: 8px 16px; 
    border-radius: var(--system-radius);
    font-size: 13px; 
    cursor: pointer; 
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--system-border);
    color: var(--system-text);
}
.preset-btn:active { 
    background: var(--system-accent-dim); 
    border-color: var(--system-accent); 
}

.audio-preview-btn {
    padding: 8px 12px;
    border-radius: var(--system-radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 42px;
    margin-top: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--system-border);
    color: var(--system-text);
}
.audio-preview-btn:active {
    transform: scale(0.96);
    opacity: 0.9;
}
.audio-preview-btn.playing {
    background: var(--system-success) !important;
    border-color: var(--system-success) !important;
    animation: previewPulse 0.5s infinite;
}

@keyframes previewPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(34, 175, 80, 0.5); }
    50% { box-shadow: 0 0 15px rgba(34, 175, 80, 0.8); }
}

.sound-selection-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
}
.sound-selection-row .system-form-group {
    flex: 1;
    min-width: 200px;
}

.system-tabs { 
    display: flex; 
    border-bottom: 1px solid var(--system-border); 
    margin-bottom: 16px; 
    margin-top: 0 !important; 
    flex-shrink: 0; 
}

.system-tab {
    flex: 1; 
    padding: 12px 8px; 
    text-align: center; 
    cursor: pointer;
    font-weight: 500; 
    color: var(--system-text-dim); 
    transition: all 0.2s ease;
    border-bottom: 3px solid transparent; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px;
}
.system-tab:active { 
    background: rgba(59, 130, 246, 0.3); 
}
.system-tab-active { 
    color: var(--system-accent); 
    border-bottom-color: var(--system-accent); 
}
.system-tab .system-badge { 
    font-size: 10px; 
    padding: 2px 6px; 
    margin-left: 4px; 
}

.system-tab-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
}
.system-hidden { display: none !important; }

/* Modal Styles */
.modal-overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    right: 0; 
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 9999;
    display: flex; 
    align-items: center; 
    justify-content: center;
    opacity: 0; 
    visibility: hidden; 
    transition: opacity 0.2s ease, visibility 0.2s ease;
}
.modal-overlay.active { 
    opacity: 1; 
    visibility: visible; 
}

.modal-content {
    background: var(--system-menu-bg) !important;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--system-border) !important;
    border-radius: var(--system-radius-lg); 
    box-shadow: var(--system-shadow) !important;
    width: 90%; 
    max-width: 450px; 
    padding: 24px; 
    text-align: center;
    transform: scale(0.9); 
    transition: transform 0.2s ease;
    max-height: 85dvh; 
    overflow-y: auto;
    color: var(--system-text);
}
.modal-overlay.active .modal-content { 
    transform: scale(1); 
}

.modal-icon {
    width: 80px; 
    height: 80px; 
    background: var(--system-danger);
    opacity: 0.9;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    margin: 0 auto 16px; 
    animation: alarmIconPulse 0.8s infinite;
}
.modal-icon .material-icons { 
    font-size: 48px; 
    color: var(--system-text); 
}

.modal-title { 
    font-size: 22px; 
    font-weight: bold; 
    color: var(--system-text); 
    margin-bottom: 8px; 
}

.modal-count { 
    font-size: 14px; 
    color: var(--system-warning); 
    margin-bottom: 16px; 
    font-weight: 500; 
}

.modal-message { 
    font-size: 14px; 
    color: var(--system-text-dim); 
    margin-bottom: 24px; 
    line-height: 1.5; 
}

.edit-modal-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}
.edit-modal-header .material-icons {
    font-size: 32px;
    color: var(--system-accent);
}

.edit-form-group {
    margin-bottom: 16px;
    text-align: left;
}

.edit-modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
}

.modal-actions { 
    display: flex; 
    gap: 12px; 
    justify-content: center; 
    flex-wrap: wrap; 
    margin-top: 20px; 
}

.alarm-timer-row {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--system-border);
    border-radius: var(--system-radius);
    padding: 12px;
    margin-bottom: 12px;
    text-align: left;
}
.alarm-timer-row:last-child { 
    margin-bottom: 0; 
}

.alarm-timer-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 8px; 
}

.alarm-timer-name { 
    font-size: 18px; 
    font-weight: 600; 
    color: var(--system-accent); 
}

.alarm-timer-duration { 
    font-size: 13px; 
    color: var(--system-text-dim); 
}

.alarm-timer-actions { 
    display: flex; 
    gap: 8px; 
    justify-content: flex-end; 
}

.alarm-timer-btn {
    padding: 6px 12px;
    border-radius: var(--system-radius);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 4px;
    min-height: 32px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--system-border);
    color: var(--system-text);
}
.alarm-timer-btn:active { 
    transform: scale(0.96); 
}

.alarm-progress-bar {
    width: 100%; 
    height: 6px; 
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px; 
    margin-top: 16px; 
    overflow: hidden;
}

.alarm-progress-fill {
    height: 100%; 
    background: linear-gradient(90deg, var(--system-warning), var(--system-danger));
    width: 100%; 
    border-radius: 3px; 
    animation: alarmProgressShrink 60s linear forwards;
}

@keyframes pulseActive { 
    0%,100% { box-shadow: 0 0 5px var(--system-accent); } 
    50% { box-shadow: 0 0 15px var(--system-accent); } 
}

@keyframes alarmPulse { 
    0%,100% { box-shadow: 0 0 10px rgba(239,68,68,0.5); } 
    50% { box-shadow: 0 0 30px rgba(239,68,68,0.9); } 
}

@keyframes alarmIconPulse { 
    0%,100% { transform: scale(1); } 
    50% { transform: scale(1.1); } 
}

@keyframes alarmProgressShrink { 
    from { width: 100%; } 
    to { width: 0%; } 
}

/* Form Inputs */
.system-input, .system-select {
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--system-radius);
    border: 1px solid var(--system-border);
    background: rgba(255,255,255,0.1);
    color: var(--system-text);
    font-family: var(--system-font);
    font-size: 14px;
    box-sizing: border-box;
}
.system-input:focus, .system-select:focus {
    outline: none;
    border-color: var(--system-accent);
    box-shadow: 0 0 0 2px var(--system-accent-dim);
}

.system-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--system-text-dim);
    margin-bottom: 6px;
}

.system-btn {
    padding: 10px 20px;
    border-radius: var(--system-radius);
    border: none;
    background: var(--system-accent);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.system-btn:active { transform: scale(0.98); }
.system-btn-secondary {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--system-border);
    color: var(--system-text);
}
.system-btn-danger {
    background: var(--system-danger);
}
.system-btn-block { width: 100%; }
.system-btn-sm {
    padding: 6px 12px;
    font-size: 12px;
}

.system-mb-2 { margin-bottom: 8px; }
.system-mb-3 { margin-bottom: 12px; }
.system-mt-3 { margin-top: 12px; }
.system-text-center { text-align: center; }
.system-text-small { font-size: 12px; }
.system-text-dim { color: var(--system-text-dim); }
.system-flex { display: flex; }
.system-flex-wrap { flex-wrap: wrap; }

@media (prefers-reduced-motion: reduce) {
    .timer-item.active, 
    .timer-item.alarming, 
    .modal-icon, 
    .alarm-progress-fill,
    .audio-preview-btn.playing,
    .modal-content,
    .modal-overlay { 
        animation: none !important; 
        transition: none !important;
    }
}

@media (max-width: 480px) {
    .timer-item { flex-wrap: wrap; }
    .timer-name { max-width: 100%; min-width: 100%; order: -1; margin-bottom: 8px; }
    .timer-time { font-size: 24px; min-width: 90px; }
    .modal-content { width: 95%; padding: 20px; }
    .modal-actions, .edit-modal-actions { flex-direction: column; }
    .sound-selection-row { flex-direction: column; align-items: stretch; }
    .sound-selection-row .system-form-group { min-width: 100%; }
    .audio-preview-btn { width: 100%; justify-content: center; }
    .timer-controls { width: 100%; justify-content: flex-end; }
}
</style>
</head>
<body data-os-app="true">
<div class="system-app">
    <div class="system-tabs" role="tablist">
        <div class="system-tab system-tab-active" data-tab="create" role="tab" aria-selected="true" tabindex="0">
            <span class="material-icons">add</span> Create
        </div>
        <div class="system-tab" data-tab="timers" role="tab" aria-selected="false" tabindex="0">
            <span class="material-icons">play_circle</span> Run <span class="system-badge" id="totalBadge">0</span>
        </div>
    </div>

    <div id="panel-create" class="system-tab-panel" role="tabpanel">
        <div class="timer-form system-card">
            <div class="system-form-group system-mb-3">
                <label class="system-label">Timer Name</label>
                <input type="text" id="timerNameInput" class="system-input" placeholder="e.g., Focus, Break, Workout" maxlength="30">
            </div>
            <div class="form-input-row system-mb-3">
                <div class="time-input-group"><label class="system-label">H</label><input type="number" id="hoursInput" class="system-input" min="0" max="99" value="0"></div>
                <div class="time-input-group"><label class="system-label">M</label><input type="number" id="minutesInput" class="system-input" min="0" max="59" value="5"></div>
                <div class="time-input-group"><label class="system-label">S</label><input type="number" id="secondsInput" class="system-input" min="0" max="59" value="0"></div>
            </div>
            <div class="system-form-group system-mb-3">
                <label class="system-label">Alarm Sound</label>
                <div class="sound-selection-row">
                    <div class="system-form-group" style="flex:1;min-width:200px;">
                        <select id="alarmSoundInput" class="system-select">
                            <!-- Options populated dynamically by JS -->
                        </select>
                    </div>
                    <button id="previewSoundBtn" class="system-btn system-btn-secondary audio-preview-btn" type="button">
                        <span class="material-icons" id="previewIcon">play_arrow</span>
                        <span id="previewText">Preview</span>
                    </button>
                </div>
            </div>
            <button id="addTimerBtn" class="system-btn system-btn-block">
                <span class="material-icons" style="font-size: 16px; vertical-align: middle; margin-right: 4px;">add</span>
                Create & Switch to Run Tab
            </button>
        </div>

        <div class="presets-container system-card">
            <label class="system-label system-mb-2">Quick Presets:</label>
            <div class="presets-buttons" style="gap: 8px;">
                <button class="system-btn system-btn-secondary preset-btn" data-hours="0" data-minutes="1" data-seconds="0" data-sound="classic">1m</button>
                <button class="system-btn system-btn-secondary preset-btn" data-hours="0" data-minutes="5" data-seconds="0" data-sound="gentle">5m</button>
                <button class="system-btn system-btn-secondary preset-btn" data-hours="0" data-minutes="15" data-seconds="0" data-sound="melody">15m</button>
                <button class="system-btn system-btn-secondary preset-btn" data-hours="0" data-minutes="25" data-seconds="0" data-sound="urgent">25m</button>
                <button class="system-btn system-btn-secondary preset-btn" data-hours="1" data-minutes="0" data-seconds="0" data-sound="mario-coin">1h</button>
            </div>
        </div>
    </div>

    <div id="panel-timers" class="system-tab-panel system-hidden" role="tabpanel" style="display:flex; flex-direction:column; min-height:0;">
        <div id="timersList" class="timer-list-container"></div>
        <div id="emptyState" class="empty-state system-empty system-hidden">
            <span class="material-icons">schedule</span>
            <h3 class="system-heading">No timers ready</h3>
            <p class="system-text system-text-dim">Create a timer in the Create tab to get started</p>
        </div>
    </div>
</div>

<!-- Alarm Modal -->
<div id="alarmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="alarmModalTitle">
    <div class="modal-content">
        <div class="modal-icon"><span class="material-icons">notifications_active</span></div>
        <h2 id="alarmModalTitle" class="modal-title">Timer(s) Complete!</h2>
        <div id="alarmCount" class="modal-count"></div>
        <p id="alarmMessage" class="modal-message">Timer completed. Ready to run again.</p>
        <div id="alarmTimerRows" class="alarm-timer-rows"></div>
        <div class="modal-actions system-flex system-flex-wrap" style="gap: 12px;">
            <button id="btnDismissAll" class="system-btn system-btn-danger">
                <span class="material-icons">close</span>Dismiss All
            </button>
            <button id="btnRestartAll" class="system-btn">
                <span class="material-icons">refresh</span>Restart All
            </button>
        </div>
        <div class="alarm-progress-bar"><div class="alarm-progress-fill" id="alarmProgressBar"></div></div>
        <p class="system-text-small system-text-center system-mt-3">Auto-dismiss in <span id="alarmCountdown">60</span>s</p>
    </div>
</div>

<!-- Edit Timer Modal -->
<div id="editModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-content">
        <div class="edit-modal-header">
            <span class="material-icons">edit</span>
            <h2 id="editModalTitle" class="modal-title">Edit Timer</h2>
        </div>
        
        <div class="edit-form-group">
            <label class="system-label">Timer Name</label>
            <input type="text" id="editTimerNameInput" class="system-input" placeholder="e.g., Focus, Break, Workout" maxlength="30">
        </div>
        
        <div class="form-input-row system-mb-3">
            <div class="time-input-group">
                <label class="system-label">H</label>
                <input type="number" id="editHoursInput" class="system-input" min="0" max="99" value="0">
            </div>
            <div class="time-input-group">
                <label class="system-label">M</label>
                <input type="number" id="editMinutesInput" class="system-input" min="0" max="59" value="5">
            </div>
            <div class="time-input-group">
                <label class="system-label">S</label>
                <input type="number" id="editSecondsInput" class="system-input" min="0" max="59" value="0">
            </div>
        </div>
        
        <div class="system-form-group system-mb-3">
            <label class="system-label">Alarm Sound</label>
            <div class="sound-selection-row">
                <div class="system-form-group" style="flex:1;min-width:200px;">
                    <select id="editAlarmSoundInput" class="system-select">
                        <!-- Options populated dynamically by JS -->
                    </select>
                </div>
                <button id="editPreviewSoundBtn" class="system-btn system-btn-secondary audio-preview-btn" type="button">
                    <span class="material-icons" id="editPreviewIcon">play_arrow</span>
                    <span id="editPreviewText">Preview</span>
                </button>
            </div>
        </div>
        
        <div class="edit-modal-actions system-flex system-flex-wrap" style="gap: 12px;">
            <button id="editModalCancelBtn" class="system-btn system-btn-secondary">
                <span class="material-icons">close</span> Cancel
            </button>
            <button id="editModalSaveBtn" class="system-btn">
                <span class="material-icons">check</span> Save Changes
            </button>
        </div>
    </div>
</div>

<script>
class TimerManager {
    constructor() {
        this.timers = []; 
        this.intervals = {};
        this.audioCtx = null; 
        this.alarmSounds = null;
        this.audioLoops = {};
        this.alarmingIds = [];
        this.autoStopTimeout = null;
        this.activeTab = 'create';
        this.previewOscillator = null;
        this.previewGain = null;
        this.isPreviewPlaying = false;
        this.previewTimeout = null;
        this.editPreviewOscillator = null;
        this.editPreviewGain = null;
        this.isEditPreviewPlaying = false;
        this.editPreviewTimeout = null;
        this.editingTimerId = null;
        this.includePremiumSounds = true;
        this.init();
    }

    async init() {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.alarmSounds = new AlarmSounds(this.audioCtx);
        
        // Expose audioLoops globally for AlarmSounds loop callbacks
        if (typeof window !== 'undefined') {
            window.audioLoops = this.audioLoops;
        }
        
        // Populate sound dropdowns dynamically from AlarmSounds registry
        this.populateSoundDropdowns(this.includePremiumSounds);
        
        const saved = localStorage.getItem('os-timers-data-v5');
        if (saved) { 
            try { 
                this.timers = JSON.parse(saved);
                // Migrate deprecated sound names
                this.timers = this.timers.map(timer => {
                    if (timer.sound === 'minecraft-theme') timer.sound = 'sweden';
                    return timer;
                });
            } catch(e) { this.timers = []; } 
        }
        
        this.initTabs();
        this.initPreviewButton();
        this.initEditPreviewButton();
        this.initEditModal();
        document.getElementById('addTimerBtn').addEventListener('click', () => this.addTimer());
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => this.setPreset(
                btn.dataset.hours, 
                btn.dataset.minutes, 
                btn.dataset.seconds, 
                btn.dataset.sound || 'classic'
            ));
        });
        document.body.addEventListener('click', (e) => this.handleControlClick(e));
        document.getElementById('btnDismissAll').addEventListener('click', () => this.dismissAllAlarms());
        document.getElementById('btnRestartAll').addEventListener('click', () => this.restartAllAlarms());
        window.addEventListener('osThemeChanged', (e) => console.log('Theme updated:', e.detail.themeId));
        window.addEventListener('osBridgeReady', () => this.updateCounts());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('alarmModal').classList.contains('active')) this.dismissAllAlarms();
                if (document.getElementById('editModal').classList.contains('active')) this.closeEditModal();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') { 
                e.preventDefault(); 
                document.getElementById('timerNameInput').focus(); 
            }
        });
        this.renderTimerList();
        setTimeout(() => this.startActiveTimers(), 100);
    }

    /**
     * Populate alarm sound dropdowns from AlarmSounds registry
     * @param {boolean} includePremium - Whether to show premium sounds
     */
    populateSoundDropdowns(includePremium = true) {
        const options = AlarmSounds.getSoundOptions(includePremium);
        const selects = [
            document.getElementById('alarmSoundInput'),
            document.getElementById('editAlarmSoundInput')
        ].filter(el => el);
        
        selects.forEach(select => {
            const currentValue = select.value;
            select.innerHTML = '';
            
            const categories = [...new Set(options.map(o => o.category))];
            
            if (categories.length > 1) {
                categories.forEach(category => {
                    const categorySounds = options.filter(o => o.category === category);
                    if (categorySounds.length === 0) return;
                    
                    const group = document.createElement('optgroup');
                    group.label = category.charAt(0).toUpperCase() + category.slice(1);
                    select.appendChild(group);
                    
                    categorySounds.forEach(sound => {
                        const option = document.createElement('option');
                        option.value = sound.value;
                        option.textContent = sound.label;
                        if (sound.premium) option.dataset.premium = 'true';
                        group.appendChild(option);
                    });
                });
            } else {
                options.forEach(sound => {
                    const option = document.createElement('option');
                    option.value = sound.value;
                    option.textContent = sound.label;
                    if (sound.premium) option.dataset.premium = 'true';
                    select.appendChild(option);
                });
            }
            
            if (currentValue && options.some(o => o.value === currentValue)) {
                select.value = currentValue;
            } else if (options.length > 0) {
                select.value = options[0].value;
            }
        });
    }

    initTabs() {
        document.querySelectorAll('.system-tab').forEach(tab => {
            tab.addEventListener('click', () => this.switchTab(tab.dataset.tab));
            tab.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { 
                    e.preventDefault(); 
                    this.switchTab(tab.dataset.tab); 
                }
            });
        });
    }

    initPreviewButton() {
        const previewBtn = document.getElementById('previewSoundBtn');
        const soundSelect = document.getElementById('alarmSoundInput');
        
        previewBtn.addEventListener('click', () => this.togglePreview());
        
        soundSelect.addEventListener('change', () => {
            if (this.isPreviewPlaying) this.stopPreview();
        });
    }

    initEditPreviewButton() {
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const soundSelect = document.getElementById('editAlarmSoundInput');
        
        previewBtn.addEventListener('click', () => this.toggleEditPreview());
        
        soundSelect.addEventListener('change', () => {
            if (this.isEditPreviewPlaying) this.stopEditPreview();
        });
    }

    initEditModal() {
        document.getElementById('editModalSaveBtn').addEventListener('click', () => this.saveEditTimer());
        document.getElementById('editModalCancelBtn').addEventListener('click', () => this.closeEditModal());
    }

    togglePreview() {
        if (this.isPreviewPlaying) this.stopPreview();
        else this.playPreview();
    }

    playPreview() {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        
        const soundType = document.getElementById('alarmSoundInput').value;
        const previewBtn = document.getElementById('previewSoundBtn');
        const previewIcon = document.getElementById('previewIcon');
        const previewText = document.getElementById('previewText');
        
        previewBtn.classList.add('playing');
        previewIcon.textContent = 'stop';
        previewText.textContent = 'Stop';
        this.isPreviewPlaying = true;
        
        this.alarmSounds.playSoundPattern(soundType, true);
        
        const previewDuration = this.alarmSounds.getSoundDuration(soundType);
        if (this.previewTimeout) clearTimeout(this.previewTimeout);
        this.previewTimeout = setTimeout(() => {
            if (this.isPreviewPlaying) this.stopPreview();
        }, previewDuration);
    }

    stopPreview() {
        const previewBtn = document.getElementById('previewSoundBtn');
        const previewIcon = document.getElementById('previewIcon');
        const previewText = document.getElementById('previewText');
        
        previewBtn.classList.remove('playing');
        previewIcon.textContent = 'play_arrow';
        previewText.textContent = 'Preview';
        this.isPreviewPlaying = false;
        
        if (this.previewTimeout) {
            clearTimeout(this.previewTimeout);
            this.previewTimeout = null;
        }
        
        if (this.alarmSounds) this.alarmSounds.stopAll();
        if (this.previewGain) {
            this.previewGain.disconnect();
            this.previewGain = null;
        }
    }

    toggleEditPreview() {
        if (this.isEditPreviewPlaying) this.stopEditPreview();
        else this.playEditPreview();
    }

    playEditPreview() {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        
        const soundType = document.getElementById('editAlarmSoundInput').value;
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const previewIcon = document.getElementById('editPreviewIcon');
        const previewText = document.getElementById('editPreviewText');
        
        previewBtn.classList.add('playing');
        previewIcon.textContent = 'stop';
        previewText.textContent = 'Stop';
        this.isEditPreviewPlaying = true;
        
        this.alarmSounds.playSoundPattern(soundType, true, null, true);
        
        const previewDuration = this.alarmSounds.getSoundDuration(soundType);
        if (this.editPreviewTimeout) clearTimeout(this.editPreviewTimeout);
        this.editPreviewTimeout = setTimeout(() => {
            if (this.isEditPreviewPlaying) this.stopEditPreview();
        }, previewDuration);
    }

    stopEditPreview() {
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const previewIcon = document.getElementById('editPreviewIcon');
        const previewText = document.getElementById('editPreviewText');
        
        previewBtn.classList.remove('playing');
        previewIcon.textContent = 'play_arrow';
        previewText.textContent = 'Preview';
        this.isEditPreviewPlaying = false;
        
        if (this.editPreviewTimeout) {
            clearTimeout(this.editPreviewTimeout);
            this.editPreviewTimeout = null;
        }
        
        if (this.alarmSounds) this.alarmSounds.stopAll();
        if (this.editPreviewGain) {
            this.editPreviewGain.disconnect();
            this.editPreviewGain = null;
        }
    }

    switchTab(tabId) {
        this.activeTab = tabId;
        document.querySelectorAll('.system-tab').forEach(t => {
            const isActive = t.dataset.tab === tabId;
            t.classList.toggle('system-tab-active', isActive);
            t.setAttribute('aria-selected', isActive);
        });
        document.querySelectorAll('.system-tab-panel').forEach(p => p.classList.add('system-hidden'));
        document.getElementById(`panel-${tabId}`).classList.remove('system-hidden');
        if (tabId === 'timers') this.renderTimerList();
    }

    generateId() { return 'timer-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
    
    saveTimers() { 
        localStorage.setItem('os-timers-data-v5', JSON.stringify(this.timers)); 
        this.updateCounts(); 
    }
    
    setPreset(h, m, s, sound) {
        document.getElementById('hoursInput').value = h;
        document.getElementById('minutesInput').value = m;
        document.getElementById('secondsInput').value = s;
        document.getElementById('alarmSoundInput').value = sound || 'classic';
    }

    addTimer() {
        const name = document.getElementById('timerNameInput').value.trim() || `Timer ${new Date().toLocaleTimeString()}`;
        const h = parseInt(document.getElementById('hoursInput').value || 0);
        const m = parseInt(document.getElementById('minutesInput').value || 0);
        const s = parseInt(document.getElementById('secondsInput').value || 0);
        const sound = document.getElementById('alarmSoundInput').value;
        let totalSeconds = h * 3600 + m * 60 + s;
        if (totalSeconds <= 0) { alert('Please set a valid time duration'); return; }
        const timer = { 
            id: this.generateId(), 
            name, 
            duration: totalSeconds, 
            remaining: totalSeconds, 
            isActive: false, 
            createdAt: Date.now(), 
            completedAt: null, 
            alarmsTriggered: 0, 
            sound 
        };
        this.timers.unshift(timer);
        this.saveTimers();
        this.renderTimerList();
        this.switchTab('timers');
        document.getElementById('timerNameInput').value = '';
        document.getElementById('hoursInput').value = '0';
        document.getElementById('minutesInput').value = '5';
        document.getElementById('secondsInput').value = '0';
    }

    openEditModal(timerId) {
        const timer = this.timers.find(t => t.id === timerId);
        if (!timer) return;
        
        this.editingTimerId = timerId;
        
        if (this.intervals[timerId]) {
            clearInterval(this.intervals[timerId]);
            delete this.intervals[timerId];
            timer.isActive = false;
        }
        
        document.getElementById('editTimerNameInput').value = timer.name;
        
        const hours = Math.floor(timer.duration / 3600);
        const minutes = Math.floor((timer.duration % 3600) / 60);
        const seconds = timer.duration % 60;
        
        document.getElementById('editHoursInput').value = hours;
        document.getElementById('editMinutesInput').value = minutes;
        document.getElementById('editSecondsInput').value = seconds;
        document.getElementById('editAlarmSoundInput').value = timer.sound || 'classic';
        
        document.getElementById('editModal').classList.add('active');
    }

    closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        this.editingTimerId = null;
        this.stopEditPreview();
        this.renderTimerList();
    }

    saveEditTimer() {
        const timer = this.timers.find(t => t.id === this.editingTimerId);
        if (!timer) return;
        
        const name = document.getElementById('editTimerNameInput').value.trim() || timer.name;
        const h = parseInt(document.getElementById('editHoursInput').value || 0);
        const m = parseInt(document.getElementById('editMinutesInput').value || 0);
        const s = parseInt(document.getElementById('editSecondsInput').value || 0);
        const sound = document.getElementById('editAlarmSoundInput').value;
        
        let totalSeconds = h * 3600 + m * 60 + s;
        if (totalSeconds <= 0) { 
            alert('Please set a valid time duration'); 
            return; 
        }
        
        timer.name = name;
        timer.duration = totalSeconds;
        timer.remaining = totalSeconds;
        timer.sound = sound;
        timer.isActive = false;
        timer.completedAt = null;
        
        this.saveTimers();
        this.closeEditModal();
        this.renderTimerList();
    }

    startTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer || timer.remaining <= 0) return;
        timer.isActive = true; 
        timer.completedAt = null;
        this.saveTimers();
        this.intervals[id] = setInterval(() => {
            timer.remaining--;
            this.updateTimerDisplay(id);
            if (timer.remaining <= 0) this.completeTimer(id);
            else this.saveTimers();
        }, 1000);
        this.renderTimerList();
        this.updateCounts();
    }

    stopTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        timer.remaining = timer.duration; 
        timer.isActive = false; 
        timer.completedAt = null;
        this.stopAudioIfNotAlarming(id);
        this.saveTimers(); 
        this.renderTimerList();
    }

    completeTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        timer.alarmsTriggered++; 
        timer.remaining = timer.duration; 
        timer.isActive = false; 
        timer.completedAt = Date.now();
        if (!this.alarmingIds.includes(id)) { this.alarmingIds.push(id); }
        this.saveTimers(); 
        this.renderTimerList(); 
        this.updateCounts();
        this.showAlarmModal(); 
        this.playAlarmSound(id);
        if ('Notification' in window && Notification.permission === 'granted') {
            const count = this.alarmingIds.length;
            const title = count > 1 ? `${count} Timer${count > 1 ? 's' : ''} Complete!` : `${timer.name} Complete!`;
            new Notification(title, { body: `Timer(s) finished. See details in app.`, tag: 'multiple-timers' });
        }
    }

    showAlarmModal() {
        if (this.alarmingIds.length === 0) return;
        const modal = document.getElementById('alarmModal');
        modal.classList.add('active');
        const countEl = document.getElementById('alarmCount');
        const count = this.alarmingIds.length;
        if (count === 1) { countEl.textContent = `${count} timer completed`; } 
        else { countEl.textContent = `${count} timers completed!`; }
        const rowsContainer = document.getElementById('alarmTimerRows');
        rowsContainer.innerHTML = '';
        this.alarmingIds.forEach(id => {
            const timer = this.timers.find(t => t.id === id);
            if (!timer) return;
            const row = document.createElement('div');
            row.className = 'alarm-timer-row';
            row.id = `alarm-row-${id}`;
            row.innerHTML = `
                <div class="alarm-timer-header">
                    <span class="alarm-timer-name">${timer.name}</span>
                    <span class="alarm-timer-duration">${this.formatTime(timer.duration)}</span>
                </div>
                <div class="alarm-timer-actions system-flex" style="gap: 8px;">
                    <button class="system-btn system-btn-sm system-btn-secondary alarm-timer-btn-dismiss" onclick="timerApp.dismissSingleAlarm('${id}')">
                        <span class="material-icons" style="font-size:14px;">check</span>Dismiss
                    </button>
                    <button class="system-btn system-btn-sm alarm-timer-btn-restart" onclick="timerApp.restartSingleTimer('${id}')">
                        <span class="material-icons" style="font-size:14px;">refresh</span>Restart
                    </button>
                    <button class="system-btn system-btn-sm system-btn-danger alarm-timer-btn-delete" onclick="timerApp.deleteTimerFromModal('${id}')">
                        <span class="material-icons" style="font-size:14px;">delete</span>Delete
                    </button>
                </div>`;
            rowsContainer.appendChild(row);
        });
        document.getElementById('alarmCountdown').textContent = '60';
        const pb = document.getElementById('alarmProgressBar');
        pb.style.animation = 'none'; 
        void pb.offsetWidth; 
        pb.style.animation = 'alarmProgressShrink 60s linear forwards';
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout);
        this.autoStopTimeout = setTimeout(() => this.autoDismissAll(), 60000);
        const cd = setInterval(() => { 
            const el = document.getElementById('alarmCountdown'); 
            const v = parseInt(el.textContent); 
            if(v > 0) el.textContent = v - 1; 
            else clearInterval(cd); 
        }, 1000);
        modal.countdownInterval = cd;
    }

    hideAlarmModal() {
        const modal = document.getElementById('alarmModal');
        modal.classList.remove('active');
        if (modal.countdownInterval) { 
            clearInterval(modal.countdownInterval); 
            modal.countdownInterval = null; 
        }
    }

    autoDismissAll() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        this.clearAlarmingState(); 
    }
    
    clearAlarmingState() { 
        this.alarmingIds = []; 
        this.renderTimerList(); 
        this.updateCounts(); 
    }
    
    dismissAllAlarms() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
        this.clearAlarmingState(); 
    }
    
    restartAllAlarms() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
        this.alarmingIds.forEach(id => { 
            if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; } 
        });
        this.alarmingIds.forEach(id => this.startTimer(id)); 
        this.clearAlarmingState(); 
    }
    
    dismissSingleAlarm(id) {
        const idx = this.alarmingIds.indexOf(id);
        if (idx !== -1) { this.alarmingIds.splice(idx, 1); }
        this.stopAlarmSound(id); 
        this.renderTimerList();
        if (this.alarmingIds.length > 0) { this.showAlarmModal(); } 
        else { this.hideAlarmModal(); if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); }
    }
    
    restartSingleTimer(id) {
        const idx = this.alarmingIds.indexOf(id);
        if (idx !== -1) { this.alarmingIds.splice(idx, 1); }
        this.stopAlarmSound(id);
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        this.startTimer(id); 
        this.renderTimerList();
        if (this.alarmingIds.length > 0) { this.showAlarmModal(); } 
        else { this.hideAlarmModal(); if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); }
    }
    
    deleteTimerFromModal(id) { 
        this.dismissSingleAlarm(id); 
        this.deleteTimer(id); 
    }

    playAlarmSound(id) {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        
        this.alarmSounds.playSoundPattern(timer.sound || 'classic', false, id);
        
        const loopInterval = this.alarmSounds.getLoopInterval(timer.sound || 'classic');
        this.audioLoops[id] = setInterval(() => {
            this.alarmSounds.playSoundPattern(timer.sound || 'classic', false, id);
        }, loopInterval);
    }
    
    stopAlarmSound(id) { 
        if (this.audioLoops[id]) { 
            clearInterval(this.audioLoops[id]); 
            delete this.audioLoops[id]; 
        }
        if (this.alarmSounds) this.alarmSounds.stopAll();
    }
    
    stopAllAlarmSounds() { 
        Object.keys(this.audioLoops).forEach(id => this.stopAlarmSound(id)); 
        if (this.alarmSounds) this.alarmSounds.stopAll();
    }
    
    stopAudioIfNotAlarming(id) { 
        if (!this.alarmingIds.includes(id)) this.stopAlarmSound(id); 
    }
    
    toggleTimerStatus(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (timer.isActive) this.stopTimer(id); else this.startTimer(id);
    }
    
    deleteTimer(id) {
        const idx = this.timers.findIndex(t => t.id === id);
        if (idx === -1) return;
        clearInterval(this.intervals[id]); delete this.intervals[id];
        if (this.audioLoops[id]) { this.stopAlarmSound(id); }
        const alarmIdx = this.alarmingIds.indexOf(id);
        if (alarmIdx !== -1) { this.alarmingIds.splice(alarmIdx, 1); }
        if (this.alarmingIds.length === 0) { this.stopAllAlarmSounds(); this.hideAlarmModal(); }
        this.timers.splice(idx, 1); 
        this.saveTimers(); 
        this.renderTimerList(); 
        this.updateCounts();
    }
    
    handleControlClick(e) {
        const btn = e.target.closest('.timer-control-btn');
        if (!btn) return;
        const action = btn.dataset.action, id = btn.dataset.timerId;
        switch(action) {
            case 'toggle': this.toggleTimerStatus(id); break;
            case 'delete': if (confirm('Delete this timer?')) this.deleteTimer(id); break;
            case 'edit': this.openEditModal(id); break;
        }
    }
    
    formatTime(seconds) {
        const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
        return h>0 ? `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    
    updateTimerDisplay(id) {
        const el = document.getElementById(`time-${id}`);
        const timerEl = document.getElementById(`timer-${id}`);
        const timer = this.timers.find(t => t.id === id);
        if (el && timer) {
            el.textContent = this.formatTime(timer.remaining);
            el.style.color = timer.remaining <= 30 ? 'var(--system-warning)' : timer.remaining <= 60 ? 'var(--system-highlight)' : 'var(--system-accent)';
            if (timer.remaining <= 5 && timer.remaining > 0 && timerEl) {
                timerEl.style.transform = 'translateX(2px)';
                setTimeout(()=>{ timerEl.style.transform='translateX(-2px)'; setTimeout(()=>timerEl.style.transform='',50); },50);
            }
        }
    }
    
    updateCounts() { 
        document.getElementById('totalBadge').textContent = this.timers.length; 
    }
    
    getSortedTimers() {
        return [...this.timers].sort((a, b) => {
            if (a.isActive && !b.isActive) return -1;
            if (!a.isActive && b.isActive) return 1;
            if (a.alarmsTriggered !== b.alarmsTriggered) return b.alarmsTriggered - a.alarmsTriggered;
            return b.createdAt - a.createdAt;
        });
    }
    
    renderTimerList() {
        const list = document.getElementById('timersList');
        const empty = document.getElementById('emptyState');
        list.innerHTML = '';
        const sorted = this.getSortedTimers();
        if (sorted.length === 0) { empty.classList.remove('system-hidden'); }
        else { empty.classList.add('system-hidden'); sorted.forEach(timer => this.renderTimerItem(timer)); }
        this.updateCounts();
    }
    
    renderTimerItem(timer) {
        const el = document.createElement('div');
        const stateClass = timer.isActive ? 'active' : (timer.completedAt ? 'ready' : '');
        const isAlarming = this.alarmingIds.includes(timer.id);
        el.className = `timer-item system-card ${stateClass} ${isAlarming ? 'alarming' : ''}`;
        el.id = `timer-${timer.id}`;
        el.setAttribute('role', 'button'); 
        el.setAttribute('tabindex', '0');
        el.onkeydown = (e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); this.toggleTimerStatus(timer.id); }};
        const toggleIcon = timer.isActive ? 'stop' : 'play_arrow';
        const toggleLabel = timer.isActive ? 'Stop & Reset' : 'Start';
        el.innerHTML = `
            <div class="timer-time" id="time-${timer.id}">${this.formatTime(timer.remaining)}</div>
            <div class="timer-name" title="${timer.name}">${timer.name}${timer.alarmsTriggered>0?` (${timer.alarmsTriggered}x)`:''}</div>
            <div class="timer-controls">
                <button class="timer-control-btn system-btn ${timer.isActive ? 'system-btn-danger' : ''}" data-action="toggle" data-timer-id="${timer.id}" aria-label="${toggleLabel}">
                    <span class="material-icons">${toggleIcon}</span>
                </button>
                <button class="timer-control-btn system-btn system-btn-danger" data-action="delete" data-timer-id="${timer.id}" aria-label="Delete">
                    <span class="material-icons">delete</span>
                </button>
                <button class="timer-control-btn system-btn system-btn-secondary" data-action="edit" data-timer-id="${timer.id}" aria-label="Edit">
                    <span class="material-icons">edit</span>
                </button>
            </div>`;
        document.getElementById('timersList').appendChild(el);
    }
    
    startActiveTimers() { 
        this.timers.forEach(t => { if(t.isActive && t.remaining>0) this.startTimer(t.id); }); 
    }
}

// Initialize app when DOM is ready
window.addEventListener('load', () => { 
    window.timerApp = new TimerManager(); 
});

// Cleanup on page unload
window.addEventListener('beforeunload', () => { 
    if(window.timerApp) { 
        Object.values(window.timerApp.intervals).forEach(clearInterval); 
        window.timerApp.stopAllAlarmSounds(); 
        window.timerApp.stopPreview();
        window.timerApp.stopEditPreview();
    } 
});
</script>
</body>
