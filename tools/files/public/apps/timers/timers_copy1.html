<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Timers</title>
<!-- REQUIRED: Bridge CSS for .system-* classes (MUST be first) -->
<link rel="stylesheet" href="/os-theme-bridge.css" />
<!-- REQUIRED: Bridge JS for theme sync (MUST be after CSS) -->
<script src="/os-theme-bridge.js"></script>
<!-- REQUIRED: Material Icons Font -->
<style>
@font-face {
font-family: 'Material Icons';
src: url('/system/fonts/MaterialIcons-Regular.ttf') format('truetype');
font-weight: normal;
font-style: normal;
font-display: block;
}
.mat-icon {
font-family: 'Material Icons', sans-serif !important;
font-feature-settings: 'liga';
}

/* ============== TIMER APP STYLES ============== */
body { margin: 0; padding: 16px; background: var(--system-bg); color: var(--system-text); font-family: var(--system-font); min-height: 100dvh; }

.timer-item {
background: var(--system-window-bg); border: 1px solid var(--system-border);
border-radius: var(--system-radius); padding: 16px; margin-bottom: 12px;
display: flex; align-items: center; justify-content: space-between; gap: 12px;
transition: all 0.2s ease;
}
.timer-item.active { border-color: var(--system-accent); animation: pulseActive 2s infinite; }
.timer-item.alarming { border-color: var(--system-danger); box-shadow: 0 0 20px rgba(244,67,54,0.5); animation: alarmPulse 0.5s infinite; }
.timer-item.ready { border-color: var(--system-success); }

.timer-time {
font-size: 28px; font-weight: bold; color: var(--system-accent);
font-family: var(--system-font-mono), monospace; letter-spacing: 2px;
min-width: 110px; text-align: center; line-height: 1.2;
}
.timer-name {
font-size: 14px; color: var(--system-text-dim); flex: 1; max-width: 140px;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.timer-controls { display: flex; gap: 6px; flex-shrink: 0; }

.timer-btn {
padding: 8px 12px; border-radius: var(--system-radius); border: none; cursor: pointer;
font-size: 16px; transition: all 0.2s ease; display: flex; align-items: center;
justify-content: center; min-width: 40px; height: 40px;
}
.timer-btn-primary { background: var(--system-accent); color: var(--system-text-on-accent); }
.timer-btn-danger { background: var(--system-danger); color: var(--system-text-on-accent); }
.timer-btn-stop { background: var(--system-warning); color: var(--system-text-on-accent); }
.timer-btn:active { transform: scale(0.95); opacity: 0.9; }

.timer-form {
margin-bottom: 16px; background: var(--system-window-bg); padding: 16px;
border-radius: var(--system-radius); border: 1px solid var(--system-border);
}
.timer-list-container { flex: 1; overflow-y: auto; max-height: calc(100dvh - 240px); padding-right: 4px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--system-text-dim); }
.empty-state .mat-icon { font-size: 64px; opacity: 0.3; margin-bottom: 16px; display: block; }
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-bottom: 12px; }
.status-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.status-indicator.active { color: var(--system-accent); }
.status-indicator.alarming { color: var(--system-danger); }

.form-input-row { display: flex; gap: 12px; align-items: flex-end; }
.time-input-group { flex: 1; min-width: 0; }
.presets-container { margin-bottom: 16px; }
.presets-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.preset-btn {
background: var(--system-window-bg); border: 1px solid var(--system-border);
color: var(--system-text); padding: 8px 16px; border-radius: var(--system-radius);
font-size: 13px; cursor: pointer; transition: all 0.2s ease;
}
.preset-btn:active { background: var(--system-accent-dim); border-color: var(--system-accent); }

/* TABS (At Very Top Now) */
.system-tabs { display: flex; border-bottom: 1px solid var(--system-border); margin-bottom: 16px; margin-top: 0 !important; }
.system-tab {
flex: 1; padding: 12px 8px; text-align: center; cursor: pointer;
font-weight: 500; color: var(--system-text-dim); transition: all 0.2s ease;
border-bottom: 3px solid transparent; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.system-tab:active { background: var(--system-accent-dim); }
.system-tab-active { color: var(--system-accent); border-bottom-color: var(--system-accent); }
.system-tab .system-badge { font-size: 10px; padding: 2px 6px; margin-left: 4px; }

/* MODAL - Multi-alarm support */
.modal-overlay {
position: fixed; top: 0; left: 0; right: 0; bottom: 0;
background: rgba(0,0,0,0.7); z-index: 9999;
display: flex; align-items: center; justify-content: center;
opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-content {
background: var(--system-window-bg); border: 1px solid var(--system-border);
border-radius: var(--system-radius-lg); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
width: 90%; max-width: 450px; padding: 24px; text-align: center;
transform: scale(0.9); transition: transform 0.2s ease;
max-height: 85dvh; overflow-y: auto;
}
.modal-overlay.active .modal-content { transform: scale(1); }
.modal-icon {
width: 80px; height: 80px; background: var(--system-danger);
border-radius: 50%; display: flex; align-items: center; justify-content: center;
margin: 0 auto 16px; animation: alarmIconPulse 0.8s infinite;
}
.modal-icon .mat-icon { font-size: 48px; color: var(--system-text-on-accent); }
.modal-title { font-size: 22px; font-weight: bold; color: var(--system-text); margin-bottom: 8px; }
.modal-count { font-size: 14px; color: var(--system-warning); margin-bottom: 16px; font-weight: 500; }
.modal-message { font-size: 14px; color: var(--system-text-dim); margin-bottom: 24px; line-height: 1.5; }

/* Timer rows in multi-alarm modal */
.alarm-timer-row {
background: var(--system-bg);
border: 1px solid var(--system-border);
border-radius: var(--system-radius);
padding: 12px;
margin-bottom: 12px;
text-align: left;
}
.alarm-timer-row:last-child { margin-bottom: 0; }
.alarm-timer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.alarm-timer-name { font-size: 16px; font-weight: 600; color: var(--system-accent); }
.alarm-timer-duration { font-size: 13px; color: var(--system-text-dim); }
.alarm-timer-actions { display: flex; gap: 8px; justify-content: flex-end; }
.alarm-timer-btn {
padding: 6px 12px;
border-radius: var(--system-radius-sm, 4px);
border: none;
cursor: pointer;
font-size: 12px;
font-weight: 500;
transition: all 0.2s ease;
display: flex;
align-items: center;
gap: 4px;
min-height: 32px;
}
.alarm-timer-btn:active { transform: scale(0.96); }
.alarm-timer-btn-dismiss { background: var(--system-warning); color: var(--system-text-on-accent); }
.alarm-timer-btn-restart { background: var(--system-accent); color: var(--system-text-on-accent); }
.alarm-timer-btn-delete { background: var(--system-danger); color: var(--system-text-on-accent); }

.modal-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.modal-btn {
flex: 1; min-width: 120px; padding: 14px 20px; border-radius: var(--system-radius);
border: none; cursor: pointer; font-size: 14px; font-weight: 600;
transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.modal-btn-dismiss { background: var(--system-warning); color: var(--system-text-on-accent); }
.modal-btn-reset { background: var(--system-accent); color: var(--system-text-on-accent); }
.modal-btn:active { transform: scale(0.96); opacity: 0.9; }

.alarm-progress-bar {
width: 100%; height: 6px; background: var(--system-border);
border-radius: 3px; margin-top: 16px; overflow: hidden;
}
.alarm-progress-fill {
height: 100%; background: linear-gradient(90deg, var(--system-warning), var(--system-danger));
width: 100%; border-radius: 3px; animation: alarmProgressShrink 60s linear forwards;
}

@keyframes pulseActive { 0%,100%{box-shadow:0 0 5px var(--system-accent)} 50%{box-shadow:0 0 15px var(--system-accent)} }
@keyframes alarmPulse { 0%,100%{box-shadow:0 0 10px rgba(244,67,54,0.5)} 50%{box-shadow:0 0 30px rgba(244,67,54,0.9)} }
@keyframes alarmIconPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes alarmProgressShrink { from{width:100%} to{width:0%} }

@media (prefers-reduced-motion: reduce) {
.timer-item.active, .timer-item.alarming, .modal-icon, .alarm-progress-fill { animation: none !important; }
.timer-item.active { box-shadow: 0 0 10px var(--system-accent) !important; }
.timer-item.alarming { box-shadow: 0 0 20px rgba(244,67,54,0.5) !important; }
}
@media (max-width: 480px) {
.timer-item { flex-wrap: wrap; }
.timer-name { max-width: 100%; min-width: 100%; order: -1; margin-bottom: 8px; }
.timer-time { font-size: 24px; min-width: 90px; }
.modal-content { width: 95%; padding: 20px; }
.modal-actions { flex-direction: column; }
.modal-btn { min-width: 100%; }
}
</style>
</head>
<body data-os-app="true">
<div class="system-app">
<!-- TABS NOW AT VERY TOP (No header above) -->
<div class="system-tabs" role="tablist">
<div class="system-tab system-tab-active" data-tab="create" role="tab" aria-selected="true" tabindex="0">
<span class="mat-icon" data-icon-group="action-primary">add</span> Create
</div>
<div class="system-tab" data-tab="timers" role="tab" aria-selected="false" tabindex="0">
<span class="mat-icon" data-icon-group="navigation">play_circle</span> Run <span class="system-badge" id="totalBadge">0</span>
</div>
</div>

<!-- TAB 1: CREATE -->
<div id="panel-create" class="system-tab-panel" role="tabpanel">
<div class="timer-form system-p-3">
<div class="system-form-group system-mb-3">
<label class="system-label">Timer Name</label>
<input type="text" id="timerNameInput" class="system-input" placeholder="e.g., Focus, Break, Workout" maxlength="30">
</div>
<div class="form-input-row system-mb-3">
<div class="time-input-group"><label class="system-label">H</label><input type="number" id="hoursInput" class="system-input" min="0" max="99" value="0"></div>
<div class="time-input-group"><label class="system-label">M</label><input type="number" id="minutesInput" class="system-input" min="0" max="59" value="5"></div>
<div class="time-input-group"><label class="system-label">S</label><input type="number" id="secondsInput" class="system-input" min="0" max="59" value="0"></div>
</div>
<div class="system-form-group system-mb-3">
<label class="system-label">Alarm Sound</label>
<select id="alarmSoundInput" class="system-select">
<option value="classic">Classic Beep</option>
<option value="gentle">Gentle Chime</option>
<option value="urgent">Urgent Pulse</option>
<option value="melody">Ascending Melody</option>
</select>
</div>
<button id="addTimerBtn" class="system-btn btn-add timer-btn-primary" style="width: 100%;">
<span class="mat-icon" style="font-size: 16px; vertical-align: middle; margin-right: 4px;" data-icon-group="action-primary">add</span>
Create & Switch to Run Tab
</button>
</div>

<div class="presets-container system-p-3">
<label class="system-label system-mb-2">Quick Presets:</label>
<div class="presets-buttons">
<button class="preset-btn" data-hours="0" data-minutes="1" data-seconds="0" data-sound="classic">1m</button>
<button class="preset-btn" data-hours="0" data-minutes="5" data-seconds="0" data-sound="gentle">5m</button>
<button class="preset-btn" data-hours="0" data-minutes="15" data-seconds="0" data-sound="melody">15m</button>
<button class="preset-btn" data-hours="0" data-minutes="25" data-seconds="0" data-sound="urgent">25m</button>
<button class="preset-btn" data-hours="1" data-minutes="0" data-seconds="0" data-sound="classic">1h</button>
</div>
</div>
</div>

<!-- TAB 2: RUN -->
<div id="panel-timers" class="system-tab-panel system-hidden" role="tabpanel">
<div id="timersList" class="timer-list-container"></div>
<div id="emptyState" class="empty-state system-hidden">
<span class="mat-icon" data-icon-group="status-info">schedule</span>
<h3 class="system-heading">No timers ready</h3>
<p class="system-text">Create a timer in the Create tab to get started</p>
</div>
</div>
</div>

<!-- ALARM MODAL (Multi-alarm support) -->
<div id="alarmModal" class="modal-overlay">
<div class="modal-content">
<div class="modal-icon"><span class="mat-icon" data-icon-group="status-warning">notifications_active</span></div>
<h2 class="modal-title">Timer(s) Complete!</h2>
<div id="alarmCount" class="modal-count"></div>
<p id="alarmMessage" class="modal-message">Timer completed. Ready to run again.</p>
<div id="alarmTimerRows" class="alarm-timer-rows"></div>
<div class="modal-actions">
<button id="btnDismissAll" class="modal-btn modal-btn-dismiss">
<span class="mat-icon" data-icon-group="action-destructive">close</span>Dismiss All
</button>
<button id="btnRestartAll" class="modal-btn modal-btn-reset">
<span class="mat-icon" data-icon-group="system">refresh</span>Restart All
</button>
</div>
<div class="alarm-progress-bar"><div class="alarm-progress-fill" id="alarmProgressBar"></div></div>
<p class="system-text-small system-text-center system-mt-3">Auto-dismiss in <span id="alarmCountdown">60</span>s</p>
</div>
</div>

<script>
class TimerManager {
constructor() {
this.timers = []; 
this.intervals = {};
this.audioCtx = null; 
this.audioLoops = {}; // Track per-timer audio loops
this.alarmingIds = []; // Array of timer IDs currently alarming
this.autoStopTimeout = null;
this.activeTab = 'create';
this.init();
}

async init() {
this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const saved = localStorage.getItem('os-timers-data-v5');
if (saved) { try { this.timers = JSON.parse(saved); } catch(e) { this.timers = []; } }

// Tab init
this.initTabs();

document.getElementById('addTimerBtn').addEventListener('click', () => this.addTimer());
document.querySelectorAll('.preset-btn').forEach(btn => {
btn.addEventListener('click', () => this.setPreset(btn.dataset.hours, btn.dataset.minutes, btn.dataset.seconds, btn.dataset.sound || 'classic'));
});
document.body.addEventListener('click', (e) => this.handleControlClick(e));

document.getElementById('btnDismissAll').addEventListener('click', () => this.dismissAllAlarms());
document.getElementById('btnRestartAll').addEventListener('click', () => this.restartAllAlarms());

window.addEventListener('osThemeChanged', (e) => console.log('Theme updated:', e.detail.themeId));
window.addEventListener('osBridgeReady', () => this.updateCounts());
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape' && document.getElementById('alarmModal').classList.contains('active')) this.dismissAllAlarms();
if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); document.getElementById('timerNameInput').focus(); }
});

this.renderTimerList();
setTimeout(() => this.startActiveTimers(), 100);
}

initTabs() {
document.querySelectorAll('.system-tab').forEach(tab => {
tab.addEventListener('click', () => this.switchTab(tab.dataset.tab));
tab.addEventListener('keydown', (e) => {
if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.switchTab(tab.dataset.tab); }
});
});
}

switchTab(tabId) {
this.activeTab = tabId;
document.querySelectorAll('.system-tab').forEach(t => {
const isActive = t.dataset.tab === tabId;
t.classList.toggle('system-tab-active', isActive);
t.setAttribute('aria-selected', isActive);
});
document.querySelectorAll('.system-tab-panel').forEach(p => p.classList.add('system-hidden'));
document.getElementById(`panel-${tabId}`).classList.remove('system-hidden');
if (tabId === 'timers') this.renderTimerList();
}

generateId() { return 'timer-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
saveTimers() { localStorage.setItem('os-timers-data-v5', JSON.stringify(this.timers)); this.updateCounts(); }
setPreset(h, m, s, sound) {
document.getElementById('hoursInput').value = h;
document.getElementById('minutesInput').value = m;
document.getElementById('secondsInput').value = s;
document.getElementById('alarmSoundInput').value = sound || 'classic';
}

addTimer() {
const name = document.getElementById('timerNameInput').value.trim() || `Timer ${new Date().toLocaleTimeString()}`;
const h = parseInt(document.getElementById('hoursInput').value || 0);
const m = parseInt(document.getElementById('minutesInput').value || 0);
const s = parseInt(document.getElementById('secondsInput').value || 0);
const sound = document.getElementById('alarmSoundInput').value;
let totalSeconds = h * 3600 + m * 60 + s;
if (totalSeconds <= 0) { alert('Please set a valid time duration'); return; }

const timer = { id: this.generateId(), name, duration: totalSeconds, remaining: totalSeconds, isActive: false, createdAt: Date.now(), completedAt: null, alarmsTriggered: 0, sound };
this.timers.unshift(timer);
this.saveTimers();
this.renderTimerList();

// Auto-switch to Run tab
this.switchTab('timers');

document.getElementById('timerNameInput').value = '';
document.getElementById('hoursInput').value = '0';
document.getElementById('minutesInput').value = '5';
document.getElementById('secondsInput').value = '0';
}

startTimer(id) {
const timer = this.timers.find(t => t.id === id);
if (!timer || timer.remaining <= 0) return;
timer.isActive = true; timer.completedAt = null;
this.saveTimers();
this.intervals[id] = setInterval(() => {
timer.remaining--;
this.updateTimerDisplay(id);
if (timer.remaining <= 0) this.completeTimer(id);
else this.saveTimers();
}, 1000);
this.renderTimerList();
this.updateCounts();
}

stopTimer(id) {
const timer = this.timers.find(t => t.id === id);
if (!timer) return;
if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
timer.remaining = timer.duration; timer.isActive = false; timer.completedAt = null;
this.stopAudioIfNotAlarming(id);
this.saveTimers(); this.renderTimerList();
}

completeTimer(id) {
const timer = this.timers.find(t => t.id === id);
if (!timer) return;
if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
timer.alarmsTriggered++; timer.remaining = timer.duration; timer.isActive = false; timer.completedAt = Date.now();

// Check if already alarming (multi-alarm scenario)
if (!this.alarmingIds.includes(id)) {
    this.alarmingIds.push(id);
}

this.saveTimers(); this.renderTimerList(); this.updateCounts();
this.showAlarmModal(); this.playAlarmSound(id);

if ('Notification' in window && Notification.permission === 'granted') {
    const count = this.alarmingIds.length;
    const title = count > 1 ? `${count} Timer${count > 1 ? 's' : ''} Complete!` : `${timer.name} Complete!`;
    new Notification(title, { body: `Timer(s) finished. See details in app.`, tag: 'multiple-timers' });
}
}

showAlarmModal() {
if (this.alarmingIds.length === 0) return;

const modal = document.getElementById('alarmModal');
modal.classList.add('active');

// Update count
const countEl = document.getElementById('alarmCount');
const count = this.alarmingIds.length;
if (count === 1) {
    countEl.textContent = `${count} timer completed`;
} else {
    countEl.textContent = `${count} timers completed!`;
}

// Render individual timer rows
const rowsContainer = document.getElementById('alarmTimerRows');
rowsContainer.innerHTML = '';

this.alarmingIds.forEach(id => {
    const timer = this.timers.find(t => t.id === id);
    if (!timer) return;
    
    const row = document.createElement('div');
    row.className = 'alarm-timer-row';
    row.id = `alarm-row-${id}`;
    
    row.innerHTML = `
        <div class="alarm-timer-header">
            <span class="alarm-timer-name">${timer.name}</span>
            <span class="alarm-timer-duration">${this.formatTime(timer.duration)}</span>
        </div>
        <div class="alarm-timer-actions">
            <button class="alarm-timer-btn alarm-timer-btn-dismiss" onclick="timerApp.dismissSingleAlarm('${id}')">
                <span class="mat-icon" style="font-size:14px;">check</span>Dismiss
            </button>
            <button class="alarm-timer-btn alarm-timer-btn-restart" onclick="timerApp.restartSingleTimer('${id}')">
                <span class="mat-icon" style="font-size:14px;">refresh</span>Restart
            </button>
            <button class="alarm-timer-btn alarm-timer-btn-delete" onclick="timerApp.deleteTimerFromModal('${id}')">
                <span class="mat-icon" style="font-size:14px;">delete</span>Delete
            </button>
        </div>`;
    
    rowsContainer.appendChild(row);
});

// Reset countdown bar
document.getElementById('alarmCountdown').textContent = '60';
const pb = document.getElementById('alarmProgressBar');
pb.style.animation = 'none'; void pb.offsetWidth; pb.style.animation = 'alarmProgressShrink 60s linear forwards';

if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout);
this.autoStopTimeout = setTimeout(() => this.autoDismissAll(), 60000);

const cd = setInterval(() => { 
    const el = document.getElementById('alarmCountdown'); 
    const v = parseInt(el.textContent); 
    if(v > 0) el.textContent = v - 1; 
    else clearInterval(cd); 
}, 1000);
modal.countdownInterval = cd;
}

hideAlarmModal() {
const modal = document.getElementById('alarmModal');
modal.classList.remove('active');
if (modal.countdownInterval) { 
    clearInterval(modal.countdownInterval); 
    modal.countdownInterval = null; 
}
}

autoDismissAll() { this.stopAllAlarmSounds(); this.hideAlarmModal(); this.clearAlarmingState(); }

clearAlarmingState() {
    this.alarmingIds = [];
    this.renderTimerList();
    this.updateCounts();
}

dismissAllAlarms() { 
    this.stopAllAlarmSounds(); 
    this.hideAlarmModal(); 
    if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
    this.clearAlarmingState(); 
}

restartAllAlarms() { 
    this.stopAllAlarmSounds(); 
    this.hideAlarmModal(); 
    if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
    // Clear intervals before restarting
    this.alarmingIds.forEach(id => {
        if (this.intervals[id]) {
            clearInterval(this.intervals[id]);
            delete this.intervals[id];
        }
    });
    // Restart each timer
    this.alarmingIds.forEach(id => this.startTimer(id));
    this.clearAlarmingState(); 
}

// Individual timer controls in modal
dismissSingleAlarm(id) {
    const idx = this.alarmingIds.indexOf(id);
    if (idx !== -1) {
        this.alarmingIds.splice(idx, 1);
    }
    this.stopAlarmSound(id);
    this.renderTimerList();
    
    // Update modal if still has alarms
    if (this.alarmingIds.length > 0) {
        this.showAlarmModal();
    } else {
        this.hideAlarmModal();
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout);
    }
}

restartSingleTimer(id) {
    const idx = this.alarmingIds.indexOf(id);
    if (idx !== -1) {
        this.alarmingIds.splice(idx, 1);
    }
    this.stopAlarmSound(id);
    
    // Clear interval before restarting
    if (this.intervals[id]) {
        clearInterval(this.intervals[id]);
        delete this.intervals[id];
    }
    
    this.startTimer(id);
    this.renderTimerList();
    
    // Update modal if still has alarms
    if (this.alarmingIds.length > 0) {
        this.showAlarmModal();
    } else {
        this.hideAlarmModal();
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout);
    }
}

deleteTimerFromModal(id) {
    this.dismissSingleAlarm(id);
    this.deleteTimer(id);
}

playAlarmSound(id) {
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    const timer = this.timers.find(t => t.id === id);
    if (!timer) return;
    this.playSoundPattern(timer.sound || 'classic');
    this.audioLoops[id] = setInterval(() => this.playSoundPattern(timer.sound || 'classic'), 1200);
}

playSoundPattern(type) {
    if (!this.audioCtx || this.audioCtx.state !== 'running') return;
    const now = this.audioCtx.currentTime; 
    const osc = this.audioCtx.createOscillator(); 
    const gain = this.audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(this.audioCtx.destination);
    
    switch(type) {
        case 'classic': 
            osc.frequency.setValueAtTime(880, now); 
            osc.frequency.setValueAtTime(1100, now+0.15); 
            osc.type='square'; 
            gain.gain.setValueAtTime(0.2, now); 
            gain.gain.exponentialRampToValueAtTime(0.01, now+0.45); 
            osc.start(now); 
            osc.stop(now+0.45); 
            break;
        case 'gentle': 
            osc.frequency.setValueAtTime(523.25, now); 
            osc.type='sine'; 
            gain.gain.setValueAtTime(0.15, now); 
            gain.gain.exponentialRampToValueAtTime(0.01, now+0.8); 
            osc.start(now); 
            osc.stop(now+0.8); 
            break;
        case 'urgent': 
            osc.frequency.setValueAtTime(1500, now); 
            osc.frequency.setValueAtTime(1200, now+0.05); 
            osc.type='triangle'; 
            gain.gain.setValueAtTime(0.3, now); 
            gain.gain.exponentialRampToValueAtTime(0.01, now+0.15); 
            osc.start(now); 
            osc.stop(now+0.15); 
            break;
        case 'melody': 
            osc.frequency.setValueAtTime(440, now); 
            osc.frequency.setValueAtTime(554.37, now+0.15); 
            osc.type='triangle'; 
            gain.gain.setValueAtTime(0.15, now); 
            gain.gain.exponentialRampToValueAtTime(0.01, now+0.5); 
            osc.start(now); 
            osc.stop(now+0.5); 
            break;
    }
}

stopAlarmSound(id) { 
    if (this.audioLoops[id]) { 
        clearInterval(this.audioLoops[id]); 
        delete this.audioLoops[id]; 
    } 
}

stopAllAlarmSounds() { 
    Object.keys(this.audioLoops).forEach(id => this.stopAlarmSound(id)); 
}

stopAudioIfNotAlarming(id) { 
    if (!this.alarmingIds.includes(id)) this.stopAlarmSound(id); 
}

toggleTimerStatus(id) {
    const timer = this.timers.find(t => t.id === id);
    if (!timer) return;
    if (timer.isActive) this.stopTimer(id); else this.startTimer(id);
}

deleteTimer(id) {
    const idx = this.timers.findIndex(t => t.id === id);
    if (idx === -1) return;
    clearInterval(this.intervals[id]); delete this.intervals[id];
    if (this.audioLoops[id]) {
        this.stopAlarmSound(id);
    }
    const alarmIdx = this.alarmingIds.indexOf(id);
    if (alarmIdx !== -1) {
        this.alarmingIds.splice(alarmIdx, 1);
    }
    if (this.alarmingIds.length === 0) {
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal();
    }
    this.timers.splice(idx, 1); 
    this.saveTimers(); 
    this.renderTimerList();
    this.updateCounts();
}

handleControlClick(e) {
    const btn = e.target.closest('.timer-control-btn');
    if (!btn) return;
    const action = btn.dataset.action, id = btn.dataset.timerId;
    switch(action) {
        case 'toggle': this.toggleTimerStatus(id); break;
        case 'delete': if (confirm('Delete this timer?')) this.deleteTimer(id); break;
    }
}

formatTime(seconds) {
    const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
    return h>0 ? `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

updateTimerDisplay(id) {
    const el = document.getElementById(`time-${id}`);
    const timerEl = document.getElementById(`timer-${id}`);
    const timer = this.timers.find(t => t.id === id);
    if (el && timer) {
        el.textContent = this.formatTime(timer.remaining);
        el.style.color = timer.remaining <= 30 ? 'var(--system-warning)' : timer.remaining <= 60 ? 'var(--system-highlight)' : 'var(--system-accent)';
        if (timer.remaining <= 5 && timer.remaining > 0 && timerEl) {
            timerEl.style.transform = 'translateX(2px)';
            setTimeout(()=>{ timerEl.style.transform='translateX(-2px)'; setTimeout(()=>timerEl.style.transform='',50); },50);
        }
    }
}

updateCounts() {
    const active = this.timers.filter(t => t.isActive).length;
    document.getElementById('totalBadge').textContent = this.timers.length;
}

getSortedTimers() {
    return [...this.timers].sort((a, b) => {
        const aRun = a.isActive; 
        const bRun = b.isActive;
        if (aRun !== bRun) return aRun ? -1 : 1;
        return 0;
    });
}

renderTimerList() {
    const list = document.getElementById('timersList');
    const empty = document.getElementById('emptyState');
    list.innerHTML = '';
    const sorted = this.getSortedTimers();

    if (sorted.length === 0) { 
        empty.classList.remove('system-hidden'); 
    } else {
        empty.classList.add('system-hidden');
        sorted.forEach(timer => this.renderTimerItem(timer));
    }
    this.updateCounts();
}

renderTimerItem(timer) {
    const el = document.createElement('div');
    const stateClass = timer.isActive ? 'active' : (timer.completedAt ? 'ready' : '');
    const isAlarming = this.alarmingIds.includes(timer.id);
    el.className = `timer-item ${stateClass} ${isAlarming ? 'alarming' : ''}`;
    el.id = `timer-${timer.id}`;
    el.setAttribute('role', 'button'); 
    el.setAttribute('tabindex', '0');
    el.onkeydown = (e) => { 
        if (e.key==='Enter'||e.key===' ') { 
            e.preventDefault(); 
            this.toggleTimerStatus(timer.id); 
        }
    };

    const toggleIcon = timer.isActive ? 'stop' : 'play_circle_filled';
    const toggleLabel = timer.isActive ? 'Stop & Reset' : 'Start';
    const toggleClass = timer.isActive ? 'timer-btn-stop' : 'timer-btn-primary';

    el.innerHTML = `
        <div class="timer-time" id="time-${timer.id}">${this.formatTime(timer.remaining)}</div>
        <div class="timer-name" title="${timer.name}">${timer.name}${timer.alarmsTriggered>0?` (${timer.alarmsTriggered}x)`:''}</div>
        <div class="timer-controls">
            <button class="timer-control-btn timer-btn ${toggleClass}" data-action="toggle" data-timer-id="${timer.id}" aria-label="${toggleLabel}">
                <span class="mat-icon" data-icon-group="media">${toggleIcon}</span>
            </button>
            <button class="timer-control-btn timer-btn timer-btn-danger" data-action="delete" data-timer-id="${timer.id}" aria-label="Delete">
                <span class="mat-icon" data-icon-group="action-destructive">delete</span>
            </button>
        </div>`;
    document.getElementById('timersList').appendChild(el);
}

startActiveTimers() { 
    this.timers.forEach(t => { 
        if(t.isActive && t.remaining>0) this.startTimer(t.id); 
    }); 
}
}

window.addEventListener('load', () => { window.timerApp = new TimerManager(); });
window.addEventListener('beforeunload', () => { 
    if(window.timerApp) {
        Object.values(window.timerApp.intervals).forEach(clearInterval);
        window.timerApp.stopAllAlarmSounds();
    }
});
</script>
</body>
