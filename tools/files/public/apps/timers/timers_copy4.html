<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Timers</title>
<!-- REQUIRED: Bridge CSS for .system-* classes (MUST be first) -->
<link rel="stylesheet" href="/os-theme-bridge.css" />
<!-- REQUIRED: Bridge JS for theme sync (MUST be after CSS) -->
<script src="/os-theme-bridge.js"></script>
<!-- REQUIRED: Material Icons Font -->
<style>
@font-face {
    font-family: 'Material Icons';
    src: url('/system/fonts/MaterialIcons-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: block;
}
.mat-icon {
    font-family: 'Material Icons', sans-serif !important;
    font-feature-settings: 'liga';
}

/* ============== TIMER APP STYLES ============== */
body { 
    margin: 0; 
    padding: 16px; 
    background: transparent; 
    color: var(--system-text); 
    font-family: var(--system-font); 
    min-height: 100dvh;
}

/* Frosted Glass Background Effect */
.system-app {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--system-radius-lg);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    padding: 16px;
    min-height: calc(100dvh - 32px);
    display: flex;
    flex-direction: column;
}

.timer-item {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: var(--system-radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.2s ease;
}
.timer-item.active { 
    border-color: var(--system-accent); 
    animation: pulseActive 2s infinite;
    background: rgba(255, 255, 255, 0.12);
}
.timer-item.alarming { 
    border-color: var(--system-danger); 
    box-shadow: 0 0 20px rgba(244,67,54,0.5); 
    animation: alarmPulse 0.5s infinite;
    background: rgba(244, 67, 54, 0.15);
}
.timer-item.ready { 
    border-color: var(--system-success);
    background: rgba(76, 175, 80, 0.15);
}

.timer-time {
    font-size: 28px; 
    font-weight: bold; 
    color: var(--system-accent);
    font-family: var(--system-font-mono), monospace; 
    letter-spacing: 2px;
    min-width: 110px; 
    text-align: center; 
    line-height: 1.2;
    text-shadow: 0 0 10px rgba(0, 120, 212, 0.3);
}

.timer-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--system-text-dim);
    flex: 1; 
    max-width: 140px;
    overflow: hidden; 
    text-overflow: ellipsis; 
    white-space: nowrap;
    line-height: 1.2;
}

.timer-controls { 
    display: flex; 
    gap: 6px; 
    flex-shrink: 0; 
}

.timer-btn {
    padding: 8px 12px; 
    border-radius: var(--system-radius); 
    border: none; 
    cursor: pointer;
    font-size: 16px; 
    transition: all 0.2s ease; 
    display: flex; 
    align-items: center;
    justify-content: center; 
    min-width: 40px; 
    height: 40px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}
.timer-btn-primary { 
    background: rgba(0, 120, 212, 0.8); 
    color: var(--system-text-on-accent); 
}
.timer-btn-danger { 
    background: rgba(244, 67, 54, 0.8); 
    color: var(--system-text-on-accent); 
}
.timer-btn-stop { 
    background: rgba(255, 193, 7, 0.8); 
    color: var(--system-text-on-accent); 
}
.timer-btn-edit {
    background: rgba(100, 180, 255, 0.8);
    color: var(--system-text-on-accent);
}
.timer-btn:active { 
    transform: scale(0.95); 
    opacity: 0.9; 
}

.timer-form {
    margin-bottom: 16px; 
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px;
    border-radius: var(--system-radius); 
    border: 1px solid rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
}

.timer-list-container { 
    flex: 1; 
    overflow-y: auto; 
    min-height: 0;
    padding-right: 4px;
    margin-bottom: 20px;
}

.empty-state { 
    text-align: center; 
    padding: 60px 20px; 
    color: var(--system-text-dim);
    min-height: 200px;
}
.empty-state .mat-icon { 
    font-size: 64px; 
    opacity: 0.3; 
    margin-bottom: 16px; 
    display: block; 
}

.form-input-row { 
    display: flex; 
    gap: 12px; 
    align-items: flex-end; 
}

.time-input-group { 
    flex: 1; 
    min-width: 0; 
}

.presets-container { 
    margin-bottom: 16px; 
    flex-shrink: 0; 
}

.presets-buttons { 
    display: flex; 
    gap: 8px; 
    flex-wrap: wrap; 
}

.preset-btn {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: var(--system-text); 
    padding: 8px 16px; 
    border-radius: var(--system-radius);
    font-size: 13px; 
    cursor: pointer; 
    transition: all 0.2s ease;
}
.preset-btn:active { 
    background: rgba(0, 120, 212, 0.5); 
    border-color: var(--system-accent); 
}

/* Audio Preview Button */
.audio-preview-btn {
    background: rgba(0, 120, 212, 0.6);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(0, 120, 212, 0.3);
    color: var(--system-text-on-accent);
    padding: 8px 12px;
    border-radius: var(--system-radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 42px;
    margin-top: 8px;
}
.audio-preview-btn:active {
    transform: scale(0.96);
    background: rgba(0, 120, 212, 0.8);
}
.audio-preview-btn.playing {
    background: rgba(76, 175, 80, 0.8);
    border-color: var(--system-success);
    animation: previewPulse 0.5s infinite;
}

@keyframes previewPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
    50% { box-shadow: 0 0 15px rgba(76, 175, 80, 0.8); }
}

.sound-selection-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
}
.sound-selection-row .system-form-group {
    flex: 1;
    min-width: 200px;
}

.system-tabs { 
    display: flex; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.15); 
    margin-bottom: 16px; 
    margin-top: 0 !important; 
    flex-shrink: 0; 
}

.system-tab {
    flex: 1; 
    padding: 12px 8px; 
    text-align: center; 
    cursor: pointer;
    font-weight: 500; 
    color: var(--system-text-dim); 
    transition: all 0.2s ease;
    border-bottom: 3px solid transparent; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px;
}
.system-tab:active { 
    background: rgba(0, 120, 212, 0.3); 
}
.system-tab-active { 
    color: var(--system-accent); 
    border-bottom-color: var(--system-accent); 
}
.system-tab .system-badge { 
    font-size: 10px; 
    padding: 2px 6px; 
    margin-left: 4px; 
}

.system-tab-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ============== MODAL STYLES (THEME-COMPLIANT) ============== */

/* Modal Overlay - uses theme variables */
.modal-overlay {
    position: fixed; 
    top: 0; 
    left: 0; 
    right: 0; 
    bottom: 0;
    background: color-mix(in srgb, var(--system-bg) 70%, transparent);
    /* Fallback for older browsers */
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 9999;
    display: flex; 
    align-items: center; 
    justify-content: center;
    opacity: 0; 
    visibility: hidden; 
    transition: opacity 0.2s ease, visibility 0.2s ease;
}
.modal-overlay.active { 
    opacity: 1; 
    visibility: visible; 
}

/* Modal Content - THEME-COMPLIANT: uses CSS variables */
.modal-content {
    background: var(--system-menu-bg) !important;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--system-border) !important;
    border-radius: var(--system-radius-lg); 
    box-shadow: var(--system-shadow) !important;
    width: 90%; 
    max-width: 450px; 
    padding: 24px; 
    text-align: center;
    transform: scale(0.9); 
    transition: transform 0.2s ease;
    max-height: 85dvh; 
    overflow-y: auto;
    color: var(--system-text);
}
.modal-overlay.active .modal-content { 
    transform: scale(1); 
}

/* Fallback for browsers without backdrop-filter support */
@supports not (backdrop-filter: blur(10px)) {
    .modal-content {
        background: var(--system-menu-bg) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }
}

/* Alarm Modal Specific */
.modal-icon {
    width: 80px; 
    height: 80px; 
    /* THEME-COMPLIANT: uses theme danger variable */
    background: var(--system-danger);
    opacity: 0.9;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    margin: 0 auto 16px; 
    animation: alarmIconPulse 0.8s infinite;
}
.modal-icon .mat-icon { 
    font-size: 48px; 
    color: var(--system-text-on-accent); 
}

.modal-title { 
    font-size: 22px; 
    font-weight: bold; 
    color: var(--system-text); 
    margin-bottom: 8px; 
}

.modal-count { 
    font-size: 14px; 
    color: var(--system-warning); 
    margin-bottom: 16px; 
    font-weight: 500; 
}

.modal-message { 
    font-size: 14px; 
    color: var(--system-text-dim); 
    margin-bottom: 24px; 
    line-height: 1.5; 
}

/* Edit Modal Specific */
.edit-modal-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}
.edit-modal-header .mat-icon {
    font-size: 32px;
    color: var(--system-accent);
}

.edit-form-group {
    margin-bottom: 16px;
    text-align: left;
}

.edit-modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
}

/* THEME-COMPLIANT: Use .system-btn classes instead of custom button styles */
.edit-modal-btn {
    flex: 1;
    min-width: 120px;
    padding: 14px 20px;
    border-radius: var(--system-radius);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}
.edit-modal-btn:active {
    transform: scale(0.96);
    opacity: 0.9;
}
/* These can be removed if using .system-btn classes instead:
.edit-modal-btn-save {
    background: rgba(0, 120, 212, 0.8);
    color: var(--system-text-on-accent);
}
.edit-modal-btn-cancel {
    background: rgba(255, 255, 255, 0.1);
    color: var(--system-text);
    border: 1px solid rgba(255, 255, 255, 0.2);
}
*/

.alarm-timer-row {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: var(--system-radius);
    padding: 12px;
    margin-bottom: 12px;
    text-align: left;
}
.alarm-timer-row:last-child { 
    margin-bottom: 0; 
}

.alarm-timer-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 8px; 
}

.alarm-timer-name { 
    font-size: 18px; 
    font-weight: 600; 
    color: var(--system-accent); 
}

.alarm-timer-duration { 
    font-size: 13px; 
    color: var(--system-text-dim); 
}

.alarm-timer-actions { 
    display: flex; 
    gap: 8px; 
    justify-content: flex-end; 
}

.alarm-timer-btn {
    padding: 6px 12px;
    border-radius: var(--system-radius-sm, 4px);
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 4px;
    min-height: 32px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}
.alarm-timer-btn:active { 
    transform: scale(0.96); 
}
.alarm-timer-btn-dismiss { 
    background: rgba(255, 193, 7, 0.8); 
    color: var(--system-text-on-accent); 
}
.alarm-timer-btn-restart { 
    background: rgba(0, 120, 212, 0.8); 
    color: var(--system-text-on-accent); 
}
.alarm-timer-btn-delete { 
    background: rgba(244, 67, 54, 0.8); 
    color: var(--system-text-on-accent); 
}

.modal-actions { 
    display: flex; 
    gap: 12px; 
    justify-content: center; 
    flex-wrap: wrap; 
    margin-top: 20px; 
}

.modal-btn {
    flex: 1; 
    min-width: 120px; 
    padding: 14px 20px; 
    border-radius: var(--system-radius);
    border: none; 
    cursor: pointer; 
    font-size: 14px; 
    font-weight: 600;
    transition: all 0.2s ease; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}
.modal-btn-dismiss { 
    background: rgba(255, 193, 7, 0.8); 
    color: var(--system-text-on-accent); 
}
.modal-btn-reset { 
    background: rgba(0, 120, 212, 0.8); 
    color: var(--system-text-on-accent); 
}
.modal-btn:active { 
    transform: scale(0.96); 
    opacity: 0.9; 
}

.alarm-progress-bar {
    width: 100%; 
    height: 6px; 
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px; 
    margin-top: 16px; 
    overflow: hidden;
}

.alarm-progress-fill {
    height: 100%; 
    background: linear-gradient(90deg, var(--system-warning), var(--system-danger));
    width: 100%; 
    border-radius: 3px; 
    animation: alarmProgressShrink 60s linear forwards;
}

@keyframes pulseActive { 
    0%,100% { box-shadow: 0 0 5px var(--system-accent); } 
    50% { box-shadow: 0 0 15px var(--system-accent); } 
}

@keyframes alarmPulse { 
    0%,100% { box-shadow: 0 0 10px rgba(244,67,54,0.5); } 
    50% { box-shadow: 0 0 30px rgba(244,67,54,0.9); } 
}

@keyframes alarmIconPulse { 
    0%,100% { transform: scale(1); } 
    50% { transform: scale(1.1); } 
}

@keyframes alarmProgressShrink { 
    from { width: 100%; } 
    to { width: 0%; } 
}

/* Reduced Motion Support - includes modals */
@media (prefers-reduced-motion: reduce) {
    .timer-item.active, 
    .timer-item.alarming, 
    .modal-icon, 
    .alarm-progress-fill,
    .audio-preview-btn.playing,
    .modal-content,
    .modal-overlay { 
        animation: none !important; 
        transition: none !important;
    }
    .timer-item.active { 
        box-shadow: 0 0 10px var(--system-accent) !important; 
    }
    .timer-item.alarming { 
        box-shadow: 0 0 20px rgba(244,67,54,0.5) !important; 
    }
    .modal-overlay.active .modal-content {
        transform: none !important;
    }
}

@media (max-width: 480px) {
    .timer-item { 
        flex-wrap: wrap; 
    }
    .timer-name { 
        max-width: 100%; 
        min-width: 100%; 
        order: -1; 
        margin-bottom: 8px; 
    }
    .timer-time { 
        font-size: 24px; 
        min-width: 90px; 
    }
    .modal-content { 
        width: 95%; 
        padding: 20px; 
    }
    .modal-actions,
    .edit-modal-actions { 
        flex-direction: column; 
    }
    .modal-btn,
    .edit-modal-btn { 
        min-width: 100%; 
    }
    .sound-selection-row {
        flex-direction: column;
        align-items: stretch;
    }
    .sound-selection-row .system-form-group {
        min-width: 100%;
    }
    .audio-preview-btn {
        width: 100%;
        justify-content: center;
    }
    .timer-controls {
        width: 100%;
        justify-content: flex-end;
    }
}
</style>
</head>
<body data-os-app="true">
<div class="system-app">
    <div class="system-tabs" role="tablist">
        <div class="system-tab system-tab-active" data-tab="create" role="tab" aria-selected="true" tabindex="0">
            <span class="mat-icon" data-icon-group="action-primary">add</span> Create
        </div>
        <div class="system-tab" data-tab="timers" role="tab" aria-selected="false" tabindex="0">
            <span class="mat-icon" data-icon-group="navigation">play_circle</span> Run <span class="system-badge" id="totalBadge">0</span>
        </div>
    </div>

    <div id="panel-create" class="system-tab-panel" role="tabpanel">
        <div class="timer-form system-p-3">
            <div class="system-form-group system-mb-3">
                <label class="system-label">Timer Name</label>
                <input type="text" id="timerNameInput" class="system-input" placeholder="e.g., Focus, Break, Workout" maxlength="30">
            </div>
            <div class="form-input-row system-mb-3">
                <div class="time-input-group"><label class="system-label">H</label><input type="number" id="hoursInput" class="system-input" min="0" max="99" value="0"></div>
                <div class="time-input-group"><label class="system-label">M</label><input type="number" id="minutesInput" class="system-input" min="0" max="59" value="5"></div>
                <div class="time-input-group"><label class="system-label">S</label><input type="number" id="secondsInput" class="system-input" min="0" max="59" value="0"></div>
            </div>
            <div class="system-form-group system-mb-3">
                <label class="system-label">Alarm Sound</label>
                <div class="sound-selection-row">
                    <div class="system-form-group" style="flex:1;min-width:200px;">
                        <select id="alarmSoundInput" class="system-select">
                            <option value="classic">Classic Beep</option>
                            <option value="gentle">Gentle Chime</option>
                            <option value="urgent">Urgent Pulse</option>
                            <option value="melody">Ascending Melody</option>
                            <option value="mario-coin">Mario Coin ⭐</option>
                            <option value="mario-theme">Mario Theme ⭐</option>
                            <option value="minecraft-theme">Minecraft Theme 🎵</option>
                            <option value="success">Success Fanfare</option>
                            <option value="digital">Digital Clock</option>
                            <option value="space">Space Alert</option>
                            <option value="celebration">Celebration</option>
                        </select>
                    </div>
                    <button id="previewSoundBtn" class="audio-preview-btn" type="button">
                        <span class="mat-icon" data-icon-group="media" id="previewIcon">play_arrow</span>
                        <span id="previewText">Preview</span>
                    </button>
                </div>
            </div>
            <button id="addTimerBtn" class="system-btn btn-add timer-btn-primary" style="width: 100%;">
                <span class="mat-icon" style="font-size: 16px; vertical-align: middle; margin-right: 4px;" data-icon-group="action-primary">add</span>
                Create & Switch to Run Tab
            </button>
        </div>

        <div class="presets-container system-p-3">
            <label class="system-label system-mb-2">Quick Presets:</label>
            <div class="presets-buttons">
                <button class="preset-btn" data-hours="0" data-minutes="1" data-seconds="0" data-sound="classic">1m</button>
                <button class="preset-btn" data-hours="0" data-minutes="5" data-seconds="0" data-sound="gentle">5m</button>
                <button class="preset-btn" data-hours="0" data-minutes="15" data-seconds="0" data-sound="melody">15m</button>
                <button class="preset-btn" data-hours="0" data-minutes="25" data-seconds="0" data-sound="urgent">25m</button>
                <button class="preset-btn" data-hours="1" data-minutes="0" data-seconds="0" data-sound="mario-coin">1h</button>
            </div>
        </div>
    </div>

    <div id="panel-timers" class="system-tab-panel system-hidden" role="tabpanel" style="display:flex; flex-direction:column; min-height:0;">
        <div id="timersList" class="timer-list-container"></div>
        <div id="emptyState" class="empty-state system-hidden">
            <span class="mat-icon" data-icon-group="status-info">schedule</span>
            <h3 class="system-heading">No timers ready</h3>
            <p class="system-text">Create a timer in the Create tab to get started</p>
        </div>
    </div>
</div>

<!-- Alarm Modal - THEME-COMPLIANT with ARIA attributes -->
<div id="alarmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="alarmModalTitle">
    <div class="modal-content">
        <div class="modal-icon"><span class="mat-icon" data-icon-group="status-warning">notifications_active</span></div>
        <h2 id="alarmModalTitle" class="modal-title">Timer(s) Complete!</h2>
        <div id="alarmCount" class="modal-count"></div>
        <p id="alarmMessage" class="modal-message">Timer completed. Ready to run again.</p>
        <div id="alarmTimerRows" class="alarm-timer-rows"></div>
        <div class="modal-actions">
            <button id="btnDismissAll" class="modal-btn modal-btn-dismiss">
                <span class="mat-icon" data-icon-group="action-destructive">close</span>Dismiss All
            </button>
            <button id="btnRestartAll" class="modal-btn modal-btn-reset">
                <span class="mat-icon" data-icon-group="system">refresh</span>Restart All
            </button>
        </div>
        <div class="alarm-progress-bar"><div class="alarm-progress-fill" id="alarmProgressBar"></div></div>
        <p class="system-text-small system-text-center system-mt-3">Auto-dismiss in <span id="alarmCountdown">60</span>s</p>
    </div>
</div>

<!-- Edit Timer Modal - THEME-COMPLIANT with ARIA attributes & .system-btn classes -->
<div id="editModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-content">
        <div class="edit-modal-header">
            <span class="mat-icon" data-icon-group="action-primary">edit</span>
            <h2 id="editModalTitle" class="modal-title">Edit Timer</h2>
        </div>
        
        <div class="edit-form-group">
            <label class="system-label">Timer Name</label>
            <input type="text" id="editTimerNameInput" class="system-input" placeholder="e.g., Focus, Break, Workout" maxlength="30">
        </div>
        
        <div class="form-input-row system-mb-3">
            <div class="time-input-group">
                <label class="system-label">H</label>
                <input type="number" id="editHoursInput" class="system-input" min="0" max="99" value="0">
            </div>
            <div class="time-input-group">
                <label class="system-label">M</label>
                <input type="number" id="editMinutesInput" class="system-input" min="0" max="59" value="5">
            </div>
            <div class="time-input-group">
                <label class="system-label">S</label>
                <input type="number" id="editSecondsInput" class="system-input" min="0" max="59" value="0">
            </div>
        </div>
        
        <div class="system-form-group system-mb-3">
            <label class="system-label">Alarm Sound</label>
            <div class="sound-selection-row">
                <div class="system-form-group" style="flex:1;min-width:200px;">
                    <select id="editAlarmSoundInput" class="system-select">
                        <option value="classic">Classic Beep</option>
                        <option value="gentle">Gentle Chime</option>
                        <option value="urgent">Urgent Pulse</option>
                        <option value="melody">Ascending Melody</option>
                        <option value="mario-coin">Mario Coin ⭐</option>
                        <option value="mario-theme">Mario Theme ⭐</option>
                        <option value="minecraft-theme">Minecraft Theme 🎵</option>
                        <option value="success">Success Fanfare</option>
                        <option value="digital">Digital Clock</option>
                        <option value="space">Space Alert</option>
                        <option value="celebration">Celebration</option>
                    </select>
                </div>
                <button id="editPreviewSoundBtn" class="audio-preview-btn" type="button">
                    <span class="mat-icon" data-icon-group="media" id="editPreviewIcon">play_arrow</span>
                    <span id="editPreviewText">Preview</span>
                </button>
            </div>
        </div>
        
        <div class="edit-modal-actions">
            <!-- THEME-COMPLIANT: Use .system-btn classes for automatic theming -->
            <button id="editModalCancelBtn" class="system-btn system-btn-secondary">
                <span class="mat-icon" data-icon-group="action-destructive">close</span> Cancel
            </button>
            <button id="editModalSaveBtn" class="system-btn">
                <span class="mat-icon" data-icon-group="action-confirmation">check</span> Save Changes
            </button>
        </div>
    </div>
</div>

<script>
class TimerManager {
    constructor() {
        this.timers = []; 
        this.intervals = {};
        this.audioCtx = null; 
        this.audioLoops = {};
        this.alarmingIds = [];
        this.autoStopTimeout = null;
        this.activeTab = 'create';
        this.previewOscillator = null;
        this.previewGain = null;
        this.isPreviewPlaying = false;
        this.previewTimeout = null;
        this.editPreviewOscillator = null;
        this.editPreviewGain = null;
        this.isEditPreviewPlaying = false;
        this.editPreviewTimeout = null;
        this.activeOscillators = [];
        this.editingTimerId = null;
        this.init();
    }

    async init() {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const saved = localStorage.getItem('os-timers-data-v5');
        if (saved) { 
            try { 
                this.timers = JSON.parse(saved); 
            } catch(e) { 
                this.timers = []; 
            } 
        }
        this.initTabs();
        this.initPreviewButton();
        this.initEditPreviewButton();
        this.initEditModal();
        document.getElementById('addTimerBtn').addEventListener('click', () => this.addTimer());
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => this.setPreset(btn.dataset.hours, btn.dataset.minutes, btn.dataset.seconds, btn.dataset.sound || 'classic'));
        });
        document.body.addEventListener('click', (e) => this.handleControlClick(e));
        document.getElementById('btnDismissAll').addEventListener('click', () => this.dismissAllAlarms());
        document.getElementById('btnRestartAll').addEventListener('click', () => this.restartAllAlarms());
        window.addEventListener('osThemeChanged', (e) => console.log('Theme updated:', e.detail.themeId));
        window.addEventListener('osBridgeReady', () => this.updateCounts());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('alarmModal').classList.contains('active')) this.dismissAllAlarms();
                if (document.getElementById('editModal').classList.contains('active')) this.closeEditModal();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); document.getElementById('timerNameInput').focus(); }
        });
        this.renderTimerList();
        setTimeout(() => this.startActiveTimers(), 100);
    }

    initTabs() {
        document.querySelectorAll('.system-tab').forEach(tab => {
            tab.addEventListener('click', () => this.switchTab(tab.dataset.tab));
            tab.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.switchTab(tab.dataset.tab); }
            });
        });
    }

    initPreviewButton() {
        const previewBtn = document.getElementById('previewSoundBtn');
        const soundSelect = document.getElementById('alarmSoundInput');
        
        previewBtn.addEventListener('click', () => this.togglePreview());
        
        soundSelect.addEventListener('change', () => {
            if (this.isPreviewPlaying) {
                this.stopPreview();
            }
        });
    }

    initEditPreviewButton() {
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const soundSelect = document.getElementById('editAlarmSoundInput');
        
        previewBtn.addEventListener('click', () => this.toggleEditPreview());
        
        soundSelect.addEventListener('change', () => {
            if (this.isEditPreviewPlaying) {
                this.stopEditPreview();
            }
        });
    }

    initEditModal() {
        document.getElementById('editModalSaveBtn').addEventListener('click', () => this.saveEditTimer());
        document.getElementById('editModalCancelBtn').addEventListener('click', () => this.closeEditModal());
    }

    togglePreview() {
        if (this.isPreviewPlaying) {
            this.stopPreview();
        } else {
            this.playPreview();
        }
    }

    playPreview() {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        
        const soundType = document.getElementById('alarmSoundInput').value;
        const previewBtn = document.getElementById('previewSoundBtn');
        const previewIcon = document.getElementById('previewIcon');
        const previewText = document.getElementById('previewText');
        
        previewBtn.classList.add('playing');
        previewIcon.textContent = 'stop';
        previewText.textContent = 'Stop';
        this.isPreviewPlaying = true;
        
        this.playSoundPattern(soundType, true);
        
        const previewDuration = this.getSoundDuration(soundType);
        if (this.previewTimeout) clearTimeout(this.previewTimeout);
        this.previewTimeout = setTimeout(() => {
            if (this.isPreviewPlaying) {
                this.stopPreview();
            }
        }, previewDuration);
    }

    stopPreview() {
        const previewBtn = document.getElementById('previewSoundBtn');
        const previewIcon = document.getElementById('previewIcon');
        const previewText = document.getElementById('previewText');
        
        previewBtn.classList.remove('playing');
        previewIcon.textContent = 'play_arrow';
        previewText.textContent = 'Preview';
        this.isPreviewPlaying = false;
        
        if (this.previewTimeout) {
            clearTimeout(this.previewTimeout);
            this.previewTimeout = null;
        }
        
        this.activeOscillators.forEach(osc => {
            try {
                osc.stop();
                osc.disconnect();
            } catch(e) {}
        });
        this.activeOscillators = [];
        
        if (this.previewGain) {
            this.previewGain.disconnect();
            this.previewGain = null;
        }
    }

    toggleEditPreview() {
        if (this.isEditPreviewPlaying) {
            this.stopEditPreview();
        } else {
            this.playEditPreview();
        }
    }

    playEditPreview() {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        
        const soundType = document.getElementById('editAlarmSoundInput').value;
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const previewIcon = document.getElementById('editPreviewIcon');
        const previewText = document.getElementById('editPreviewText');
        
        previewBtn.classList.add('playing');
        previewIcon.textContent = 'stop';
        previewText.textContent = 'Stop';
        this.isEditPreviewPlaying = true;
        
        this.playSoundPattern(soundType, true, null, true);
        
        const previewDuration = this.getSoundDuration(soundType);
        if (this.editPreviewTimeout) clearTimeout(this.editPreviewTimeout);
        this.editPreviewTimeout = setTimeout(() => {
            if (this.isEditPreviewPlaying) {
                this.stopEditPreview();
            }
        }, previewDuration);
    }

    stopEditPreview() {
        const previewBtn = document.getElementById('editPreviewSoundBtn');
        const previewIcon = document.getElementById('editPreviewIcon');
        const previewText = document.getElementById('editPreviewText');
        
        previewBtn.classList.remove('playing');
        previewIcon.textContent = 'play_arrow';
        previewText.textContent = 'Preview';
        this.isEditPreviewPlaying = false;
        
        if (this.editPreviewTimeout) {
            clearTimeout(this.editPreviewTimeout);
            this.editPreviewTimeout = null;
        }
        
        this.activeOscillators.forEach(osc => {
            try {
                osc.stop();
                osc.disconnect();
            } catch(e) {}
        });
        this.activeOscillators = [];
        
        if (this.editPreviewGain) {
            this.editPreviewGain.disconnect();
            this.editPreviewGain = null;
        }
    }

    getSoundDuration(type) {
        const durations = {
            'classic': 1500,
            'gentle': 1500,
            'urgent': 1500,
            'melody': 2500,
            'mario-coin': 1500,
            'mario-theme': 4500,
            'minecraft-theme': 8000,
            'success': 3000,
            'digital': 2000,
            'space': 3500,
            'celebration': 4000
        };
        return durations[type] || 2000;
    }

    getLoopInterval(type) {
        const duration = this.getSoundDuration(type);
        return duration + 1000;
    }

    playMelodySequence(notes, isPreview = false, loopId = null, isEditPreview = false) {
        if (!this.audioCtx || this.audioCtx.state !== 'running') return;
        
        const startTime = this.audioCtx.currentTime;
        let currentTime = startTime;
        
        notes.forEach((note, index) => {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            
            if (isPreview || !loopId) {
                this.activeOscillators.push(osc);
            }
            
            const attackTime = 0.02;
            const releaseTime = 0.03;
            
            osc.frequency.value = note.freq;
            osc.type = note.type || 'sine';
            
            gain.gain.setValueAtTime(0, currentTime);
            gain.gain.linearRampToValueAtTime(note.volume || 0.15, currentTime + attackTime);
            gain.gain.setValueAtTime(note.volume || 0.15, currentTime + note.duration - releaseTime);
            gain.gain.linearRampToValueAtTime(0, currentTime + note.duration);
            
            osc.start(currentTime);
            osc.stop(currentTime + note.duration + 0.05);
            
            currentTime += note.duration + note.gap;
        });
        
        if (loopId && this.audioLoops[loopId]) {
            const totalDuration = currentTime - startTime;
            this.audioLoops[loopId].nextNoteTime = startTime + totalDuration;
        }
    }

    playSoundPattern(type, isPreview = false, loopId = null, isEditPreview = false) {
        if (!this.audioCtx || this.audioCtx.state !== 'running') return;
        
        const now = this.audioCtx.currentTime;
        
        switch(type) {
            case 'classic':
                const osc1a = this.audioCtx.createOscillator();
                const gain1a = this.audioCtx.createGain();
                osc1a.connect(gain1a);
                gain1a.connect(this.audioCtx.destination);
                osc1a.frequency.setValueAtTime(880, now);
                osc1a.type = 'square';
                gain1a.gain.setValueAtTime(0, now);
                gain1a.gain.linearRampToValueAtTime(0.2, now + 0.01);
                gain1a.gain.setValueAtTime(0.2, now + 0.14);
                gain1a.gain.linearRampToValueAtTime(0, now + 0.15);
                osc1a.start(now);
                osc1a.stop(now + 0.16);
                this.activeOscillators.push(osc1a);
                
                const osc1b = this.audioCtx.createOscillator();
                const gain1b = this.audioCtx.createGain();
                osc1b.connect(gain1b);
                gain1b.connect(this.audioCtx.destination);
                osc1b.frequency.setValueAtTime(1100, now + 0.2);
                osc1b.type = 'square';
                gain1b.gain.setValueAtTime(0, now + 0.2);
                gain1b.gain.linearRampToValueAtTime(0.2, now + 0.21);
                gain1b.gain.setValueAtTime(0.2, now + 0.34);
                gain1b.gain.linearRampToValueAtTime(0, now + 0.35);
                osc1b.start(now + 0.2);
                osc1b.stop(now + 0.36);
                this.activeOscillators.push(osc1b);
                break;
                
            case 'gentle':
                const osc2 = this.audioCtx.createOscillator();
                const gain2 = this.audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(this.audioCtx.destination);
                osc2.frequency.setValueAtTime(523.25, now);
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0, now);
                gain2.gain.linearRampToValueAtTime(0.15, now + 0.02);
                gain2.gain.setValueAtTime(0.15, now + 0.3);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc2.start(now);
                osc2.stop(now + 0.85);
                this.activeOscillators.push(osc2);
                break;
                
            case 'urgent':
                for (let i = 0; i < 4; i++) {
                    const osc3 = this.audioCtx.createOscillator();
                    const gain3 = this.audioCtx.createGain();
                    osc3.connect(gain3);
                    gain3.connect(this.audioCtx.destination);
                    osc3.frequency.setValueAtTime(1500, now + (i * 0.15));
                    osc3.type = 'triangle';
                    gain3.gain.setValueAtTime(0, now + (i * 0.15));
                    gain3.gain.linearRampToValueAtTime(0.3, now + (i * 0.15) + 0.01);
                    gain3.gain.setValueAtTime(0.3, now + (i * 0.15) + 0.04);
                    gain3.gain.linearRampToValueAtTime(0, now + (i * 0.15) + 0.05);
                    osc3.start(now + (i * 0.15));
                    osc3.stop(now + (i * 0.15) + 0.06);
                    this.activeOscillators.push(osc3);
                }
                break;
                
            case 'melody':
                const melodyNotes = [
                    { freq: 440.00, duration: 0.20, gap: 0.05, type: 'triangle', volume: 0.15 },
                    { freq: 523.25, duration: 0.20, gap: 0.05, type: 'triangle', volume: 0.15 },
                    { freq: 659.25, duration: 0.20, gap: 0.05, type: 'triangle', volume: 0.15 },
                    { freq: 880.00, duration: 0.40, gap: 0.10, type: 'triangle', volume: 0.15 }
                ];
                this.playMelodySequence(melodyNotes, isPreview, loopId, isEditPreview);
                break;
                
            case 'mario-coin':
                const coinNotes = [
                    { freq: 987.77, duration: 0.08, gap: 0.02, type: 'square', volume: 0.20 },
                    { freq: 1318.51, duration: 0.25, gap: 0.10, type: 'square', volume: 0.20 }
                ];
                this.playMelodySequence(coinNotes, isPreview, loopId, isEditPreview);
                break;
                
            case 'mario-theme':
                const marioNotes = [
                    { freq: 659.25, duration: 0.15, gap: 0.05, type: 'square', volume: 0.18 },
                    { freq: 659.25, duration: 0.15, gap: 0.15, type: 'square', volume: 0.18 },
                    { freq: 659.25, duration: 0.15, gap: 0.15, type: 'square', volume: 0.18 },
                    { freq: 523.25, duration: 0.15, gap: 0.05, type: 'square', volume: 0.18 },
                    { freq: 659.25, duration: 0.30, gap: 0.05, type: 'square', volume: 0.18 },
                    { freq: 783.99, duration: 0.30, gap: 0.15, type: 'square', volume: 0.18 },
                    { freq: 392.00, duration: 0.30, gap: 0.05, type: 'square', volume: 0.18 },
                   
                ];
                this.playMelodySequence(marioNotes, isPreview, loopId, isEditPreview);
                break;

            case 'minecraft-theme':
                const minecraftNotes = [
                    { freq: 523.25, duration: 0.50, gap: 0.10, type: 'sine', volume: 0.18 },
                    { freq: 659.25, duration: 0.50, gap: 0.10, type: 'sine', volume: 0.18 },
                    { freq: 783.99, duration: 0.50, gap: 0.10, type: 'sine', volume: 0.18 },
                    { freq: 1046.50, duration: 1.00, gap: 0.15, type: 'sine', volume: 0.18 },
                    { freq: 783.99, duration: 0.50, gap: 0.10, type: 'sine', volume: 0.18 },
                    { freq: 659.25, duration: 0.50, gap: 0.10, type: 'sine', volume: 0.18 },
                    { freq: 523.25, duration: 0.75, gap: 0.15, type: 'sine', volume: 0.18 }
                ];
                this.playMelodySequence(minecraftNotes, isPreview, loopId, isEditPreview);
                break;
                
            case 'success':
                const successNotes = [
                    { freq: 523.25, duration: 0.15, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 659.25, duration: 0.15, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 783.99, duration: 0.15, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 1046.50, duration: 0.50, gap: 0.15, type: 'triangle', volume: 0.20 }
                ];
                this.playMelodySequence(successNotes, isPreview, loopId, isEditPreview);
                break;
                
            case 'digital':
                for (let i = 0; i < 6; i++) {
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    osc.frequency.setValueAtTime(1000, now + (i * 0.25));
                    osc.type = 'square';
                    gain.gain.setValueAtTime(0, now + (i * 0.25));
                    gain.gain.linearRampToValueAtTime(0.2, now + (i * 0.25) + 0.01);
                    gain.gain.setValueAtTime(0.2, now + (i * 0.25) + 0.09);
                    gain.gain.linearRampToValueAtTime(0, now + (i * 0.25) + 0.10);
                    osc.start(now + (i * 0.25));
                    osc.stop(now + (i * 0.25) + 0.11);
                    this.activeOscillators.push(osc);
                }
                break;
                
            case 'space':
                const spaceNotes = [
                    { freq: 220.00, duration: 0.25, gap: 0.05, type: 'sawtooth', volume: 0.15 },
                    { freq: 440.00, duration: 0.25, gap: 0.05, type: 'sawtooth', volume: 0.15 },
                    { freq: 880.00, duration: 0.30, gap: 0.05, type: 'sawtooth', volume: 0.15 },
                    { freq: 1760.00, duration: 0.50, gap: 0.15, type: 'sine', volume: 0.10 }
                ];
                this.playMelodySequence(spaceNotes, isPreview, loopId, isEditPreview);
                break;
                
            case 'celebration':
                const celebrationNotes = [
                    { freq: 523.25, duration: 0.10, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 659.25, duration: 0.10, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 783.99, duration: 0.10, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 1046.50, duration: 0.10, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 1318.51, duration: 0.20, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 1046.50, duration: 0.10, gap: 0.05, type: 'triangle', volume: 0.20 },
                    { freq: 1567.98, duration: 0.50, gap: 0.15, type: 'triangle', volume: 0.20 }
                ];
                this.playMelodySequence(celebrationNotes, isPreview, loopId, isEditPreview);
                break;
        }
    }

    switchTab(tabId) {
        this.activeTab = tabId;
        document.querySelectorAll('.system-tab').forEach(t => {
            const isActive = t.dataset.tab === tabId;
            t.classList.toggle('system-tab-active', isActive);
            t.setAttribute('aria-selected', isActive);
        });
        document.querySelectorAll('.system-tab-panel').forEach(p => p.classList.add('system-hidden'));
        document.getElementById(`panel-${tabId}`).classList.remove('system-hidden');
        if (tabId === 'timers') this.renderTimerList();
    }

    generateId() { return 'timer-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
    saveTimers() { localStorage.setItem('os-timers-data-v5', JSON.stringify(this.timers)); this.updateCounts(); }
    
    setPreset(h, m, s, sound) {
        document.getElementById('hoursInput').value = h;
        document.getElementById('minutesInput').value = m;
        document.getElementById('secondsInput').value = s;
        document.getElementById('alarmSoundInput').value = sound || 'classic';
    }

    addTimer() {
        const name = document.getElementById('timerNameInput').value.trim() || `Timer ${new Date().toLocaleTimeString()}`;
        const h = parseInt(document.getElementById('hoursInput').value || 0);
        const m = parseInt(document.getElementById('minutesInput').value || 0);
        const s = parseInt(document.getElementById('secondsInput').value || 0);
        const sound = document.getElementById('alarmSoundInput').value;
        let totalSeconds = h * 3600 + m * 60 + s;
        if (totalSeconds <= 0) { alert('Please set a valid time duration'); return; }
        const timer = { 
            id: this.generateId(), 
            name, 
            duration: totalSeconds, 
            remaining: totalSeconds, 
            isActive: false, 
            createdAt: Date.now(), 
            completedAt: null, 
            alarmsTriggered: 0, 
            sound 
        };
        this.timers.unshift(timer);
        this.saveTimers();
        this.renderTimerList();
        this.switchTab('timers');
        document.getElementById('timerNameInput').value = '';
        document.getElementById('hoursInput').value = '0';
        document.getElementById('minutesInput').value = '5';
        document.getElementById('secondsInput').value = '0';
    }

    // Edit Modal Functions
    openEditModal(timerId) {
        const timer = this.timers.find(t => t.id === timerId);
        if (!timer) return;
        
        this.editingTimerId = timerId;
        
        // Stop timer if running
        if (this.intervals[timerId]) {
            clearInterval(this.intervals[timerId]);
            delete this.intervals[timerId];
            timer.isActive = false;
        }
        
        // Populate edit form
        document.getElementById('editTimerNameInput').value = timer.name;
        
        const hours = Math.floor(timer.duration / 3600);
        const minutes = Math.floor((timer.duration % 3600) / 60);
        const seconds = timer.duration % 60;
        
        document.getElementById('editHoursInput').value = hours;
        document.getElementById('editMinutesInput').value = minutes;
        document.getElementById('editSecondsInput').value = seconds;
        document.getElementById('editAlarmSoundInput').value = timer.sound || 'classic';
        
        // Show modal
        document.getElementById('editModal').classList.add('active');
    }

    closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        this.editingTimerId = null;
        this.stopEditPreview();
        this.renderTimerList();
    }

    saveEditTimer() {
        const timer = this.timers.find(t => t.id === this.editingTimerId);
        if (!timer) return;
        
        const name = document.getElementById('editTimerNameInput').value.trim() || timer.name;
        const h = parseInt(document.getElementById('editHoursInput').value || 0);
        const m = parseInt(document.getElementById('editMinutesInput').value || 0);
        const s = parseInt(document.getElementById('editSecondsInput').value || 0);
        const sound = document.getElementById('editAlarmSoundInput').value;
        
        let totalSeconds = h * 3600 + m * 60 + s;
        if (totalSeconds <= 0) { 
            alert('Please set a valid time duration'); 
            return; 
        }
        
        timer.name = name;
        timer.duration = totalSeconds;
        timer.remaining = totalSeconds;
        timer.sound = sound;
        timer.isActive = false;
        timer.completedAt = null;
        
        this.saveTimers();
        this.closeEditModal();
        this.renderTimerList();
    }

    startTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer || timer.remaining <= 0) return;
        timer.isActive = true; 
        timer.completedAt = null;
        this.saveTimers();
        this.intervals[id] = setInterval(() => {
            timer.remaining--;
            this.updateTimerDisplay(id);
            if (timer.remaining <= 0) this.completeTimer(id);
            else this.saveTimers();
        }, 1000);
        this.renderTimerList();
        this.updateCounts();
    }

    stopTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        timer.remaining = timer.duration; 
        timer.isActive = false; 
        timer.completedAt = null;
        this.stopAudioIfNotAlarming(id);
        this.saveTimers(); 
        this.renderTimerList();
    }

    completeTimer(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        timer.alarmsTriggered++; 
        timer.remaining = timer.duration; 
        timer.isActive = false; 
        timer.completedAt = Date.now();
        if (!this.alarmingIds.includes(id)) { this.alarmingIds.push(id); }
        this.saveTimers(); 
        this.renderTimerList(); 
        this.updateCounts();
        this.showAlarmModal(); 
        this.playAlarmSound(id);
        if ('Notification' in window && Notification.permission === 'granted') {
            const count = this.alarmingIds.length;
            const title = count > 1 ? `${count} Timer${count > 1 ? 's' : ''} Complete!` : `${timer.name} Complete!`;
            new Notification(title, { body: `Timer(s) finished. See details in app.`, tag: 'multiple-timers' });
        }
    }

    showAlarmModal() {
        if (this.alarmingIds.length === 0) return;
        const modal = document.getElementById('alarmModal');
        modal.classList.add('active');
        const countEl = document.getElementById('alarmCount');
        const count = this.alarmingIds.length;
        if (count === 1) { countEl.textContent = `${count} timer completed`; } 
        else { countEl.textContent = `${count} timers completed!`; }
        const rowsContainer = document.getElementById('alarmTimerRows');
        rowsContainer.innerHTML = '';
        this.alarmingIds.forEach(id => {
            const timer = this.timers.find(t => t.id === id);
            if (!timer) return;
            const row = document.createElement('div');
            row.className = 'alarm-timer-row';
            row.id = `alarm-row-${id}`;
            row.innerHTML = `
                <div class="alarm-timer-header">
                    <span class="alarm-timer-name">${timer.name}</span>
                    <span class="alarm-timer-duration">${this.formatTime(timer.duration)}</span>
                </div>
                <div class="alarm-timer-actions">
                    <button class="alarm-timer-btn alarm-timer-btn-dismiss" onclick="timerApp.dismissSingleAlarm('${id}')">
                        <span class="mat-icon" style="font-size:14px;" data-icon-group="action-confirmation">check</span>Dismiss
                    </button>
                    <button class="alarm-timer-btn alarm-timer-btn-restart" onclick="timerApp.restartSingleTimer('${id}')">
                        <span class="mat-icon" style="font-size:14px;" data-icon-group="system">refresh</span>Restart
                    </button>
                    <button class="alarm-timer-btn alarm-timer-btn-delete" onclick="timerApp.deleteTimerFromModal('${id}')">
                        <span class="mat-icon" style="font-size:14px;" data-icon-group="action-destructive">delete</span>Delete
                    </button>
                </div>`;
            rowsContainer.appendChild(row);
        });
        document.getElementById('alarmCountdown').textContent = '60';
        const pb = document.getElementById('alarmProgressBar');
        pb.style.animation = 'none'; 
        void pb.offsetWidth; 
        pb.style.animation = 'alarmProgressShrink 60s linear forwards';
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout);
        this.autoStopTimeout = setTimeout(() => this.autoDismissAll(), 60000);
        const cd = setInterval(() => { 
            const el = document.getElementById('alarmCountdown'); 
            const v = parseInt(el.textContent); 
            if(v > 0) el.textContent = v - 1; 
            else clearInterval(cd); 
        }, 1000);
        modal.countdownInterval = cd;
    }

    hideAlarmModal() {
        const modal = document.getElementById('alarmModal');
        modal.classList.remove('active');
        if (modal.countdownInterval) { 
            clearInterval(modal.countdownInterval); 
            modal.countdownInterval = null; 
        }
    }

    autoDismissAll() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        this.clearAlarmingState(); 
    }
    
    clearAlarmingState() { 
        this.alarmingIds = []; 
        this.renderTimerList(); 
        this.updateCounts(); 
    }
    
    dismissAllAlarms() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
        this.clearAlarmingState(); 
    }
    
    restartAllAlarms() { 
        this.stopAllAlarmSounds(); 
        this.hideAlarmModal(); 
        if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); 
        this.alarmingIds.forEach(id => { 
            if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; } 
        });
        this.alarmingIds.forEach(id => this.startTimer(id)); 
        this.clearAlarmingState(); 
    }
    
    dismissSingleAlarm(id) {
        const idx = this.alarmingIds.indexOf(id);
        if (idx !== -1) { this.alarmingIds.splice(idx, 1); }
        this.stopAlarmSound(id); 
        this.renderTimerList();
        if (this.alarmingIds.length > 0) { this.showAlarmModal(); } 
        else { this.hideAlarmModal(); if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); }
    }
    
    restartSingleTimer(id) {
        const idx = this.alarmingIds.indexOf(id);
        if (idx !== -1) { this.alarmingIds.splice(idx, 1); }
        this.stopAlarmSound(id);
        if (this.intervals[id]) { clearInterval(this.intervals[id]); delete this.intervals[id]; }
        this.startTimer(id); 
        this.renderTimerList();
        if (this.alarmingIds.length > 0) { this.showAlarmModal(); } 
        else { this.hideAlarmModal(); if (this.autoStopTimeout) clearTimeout(this.autoStopTimeout); }
    }
    
    deleteTimerFromModal(id) { 
        this.dismissSingleAlarm(id); 
        this.deleteTimer(id); 
    }

    playAlarmSound(id) {
        if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        
        this.playSoundPattern(timer.sound || 'classic', false, id);
        
        const loopInterval = this.getLoopInterval(timer.sound || 'classic');
        this.audioLoops[id] = setInterval(() => {
            this.playSoundPattern(timer.sound || 'classic', false, id);
        }, loopInterval);
    }
    
    stopAlarmSound(id) { 
        if (this.audioLoops[id]) { 
            clearInterval(this.audioLoops[id]); 
            delete this.audioLoops[id]; 
        }
        this.activeOscillators = this.activeOscillators.filter(osc => {
            try {
                osc.stop();
                osc.disconnect();
            } catch(e) {}
            return false;
        });
    }
    
    stopAllAlarmSounds() { 
        Object.keys(this.audioLoops).forEach(id => this.stopAlarmSound(id)); 
        this.activeOscillators.forEach(osc => {
            try {
                osc.stop();
                osc.disconnect();
            } catch(e) {}
        });
        this.activeOscillators = [];
    }
    
    stopAudioIfNotAlarming(id) { 
        if (!this.alarmingIds.includes(id)) this.stopAlarmSound(id); 
    }
    
    toggleTimerStatus(id) {
        const timer = this.timers.find(t => t.id === id);
        if (!timer) return;
        if (timer.isActive) this.stopTimer(id); else this.startTimer(id);
    }
    
    deleteTimer(id) {
        const idx = this.timers.findIndex(t => t.id === id);
        if (idx === -1) return;
        clearInterval(this.intervals[id]); delete this.intervals[id];
        if (this.audioLoops[id]) { this.stopAlarmSound(id); }
        const alarmIdx = this.alarmingIds.indexOf(id);
        if (alarmIdx !== -1) { this.alarmingIds.splice(alarmIdx, 1); }
        if (this.alarmingIds.length === 0) { this.stopAllAlarmSounds(); this.hideAlarmModal(); }
        this.timers.splice(idx, 1); 
        this.saveTimers(); 
        this.renderTimerList(); 
        this.updateCounts();
    }
    
    handleControlClick(e) {
        const btn = e.target.closest('.timer-control-btn');
        if (!btn) return;
        const action = btn.dataset.action, id = btn.dataset.timerId;
        switch(action) {
            case 'toggle': this.toggleTimerStatus(id); break;
            case 'delete': if (confirm('Delete this timer?')) this.deleteTimer(id); break;
            case 'edit': this.openEditModal(id); break;
        }
    }
    
    formatTime(seconds) {
        const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
        return h>0 ? `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    
    updateTimerDisplay(id) {
        const el = document.getElementById(`time-${id}`);
        const timerEl = document.getElementById(`timer-${id}`);
        const timer = this.timers.find(t => t.id === id);
        if (el && timer) {
            el.textContent = this.formatTime(timer.remaining);
            el.style.color = timer.remaining <= 30 ? 'var(--system-warning)' : timer.remaining <= 60 ? 'var(--system-highlight)' : 'var(--system-accent)';
            if (timer.remaining <= 5 && timer.remaining > 0 && timerEl) {
                timerEl.style.transform = 'translateX(2px)';
                setTimeout(()=>{ timerEl.style.transform='translateX(-2px)'; setTimeout(()=>timerEl.style.transform='',50); },50);
            }
        }
    }
    
    updateCounts() { 
        document.getElementById('totalBadge').textContent = this.timers.length; 
    }
    
    getSortedTimers() {
        return [...this.timers].sort((a, b) => {
            if (a.isActive && !b.isActive) return -1;
            if (!a.isActive && b.isActive) return 1;
            if (a.alarmsTriggered !== b.alarmsTriggered) { return b.alarmsTriggered - a.alarmsTriggered; }
            return b.createdAt - a.createdAt;
        });
    }
    
    renderTimerList() {
        const list = document.getElementById('timersList');
        const empty = document.getElementById('emptyState');
        list.innerHTML = '';
        const sorted = this.getSortedTimers();
        if (sorted.length === 0) { empty.classList.remove('system-hidden'); }
        else { empty.classList.add('system-hidden'); sorted.forEach(timer => this.renderTimerItem(timer)); }
        this.updateCounts();
    }
    
    renderTimerItem(timer) {
        const el = document.createElement('div');
        const stateClass = timer.isActive ? 'active' : (timer.completedAt ? 'ready' : '');
        const isAlarming = this.alarmingIds.includes(timer.id);
        el.className = `timer-item ${stateClass} ${isAlarming ? 'alarming' : ''}`;
        el.id = `timer-${timer.id}`;
        el.setAttribute('role', 'button'); 
        el.setAttribute('tabindex', '0');
        el.onkeydown = (e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); this.toggleTimerStatus(timer.id); }};
        const toggleIcon = timer.isActive ? 'stop' : 'play_circle_filled';
        const toggleLabel = timer.isActive ? 'Stop & Reset' : 'Start';
        const toggleClass = timer.isActive ? 'timer-btn-stop' : 'timer-btn-primary';
        el.innerHTML = `
            <div class="timer-time" id="time-${timer.id}">${this.formatTime(timer.remaining)}</div>
            <div class="timer-name" title="${timer.name}">${timer.name}${timer.alarmsTriggered>0?` (${timer.alarmsTriggered}x)`:''}</div>
            <div class="timer-controls">
                <button class="timer-control-btn timer-btn timer-btn-edit" data-action="edit" data-timer-id="${timer.id}" aria-label="Edit">
                    <span class="mat-icon" data-icon-group="action-primary">edit</span>
                </button>
                <button class="timer-control-btn timer-btn ${toggleClass}" data-action="toggle" data-timer-id="${timer.id}" aria-label="${toggleLabel}">
                    <span class="mat-icon" data-icon-group="media">${toggleIcon}</span>
                </button>
                <button class="timer-control-btn timer-btn timer-btn-danger" data-action="delete" data-timer-id="${timer.id}" aria-label="Delete">
                    <span class="mat-icon" data-icon-group="action-destructive">delete</span>
                </button>
            </div>`;
        document.getElementById('timersList').appendChild(el);
    }
    
    startActiveTimers() { 
        this.timers.forEach(t => { if(t.isActive && t.remaining>0) this.startTimer(t.id); }); 
    }
}

window.addEventListener('load', () => { window.timerApp = new TimerManager(); });
window.addEventListener('beforeunload', () => { 
    if(window.timerApp) { 
        Object.values(window.timerApp.intervals).forEach(clearInterval); 
        window.timerApp.stopAllAlarmSounds(); 
        window.timerApp.stopPreview();
        window.timerApp.stopEditPreview();
    } 
});
</script>
</body>
</html>
