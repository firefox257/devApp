<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>CSG Editor - Mobile</title>
        <style>
            /* ========== MATERIAL ICONS FONT ========== */
            @font-face {
                font-family: 'Material Icons';
                font-style: normal;
                font-weight: 400;
                src: url('/system/fonts/MaterialIcons-Regular.ttf') format('truetype');
                font-display: block;
            }
            
            .material-icon {
                font-family: 'Material Icons';
                font-weight: normal;
                font-style: normal;
                font-size: 1.2em;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                white-space: nowrap;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                user-select: none;
            }

            body, html {
                margin: 0; padding: 0; width: 100%; height: 100%;
                overflow: hidden; font-family: 'Segoe UI', sans-serif;
                background: #1e1e1e; color: white;
            }
            canvas {
                user-select: none; -webkit-user-select: none;
                -moz-user-select: none; -ms-user-select: none;
            }

            #toolbar {
                display: flex; background: #2c3e50; color: white;
                padding: 0; gap: 0; justify-content: center;
                box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                z-index: 10; position: relative;
            }

            #toolbar button {
                background: transparent; color: white; border: none;
                font-size: 1em; width: 40px; height: 40px;
                cursor: pointer; transition: background 0.2s, transform 0.1s;
                box-shadow: none; border-radius: 0;
                display: flex; align-items: center; justify-content: center;
            }

            #toolbar button:active { transform: scale(0.95); }
            #toolbar button:hover { background: rgba(255,255,255,0.1); }
            #toolbar button:hover .material-icon { transform: scale(1.1); transition: transform 0.15s ease; }

            .toolbar-separator {
                width: 1px; background-color: #446688;
                height: 40px;
            }

            #main-container {
                width: 100%; height: calc(100vh - 40px);
                position: relative;
            }

            #code-panel, #view-panel, #settings-panel,
            #editor-code-panel, #help-panel {
                position: absolute; width: 100vw; height: 100%;
                display: none; background: white;
            }

            #code-panel, #editor-code-panel, #help-panel {
                background: #1e1e1e; color: #f8f8f8;
            }

            #settings-panel {
                background: #282c34; color: #f8f8f8;
                padding: 20px; box-sizing: border-box; overflow-y: auto;
            }

            #settings-panel h2 {
                color: #61afef; border-bottom: 2px solid #545862;
                padding-bottom: 10px; margin-bottom: 20px;
            }

            #settings-panel label {
                font-size: 1em; color: #a0a0a0; margin-bottom: 5px;
            }

            #settings-panel input[type='number'],
            #settings-panel input[type='text'] {
                width: 80px; padding: 5px; background: #3e4451;
                border: 1px solid #545862; color: #f8f8f8;
                border-radius: 4px; margin-left: 10px;
            }

            #save-settings-btn {
                background: #28a745; color: white; border: none;
                padding: 10px 15px; border-radius: 5px;
                cursor: pointer; margin-top: 20px;
            }
            #save-settings-btn:hover { background: #218838; }

            #clear-cache-btn {
                background: #dc3545; color: white; border: none;
                padding: 10px 15px; border-radius: 5px;
                cursor: pointer; margin-top: 20px;
            }
            #clear-cache-btn:hover { background: #c82333; }

            #three-canvas { width: 100%; height: 100%; display: block; }

            .modal-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); display: none;
                justify-content: center; align-items: center; z-index: 10000;
            }
            .modal-content {
                background: #282c34; width: 100%; height: 100%;
                max-width: 100%; max-height: 100%;
            }

            #console-container {
                position: fixed; left: 0; right: 0; bottom: 0;
                height: 180px; display: flex; flex-direction: column;
                background: #0b0b0b; color: #e6e6e6;
                font-family: monospace; font-size: 12px; z-index: 0;
                border-top: 1px solid #333;
            }
            #console-resizer {
                height: 6px; cursor: ns-resize;
                background: linear-gradient(180deg, #222, #111);
                border-top: 1px solid #2b2b2b;
            }
            #console-panel {
                flex: 1; overflow-y: auto; padding: 8px;
                white-space: pre-wrap;
            }
            .console-log { color: #9fffb3; margin-bottom: 2px; }
            .console-warn { color: #ffd966; margin-bottom: 2px; }
            .console-error { color: #ff8b8b; margin-bottom: 2px; }
            .console-stack {
                color: #a0a0a0; font-size: 0.9em;
                margin-top: 4px; white-space: pre-wrap;
            }
        </style>
        <script src="/system/js/opentype.js"></script>
        <script>globalThis.opentype = opentype</script>
        <script type="importmap">
            {
                "imports": {
                    "three": "/system/threejs/build/three.module.js",
                    "three/addons/": "/system/threejs/jsm/",
                    "three-mesh-bvh": "/system/js/mesh-bvh.js",
                    "three-bvh-csg": "/system/js/csg-bvh.js",
                    "apiCalls": "/system/js/apiCalls.js",
					"editorCsg": "./editorCsg.js"
                }
            }
        </script>
    </head>
    <body>
        <div id="toolbar">
            <!-- 3D View - Primary Blue -->
            <button id="btn-3d" title="3D View" data-view="3d">
                <span class="material-icon" style="color: #007bff" aria-hidden="true">visibility</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Wireframe Toggle - Secondary Gray -->
            <button id="btn-wireframe" title="Toggle Wireframe" style="display: none" data-view="wireframe">
                <span class="material-icon" style="color: #6c757d" aria-hidden="true">grid_on</span>
            </button>
            <div class="toolbar-separator" id="separator-wireframe" style="display: none"></div>
            
            <!-- CSG Code Editor - Primary Blue -->
            <button id="btn-code" title="CSG Code Editor" data-view="code">
                <span class="material-icon" style="color: #007bff" aria-hidden="true">code</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Editor Code - Secondary Gray -->
            <button id="btn-editor-code" title="Editor Code" data-view="editor-code">
                <span class="material-icon" style="color: #6c757d" aria-hidden="true">source</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Clear Current Cache - Destructive Red -->
            <button id="btn-clear-cache-by-name" style="display: none" title="Clear Current Cache" data-view="clear-cache">
                <span class="material-icon" style="color: #dc3545" aria-hidden="true">delete_outline</span>
            </button>
            <div class="toolbar-separator" id="separator-clear-cache" style="display: none"></div>
            
            <!-- Settings - Secondary Gray -->
            <button id="btn-settings" title="Settings" data-view="settings">
                <span class="material-icon" style="color: #6c757d" aria-hidden="true">settings</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Load Project - Directory Amber -->
            <button id="btn-load" title="Load Project" data-view="load">
                <span class="material-icon" style="color: #ffc107" aria-hidden="true">upload_file</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Save Project - Warning Orange -->
            <button id="btn-save" title="Save Project" data-view="save">
                <span class="material-icon" style="color: #fd7e14" aria-hidden="true">save</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Help - Secondary Gray -->
            <button id="btn-help" title="Help" data-view="help">
                <span class="material-icon" style="color: #6c757d" aria-hidden="true">help</span>
            </button>
            <div class="toolbar-separator"></div>
            
            <!-- Clear Console - Destructive Red -->
            <button id="btn-clear-console" title="Clear Console" data-view="clear-console">
                <span class="material-icon" style="color: #dc3545" aria-hidden="true">delete_sweep</span>
            </button>
        </div>

        <div id="main-container">
            <div id="code-panel">
                <textcode id="csg-code" title="CSG Script" onrun="runCSGCode();"></textcode>
            </div>
            <div id="editor-code-panel">
                <textcode id="editor-code" title="Editor Script" onrun="runEditorScript();">
// Place reusable functions and objects here.
// Access from CSG Script with include("page name");
/* var constants = { PI: Math.PI, E: Math.E }; return { constants }; */
                </textcode>
            </div>
            <div id="view-panel">
                <canvas id="three-canvas"></canvas>
            </div>
            <div id="settings-panel">
                <h2>Settings</h2>
                <label for="width-input">Grid Width:</label>
                <input type="number" id="width-input" value="220" /> mm<br /><br />
                <label for="length-input">Grid Length:</label>
                <input type="number" id="length-input" value="220" /> mm<br /><br />
                <label for="grid-size-input">Grid Spacing:</label>
                <input type="number" id="grid-size-input" value="10" /> mm<br /><br />
                <label for="library-path-input">Library Path:</label>
                <input type="text" id="library-path-input" value="/csgLib" /><br /><br />
                <hr>
                <h3>Export Settings</h3>
                <label>Default Export Format:</label><br />
                <input type="radio" id="format-stl" name="export-format" value="stl" checked>
                <label for="format-stl">STL (.stl)</label><br />
                <input type="radio" id="format-glb" name="export-format" value="glb">
                <label for="format-glb">GLB (.glb)</label>
                <br /><br />
                <button id="save-settings-btn">Save Settings</button>
                <button id="clear-cache-btn">Clear All Cache</button>
            </div>
            <div id="help-panel" style="display: none; width: 100vw; height: 100%; background: #282c34; color: white; padding: 20px; box-sizing: border-box; overflow-y: auto;">
                <iframe src="help.html" style="width: 100%; height: 100%; border: none"></iframe>
            </div>
        </div>

        <div id="load-code-modal" class="modal-overlay">
            <div class="modal-content">
                <filepicker id="load-picker" useFileButtonText="Load Code"
                    onfilepick="handleLoadFile(event, filePath)"
                    oncancel="closeModal('load-code-modal')">
                </filepicker>
            </div>
        </div>
        <div id="save-code-modal" class="modal-overlay">
            <div class="modal-content">
                <filepicker id="save-picker" useFileButtonText="Save Code"
                    onfilepick="handleSaveFile(event, filePath)"
                    oncancel="closeModal('save-code-modal')">
                </filepicker>
            </div>
        </div>
        <div id="save-stl-modal" class="modal-overlay">
            <div class="modal-content">
                <filepicker id="save-stl-picker" useFileButtonText="Export 3d"
                    onfilepick="handleSaveStl(event, filePath)"
                    oncancel="closeModal('save-stl-modal')">
                </filepicker>
            </div>
        </div>

        <div id="console-container" aria-live="polite">
            <div id="console-resizer" title="Drag to resize console"></div>
            <div id="console-panel"></div>
        </div>

        <script type="module" src="/system/ux/textCode.js"></script>
        <script type="module" src="/system/ux/filePicker.js"></script>

        <script type="module">
            import * as THREE from 'three'
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
            import {
                initialize, runCSGCode, runEditorScript,
                handleLoadFile, handleSaveFile, handleSaveStl,
                exportSTL, clearAllCache, clearCurrentCacheByName,
                toggleWireframe
            } from 'editorCsg'

            globalThis.settings = {}
            let currentObjects, domElements, renderer, scene, groupItems, camera, controls
            let keyLight, ambientLight, originLine, buildPlateGrid = null, buildPlateBox = null
            let currentView = '3d' // ✅ Track current view state

            window.openModal = (id) => document.getElementById(id).style.display = 'flex'
            window.closeModal = (id) => document.getElementById(id).style.display = 'none'
            window.runCSGCode = runCSGCode
            window.runEditorScript = runEditorScript
            window.handleLoadFile = handleLoadFile
            window.handleSaveFile = handleSaveFile
            window.handleSaveStl = handleSaveStl
            window.clearCurrentCacheByName = clearCurrentCacheByName

            function setupThreeJs(canvas) {
                renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
                renderer.setClearColor(0x1e1e1e)
                renderer.setPixelRatio(window.devicePixelRatio)
                scene = new THREE.Scene()
                groupItems = new THREE.Group()
                groupItems.rotation.x = -Math.PI/2
                scene.add(groupItems)
                camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 2000)
                camera.position.set(0, 50, 50)
                camera.lookAt(0, 0, 0)
                controls = new OrbitControls(camera, canvas)
                controls.enableDamping = true
                controls.dampingFactor = 0.1
                controls.minDistance = 0.1
                controls.rotateSpeed = 0.3
                keyLight = new THREE.PointLight(0xffffff, 7, 1000, 0.2)
                ambientLight = new THREE.AmbientLight(0xffcc66, 0.5)
                scene.add(keyLight, ambientLight)
                const originLineMaterial = new THREE.LineBasicMaterial({ color: 0x555555 })
                const originLineGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -100, 0), new THREE.Vector3(0, 500, 0)
                ])
                originLine = new THREE.LineSegments(originLineGeometry, originLineMaterial)
                scene.add(originLine)
            }

            function createBuildPlate() {
                if (buildPlateGrid) { scene.remove(buildPlateGrid); buildPlateGrid.geometry.dispose(); buildPlateGrid = null }
                if (buildPlateBox) { scene.remove(buildPlateBox); buildPlateBox.geometry.dispose(); buildPlateBox = null }
                const plateSize = Math.max(settings.plateWidth, settings.plateLength)
                const divisions = Math.floor(plateSize / settings.gridSize)
                buildPlateGrid = new THREE.GridHelper(plateSize, divisions, 0x555555, 0x555555)
                buildPlateGrid.position.y = 0
                scene.add(buildPlateGrid)
                const boxMaterial = new THREE.LineBasicMaterial({ color: 0xcccccc })
                const boxGeometry = new THREE.BufferGeometry()
                const halfWidth = settings.plateWidth / 2, halfLength = settings.plateLength / 2
                const boxVertices = new Float32Array([
                    -halfWidth, 0, -halfLength, halfWidth, 0, -halfLength,
                    halfWidth, 0, halfLength, halfWidth, 0, halfLength,
                    -halfWidth, 0, halfLength, -halfWidth, 0, -halfLength
                ])
                boxGeometry.setAttribute('position', new THREE.BufferAttribute(boxVertices, 3))
                buildPlateBox = new THREE.LineSegments(boxGeometry, boxMaterial)
                scene.add(buildPlateBox)
            }

            function resizeRenderer() {
                const canvas = renderer.domElement
                const width = canvas.clientWidth, height = canvas.clientHeight
                if (canvas.width !== width || canvas.height !== height) {
                    renderer.setSize(width, height, false)
                    camera.aspect = width / height
                    camera.updateProjectionMatrix()
                }
            }

            function animate() {
                requestAnimationFrame(animate)
                controls.update()
                const cameraDirection = new THREE.Vector3()
                camera.getWorldDirection(cameraDirection)
                keyLight.position.copy(camera.position).add(cameraDirection.multiplyScalar(-10))
                renderer.render(scene, camera)
            }

            function showView(id) {
                const dom = {
                    codePanel: document.getElementById('code-panel'),
                    viewPanel: document.getElementById('view-panel'),
                    settingsPanel: document.getElementById('settings-panel'),
                    editorCodePanel: document.getElementById('editor-code-panel'),
                    helpPanel: document.getElementById('help-panel'),
                    btn3D: document.getElementById('btn-3d'),
                    btnCode: document.getElementById('btn-code'),
                    btnEditorCode: document.getElementById('btn-editor-code'),
                    btnSettings: document.getElementById('btn-settings'),
                    btnHelp: document.getElementById('btn-help'),
                    btnClearCacheByName: document.getElementById('btn-clear-cache-by-name'),
                    separatorClearCache: document.getElementById('separator-clear-cache'),
                    btnWireframe: document.getElementById('btn-wireframe'),
                    separatorWireframe: document.getElementById('separator-wireframe')
                }
                ;[dom.codePanel, dom.viewPanel, dom.settingsPanel, dom.editorCodePanel, dom.helpPanel]
                    .forEach(el => el.style.display = 'none')
                ;[dom.btn3D, dom.btnCode, dom.btnEditorCode, dom.btnSettings, dom.btnHelp]
                    .forEach(btn => btn.style.backgroundColor = 'transparent')
                dom.btnClearCacheByName.style.display = 'none'
                dom.separatorClearCache.style.display = 'none'
                dom.btnWireframe.style.display = 'none'
                dom.separatorWireframe.style.display = 'none'

                if (id === '3d') {
                    dom.viewPanel.style.display = 'block'
                    dom.btn3D.style.backgroundColor = 'rgba(231,76,60,0.3)'
                    dom.btnWireframe.style.display = 'block'
                    dom.separatorWireframe.style.display = 'block'
                } else if (id === 'code') {
                    dom.codePanel.style.display = 'block'
                    dom.btnCode.style.backgroundColor = 'rgba(231,76,60,0.3)'
                    dom.btnClearCacheByName.style.display = 'block'
                    dom.separatorClearCache.style.display = 'block'
                } else if (id === 'editor-code') {
                    dom.editorCodePanel.style.display = 'block'
                    dom.btnEditorCode.style.backgroundColor = 'rgba(231,76,60,0.3)'
                    dom.btnClearCacheByName.style.display = 'block'
                    dom.separatorClearCache.style.display = 'block'
                } else if (id === 'settings') {
                    dom.settingsPanel.style.display = 'block'
                    dom.btnSettings.style.backgroundColor = 'rgba(231,76,60,0.3)'
                } else if (id === 'help') {
                    dom.helpPanel.style.display = 'block'
                    dom.btnHelp.style.backgroundColor = 'rgba(231,76,60,0.3)'
                }
                
                currentView = id // ✅ Update current view state
            }

            function saveSettings(domElements) {
                const newWidth = parseFloat(domElements.widthInput.value)
                const newLength = parseFloat(domElements.lengthInput.value)
                const newGridSize = parseFloat(domElements.gridSizeInput.value)
                const newLibraryPath = domElements.libraryPathInput.value
                if (isNaN(newWidth) || newWidth <= 0 || isNaN(newLength) || newLength <= 0 ||
                    isNaN(newGridSize) || newGridSize <= 0) {
                    alert('Please enter valid positive numbers for all settings.')
                    return
                }
                settings.plateWidth = newWidth
                settings.plateLength = newLength
                settings.gridSize = newGridSize
                settings.libraryPath = newLibraryPath
                settings.exportFormat = domElements.exportStlRadio.checked ? 'stl' : 'glb'
                localStorage.setItem('csg-editor-settings', JSON.stringify(settings))
                createBuildPlate()
                alert('Settings saved successfully!')
            }

            window.onload = function () {
                domElements = {
                    btn3D: document.getElementById('btn-3d'),
                    btnCode: document.getElementById('btn-code'),
                    btnEditorCode: document.getElementById('btn-editor-code'),
                    btnSettings: document.getElementById('btn-settings'),
                    btnLoad: document.getElementById('btn-load'),
                    btnSave: document.getElementById('btn-save'),
                    btnHelp: document.getElementById('btn-help'),
                    clearConsoleBtn: document.getElementById('btn-clear-console'),
                    btnWireframe: document.getElementById('btn-wireframe'),
                    widthInput: document.getElementById('width-input'),
                    lengthInput: document.getElementById('length-input'),
                    gridSizeInput: document.getElementById('grid-size-input'),
                    libraryPathInput: document.getElementById('library-path-input'),
                    saveSettingsBtn: document.getElementById('save-settings-btn'),
                    clearCacheBtn: document.getElementById('clear-cache-btn'),
                    csgEditor: document.getElementById('csg-code'),
                    editorCodeEditor: document.getElementById('editor-code'),
                    codePanel: document.getElementById('code-panel'),
                    editorCodePanel: document.getElementById('editor-code-panel'),
                    viewPanel: document.getElementById('view-panel'),
                    settingsPanel: document.getElementById('settings-panel'),
                    helpPanel: document.getElementById('help-panel'),
                    canvas: document.getElementById('three-canvas'),
                    openModal, closeModal, setupThreeJs, createBuildPlate,
                    resizeRenderer, animate,
                    get scene() { return scene },
                    get groupItems() { return groupItems },
                    showView,
                    exportStlRadio: document.getElementById('format-stl'),
                    exportGlbRadio: document.getElementById('format-glb')
                }

                settings = { plateWidth: 220, plateLength: 220, gridSize: 10, libraryPath: '/csgLib', exportFormat: 'stl' }
                const savedSettings = localStorage.getItem('csg-editor-settings')
                if (savedSettings) {
                    settings = JSON.parse(savedSettings)
                }
                domElements.widthInput.value = settings.plateWidth
                domElements.lengthInput.value = settings.plateLength
                domElements.gridSizeInput.value = settings.gridSize
                domElements.libraryPathInput.value = settings.libraryPath
                if (settings.exportFormat === 'stl') {
                    domElements.exportStlRadio.checked = true
                } else {
                    domElements.exportGlbRadio.checked = true
                }
                domElements.settings = settings

                setupThreeJs(domElements.canvas)

                domElements.btn3D.addEventListener('click', () => showView('3d'))
                domElements.btnCode.addEventListener('click', () => showView('code'))
                domElements.btnEditorCode.addEventListener('click', () => showView('editor-code'))
                domElements.btnSettings.addEventListener('click', () => showView('settings'))
                domElements.btnLoad.addEventListener('click', () => openModal('load-code-modal'))
                domElements.clearConsoleBtn.addEventListener('click', () => {
                    document.getElementById('console-panel').innerHTML = ''
                })
                document.getElementById('btn-clear-cache-by-name').addEventListener('click', clearCurrentCacheByName)
                document.getElementById('btn-wireframe').addEventListener('click', toggleWireframe)
                domElements.btnHelp.addEventListener('click', () => showView('help'))

                // ✅ FIXED: Save button now uses currentView state instead of color comparison
                domElements.btnSave.addEventListener('click', () => {
                    if (currentView === 'code' || currentView === 'editor-code') {
                        openModal('save-code-modal')
                    } else if (currentView === '3d') {
                        exportSTL()
                    } else if (currentView === 'settings') {
                        saveSettings(domElements)
                    }
                })

                domElements.saveSettingsBtn.addEventListener('click', () => saveSettings(domElements))
                domElements.clearCacheBtn.addEventListener('click', clearAllCache)

                initialize(domElements)
                showView('3d')
                createBuildPlate()
                resizeRenderer()
                animate()
            }
        </script>
    </body>
</html>
