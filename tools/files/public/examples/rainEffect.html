<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Layered Rain and Lightning</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #222;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('back1.jpg'); /* Your background image */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            z-index: -2;
            filter: brightness(0.6) contrast(1.3);
        }

        /* Canvas for image analysis - hidden */
        #imageAnalysisCanvas {
            display: none;
        }

        .rain-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0));
            opacity: 0;
            animation-timing-function: linear;
            border-radius: 2px 2px 0 0;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }

        /* --- Rain Layer 1: Far Away, Slower, Thinner --- */
        .rain-layer.layer1 { z-index: 1; }
        .rain-layer.layer1 .raindrop {
            width: 1px; height: 15px; animation-duration: 2s; animation-name: fallLayer1; animation-iteration-count: infinite;
        }
        @keyframes fallLayer1 { 0% { transform: translateY(-100%); opacity: 0; } 70% { opacity: 0.6; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* --- Rain Layer 2: Mid-Distance, Moderate Speed --- */
        .rain-layer.layer2 { z-index: 2; }
        .rain-layer.layer2 .raindrop {
            width: 2px; height: 25px; animation-duration: 1.5s; animation-name: fallLayer2; animation-iteration-count: infinite; box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        @keyframes fallLayer2 { 0% { transform: translateY(-100%); opacity: 0; } 60% { opacity: 0.8; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* --- Rain Layer 3: Close Up, Faster, Thicker --- */
        .rain-layer.layer3 { z-index: 3; }
        .rain-layer.layer3 .raindrop {
            width: 3px; height: 35px; animation-duration: 1s; animation-name: fallLayer3; animation-iteration-count: infinite; box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }
        @keyframes fallLayer3 { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* --- Lightning --- */
        .lightning-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10; /* Ensure lightning is on top */
            overflow: hidden;
        }

        .lightning {
            position: absolute;
            top: -100%;
            width: 5px; /* Initial width */
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0));
            opacity: 0;
            box-shadow: 0 0 70px 40px rgba(255, 255, 255, 0.7);
            animation: flash 0.4s ease-out forwards;
            transition: left 0.2s ease-out; /* Smooth transition for position */
            transform: translateX(-50%); /* Center based on its own width */
        }

        @keyframes flash {
            0% { opacity: 0; width: 5px; }
            50% { opacity: 1; width: 25px; }
            100% { opacity: 0; width: 5px; }
        }

        /* --- Glow Effect Element --- */
        .lightning-glow {
            position: absolute;
            top: 0; /* Will be adjusted by JS */
            left: 0; /* Will be adjusted by JS */
            width: 200px; /* Initial size, will be scaled */
            height: 200px; /* Initial size, will be scaled */
            background: radial-gradient(circle at center, rgba(255, 255, 200, 0.6) 0%, rgba(255, 255, 200, 0) 70%); /* Soft yellow glow */
            opacity: 0;
            transform: translate(-50%, -50%); /* Center the glow element */
            pointer-events: none;
            z-index: 9; /* Just below lightning, above background */
            animation: glowFade 0.8s ease-out forwards; /* Longer fade than lightning */
            filter: blur(10px); /* Soften the glow */
        }

        @keyframes glowFade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } /* Briefly expand */
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } /* Fade out and expand */
        }

    </style>
</head>
<body>

    <div class="background-container"></div>
    <canvas id="imageAnalysisCanvas"></canvas> <!-- Hidden canvas for analysis -->

    <!-- Rain Layers -->
    <div class="rain-layer layer1"></div>
    <div class="rain-layer layer2"></div>
    <div class="rain-layer layer3"></div>

    <div class="lightning-container">
        <!-- Lightning flashes will be created by JavaScript -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rainLayers = document.querySelectorAll('.rain-layer');
            const lightningContainer = document.querySelector('.lightning-container');
            const canvas = document.getElementById('imageAnalysisCanvas');
            const ctx = canvas.getContext('2d');
            const backgroundImageURL = 'back1.jpg'; // Make sure this matches your image file name

            // --- Configuration ---
            const brightnessThreshold = 210; // Adjust this value (0-255). Higher = brighter spots only.
            const minBrightSpots = 5;        // Minimum number of bright spots to trigger dynamic placement.
            const glowSizeMultiplier = 1.5;  // How large the glow effect is relative to the lightning width.
            const glowFadeDuration = 0.8;     // Duration of the glow animation in seconds.

            let brightSpots = []; // Stores {x, y} coordinates of bright areas (percentages)

            const layerConfigs = [
                { element: rainLayers[0], numDrops: 120, animationName: 'fallLayer1' },
                { element: rainLayers[1], numDrops: 180, animationName: 'fallLayer2' },
                { element: rainLayers[2], numDrops: 250, animationName: 'fallLayer3' }
            ];

            const lightningIntervalMin = 3000;
            const lightningIntervalMax = 10000;

            // --- Image Analysis for Bright Spots ---
            function analyzeBackgroundImage() {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    const imageData = ctx.getImageData(0, 0, img.width, img.height);
                    const data = imageData.data;

                    brightSpots = []; // Reset spots

                    for (let y = 0; y < img.height; y++) {
                        for (let x = 0; x < img.width; x++) {
                            const index = (y * img.width + x) * 4;
                            const r = data[index];
                            const g = data[index + 1];
                            const b = data[index + 2];
                            const brightness = 0.2126 * r + 0.7152 * g + 0.0722 * b;

                            if (brightness > brightnessThreshold) {
                                brightSpots.push({
                                    x: (x / img.width) * 100, // Percentage
                                    y: (y / img.height) * 100 // Percentage
                                });
                            }
                        }
                    }
                    console.log(`Found ${brightSpots.length} bright spots.`);

                    // Start effects only after analysis is done
                    if (brightSpots.length >= minBrightSpots) {
                        scheduleLightning();
                        startRaindropCreation();
                    } else {
                        console.warn("Not enough bright spots found. Falling back to random lightning placement.");
                        scheduleLightning(); // Fallback
                        startRaindropCreation();
                    }
                };
                img.onerror = () => {
                    console.error("Failed to load background image. Ensure 'back1.jpg' is correct and accessible.");
                    scheduleLightning(); // Fallback
                    startRaindropCreation();
                };
                img.src = backgroundImageURL;
            }

            // --- Raindrop Generation ---
            function createRaindrop(layerElement, animationName) {
                const raindrop = document.createElement('div');
                raindrop.classList.add('raindrop');
                const randomLeft = Math.random() * 100;
                const randomDelay = Math.random() * 6;
                raindrop.style.left = `${randomLeft}%`;
                raindrop.style.animationDelay = `-${randomDelay}s`;
                raindrop.style.animationName = animationName;
                layerElement.appendChild(raindrop);
                raindrop.addEventListener('animationend', () => { raindrop.remove(); });
            }

            // --- Lightning Flashes ---
            function createLightningGlow(xPosPercent) {
                const glow = document.createElement('div');
                glow.classList.add('lightning-glow');

                // Position the glow element at the strike location
                glow.style.left = `${xPosPercent}%`;
                // Adjust top position slightly to make it appear centered if needed, or keep it from the animation
                // glow.style.top = `${lightningYPercent}%`; // If you had a Y position for lightning

                // Dynamically set animation duration based on glowFadeDuration constant
                glow.style.animationDuration = `${glowFadeDuration}s`;

                // Scale the glow based on lightning width and multiplier
                // This part is tricky as lightning width changes. We use a fixed size and scale it.
                // The animation handles the expansion.
                const glowBaseSize = 150; // Base pixel size before scaling
                glow.style.width = `${glowBaseSize}px`;
                glow.style.height = `${glowBaseSize}px`;

                lightningContainer.appendChild(glow);

                glow.addEventListener('animationend', () => {
                    glow.remove();
                });
            }

            function triggerLightning() {
                const lightningFlash = document.createElement('div');
                lightningFlash.classList.add('lightning');

                let lightningX = 50; // Default center

                if (brightSpots.length > 0) {
                    const randomSpot = brightSpots[Math.floor(Math.random() * brightSpots.length)];
                    lightningX = randomSpot.x;
                } else {
                    const randomLeftOffset = (Math.random() - 0.5) * 70;
                    lightningX = 50 + randomLeftOffset;
                }

                lightningFlash.style.left = `${lightningX}%`;
                lightningContainer.appendChild(lightningFlash);

                // Trigger the glow effect shortly after the lightning appears
                // Use a small delay so the lightning element is in the DOM first
                setTimeout(() => {
                    createLightningGlow(lightningX);
                }, 50); // Small delay (ms)

                lightningFlash.addEventListener('animationend', () => {
                    lightningFlash.remove();
                });
            }

            function scheduleLightning() {
                const delay = Math.random() * (lightningIntervalMax - lightningIntervalMin) + lightningIntervalMin;
                setTimeout(() => {
                    triggerLightning();
                    scheduleLightning();
                }, delay);
            }

            // --- Start Functions ---
            function startRaindropCreation() {
                layerConfigs.forEach(config => {
                    for (let i = 0; i < config.numDrops; i++) {
                        createRaindrop(config.element, config.animationName);
                    }
                });

                setInterval(() => {
                    layerConfigs.forEach(config => {
                        if (config.element.querySelectorAll('.raindrop').length < config.numDrops) {
                            createRaindrop(config.element, config.animationName);
                        }
                    });
                }, 150);
            }

            // --- Initialization ---
            analyzeBackgroundImage();
        });
    </script>

</body>
</html>
