<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iPhone MIDI Player</title>
  
  <!-- CDN Fallbacks for Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2/dist/MidiPlayer.min.js"></script>
  <script>
    if (typeof MidiPlayer === 'undefined') {
      document.write('<script src="https://unpkg.com/midi-player-js@2/dist/MidiPlayer.min.js"><\/script>');
    }
  </script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
  <script>
    if (typeof Tone === 'undefined') {
      document.write('<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"><\/script>');
    }
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px; margin: 0; background: #f8f9fa; text-align: center;
      padding-bottom: 42vh; /* Space for fixed console */
    }
    h2 { margin-top: 10px; }
    #playBtn {
      font-size: 18px; padding: 16px 32px; margin: 15px 0;
      background: #007aff; color: white; border: none; border-radius: 12px;
      cursor: pointer;
    }
    #playBtn:disabled { background: #999; }
    #status { margin: 10px 0; font-weight: 600; min-height: 24px; font-size: 16px; color: #333; }
    .playing { animation: pulse 1s infinite; color: #007aff; }
    @keyframes pulse { 50% { opacity: 0.6; } }

    /* Loading Status Box */
    .loading-info {
      font-size: 12px; color: #666; margin: 10px 0;
      padding: 8px; background: #e9ecef; border-radius: 6px;
    }

    /* Mobile Console Controls */
    #console-controls {
      position: fixed; bottom: calc(35vh + 8px); right: 12px;
      display: flex; gap: 8px; z-index: 10000;
    }
    #console-controls button {
      background: #2a2a2a; color: #fff; border: 1px solid #555;
      padding: 8px 12px; font-size: 13px; border-radius: 8px; cursor: pointer;
      font-family: inherit;
    }
    #console-controls button:active { background: #444; }

    /* Console Area */
    #mobile-console {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 35vh; background: #0d0d0d; color: #e0e0e0;
      font-family: "SF Mono", Monaco, "Courier New", monospace;
      font-size: 11px; padding: 10px; overflow-y: auto;
      border-top: 2px solid #333; z-index: 9999; box-sizing: border-box;
      line-height: 1.4; -webkit-overflow-scrolling: touch;
      user-select: text; /* Allow text selection */
    }
    #mobile-console div { margin-bottom: 4px; padding-left: 8px; border-left: 3px solid #4da6ff; white-space: pre-wrap; }
    #mobile-console .warn { border-left-color: #ffcc00; color: #ffd633; }
    #mobile-console .error { border-left-color: #ff4d4d; color: #ff6b6b; }
  </style>
</head>
<body>
  <h2>🎹 Browser MIDI Player</h2>
  
  <div id="loadingStatus" class="loading-info">Loading libraries...</div>
  <button id="playBtn" disabled>⏳ Loading...</button>
  <div id="status">Checking connection...</div>

  <!-- Console Controls -->
  <div id="console-controls">
    <button id="copy-console">📋 Copy Logs</button>
    <button id="clear-console">🗑️ Clear</button>
  </div>
  
  <div id="mobile-console"></div>

  <script>
    // 1️⃣ CONSOLE CAPTURE
    (function() {
      const container = document.getElementById('mobile-console');
      const _log = console.log;
      const _warn = console.warn;
      const _error = console.error;

      function formatArgs(args) {
        return args.map(arg => {
          try {
            if (arg === null) return 'null';
            if (arg === undefined) return 'undefined';
            if (typeof arg === 'object') return JSON.stringify(arg, null, 2);
            return String(arg);
          } catch(e) { return `[${typeof arg}]`; }
        }).join(' ');
      }

      function addLine(type, args) {
        const line = document.createElement('div');
        line.className = type === 'warn' ? 'warn' : type === 'error' ? 'error' : '';
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        line.textContent = `[${time}] [${type.toUpperCase()}] ${formatArgs(args)}`;
        container.appendChild(line);
        container.scrollTop = container.scrollHeight;
      }

      console.log = function(...args) { addLine('log', args); _log.apply(console, args); };
      console.warn = function(...args) { addLine('warn', args); _warn.apply(console, args); };
      console.error = function(...args) { addLine('error', args); _error.apply(console, args); };
    })();

    // 2️⃣ COPY TO CLIPBOARD LOGIC
    document.getElementById('copy-console').addEventListener('click', async () => {
      const text = document.getElementById('mobile-console').innerText;
      const btn = document.getElementById('copy-console');
      
      if (!text.trim()) {
        btn.textContent = '⚠️ Empty';
        setTimeout(() => btn.textContent = '📋 Copy Logs', 1500);
        return;
      }

      try {
        // Try modern Clipboard API first
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          // Fallback for http:// or older browsers
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }
        
        // Visual feedback
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '📋 Copy Logs', 2000);
      } catch (err) {
        console.error('Copy failed:', err);
        btn.textContent = '❌ Failed';
        alert('Copy failed. Try selecting the text manually.');
        setTimeout(() => btn.textContent = '📋 Copy Logs', 2000);
      }
    });

    document.getElementById('clear-console').addEventListener('click', () => {
      document.getElementById('mobile-console').innerHTML = '';
    });

    // 3️⃣ LIBRARY CHECK & MIDI LOGIC
    const loadingStatus = document.getElementById('loadingStatus');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    let player, synth, isPlaying = false;
    
    // Inline MIDI (C Major Scale)
    const TINY_MIDI = 'data:audio/midi;base64,TVRoZAAAAAYAAAABAIBNVHJrAAAAGwD/UQMHoSAA/1gEBAIYCACf/wD/AQEA/1gEBAIYCACf/gADAA==';

    // Check libraries after a short delay to ensure scripts loaded
    setTimeout(checkLibraries, 200);

    function checkLibraries() {
      console.log('🔍 Checking library availability...');
      const midiPlayerLoaded = typeof MidiPlayer !== 'undefined';
      const toneLoaded = typeof Tone !== 'undefined';
      
      console.log(`MidiPlayer: ${midiPlayerLoaded ? '✅' : '❌'}`);
      console.log(`Tone.js: ${toneLoaded ? '✅' : '❌'}`);
      
      if (!midiPlayerLoaded && !toneLoaded) {
        loadingStatus.textContent = '❌ Both libraries failed - No internet?';
        loadingStatus.style.color = '#721c24';
        loadingStatus.style.background = '#f8d7da';
        status.textContent = 'Check WiFi/Cellular';
        console.error(' No internet connection or CDNs blocked');
        playBtn.disabled = true;
        playBtn.textContent = '❌ No Connection';
      } else if (!toneLoaded) {
        loadingStatus.textContent = '❌ Tone.js failed to load';
        status.textContent = 'Tone.js missing';
        console.error(' Tone.js CDN unreachable');
        playBtn.disabled = true;
      } else if (!midiPlayerLoaded) {
        loadingStatus.textContent = '❌ MidiPlayer failed to load';
        status.textContent = 'MidiPlayer missing';
        console.error(' MidiPlayer CDN unreachable');
        playBtn.disabled = true;
      } else {
        // Success
        loadingStatus.textContent = '✅ Libraries loaded successfully';
        loadingStatus.style.background = '#d4edda';
        loadingStatus.style.color = '#155724';
        playBtn.disabled = false;
        playBtn.textContent = '▶️ Tap to Start';
        status.textContent = 'Ready';
        console.log('✅ All libraries ready. Tap button to play.');
        
        playBtn.addEventListener('touchstart', handleStart, {passive: true});
        playBtn.addEventListener('click', handleStart);
      }
    }

    async function handleStart(e) {
      e.preventDefault();
      if (isPlaying) return;
      
      console.log('👆 User tapped');
      playBtn.disabled = true;

      try {
        status.textContent = '🔓 Unlocking audio...';
        await Tone.start();
        console.log('✅ AudioContext unlocked');

        status.textContent = '⏳ Creating synth...';
        synth = new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: 'triangle' },
          envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.4 }
        }).toDestination();
        synth.volume.value = -6;
        console.log('✅ Synth created');

        status.textContent = ' Loading MIDI...';
        player = new MidiPlayer.Player(handleMidiEvent);

        player.on('endOfFile', () => {
          status.textContent = '✅ Finished!';
          playBtn.disabled = false;
          playBtn.textContent = '🔁 Play Again';
          isPlaying = false;
          console.log('🏁 Playback finished');
        });

        const response = await fetch(TINY_MIDI);
        const arrayBuffer = await response.arrayBuffer();
        player.loadArrayBuffer(arrayBuffer);
        player.play();
        isPlaying = true;

        status.textContent = '🔊 Playing...';
        status.classList.add('playing');
        playBtn.textContent = ' Playing';
        console.log('▶️ Playback started');

      } catch (err) {
        status.textContent = '❌ Error';
        playBtn.disabled = false;
        playBtn.textContent = '▶️ Tap to Start';
        console.error('🔴 Error:', err.message);
        alert('Error: ' + err.message);
      }
    }

    function handleMidiEvent(event) {
      if (event.name === 'Note on' && event.velocity > 0 && event.noteNumber) {
        try {
          const freq = Tone.Frequency(event.noteNumber, 'midi').toFrequency();
          const duration = Math.max(0.08, event.duration || 0.25);
          const velocity = Math.max(0.1, Math.min(1, event.velocity / 100));
          synth.triggerAttackRelease(freq, duration, Tone.now(), velocity);
        } catch (e) {
          console.warn('⚠️ Note failed:', e.message);
        }
      }
    }

    console.log('📱 Page loaded');
  </script>
</body>
</html>
