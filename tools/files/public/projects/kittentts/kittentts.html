<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KittenTTS Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #eee; padding: 15px; margin: 0; }
        .card { max-width: 450px; margin: 20px auto; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h2 { color: #ff69b4; margin: 0 0 15px 0; font-size: 1.4rem; text-align: center; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; }
        button { width: 100%; padding: 16px; background: #ff69b4; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; }
        button:disabled { background: #444; color: #888; }
        #log { margin-top: 15px; background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 10px; color: #00ff41; height: 200px; overflow-y: auto; border: 1px solid #333; white-space: pre-wrap; }
        
        #phoneticOutput { 
            margin-top: 12px; 
            background: #252525; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 12px; 
            color: #7ec8ff; 
            border: 1px solid #444;
            white-space: pre-wrap;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
        }
        .phonetic-label { color: #aaa; font-size: 10px; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .phoneme { display: inline-block; background: #333; padding: 2px 6px; margin: 2px; border-radius: 4px; font-size: 11px; }
        .phoneme-id { color: #ff69b4; font-weight: bold; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
        .status-ready { background: #00ff41; color: #000; }
        .status-loading { background: #ffaa00; color: #000; }
        .status-error { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h2>🐱 KittenTTS v0.8 <span id="statusBadge" class="status-badge status-loading">Loading...</span></h2>
    
    <label>Voice Artist</label>
    <select id="voiceSelect">
        <option value="Bella">Bella (Female)</option>
        <option value="Jasper" selected>Jasper (Male)</option>
        <option value="Luna">Luna (Female)</option>
        <option value="Bruno">Bruno (Male)</option>
        <option value="Rosie">Rosie (Female)</option>
        <option value="Hugo">Hugo (Male)</option>
        <option value="Kiki">Kiki (Female)</option>
        <option value="Leo">Leo (Male)</option>
    </select>

    <label>Talking Speed: <span id="speedVal">1.0</span>x</label>
    <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">

    <label>Text</label>
    <textarea id="textInput" rows="3">Hello! Testing the phoneme fix on my iPhone.</textarea>

    <span class="phonetic-label">Phonetic Translation (IPA)</span>
    <div id="phoneticOutput">Enter text to see phonemes...</div>

    <button id="runBtn" disabled>GENERATE SPEECH</button>
    <div id="log">Status: Initializing...</div>
</div>

<script>
    const logDiv = document.getElementById('log');
    const phoneticOutput = document.getElementById('phoneticOutput');
    const statusBadge = document.getElementById('statusBadge');
    const runBtn = document.getElementById('runBtn');
    
    const log = (msg) => { 
        logDiv.innerText += `\n> ${msg}`; 
        logDiv.scrollTop = logDiv.scrollHeight; 
    };
    
    const speedRange = document.getElementById('speedRange');
    const speedVal = document.getElementById('speedVal');
    speedRange.oninput = () => speedVal.innerText = speedRange.value;

    let session = null;
    let voices = {};
    let expectedStyleDim = 256; // KittenTTS nano v0.8 expects 256-dim style vectors

    // ✅ CORRECTED: Match actual filenames in your voices.npz
    const voiceMap = {
        "Bella": "expr-voice-2-f.npy", 
        "Jasper": "expr-voice-2-m.npy",
        "Luna": "expr-voice-3-f.npy", 
        "Bruno": "expr-voice-3-m.npy",
        "Rosie": "expr-voice-4-f.npy", 
        "Hugo": "expr-voice-4-m.npy",
        "Kiki": "expr-voice-5-f.npy", 
        "Leo": "expr-voice-5-m.npy"
    };

    // ✅ KittenTTS v0.8 Phoneme Vocabulary (IPA → Token ID)
    const KITTEN_VOCAB = new Map([
        ['<pad>', 0], ['<unk>', 1], ['<eos>', 10],
        ['ɑ', 2], ['æ', 3], ['ɒ', 4], ['ɔ', 5], ['ʌ', 6],
        ['ə', 7], ['ɜ', 8], ['ɪ', 9], ['ʊ', 11], ['u', 12],
        ['i', 13], ['e', 14], ['ɛ', 15],
        ['aɪ', 16], ['aʊ', 17], ['ɔɪ', 18], ['əʊ', 19], 
        ['ɪə', 20], ['ɛə', 21], ['ʊə', 22],
        ['b', 23], ['d', 24], ['f', 25], ['g', 26], ['h', 27],
        ['j', 28], ['k', 29], ['l', 30], ['m', 31], ['n', 32],
        ['ŋ', 33], ['p', 34], ['r', 35], ['s', 36], ['ʃ', 37],
        ['t', 38], ['θ', 39], ['ð', 40], ['v', 41], ['w', 42],
        ['z', 43], ['ʒ', 44], ['tʃ', 45], ['dʒ', 46],
        ['ˈ', 47], ['ˌ', 48],
        ['.', 49], [',', 50], ['?', 51], ['!', 52], 
        [';', 53], [':', 54], ['-', 55], [' ', 56],
        ['x', 57], ['y', 58]  // Added missing phonemes
    ]);

    // ✅ Simple fallback G2P (improved)
    function simpleG2P(text) {
        let processed = text.toLowerCase()
            .replace(/[^a-z\s\.\,\!\?\-']/g, '')
            .replace(/th/g, 'θ')
            .replace(/sh/g, 'ʃ')
            .replace(/ch/g, 'tʃ')
            .replace(/ng/g, 'ŋ')
            .replace(/wh/g, 'w')
            .replace(/ph/g, 'f')
            .replace(/gh/g, '')
            .replace(/ck/g, 'k')
            .replace(/qu/g, 'kw')
            .replace(/tion/g, 'ʃən')
            .replace(/sion/g, 'ʒən')
            .replace(/ing/g, 'ɪŋ')
            .replace(/ed/g, 'd')
            .replace(/ly/g, 'li')
            .replace(/er/g, 'ər')
            .replace(/or/g, 'ɔr')
            .replace(/ar/g, 'ɑr')
            .replace(/ir/g, 'ɪr')
            .replace(/ur/g, 'ʌr')
            .replace(/ai/g, 'eɪ')
            .replace(/ay/g, 'eɪ')
            .replace(/ea/g, 'i')
            .replace(/ee/g, 'i')
            .replace(/ie/g, 'i')
            .replace(/oa/g, 'oʊ')
            .replace(/oe/g, 'oʊ')
            .replace(/oo/g, 'u')
            .replace(/ou/g, 'aʊ')
            .replace(/ow/g, 'aʊ')
            .replace(/ui/g, 'uɪ')
            .replace(/ue/g, 'u')
            .replace(/a([^aeiou])/g, 'æ$1')
            .replace(/e([^aeiou])/g, 'ɛ$1')
            .replace(/i([^aeiou])/g, 'ɪ$1')
            .replace(/o([^aeiou])/g, 'ɔ$1')
            .replace(/u([^aeiou])/g, 'ʌ$1');
        
        return processed.split('').filter(c => c);
    }

    // ✅ Convert text to phoneme IDs
    async function textToIds(text) {
        let phonemes = simpleG2P(text);
        
        const ids = [0n];
        const phonemeTokens = [];
        let unknownCount = 0;
        
        for (const p of phonemes) {
            let id = KITTEN_VOCAB.get(p);
            if (id === undefined) {
                id = KITTEN_VOCAB.get('<unk>');
                unknownCount++;
            }
            ids.push(BigInt(id));
            phonemeTokens.push({ char: p, phoneme: p, id: id });
        }
        
        ids.push(10n, 0n);
        
        if (unknownCount > 0) {
            log(`⚠️ ${unknownCount} unknown phonemes`);
        }
        
        return { 
            ids: new BigInt64Array(ids), 
            phonemes: phonemeTokens 
        };
    }

    // ✅ Display phonetic translation
    function displayPhonetics(text, phonemeData) {
        if (!phonemeData || phonemeData.length === 0) {
            phoneticOutput.innerText = 'Enter text to see phonemes...';
            return;
        }
        
        let html = '';
        for (let p of phonemeData) {
            html += `<span class="phoneme">"${p.phoneme}"<span class="phoneme-id">[${p.id}]</span></span> `;
        }
        phoneticOutput.innerHTML = html.trim();
    }

    // ✅ Parse NPY files
    function parseNpy(buffer) {
        const view = new DataView(buffer);
        const magic = String.fromCharCode(...new Uint8Array(buffer.slice(0, 6)));
        if (magic !== "\x93NUMPY") throw new Error("Not a valid NPY file");
        
        const headerLen = view.getUint16(8, true);
        const start = 10 + headerLen;
        
        return new Float32Array(buffer.slice(start));
    }

    // ✅ Downsample voice embeddings if needed
    function downsampleVoice(embedding, targetDim = 256) {
        const originalDim = embedding.length;
        if (originalDim <= targetDim) return embedding;
        
        const blockSize = Math.floor(originalDim / targetDim);
        const downsampled = new Float32Array(targetDim);
        
        for (let i = 0; i < targetDim; i++) {
            let sum = 0;
            for (let j = 0; j < blockSize; j++) {
                const idx = i * blockSize + j;
                if (idx < originalDim) {
                    sum += embedding[idx];
                }
            }
            downsampled[i] = sum / blockSize;
        }
        
        return downsampled;
    }

    // ✅ Initialize system
    async function init() {
        try {
            log("🔄 Loading ONNX Model...");
            session = await ort.InferenceSession.create('kitten_tts_nano_v0_8.onnx', { 
                executionProviders: ['wasm'] 
            });
            log("✅ ONNX Model loaded");
            
            const inputNames = session.inputNames;
            log(`📊 Model inputs: ${inputNames.join(', ')}`);
            
            log("🔄 Fetching voices.npz...");
            const response = await fetch('./voices.npz');
            if (!response.ok) throw new Error(`Failed to fetch voices: ${response.status}`);
            const arrayBuffer = await response.arrayBuffer();
            
            log("🔄 Unzipping voice embeddings...");
            const zip = await JSZip.loadAsync(arrayBuffer);

            // List all files in the archive for debugging
            const allFiles = [];
            zip.forEach((relativePath, file) => {
                allFiles.push(relativePath);
                log(`📁 Found: ${relativePath}`);
            });

            let loadedCount = 0;
            for (const [name, filename] of Object.entries(voiceMap)) {
                const file = zip.file(filename);
                if (file) {
                    const content = await file.async("arraybuffer");
                    const rawEmbedding = parseNpy(content);
                    
                    log(`📏 ${name} raw dimensions: ${rawEmbedding.length}`);
                    
                    if (rawEmbedding.length !== expectedStyleDim) {
                        log(`⚠️ Dimension mismatch! ${rawEmbedding.length} → ${expectedStyleDim}`);
                        log(`🔧 Downsampling voice embedding...`);
                        voices[name] = downsampleVoice(rawEmbedding, expectedStyleDim);
                    } else {
                        voices[name] = rawEmbedding;
                    }
                    
                    log(`✓ Loaded ${name} (${voices[name].length} features)`);
                    loadedCount++;
                } else {
                    log(`⚠️ Voice file not found: ${filename}`);
                }
            }
            
            if (loadedCount === 0) {
                throw new Error("No voices loaded!");
            }
            
            runBtn.disabled = false;
            statusBadge.className = 'status-badge status-ready';
            statusBadge.innerText = 'Ready';
            log("✅ System Ready! You can now generate speech.");
            
            const initialText = document.getElementById('textInput').value;
            const { phonemes } = await textToIds(initialText);
            displayPhonetics(initialText, phonemes);
            
        } catch (e) {
            statusBadge.className = 'status-badge status-error';
            statusBadge.innerText = 'Error';
            log("❌ INIT ERROR: " + e.message);
            console.error("Initialization error:", e);
        }
    }

    // ✅ Generate and play speech
    async function speak() {
        const originalBtnText = runBtn.innerText;
        runBtn.disabled = true;
        runBtn.innerText = "Generating...";

        try {
            const voiceName = document.getElementById('voiceSelect').value;
            const styleData = voices[voiceName];
            if (!styleData) throw new Error("Voice style not loaded!");

            log(`\n🎤 Generating speech with ${voiceName}...`);
            const text = document.getElementById('textInput').value.trim();
            if (!text) throw new Error("Please enter some text");
            
            const { ids, phonemes } = await textToIds(text);
            displayPhonetics(text, phonemes);
            log(`🔤 Total tokens: ${ids.length}`);
            
            const debugIds = Array.from(ids).slice(0, 20).map(id => id.toString());
            log(`🔍 Token IDs: [${debugIds.join(', ')}${ids.length > 20 ? '...' : ''}]`);

            const feeds = {
                "input_ids": new ort.Tensor('int64', ids, [1, ids.length]),
                "style": new ort.Tensor('float32', styleData, [1, styleData.length]),
                "speed": new ort.Tensor('float32', new Float32Array([parseFloat(speedRange.value)]), [1])
            };

            log(`📊 Style vector shape: [1, ${styleData.length}]`);
            log("🔄 Running ONNX inference...");
            const startTime = performance.now();
            const results = await session.run(feeds);
            const endTime = performance.now();
            log(`⏱️ Inference time: ${(endTime - startTime).toFixed(2)}ms`);
            
            const outputKey = Object.keys(results)[0];
            
            if (!results[outputKey]?.data) {
                throw new Error("No audio data in output");
            }

            log("✅ Success! Playing audio...");
            await playAudio(results[outputKey].data);

        } catch (e) {
            log("❌ RUN ERROR: " + e.message);
            console.error("Inference error:", e);
        } finally {
            runBtn.disabled = false;
            runBtn.innerText = originalBtnText;
        }
    }

    // ✅ Play audio
    async function playAudio(data) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        
        if (ctx.state === 'suspended') {
            await ctx.resume();
        }
        
        const buffer = ctx.createBuffer(1, data.length, 24000);
        const channelData = buffer.getChannelData(0);
        
        for (let i = 0; i < data.length; i++) {
            channelData[i] = data[i];
        }
        
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start();
        
        log("🔊 Audio playback started");
        
        source.onended = () => {
            log("🔇 Audio playback complete");
            ctx.close();
        };
    }

    // ✅ Live phonetic preview
    document.getElementById('textInput').addEventListener('input', async (e) => {
        const text = e.target.value.trim();
        if (text.length > 0) {
            const { phonemes } = await textToIds(text);
            displayPhonetics(text, phonemes);
        } else {
            phoneticOutput.innerText = 'Enter text to see phonemes...';
        }
    });

    document.getElementById('runBtn').onclick = speak;
    window.onload = init;
</script>
</body>
</html>
