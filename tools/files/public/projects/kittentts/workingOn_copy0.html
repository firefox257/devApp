<script>
// ============ CONFIG ============
const MODEL_PATH = 'kitten_tts_nano_v0_8.onnx';
const VOICES_PATH = 'voices.npz';
const EXPECTED_STYLE_DIM = 256;
const SAMPLE_RATE = 24000;

// ============ KITTEN TTS VOCABULARY ============
const KITTEN_VOCAB = new Map([
  ['<pad>', 0], ['<unk>', 1], ['<eos>', 10],
  ['ɑ', 2], ['æ', 3], ['ɒ', 4], ['ɔ', 5], ['ʌ', 6],
  ['ə', 7], ['ɜ', 8], ['ɪ', 9], ['ʊ', 11], ['u', 12],
  ['i', 13], ['e', 14], ['ɛ', 15],
  ['aɪ', 16], ['aʊ', 17], ['ɔɪ', 18], ['əʊ', 19], 
  ['ɪə', 20], ['ɛə', 21], ['ʊə', 22],
  ['b', 23], ['d', 24], ['f', 25], ['g', 26], ['h', 27],
  ['j', 28], ['k', 29], ['l', 30], ['m', 31], ['n', 32],
  ['ŋ', 33], ['p', 34], ['r', 35], ['s', 36], ['ʃ', 37],
  ['t', 38], ['θ', 39], ['ð', 40], ['v', 41], ['w', 42],
  ['z', 43], ['ʒ', 44], ['tʃ', 45], ['dʒ', 46],
  ['ˈ', 47], ['ˌ', 48],
  ['.', 49], [',', 50], ['?', 51], ['!', 52], 
  [';', 53], [':', 54], ['-', 55], [' ', 56],
  ['x', 57], ['y', 58]
]);

// ============ ARPABET → IPA ============
const ARPABET_TO_IPA = {
  'AA': 'ɑ', 'AE': 'æ', 'AH': 'ʌ', 'AO': 'ɔ', 'AW': 'aʊ', 'AY': 'aɪ',
  'EH': 'ɛ', 'ER': 'ɜ', 'EY': 'e', 'IH': 'ɪ', 'IY': 'i',
  'OW': 'əʊ', 'OY': 'ɔɪ', 'UH': 'ʊ', 'UW': 'u',
  'B': 'b', 'CH': 'tʃ', 'D': 'd', 'DH': 'ð', 'F': 'f', 'G': 'g',
  'HH': 'h', 'JH': 'dʒ', 'K': 'k', 'L': 'l', 'M': 'm', 'N': 'n',
  'NG': 'ŋ', 'P': 'p', 'R': 'r', 'S': 's', 'SH': 'ʃ', 'T': 't',
  'TH': 'θ', 'V': 'v', 'W': 'w', 'Y': 'j', 'Z': 'z', 'ZH': 'ʒ',
  '0': '', '1': 'ˈ', '2': 'ˌ'
};

// ============ MINI CMU DICT (fallback) ============
const MINI_CMU_DICT = {
  'hello': 'həlˈoʊ', 'world': 'wˈɜrld', 'testing': 'tˈɛstɪŋ',
  'kitten': 'kˈɪtən', 'tts': 'tˈiːtˈiːs', 'the': 'ðə',
  'cat': 'kˈæt', 'is': 'ˈɪz', 'cute': 'kjˈuːt', 'meow': 'mjaʊ',
  'yes': 'jˈɛs', 'no': 'nˈoʊ', 'good': 'ɡˈʊd', 'bye': 'bˈaɪ',
  'thanks': 'θˈæŋks', 'please': 'plˈiːz', 'sorry': 'sˈɔri',
  'help': 'hˈɛlp', 'wait': 'wˈeɪt', 'okay': 'oʊkˈeɪ',
  'what': 'wˈʌt', 'where': 'wˈɛr', 'when': 'wˈɛn', 'why': 'wˈaɪ',
  'how': 'hˈaʊ', 'who': 'hˈuː', 'i': 'ˈaɪ', 'you': 'jˈuː',
  'we': 'wˈiː', 'they': 'ðˈeɪ', 'it': 'ˈɪt', 'this': 'ðˈɪs',
  'that': 'ðˈæt', 'here': 'hˈɪr', 'there': 'ðˈɛr', 'now': 'nˈaʊ',
  'then': 'ðˈɛn', 'today': 'tədˈeɪ', 'tomorrow': 'təmˈɔroʊ',
  'yesterday': 'jˈɛstərdeɪ', 'iphone': 'ˈaɪfoʊn', 'apple': 'ˈæpəl'
};

// ============ LOGGING ============
const logDiv = document.getElementById('log');
const log = (msg, type = 'info') => { 
  const time = new Date().toLocaleTimeString([], {hour12:false, minute:'2-digit', second:'2-digit'});
  const colors = {info:'#00ff41', success:'#34c759', warn:'#ffcc00', error:'#ff3b30'};

  logDiv.scrollTop = logDiv.scrollHeight; 
};

const updateStatus = (elId, text, cls) => {
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = `badge ${cls}`;
};

const setProgress = (pct) => {
  document.getElementById('progressBar').style.width = `${pct}%`;
};

const enableUI = (enabled) => {
  document.getElementById('voiceSelect').disabled = !enabled;
  document.getElementById('textInput').disabled = !enabled;
  document.getElementById('generateBtn').disabled = !enabled;
};

// ============ CMU DICT LOADER ============
class CMUPhonemizer {
  constructor() {
    this.dict = new Map(Object.entries(MINI_CMU_DICT));
    this.loaded = false;
  }

  async load() {
    try {
      log('📥 Fetching CMU Dict from GitHub...', 'info');
      const response = await fetch('https://raw.githubusercontent.com/cmusphinx/cmudict/master/cmudict.dict', { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const text = await response.text();
      let newWords = 0;
      
      for (const line of text.split('\n')) {
        if (line.startsWith(';') || !line.trim()) continue;
        const parts = line.trim().split(/\s+/);
        if (parts.length < 2) continue;
        
        const word = parts[0].replace(/\(\d+\)$/, '').toLowerCase();
        const arpabet = parts.slice(1);
        const ipa = arpabet
          .map(p => ARPABET_TO_IPA[p.replace(/\d$/, '')] || null)
          .filter(x => x !== null)
          .join('');
        
        if (!this.dict.has(word) && ipa) {
          this.dict.set(word, ipa);
          newWords++;
        }
      }
      
      this.loaded = true;
      log(`✅ CMU Dict: ${this.dict.size} words (${newWords} from GitHub)`, 'success');
      return this.dict.size;
    } catch (e) {
      log(`⚠️ Using embedded dict (${this.dict.size} words): ${e.message}`, 'warn');
      this.loaded = true;
      return this.dict.size;
    }
  }

  toIPA(text) {
    if (!this.loaded) throw new Error('Dictionary not loaded');
    const words = text.toLowerCase().replace(/[^\w\s'-]/g, ' ').split(/\s+/).filter(w => w.length > 0);
    const results = [];
    for (const word of words) {
      let ipa = this.dict.get(word);
      if (!ipa) {
        ipa = this.fallbackG2P(word);
        results.push({ word, ipa, fromCMU: false });
      } else {
        results.push({ word, ipa, fromCMU: true });
      }
    }
    return results;
  }
  
  fallbackG2P(word) {
    let ipa = word;
    const safeMap = {
      'a': 'æ', 'e': 'ɛ', 'i': 'ɪ', 'o': 'ɔ', 'u': 'ʌ',
      'b': 'b', 'c': 'k', 'd': 'd', 'f': 'f', 'g': 'g',
      'h': 'h', 'j': 'dʒ', 'k': 'k', 'l': 'l', 'm': 'm',
      'n': 'n', 'p': 'p', 'r': 'r', 's': 's', 't': 't',
      'v': 'v', 'w': 'w', 'x': 'ks', 'y': 'j', 'z': 'z',
      'th': 'θ', 'sh': 'ʃ', 'ch': 'tʃ', 'ng': 'ŋ', 'ph': 'f'
    };
    for (const [digraph, replacement] of Object.entries(safeMap)) {
      if (digraph.length > 1) ipa = ipa.replace(new RegExp(digraph, 'g'), replacement);
    }
    ipa = ipa.split('').map(c => safeMap[c] || c).join('');
    return ipa;
  }
}

// ============ NPY PARSER ============
function parseNpy(buffer) {
  const view = new DataView(buffer);
  const magic = String.fromCharCode(...new Uint8Array(buffer.slice(0, 6)));
  if (magic !== "\x93NUMPY") throw new Error("Not a valid NPY file");
  const major = view.getUint8(6);
  const headerLen = major === 1 ? view.getUint16(8, true) : view.getUint32(8, true);
  const start = (major === 1 ? 10 : 18) + headerLen;
  return new Float32Array(buffer.slice(start));
}

// ============ VOICE LOADER ============
async function loadVoices(npzBuffer, expectedDim = EXPECTED_STYLE_DIM) {
  const zip = await JSZip.loadAsync(npzBuffer);
  const voices = {};
  const voiceMap = {
    "Bella": "expr-voice-2-f.npy", "Jasper": "expr-voice-2-m.npy",
    "Luna": "expr-voice-3-f.npy", "Bruno": "expr-voice-3-m.npy",
    "Rosie": "expr-voice-4-f.npy", "Hugo": "expr-voice-4-m.npy",
    "Kiki": "expr-voice-5-f.npy", "Leo": "expr-voice-5-m.npy"
  };
  
  let loaded = 0;
  for (const [name, filename] of Object.entries(voiceMap)) {
    const file = zip.file(filename);
    if (!file) {
      log(`⚠️ Voice file not found: ${filename}`, 'warn');
      continue;
    }
    const content = await file.async("arraybuffer");
    const raw = parseNpy(content);
    
    if (raw.length !== expectedDim) {
      const blockSize = Math.floor(raw.length / expectedDim);
      const downsampled = new Float32Array(expectedDim);
      for (let i = 0; i < expectedDim; i++) {
        let sum = 0;
        for (let j = 0; j < blockSize; j++) {
          const idx = i * blockSize + j;
          if (idx < raw.length) sum += raw[idx];
        }
        downsampled[i] = sum / blockSize;
      }
      voices[name] = downsampled;
      log(`🔧 ${name}: ${raw.length} → ${expectedDim}`, 'info');
    } else {
      voices[name] = raw;
    }
    loaded++;
    log(`✓ ${name} (${voices[name].length} dims)`, 'success');
  }
  
  if (loaded === 0) throw new Error("No voices loaded");
  return voices;
}

// ============ TEXT → TOKEN IDS ============
function textToTokenIds(text, phonemizer) {
  const entries = phonemizer.toIPA(text);
  const ids = [0n];
  const tokens = [];
  
  for (const { word, ipa } of entries) {
    for (const char of ipa.split('')) {
      if (char === ' ') continue;
      let id = KITTEN_VOCAB.get(char);
      if (id === undefined) id = KITTEN_VOCAB.get('<unk>');
      ids.push(BigInt(id));
      tokens.push({ char, id, word });
    }
    ids.push(BigInt(KITTEN_VOCAB.get(' ')));
  }
  ids.push(10n, 0n);
  
  return { ids: new BigInt64Array(ids), tokens };
}

function renderPhonemes(tokenData) {
  const output = document.getElementById('phonemeOutput');
  if (!tokenData || tokenData.tokens.length === 0) {
    output.textContent = 'Type text to see phonemes...';
    return;
  }
  let html = '';
  for (const t of tokenData.tokens) {
    const isUnknown = t.id === 1 && t.char !== '<unk>';
    html += `<span class="phoneme${isUnknown ? ' unknown' : ''}">"${t.char}"<span class="id">[${t.id}]</span></span> `;
  }
  output.innerHTML = html.trim();
}

// ============ 🎵 AUDIO POST-PROCESSING (Critical Fix for Scratches) ============
function postProcessAudio(audioData) {
  const cleaned = new Float32Array(audioData.length);
  
  // 1. Clean NaN/Infinity values (common cause of digital noise/scratches)
  let nanCount = 0;
  for (let i = 0; i < audioData.length; i++) {
    if (isFinite(audioData[i])) {
      cleaned[i] = audioData[i];
    } else {
      cleaned[i] = 0;
      nanCount++;
    }
  }
  if (nanCount > 0) {
    log(`⚠️ Replaced ${nanCount} NaN/Inf values with 0`, 'warn');
  }
  
  // 2. Trim leading/trailing silence (removes pops at start/end)
  const threshold = 0.001;
  let startIdx = 0;
  let endIdx = cleaned.length - 1;
  
  while (startIdx < endIdx && Math.abs(cleaned[startIdx]) < threshold) {
    startIdx++;
  }
  while (endIdx > startIdx && Math.abs(cleaned[endIdx]) < threshold) {
    endIdx--;
  }
  
  const trimmed = cleaned.slice(startIdx, endIdx + 1);
  
  // 3. Normalize to [-0.95, 0.95] range (prevents clipping distortion)
  if (trimmed.length > 0) {
    let maxVal = 0;
    for (const sample of trimmed) {
      maxVal = Math.max(maxVal, Math.abs(sample));
    }
    
    if (maxVal > 0.001) {
      const scale = 0.95 / maxVal;
      for (let i = 0; i < trimmed.length; i++) {
        trimmed[i] = trimmed[i] * scale;
      }
    }
  }
  
  return trimmed;
}

// ============ 🔊 AUDIO PLAYER (Fixed with Post-Processing) ============
async function playAudio(float32Data, sampleRate = SAMPLE_RATE) {
  // ✅ Post-process raw model output to remove scratches
  const cleanAudio = postProcessAudio(new Float32Array(float32Data));
  
  if (cleanAudio.length === 0) {
    log('⚠️ No audio data after processing', 'warn');
    return;
  }
  
  // ✅ Log audio stats for debugging
  let minVal = Infinity, maxVal = -Infinity;
  for (const s of cleanAudio) {
    minVal = Math.min(minVal, s);
    maxVal = Math.max(maxVal, s);
  }
  log(`📊 Audio: ${cleanAudio.length} samples, range [${minVal.toFixed(3)}, ${maxVal.toFixed(3)}]`, 'info');
  
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioCtx({ sampleRate });
  
  if (ctx.state === 'suspended') {
    await ctx.resume();
  }
  
  // ✅ Create buffer with cleaned, normalized audio
  const buffer = ctx.createBuffer(1, cleanAudio.length, sampleRate);
  const channelData = buffer.getChannelData(0);
  
  // ✅ Copy with final clamping (safety net)
  for (let i = 0; i < cleanAudio.length; i++) {
    channelData[i] = Math.max(-1, Math.min(1, cleanAudio[i]));
  }
  
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start();
  
  log(`🔊 Playing audio at ${sampleRate}Hz...`, 'info');
  
  return new Promise(resolve => {
    source.onended = () => {
      log('✓ Playback complete', 'success');
      ctx.close();
      resolve();
    };
  });
}

// ============ WEB SPEECH API (FALLBACK) ============
let speechVoices = [];
function initSpeechFallback() {
  if (!('speechSynthesis' in window)) {
    document.getElementById('fallbackBtn').disabled = true;
    return;
  }
  const loadVoices = () => {
    speechVoices = speechSynthesis.getVoices();
    if (speechVoices.length > 0) document.getElementById('fallbackBtn').disabled = false;
  };
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 500);
}

function speakFallback(text) {
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  const voice = speechVoices.find(v => v.lang.startsWith('en')) || speechVoices[0];
  if (voice) utterance.voice = voice;
  utterance.onstart = () => log('🔊 Speaking...', 'info');
  utterance.onend = () => log('✓ Done', 'success');
  speechSynthesis.speak(utterance);
}

// ============ APP STATE ============
let session = null;
let phonemizer = null;
let voices = {};
let onnxReady = false;
let dictReady = false;
let voiceReady = false;

// ============ INIT ============
async function init() {
  setProgress(10);
  log('🔍 Checking environment...', 'info');
  
  // ✅ Configure WASM paths explicitly
  if (ort?.env?.wasm) {
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
    ort.env.wasm.numThreads = navigator.hardwareConcurrency || 4;
    log(`🔧 WASM configured: ${ort.env.wasm.numThreads} threads`, 'info');
  }
  
  // 1. CMU Dict
  try {
    setProgress(20);
    phonemizer = new CMUPhonemizer();
    await phonemizer.load();
    dictReady = true;
    updateStatus('dictStatus', `✅ ${phonemizer.dict.size}`, 'ready');
    setProgress(40);
  } catch (e) {
    updateStatus('dictStatus', '❌', 'error');
    log(`❌ Dict error: ${e.message}`, 'error');
  }
  
  // 2. ONNX Model
  try {
    setProgress(50);
    log(`📥 Loading: ${MODEL_PATH}`, 'info');
    
    if (typeof ort === 'undefined') {
      throw new Error('ONNX Runtime not loaded - check CDN script tag');
    }
    log(`📊 ONNX Runtime v${ort.env?.version || 'unknown'} available`, 'info');
    
    session = await ort.InferenceSession.create(MODEL_PATH, { 
      executionProviders: ['wasm'],
      logSeverityLevel: 2
    });
    
    onnxReady = true;
    updateStatus('modelStatus', '✅', 'ready');
    log(`✅ Model loaded successfully`, 'success');
    log(`📊 Inputs: ${session.inputNames.join(', ')}`, 'info');
    log(`📊 Outputs: ${session.outputNames.join(', ')}`, 'info');
    setProgress(70);
    
  } catch (e) {
    updateStatus('modelStatus', '❌', 'error');
    log(`❌ Model load failed: ${e.message}`, 'error');
    console.error('Full ONNX error:', e);
    
    if (e.message.includes('404') || e.message.includes('Not Found')) {
      log('💡 Model file not found - check file path and HTTP server', 'warn');
    } else if (e.message.includes('CORS')) {
      log('💡 CORS error - serve via HTTP server, not file://', 'warn');
    } else if (e.message.includes('WASM') || e.message.includes('wasm')) {
      log('💡 WASM backend issue - try Chrome/Firefox desktop', 'warn');
    }
  }
  
  // 3. Voices
  try {
    setProgress(75);
    log(`📥 Loading: ${VOICES_PATH}`, 'info');
    const response = await fetch(VOICES_PATH, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const npzBuffer = await response.arrayBuffer();
    voices = await loadVoices(npzBuffer, EXPECTED_STYLE_DIM);
    voiceReady = true;
    updateStatus('voiceStatus', `✅ ${Object.keys(voices).length}`, 'ready');
    setProgress(90);
  } catch (e) {
    updateStatus('voiceStatus', '❌', 'error');
    log(`❌ Voices error: ${e.message}`, 'error');
  }
  
  // Initialize fallback
  initSpeechFallback();
  
  // Final readiness check
  const canGenerate = onnxReady && voiceReady && dictReady;
  enableUI(canGenerate);
  setProgress(100);
  
  const badge = document.getElementById('statusBadge');
  if (canGenerate) {
    badge.textContent = 'Ready';
    badge.className = 'badge ready';
    log('✨ All systems ready! Generate speech 🎙️', 'success');
  } else {
    badge.textContent = 'Limited';
    badge.className = 'badge fallback';
    log('⚠️ ONNX not ready - fallback button available', 'warn');
    document.getElementById('fallbackBtn').disabled = false;
  }
  
  // Initial phoneme preview
  handleTextUpdate();
}

// ============ GENERATE ============
async function generateSpeech() {
  if (!onnxReady || !voiceReady) {
    log('❌ System not ready', 'error');
    return;
  }
  
  const btn = document.getElementById('generateBtn');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = '🔄 Generating...';
  
  try {
    const voiceName = document.getElementById('voiceSelect').value;
    const text = document.getElementById('textInput').value.trim();
    if (!text) throw new Error('Please enter some text');
    
    log(`\n🎙️ ${voiceName}: "${text}"`, 'info');
    const { ids, tokens } = textToTokenIds(text, phonemizer);
    renderPhonemes({ tokens });
    log(`🔤 Tokens: ${ids.length}`, 'info');
    
    // Log voice embedding info
    const styleData = voices[voiceName];
    log(`🎨 Voice style: ${styleData.length} dimensions`, 'info');
    
    const feeds = {
      input_ids: new ort.Tensor('int64', ids, [1, ids.length]),
      style: new ort.Tensor('float32', styleData, [1, styleData.length]),
      speed: new ort.Tensor('float32', new Float32Array([1.0]), [1])
    };
    
    log('🔄 Running inference...', 'info');
    const start = performance.now();
    const results = await session.run(feeds);
    const elapsed = (performance.now() - start).toFixed(1);
    log(`⏱️ Inference: ${elapsed}ms`, 'info');
    
    const outputKey = Object.keys(results)[0];
    const rawAudio = results[outputKey].data;
    log(`📊 Raw audio samples: ${rawAudio.length}`, 'info');
    
    // ✅ Play with post-processing (removes scratches)
    await playAudio(rawAudio);
    
  } catch (e) {
    log(`❌ Generation error: ${e.message}`, 'error');
    console.error('Inference error:', e);
  } finally {
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

// ============ LIVE PHONEME PREVIEW ============
function handleTextUpdate() {
  if (!phonemizer?.loaded) return;
  const text = document.getElementById('textInput').value.trim();
  if (!text) { 
    document.getElementById('phonemeOutput').textContent = 'Type text to see phonemes...'; 
    return; 
  }
  try {
    const { tokens } = textToTokenIds(text, phonemizer);
    renderPhonemes({ tokens });
  } catch (e) {
    // Silent fail for live preview
  }
}

// ============ EVENTS ============
document.getElementById('textInput').addEventListener('input', handleTextUpdate);
document.getElementById('generateBtn').addEventListener('click', generateSpeech);
document.getElementById('fallbackBtn').addEventListener('click', () => {
  const text = document.getElementById('textInput').value.trim();
  if (text) speakFallback(text);
});

// ============ START ============
window.addEventListener('load', init);
</script>
