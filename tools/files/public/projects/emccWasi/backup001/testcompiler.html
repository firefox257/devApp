<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Browser C++ Compiler</title></head>
<body>
<pre id="output">Loading...</pre>
<script type="module">
import { WASI } from "https://unpkg.com/@bjorn3/browser_wasi_shim@latest/dist/index.mjs";
import { Volume } from "https://unpkg.com/memfs@latest/lib/index.mjs";
import { untar } from "https://unpkg.com/js-untar@latest/dist/index.mjs";

const out = document.getElementById('output');
const log = (msg) => out.textContent += msg + '\n';

async function loadBytes(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
  return new Uint8Array(await res.arrayBuffer());
}

async function initCompiler() {
  log('⬇️ Downloading clang.wasm...');
  const clangWasm = await loadBytes('https://github.com/nicolo-ribaudo/wasm-compiler/raw/main/dist/clang.wasm');
  const lldWasm = await loadBytes('https://github.com/nicolo-ribaudo/wasm-compiler/raw/main/dist/wasm-ld.wasm');
  
  log('⬇️ Extracting sysroot (libc.a, libc++.a, headers)...');
  const sysrootTar = await loadBytes('https://github.com/nicolo-ribaudo/wasm-compiler/raw/main/dist/sysroot.tar');
  const sysrootFiles = await untar(sysrootTar.buffer);
  
  // Create virtual FS
  const fs = new Volume();
  fs.mkdirSync('/wasi-sysroot', { recursive: true });
  fs.mkdirSync('/src', { recursive: true });
  
  // Mount sysroot
  for (const f of sysrootFiles) {
    if (f.name === '.' || f.name === '..') continue;
    const path = '/wasi-sysroot/' + f.name;
    if (f.type === 'directory') {
      fs.mkdirSync(path, { recursive: true });
    } else {
      fs.writeFileSync(path, new Uint8Array(f.buffer));
    }
  }

  // Place user source
  fs.writeFileSync('/src/main.cpp', `
#include <iostream>
#include <vector>
#include <string>
int main() {
  std::vector<std::string> v = {"Hello", "from", "WASM"};
  for (const auto& s : v) std::cout << s << " ";
  std::cout << std::endl;
  return 0;
}`);

  return { clangWasm, lldWasm, fs };
}

async function compileAndRun() {
  const { clangWasm, lldWasm, fs } = await initCompiler();
  
  log('🔧 Running clang...');
  const wasi = new WASI([
    'clang',
    '--target=wasm32-wasi',
    '-std=c++17',
    '-stdlib=libc++',
    '--sysroot=/wasi-sysroot',
    '-I/wasi-sysroot/include',
    '-I/wasi-sysroot/include/c++/v1',
    '-L/wasi-sysroot/lib/wasm32-wasi',
    '-lc++', '-lc++abi', '-lc',
    '-o', '/src/output.wasm',
    '/src/main.cpp'
  ], [], fs, { debug: false });

  const { instance } = await WebAssembly.instantiate(clangWasm, {
    wasi_snapshot_preview1: wasi.wasiImport
  });

  try {
    wasi.start(instance);
  } catch (e) {
    if (e.name !== 'ExitStatus') throw e;
  }

  if (!fs.existsSync('/src/output.wasm')) {
    log('❌ Compilation failed. Check WASI logs.');
    return;
  }

  log('✅ Compiled! Running output.wasm...');
  const wasmBytes = fs.readFileSync('/src/output.wasm');
  const { instance: appInst } = await WebAssembly.instantiate(wasmBytes, {
    wasi_snapshot_preview1: wasi.wasiImport
  });

  try {
    wasi.start(appInst);
  } catch (e) {
    if (e.name !== 'ExitStatus') throw e;
  }
  log('✅ Done.');
}

compileAndRun().catch(err => {
  log('❌ ' + err.message);
  console.error(err);
});
</script>
</body>
</html>
