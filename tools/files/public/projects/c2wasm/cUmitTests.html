<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-to-WASM Compiler Unit Tests</title>
    <style>
        :root {
            --bg: #1e1e1e; --fg: #d4d4d4; --panel: #252526;
            --border: #3c3c3c; --pass: #4ec9b0; --fail: #f44747;
            --btn-bg: #333333; --btn-hover: #444444; --accent: #569cd6;
            --code-bg: #111111; --expected: #b5cea8; --actual: #ce9178;
            --card-fail: #2a1a1a; --card-pass: #1a2520;
        }
        body { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            background: var(--bg); color: var(--fg); 
            padding: 20px; margin: 0; 
        }
        h1 { color: var(--accent); margin: 0 0 15px; font-size: 1.4rem; }
        
        /* Toolbar */
        .toolbar { 
            margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; 
            padding: 10px; background: var(--panel); border-radius: 6px; border: 1px solid var(--border);
        }
        button { 
            background: var(--btn-bg); color: var(--fg); border: 1px solid var(--border); 
            padding: 6px 12px; cursor: pointer; border-radius: 4px; font-family: inherit; 
            transition: background 0.2s; font-size: 13px;
        }
        button:hover:not(:disabled) { background: var(--btn-hover); }
        button.primary { background: #0e639c; border-color: #0e639c; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Test Container */
        #console {
            display: flex; flex-direction: column; gap: 12px;
            min-height: 60vh; max-height: 75vh; overflow-y: auto;
            padding: 5px;
        }

        /* ✅ Test Card - Visual Block */
        .test-card {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            padding: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .test-card.fail {
            border-left: 4px solid var(--fail);
            background: var(--card-fail);
            box-shadow: 0 2px 8px rgba(244, 71, 71, 0.15);
        }
        .test-card.pass {
            border-left: 4px solid var(--pass);
            background: var(--card-pass);
        }

        /* Card Header */
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #333;
        }
        .test-name { font-weight: 600; color: var(--accent); font-size: 14px; }
        .status-badge {
            padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
        }
        .status-pass { background: rgba(78, 201, 176, 0.15); color: var(--pass); }
        .status-fail { background: rgba(244, 71, 71, 0.15); color: var(--fail); }

        /* C Code Block */
        .code-block {
            background: var(--code-bg);
            border: 1px solid #2a2a2a;
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 10px 12px;
            margin: 8px 0;
            font-size: 12px; line-height: 1.4;
            white-space: pre-wrap; overflow-x: auto;
            position: relative; max-height: 150px; overflow-y: auto;
        }
        .lang-badge {
            position: absolute; top: 6px; right: 8px;
            background: #2d2d30; border: 1px solid #444;
            padding: 2px 6px; font-size: 10px; color: #888;
            border-radius: 3px; text-transform: uppercase;
        }

        /* Expected/Actual Results */
        .results-grid {
            display: grid; grid-template-columns: max-content 1fr;
            gap: 6px 14px; margin: 10px 0; padding: 10px;
            background: #151515; border-radius: 4px; border: 1px solid #2a2a2a;
            font-size: 13px;
        }
        .results-label { color: #888; font-weight: 500; }
        .results-value { word-break: break-all; font-family: inherit; }
        .results-expected { color: var(--expected); }
        .results-actual.match { color: var(--pass); font-weight: 600; }
        .results-actual.mismatch { color: var(--fail); font-weight: 600; text-decoration: wavy underline var(--fail); }

        /* Meta Row (binary, timing, actions) */
        .meta-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px; padding-top: 8px; border-top: 1px dashed #333;
            font-size: 11px; color: #999; flex-wrap: wrap; gap: 8px;
        }
        .copy-btn { 
            background: transparent; border: 1px solid #555; color: #aaa; 
            font-size: 10px; padding: 2px 8px; cursor: pointer; border-radius: 3px;
        }
        .copy-btn:hover { background: #2a2a2a; color: #fff; border-color: #666; }

        /* Section Headers */
        .section-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; margin: 20px 0 10px;
            background: var(--panel); border-radius: 4px;
            border: 1px solid var(--border);
            font-weight: 600; font-size: 13px;
            position: sticky; top: 0; z-index: 10;
        }
        .section-header.fail { color: var(--fail); border-left: 4px solid var(--fail); }
        .section-header.pass { color: var(--pass); border-left: 4px solid var(--pass); }
        .section-count { 
            background: #333; padding: 2px 8px; border-radius: 10px; 
            font-size: 11px; color: #ccc; 
        }

        /* Summary Bar */
        .summary { 
            position: fixed; bottom: 15px; right: 15px; 
            background: var(--panel); padding: 10px 15px; 
            border-radius: 6px; border: 2px solid var(--border); 
            font-size: 13px; z-index: 100; min-width: 200px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .summary.all-pass { border-color: var(--pass); }
        .summary.has-fail { border-color: var(--fail); }
        
        .timing { color: #666; font-size: 11px; }
        .empty-state { 
            text-align: center; color: #666; padding: 40px; 
            font-style: italic; 
        }
    </style>
</head>
<body>
    <h1>🔧 C-to-WASM Compiler Unit Tests</h1>
    
    <div class="toolbar">
        <button id="runAll" class="primary">▶ Run All Tests</button>
        <button id="clearBtn">🗑 Clear Results</button>
        <button id="toggleAuto">🔄 Auto-run: ON</button>
        <span id="progress" style="margin-left: auto; color: #888;">Ready</span>
    </div>
    
    <div id="console">
        <div class="empty-state">Click "Run All Tests" to begin • Failures will appear at top</div>
    </div>
    
    <div id="summary" class="summary">🏁 0 passed • 0 failed</div>

    <script type="module">
        console.log('🔍 Module script starting...');
        
        let CCompiler, cTests;
        try {
            const compilerMod = await import('./cToWasmCompiler.js');
            CCompiler = compilerMod.default;
            console.log('✅ Compiler module loaded');
            
            const testsMod = await import('./cUnitTests.js');
            cTests = testsMod.cTests;
            console.log('✅ Tests module loaded:', cTests?.length, 'tests');
        } catch (e) {
            console.error('❌ Import failed:', e);
            document.getElementById('console').innerHTML = 
                `<div class="test-card fail" style="margin:20px">
                    <div class="card-header">
                        <span class="test-name">❌ Module Load Error</span>
                        <span class="status-badge status-fail">ERROR</span>
                    </div>
                    <div style="color:#f44747">
                        Failed to load compiler or tests:<br>
                        <code>${e.message}</code><br><br>
                        Ensure <code>cToWasmCompiler.js</code> and <code>cUnitTests.js</code> 
                        exist in the same folder and export correctly.
                    </div>
                </div>`;
            throw e;
        }

        const consoleEl = document.getElementById('console');
        const runBtn = document.getElementById('runAll');
        const clearBtn = document.getElementById('clearBtn');
        const toggleAutoBtn = document.getElementById('toggleAuto');
        const summaryEl = document.getElementById('summary');
        const progressEl = document.getElementById('progress');

        let autoRun = true;
        toggleAutoBtn.onclick = () => {
            autoRun = !autoRun;
            toggleAutoBtn.textContent = `🔄 Auto-run: ${autoRun ? 'ON' : 'OFF'}`;
        };

        const toHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ');
        
        const formatValue = (val) => {
            if (val === null) return 'null';
            if (val === undefined) return 'undefined';
            if (typeof val === 'string') return `"${val}"`;
            if (typeof val === 'boolean') return val ? 'true' : 'false';
            if (typeof val === 'number') {
                if (!Number.isFinite(val)) return val.toString();
                if (!Number.isInteger(val)) return val.toFixed(8).replace(/\.?0+$/, '');
                return val.toString();
            }
            return String(val);
        };

        const isClose = (a, b, tol = 1e-6) => {
            if (typeof a !== 'number' || typeof b !== 'number') return a === b;
            return Math.abs(a - b) < tol;
        };

        async function copyText(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const orig = btn.textContent;
                btn.textContent = '✅ Copied';
                setTimeout(() => btn.textContent = orig, 1200);
            } catch {
                const orig = btn.textContent;
                btn.textContent = '❌ Failed';
                setTimeout(() => btn.textContent = orig, 1200);
            }
        }

        // ✅ Create a single test card (but don't append yet)
        function createTestCard(test, result) {
            const card = document.createElement('div');
            card.className = `test-card ${result.passed ? 'pass' : 'fail'}`;
            card.dataset.testName = test.name;

            const statusBadge = result.passed 
                ? '<span class="status-badge status-pass">✅ PASS</span>' 
                : '<span class="status-badge status-fail">❌ FAIL</span>';

            const codeEscaped = test.code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            const actualClass = result.passed ? 'match' : 'mismatch';
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="test-name">${test.name}</span>
                    ${statusBadge}
                </div>
                
                <pre class="code-block"><span class="lang-badge">C</span>${codeEscaped}</pre>
                <div style="text-align:right;margin:-4px 0 8px">
                    <button class="copy-btn" data-action="copy-source">📋 Copy C Source</button>
                </div>
                
                <div class="results-grid">
                    <span class="results-label">🎯 Expected:</span>
                    <span class="results-value results-expected">${formatValue(result.expected)}</span>
                    <span class="results-label">📤 Actual:</span>
                    <span class="results-value results-actual ${actualClass}">${formatValue(result.actual)}</span>
                </div>
                
                ${result.errorMsg && !result.passed ? `
                <div style="background:#2a1515;border:1px solid #442; padding:8px; border-radius:4px; margin:8px 0; color:#f44747; font-size:12px">
                    ⚠️ <strong>Error:</strong> ${result.errorMsg}
                    <button class="copy-btn" data-action="copy-error" style="float:right">Copy Full Report</button>
                </div>` : ''}
                
                ${result.errorMsg && result.passed ? `
                <div style="background:#15251a;border:1px solid #244; padding:8px; border-radius:4px; margin:8px 0; color:#4ec9b0; font-size:12px">
                    ℹ️ ${result.errorMsg}
                </div>` : ''}
                
                <div class="meta-row">
                    <span>📦 WASM: ${result.wasmBytes ? `${result.wasmBytes.length} bytes` : 'N/A'}</span>
                    <span>⏱ ${result.elapsedMs.toFixed(1)}ms</span>
                    ${result.wasmBytes ? `<button class="copy-btn" data-action="copy-hex">Copy Hex</button>` : ''}
                </div>
            `;

            // ✅ Attach event listeners using data-action attributes (reliable!)
            card.querySelector('[data-action="copy-source"]')?.addEventListener('click', (e) => 
                copyText(test.code, e.currentTarget));
            
            card.querySelector('[data-action="copy-error"]')?.addEventListener('click', (e) => 
                copyText(result.copyableError || result.errorMsg, e.currentTarget));  // ✅ Use copyableError first
            
            if (result.wasmBytes) {
                const hex = toHex(result.wasmBytes);
                card.querySelector('[data-action="copy-hex"]')?.addEventListener('click', (e) => 
                    copyText(hex, e.currentTarget));
            }

            return card;
        }

        async function executeTest(test) {
            const startTime = performance.now();
            let wasmBytes = null, passed = false, errorMsg = null, actual = undefined, copyableError = null;

            try {
                const compiler = new CCompiler();
                wasmBytes = compiler.compile(test.code);

                if (test.expected === 'error') {
                    throw new Error('Expected compilation failure but succeeded');
                }

                const { instance } = await WebAssembly.instantiate(wasmBytes, {});
                actual = test.test(instance.exports);

                if (test.expected === 'any') {
                    passed = true;
                } else if (typeof test.expected === 'number' && typeof actual === 'number') {
                    passed = isClose(actual, test.expected);
                } else {
                    passed = actual === test.expected;
                }
                
                // ✅ Enhanced error message with expected/actual on mismatch
                if (!passed) {
                    errorMsg = `Value mismatch: expected ${formatValue(test.expected)}, got ${formatValue(actual)}`;
                    // ✅ Full context for copying
                    copyableError = `Test "${test.name}" failed:\n` +
                                   `  Code: ${test.code.replace(/\s+/g, ' ').trim()}\n` +
                                   `  Expected: ${formatValue(test.expected)}\n` +
                                   `  Actual:   ${formatValue(actual)}\n` +
                                   `  Time: ${new Date().toISOString()}`;
                }

            } catch (e) {
                actual = `⚠️ ${e.message || e}`;
                if (test.expected === 'error') {
                    passed = true;
                    errorMsg = 'Compilation failed as expected ✅';
                    copyableError = `Test "${test.name}": Compilation failed as expected\n` +
                                   `  Code: ${test.code.replace(/\s+/g, ' ').trim()}\n` +
                                   `  Error: ${e.message || e}\n` +
                                   `  Time: ${new Date().toISOString()}`;
                } else {
                    const expectedStr = test.expected !== undefined ? formatValue(test.expected) : 'N/A';
                    const actualStr = actual !== undefined ? formatValue(actual) : 'N/A';
                    errorMsg = `${e.message?.split('\n')[0] || String(e)} (expected: ${expectedStr}, actual: ${actualStr})`;
                    // ✅ Full context for copying
                    copyableError = `Test "${test.name}" failed:\n` +
                                   `  Code: ${test.code.replace(/\s+/g, ' ').trim()}\n` +
                                   `  Error:  ${e.message || e}\n` +
                                   `  Expected: ${expectedStr}\n` +
                                   `  Actual:   ${actualStr}\n` +
                                   `  Time: ${new Date().toISOString()}`;
                }
            }

            return {
                passed,
                expected: test.expected,
                actual,
                errorMsg,
                copyableError,  // ✅ New field for clipboard
                wasmBytes,
                elapsedMs: performance.now() - startTime
            };
        }

        // ✅ Render all results: FAILURES FIRST, then passes
        function renderResults(results) {
            consoleEl.innerHTML = '';
            
            const failed = results.filter(r => !r.result.passed);
            const passed = results.filter(r => r.result.passed);

            // 🚨 Failed Tests Section (TOP)
            if (failed.length > 0) {
                const failHeader = document.createElement('div');
                failHeader.className = 'section-header fail';
                failHeader.innerHTML = `❌ Failed Tests <span class="section-count">${failed.length}</span>`;
                consoleEl.appendChild(failHeader);
                
                failed.forEach(({ test, result }) => {
                    consoleEl.appendChild(createTestCard(test, result));
                });
            }

            // ✅ Passed Tests Section (BOTTOM)
            if (passed.length > 0) {
                const passHeader = document.createElement('div');
                passHeader.className = 'section-header pass';
                passHeader.innerHTML = `✅ Passed Tests <span class="section-count">${passed.length}</span>`;
                consoleEl.appendChild(passHeader);
                
                passed.forEach(({ test, result }) => {
                    consoleEl.appendChild(createTestCard(test, result));
                });
            }

            if (failed.length === 0 && passed.length === 0) {
                consoleEl.innerHTML = '<div class="empty-state">No tests to display</div>';
            }

            // Scroll to top to show failures immediately
            consoleEl.scrollTop = 0;
        }

        async function runAll() {
            console.log('🚀 Starting test run...');
            runBtn.disabled = true;
            clearBtn.disabled = true;
            progressEl.textContent = `Running 0/${cTests.length}...`;
            summaryEl.textContent = '🏁 Running...';

            const results = [];
            const globalStart = performance.now();

            for (let i = 0; i < cTests.length; i++) {
                const test = cTests[i];
                progressEl.textContent = `Running ${i + 1}/${cTests.length}: ${test.name}...`;
                
                try {
                    const result = await executeTest(test);
                    results.push({ test, result });
                } catch (e) {
                    console.error(`💥 Test "${test.name}" crashed:`, e);
                    results.push({ 
                        test, 
                        result: { 
                            passed: false, 
                            expected: test.expected, 
                            actual: `💥 ${e.message || e}`, 
                            errorMsg: 'Test harness error',
                            copyableError: `Test "${test.name}" crashed:\n  Error: ${e.message || e}\n  Time: ${new Date().toISOString()}`,
                            wasmBytes: null, 
                            elapsedMs: 0 
                        } 
                    });
                }
                
                // Allow UI to stay responsive
                await new Promise(res => setTimeout(res, 5));
            }

            const totalElapsed = ((performance.now() - globalStart) / 1000).toFixed(2);
            const passedCount = results.filter(r => r.result.passed).length;
            const failedCount = results.length - passedCount;

            // 🎯 Render with failures first
            renderResults(results);

            // Update summary
            runBtn.disabled = false;
            clearBtn.disabled = false;
            progressEl.textContent = `Done in ${totalElapsed}s`;
            summaryEl.textContent = `🏁 ${passedCount} passed • ${failedCount} failed`;
            summaryEl.className = `summary ${failedCount === 0 ? 'all-pass' : 'has-fail'}`;
            
            console.log(`✅ Finished: ${passedCount}/${results.length} passed in ${totalElapsed}s`);
        }

        runBtn.onclick = runAll;
        
        clearBtn.onclick = () => {
            consoleEl.innerHTML = '<div class="empty-state">Results cleared • Click "Run All Tests" to begin</div>';
            summaryEl.textContent = '🏁 0 passed • 0 failed';
            summaryEl.className = 'summary';
            progressEl.textContent = 'Ready';
        };

        // Auto-run on load if enabled
        if (autoRun) {
            setTimeout(runAll, 300);
        }
    </script>
</body>
</html>
