<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tops Compiler - Unit Tests</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --border: #333;
            --primary: #4caf50;
            --error: #f44336;
            --text: #eee;
            --wasm-blue: #659ad2;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 15px; 
            padding-bottom: 300px; 
            margin: 0;
            font-size: 16px; 
        }
        
        h1 { font-size: 1.4rem; margin: 10px 0; }
        .stats { 
            display: block; margin-bottom: 20px; font-size: 1rem; background: var(--card-bg); 
            padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center;
        }

        .test-card { border-radius: 8px; margin-bottom: 12px; padding: 12px; border-left: 5px solid; background: var(--card-bg); }
        .pass { border-left-color: var(--primary); }
        .fail { border-left-color: var(--error); background: #2d1a1a; }
        
        .header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        @media (min-width: 600px) {
            .header { flex-direction: row; justify-content: space-between; align-items: flex-start; }
        }

        .status-badge { font-weight: bold; text-transform: uppercase; font-size: 0.7rem; padding: 3px 6px; border-radius: 4px; display: inline-block; }
        .pass .status-badge { background: #1b3320; color: #81c784; }
        .fail .status-badge { background: #331111; color: #e57373; }
        
        pre { 
            background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; 
            font-size: 0.85rem; color: #ce9178; border: 1px solid var(--border); margin: 10px 0;
        }
        
        .info-box { padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; margin-top: 10px; line-height: 1.4; }
        .pass .info-box { background: #1e251e; color: #a5d6a7; border: 1px solid #2e7d32; }
        .fail .info-box { background: #331111; color: #ef9a9a; border: 1px solid #632a2a; }
        
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .copy-btn { 
            flex: 1; min-width: 80px; background: #333; color: #ccc; border: 1px solid #444; 
            padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; 
            text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        .copy-btn.hex { border-color: var(--wasm-blue); color: var(--wasm-blue); }
        .copy-btn:active { background: var(--primary); color: white; }

        .label { font-weight: bold; opacity: 0.7; font-size: 0.65rem; margin-right: 5px; }

        #terminal-container {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 200px; min-height: 45px; max-height: 85vh;
            background: #050505; display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }

        #terminal-resizer {
            height: 20px; background: #222; cursor: ns-resize; 
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }
        #terminal-resizer::after { content: ""; width: 40px; height: 4px; background: #444; border-radius: 2px; }

        #terminal-header {
            background: #1a1a1a; padding: 6px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            font-size: 0.75rem; color: #888; font-weight: bold;
        }

        #terminal-body {
            flex-grow: 1; overflow-y: auto; padding: 10px;
            font-family: 'Consolas', monospace; font-size: 0.8rem;
            -webkit-overflow-scrolling: touch;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
    </style>
</head>
<body>

    <h1>Tops Compiler Tests</h1>
    <div id="stats" class="stats">Running tests...</div>
    <div id="results-container"></div>

    <div id="terminal-container">
        <div id="terminal-resizer"></div>
        <div id="terminal-header">
            <span>CONSOLE</span>
            <button class="copy-btn" style="flex:none; padding: 4px 10px;" onclick="document.getElementById('terminal-body').innerHTML=''">Clear</button>
        </div>
        <div id="terminal-body"></div>
    </div>
	
    <!--<script src="topsCompiler.js"></script>-->
	
    <script src="topsUnitTests.js"></script>
	
    <script>
        // Define copyText globally so it's accessible from inline handlers
        function copyText(text) { 
            if (!text) return;
            navigator.clipboard.writeText(text).catch(err => {
                console.error('Failed to copy text: ', err);
            }); 
        }
    </script>
    
    <script type="module">
        import TopsCompiler from './topsCompiler.js';
        
        // Make copyText available in the module scope too
        window.copyText = copyText;
        
        function bufToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0').toUpperCase())
                .join(' ');
        }

        /** 2. CONSOLE LOGIC **/
        (function() {
            const terminalBody = document.getElementById('terminal-body');
            const originalConsole = { log: console.log, warn: console.warn, error: console.error };

            function appendToUI(type, args) {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                const timestamp = new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' });
                const message = Array.from(args).map(arg => 
                    typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
                ).join(' ');

                entry.innerHTML = `<small style="color:#555; margin-right:8px;">[${timestamp}]</small>${message}`;
                terminalBody.appendChild(entry);
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }

            console.log = (...args) => { originalConsole.log(...args); appendToUI('log', args); };
            console.warn = (...args) => { originalConsole.warn(...args); appendToUI('warn', args); };
            console.error = (...args) => { originalConsole.error(...args); appendToUI('error', args); };
        })();

        /** 3. DRAG LOGIC **/
        (function() {
            const container = document.getElementById('terminal-container');
            const resizer = document.getElementById('terminal-resizer');
            let isResizing = false;

            const move = (y) => {
                if (!isResizing) return;
                const h = window.innerHeight - y;
                if (h > 45 && h < window.innerHeight * 0.85) container.style.height = h + 'px';
            };

            resizer.addEventListener('mousedown', () => isResizing = true);
            window.addEventListener('mousemove', (e) => move(e.clientY));
            window.addEventListener('mouseup', () => isResizing = false);
            resizer.addEventListener('touchstart', () => isResizing = true, { passive: true });
            window.addEventListener('touchmove', (e) => move(e.touches[0].clientY), { passive: true });
            window.addEventListener('touchend', () => isResizing = false);
        })();

        /** 4. RUNNER LOGIC **/
        // Global object to hold raw code strings safely
        window.testCodeMap = {};

        async function runSuite() {
            const container = document.getElementById('results-container');
            const statsElement = document.getElementById('stats');
            let passedCount = 0, failedCount = 0;
            const results = [];

            for (let i = 0; i < tests.length; i++) {
                const t = tests[i];
                let status = "fail", errorMsg = null, actualVal = null, hexData = null;
                
                // Save original code to memory map
                window.testCodeMap[i] = t.code;

                try {
                    const compiler = new TopsCompiler(t.code);
                    const wasmBuffer = compiler.compile();
                    hexData = bufToHex(wasmBuffer); 
                    
                    const { instance } = await WebAssembly.instantiate(wasmBuffer);
                    
					try {
						actualVal = t.test(instance.exports);
					} catch(e) {
						actualVal=e.message;
					}
					
					
                    if (t.test === "caught error") {
                        status = "fail"; errorMsg = "Expected error but passed.";
                    } 
					else if (t.test=="any")
					{
						status= "pass";
					}
					else 
					{
                        //actualVal = t.test(instance.exports);
                        const isMatch = (typeof actualVal === 'number' && typeof t.expected === 'number') 
                            ? Math.abs(actualVal - t.expected) < 0.00001 
                            : actualVal === t.expected;
                        status = isMatch ? "pass" : "fail";
                        if (!isMatch) errorMsg = "Value Mismatch";
                    }
                } catch (e) {
                    if (t.test === "caught error") { status = "pass"; errorMsg = e.message; }
                    else { status = "fail"; errorMsg = e.message; }
                }

                if (status === "pass") passedCount++; else failedCount++;
                results.push({ ...t, status, errorMsg, actualVal, hexData, index: i });
            }

            container.innerHTML = results.sort((a,b) => a.status === "fail" ? -1 : 1).map(r => {
                const safeHex = r.hexData ? r.hexData : "";
                
                let detailedErr = r.errorMsg || "Unknown Error";
                if (r.status === "fail" && r.test !== "caught error") {
                    detailedErr += ` | Exp: ${r.expected} | Act: ${r.actualVal ?? 'N/A'}`;
                }
                const escapedErr = detailedErr.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                return `
                <div class="test-card ${r.status}">
                    <div class="header">
                        <div><span class="status-badge">${r.status}</span> <strong>${r.name}</strong></div>
                        <div class="btn-group">
                            <button class="copy-btn" onclick="copyText(window.testCodeMap[${r.index}])">Code</button>
                            ${r.hexData ? `<button class="copy-btn hex" onclick="copyText(\`${safeHex}\`)">Copy Hex</button>` : ''}
                            ${r.status === 'fail' ? `<button class="copy-btn" onclick="copyText('${escapedErr}')">Error</button>` : ''}
                        </div>
                    </div>
                    <pre>${r.code.trim()}</pre>
                    <div class="info-box">
                        ${r.test === "caught error" ? 
                            `<div><span class="label">Compiler:</span> ${r.errorMsg}</div>` : 
                            `<div><span class="label">Expected:</span> ${r.expected}</div>
                             <div><span class="label">Actual:</span> ${r.actualVal ?? '---'}</div>
                             ${(r.status === 'fail' && r.errorMsg !== 'Value Mismatch') ? `<div><span class="label">Error:</span> ${r.errorMsg}</div>` : ''}`
                        }
                    </div>
                </div>`;
            }).join('');

            statsElement.innerHTML = `<b style="color:#4caf50">${passedCount} Passed</b> | <b style="color:#f44336">${failedCount} Failed</b>`;
        }

        window.onload = runSuite;
    </script>
</body>
</html>
