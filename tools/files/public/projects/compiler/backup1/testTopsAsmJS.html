<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tops asm.js Compiler - Unit Tests</title>
    <style>
        :root {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --border: #333;
            --primary: #4caf50; --error: #f44336; --text: #eee; --asm-orange: #ff9800;
            --warn: #ff9800; --skip: #607d8b;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); padding: 15px; padding-bottom: 300px; margin: 0; font-size: 16px; 
        }
        h1 { font-size: 1.4rem; margin: 10px 0; color: var(--asm-orange); }
        .stats { display: block; margin-bottom: 20px; font-size: 1rem; background: var(--card-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .error-banner { background: #2a1a1a; border: 1px solid var(--error); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .error-banner h3 { color: var(--error); margin: 0 0 10px 0; }
        .error-banner code { background: #000; padding: 2px 6px; border-radius: 3px; }
        .error-banner pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.75rem; color: #ef9a9a; }
        .test-card { border-radius: 8px; margin-bottom: 12px; padding: 12px; border-left: 5px solid; background: var(--card-bg); }
        .pass { border-left-color: var(--primary); }
        .fail { border-left-color: var(--error); background: #2d1a1a; }
        .skip { border-left-color: var(--skip); background: #1a1a2a; opacity: 0.85; }
        .header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        @media (min-width: 600px) { .header { flex-direction: row; justify-content: space-between; align-items: flex-start; } }
        .status-badge { font-weight: bold; text-transform: uppercase; font-size: 0.7rem; padding: 3px 6px; border-radius: 4px; display: inline-block; }
        .pass .status-badge { background: #1b3320; color: #81c784; }
        .fail .status-badge { background: #331111; color: #e57373; }
        .skip .status-badge { background: #2a3340; color: #90a4ae; }
        .asm-badge { background: #332211; color: var(--asm-orange); }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; color: #ce9178; border: 1px solid var(--border); margin: 10px 0; }
        .info-box { padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; margin-top: 10px; line-height: 1.4; }
        .pass .info-box { background: #1e251e; color: #a5d6a7; border: 1px solid #2e7d32; }
        .fail .info-box { background: #331111; color: #ef9a9a; border: 1px solid #632a2a; }
        .skip .info-box { background: #1a202a; color: #90a4ae; border: 1px solid #37474f; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .copy-btn { flex: 1; min-width: 80px; background: #333; color: #ccc; border: 1px solid #444; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        .copy-btn.asm { border-color: var(--asm-orange); color: var(--asm-orange); }
        .copy-btn:active { background: var(--primary); color: white; }
        .label { font-weight: bold; opacity: 0.7; font-size: 0.65rem; margin-right: 5px; }
        #terminal-container { position: fixed; bottom: 0; left: 0; right: 0; height: 200px; min-height: 45px; max-height: 85vh; background: #050505; display: flex; flex-direction: column; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.6); }
        #terminal-resizer { height: 20px; background: #222; cursor: ns-resize; display: flex; justify-content: center; align-items: center; touch-action: none; }
        #terminal-resizer::after { content: ""; width: 40px; height: 4px; background: #444; border-radius: 2px; }
        #terminal-header { background: #1a1a1a; padding: 6px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #888; font-weight: bold; }
        #terminal-body { flex-grow: 1; overflow-y: auto; padding: 10px; font-family: 'Consolas', monospace; font-size: 0.8rem; -webkit-overflow-scrolling: touch; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-error { color: var(--error); }
        .log-asm { color: var(--asm-orange); }
        .log-warn { color: var(--warn); }
        .debug-info { background: #1a1a2a; border: 1px solid #444466; border-radius: 8px; padding: 15px; margin: 10px 0; font-size: 0.8rem; }
        .debug-info h4 { margin: 0 0 10px 0; color: #81c784; }
        .debug-info .check { margin: 5px 0; }
        .debug-info .check.ok { color: #81c784; }
        .debug-info .check.fail { color: #e57373; }
        .reload-btn { background: var(--asm-orange); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 10px 0; }
        .reload-btn:hover { background: #ffb74d; }
        .heap-dump { background: #0a0a1a; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 0.75rem; margin-top: 8px; max-height: 120px; overflow-y: auto; }
        .heap-dump .addr { color: #81c784; }
        .heap-dump .val { color: #ff9800; }
        .toast { position: fixed; bottom: 220px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; }
        .toast.show { opacity: 1; }
        .toast.success { background: #2e7d32; }
        .toast.error { background: #c62828; }
    </style>
</head>
<body>

    <h1>Tops asm.js Tests <span class="status-badge asm-badge">asm.js</span></h1>
    <div id="stats" class="stats">Loading...</div>
    
    <div id="debug-banner" class="debug-info" style="display:none;">
        <h4>🔍 Debug Information</h4>
        <div id="debug-content"></div>
    </div>
    
    <div id="error-banner" class="error-banner" style="display:none;">
        <h3>⚠️ Initialization Error</h3>
        <div id="error-message"></div>
        <button class="reload-btn" onclick="location.reload()">🔄 Retry</button>
    </div>
    
    <div id="results-container"></div>

    <!-- ✅ Toast notification for copy feedback -->
    <div id="toast" class="toast">Copied to clipboard!</div>

    <div id="terminal-container">
        <div id="terminal-resizer"></div>
        <div id="terminal-header">
            <span>CONSOLE</span>
            <button class="copy-btn" style="flex:none; padding: 4px 10px;" onclick="clearTerminal()">Clear</button>
        </div>
        <div id="terminal-body"></div>
    </div>

    <script src="topsUnitTests.js"></script>
    <script src="topsAsmJSCompiler.js"></script>
    
    <script>
        // ✅ Integer cast helpers for unsigned/wrap handling
        /*const integerCast = {
            uint1: (v) => (v | 0) & 0xFF,
            uint2: (v) => (v | 0) & 0xFFFF,
            uint4: (v) => (v | 0) >>> 0,
            int1: (v) => ((v | 0) << 24) >> 24,
            int2: (v) => ((v | 0) << 16) >> 16,
            uint8: (v) => typeof v === 'bigint' ? v : BigInt(Math.floor(v)),
            int8: (v) => typeof v === 'bigint' ? v : BigInt(Math.floor(v))
        };//*/

const integerCast = {
    uint1: (v) => (v | 0) & 0xFF,
    uint2: (v) => (v | 0) & 0xFFFF,
    uint4: (v) => (v | 0) >>> 0,
    int1: (v) => ((v | 0) << 24) >> 24,
    int2: (v) => ((v | 0) << 16) >> 16,
    
    // ✅ UPDATED: Handle [hi, lo] array from asm.js
    uint8: (v) => {
        if (typeof v === 'bigint') return v;
        if (Array.isArray(v) && v.length === 2) {
            const hi = (v[0] | 0) >>> 0;  // unsigned 32-bit
            const lo = (v[1] | 0) >>> 0;
            return (BigInt(hi) << BigInt(32)) | BigInt(lo);
        }
        return BigInt(Math.floor(v));
    },
    
    // ✅ UPDATED: Handle [hi, lo] array with two's complement for signed
    int8: (v) => {
        if (typeof v === 'bigint') return v;
        if (Array.isArray(v) && v.length === 2) {
            const hi = v[0] | 0;           // signed 32-bit
            const lo = (v[1] | 0) >>> 0;   // unsigned 32-bit
            let result = (BigInt(hi >>> 0) << BigInt(32)) | BigInt(lo);
            // Two's complement conversion for negative values
            const SIGN_BIT = BigInt('0x8000000000000000');
            const MODULO = BigInt('0x10000000000000000');
            if (result >= SIGN_BIT) {
                result = result - MODULO;
            }
            return result;
        }
        return BigInt(Math.floor(v));
    },
    
    float4: (v) => Math.fround(v),
    float8: (v) => +v
};




        // ✅ Store both test code and asm.js code by index
        window.testCodeMap = {};
        window.asmCodeMap = {};

        // ✅ FIX: Copy from stored map OR use raw text for errors
        function copyText(key, type = 'test') { 
            let text;
            
            if (type === 'asm') {
                // key is test index → look up asm code
                text = window.asmCodeMap[key];
            } else if (type === 'error') {
                // key IS the error text → use directly
                text = key;
            } else {
                // key is test index → look up test code
                text = window.testCodeMap[key];
            }
            
            if (text == null) {  // catches undefined AND null
                showToast('Nothing to copy', 'error');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                const msg = type === 'asm' ? '✅ asm.js code copied!' 
                          : type === 'error' ? '✅ Error copied!' 
                          : '✅ Test code copied!';
                showToast(msg, 'success');
            }).catch(err => {
                console.error('Copy failed:', err);
                showToast('❌ Copy failed', 'error');
            });
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 2000);
        }
        
        function clearTerminal() {
            document.getElementById('terminal-body').innerHTML = '';
        }
        
        // Console override for terminal UI
        (function() {
            const terminalBody = document.getElementById('terminal-body');
            const originalConsole = { log: console.log, warn: console.warn, error: console.error };

            function appendToUI(type, args) {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type === 'error' ? 'error' : type === 'warn' ? 'warn' : 'log'}`;
                const timestamp = new Date().toLocaleTimeString([], { hour12: false, minute: '2-digit', second: '2-digit' });
                const message = Array.from(args).map(arg => {
                    if (typeof arg === 'object' && arg !== null) {
                        if (arg instanceof Error) return arg.message;
                        if (arg instanceof ArrayBuffer) return `ArrayBuffer(${arg.byteLength} bytes)`;
                        try { return JSON.stringify(arg); } catch { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');

                entry.innerHTML = `<small style="color:#555; margin-right:8px;">[${timestamp}]</small>${message}`;
                terminalBody.appendChild(entry);
                terminalBody.scrollTop = terminalBody.scrollHeight;
            }

            console.log = (...args) => { originalConsole.log(...args); appendToUI('log', args); };
            console.warn = (...args) => { originalConsole.warn(...args); appendToUI('warn', args); };
            console.error = (...args) => { originalConsole.error(...args); appendToUI('error', args); };
        })();

        // Terminal resizer logic
        (function() {
            const container = document.getElementById('terminal-container');
            const resizer = document.getElementById('terminal-resizer');
            let isResizing = false;

            const move = (y) => {
                if (!isResizing) return;
                const h = window.innerHeight - y;
                if (h > 45 && h < window.innerHeight * 0.85) container.style.height = h + 'px';
            };

            resizer.addEventListener('mousedown', () => isResizing = true);
            window.addEventListener('mousemove', (e) => move(e.clientY));
            window.addEventListener('mouseup', () => isResizing = false);
            resizer.addEventListener('touchstart', () => isResizing = true, { passive: true });
            window.addEventListener('touchmove', (e) => move(e.touches[0].clientY), { passive: true });
            window.addEventListener('touchend', () => isResizing = false);
        })();

        // Check for required globals
        function checkGlobals() {
            const checks = [];
            const hasTests = typeof tests !== 'undefined' && Array.isArray(tests);
            checks.push({ name: 'tests array', ok: hasTests, details: hasTests ? `${tests.length} tests found` : 'NOT FOUND' });
            const hasCompiler = typeof TopsAsmJSCompiler !== 'undefined';
            checks.push({ name: 'TopsAsmJSCompiler', ok: hasCompiler, details: hasCompiler ? (typeof TopsAsmJSCompiler.compile === 'function' ? 'compile() method found' : 'compile() MISSING') : 'NOT FOUND' });
            const hasCompileMethod = hasCompiler && typeof TopsAsmJSCompiler.compile === 'function';
            checks.push({ name: 'TopsAsmJSCompiler.compile()', ok: hasCompileMethod, details: hasCompileMethod ? 'Ready' : 'Method not found' });
            return checks;
        }

        function showDebugInfo(checks) {
            const banner = document.getElementById('debug-banner');
            const content = document.getElementById('debug-content');
            banner.style.display = 'block';
            content.innerHTML = checks.map(c => `<div class="check ${c.ok ? 'ok' : 'fail'}">${c.ok ? '✅' : '❌'} <b>${c.name}:</b> ${c.details}</div>`).join('');
            console.log('=== Global Variable Check ===');
            checks.forEach(c => console.log(`${c.ok ? '✅' : '❌'} ${c.name}: ${c.details}`));
        }

        function showError(message, checks = null) {
            const banner = document.getElementById('error-banner');
            const msgEl = document.getElementById('error-message');
            const stats = document.getElementById('stats');
            msgEl.innerHTML = message;
            banner.style.display = 'block';
            stats.innerHTML = `<b style="color:#f44336">❌ Initialization Failed</b>`;
            if (checks) showDebugInfo(checks);
            console.error('Initialization error:', message);
        }

        // Create asm.js stdlib with proper bindings
        function createAsmStdlib() {
            return {
                Math: { 
                    fround: Math.fround.bind(Math), 
                    imul: Math.imul.bind(Math), 
                    abs: Math.abs.bind(Math), 
                    floor: Math.floor.bind(Math), 
                    ceil: Math.ceil.bind(Math), 
                    sqrt: Math.sqrt.bind(Math), 
                    min: Math.min.bind(Math), 
                    max: Math.max.bind(Math) 
                },
                Int8Array, Uint8Array, Int16Array, Uint16Array, Int32Array, Uint32Array, Float32Array, Float64Array,
                BigInt64Array: typeof BigInt64Array !== 'undefined' ? BigInt64Array : null,
                BigUint64Array: typeof BigUint64Array !== 'undefined' ? BigUint64Array : null,
            };
        }

        // Proper 2-step module instantiation with validation
        function instantiateAsmModule(asmCode, heapSize = 65536) {
            const stdlib = createAsmStdlib();
            const foreign = {};
            const heap = new ArrayBuffer(heapSize);
            
            try {
                const moduleFactory = new Function('stdlib', 'foreign', 'heap', asmCode);
                const TOPS = moduleFactory(stdlib, foreign, heap);
                
                if (typeof TOPS !== 'function') {
                    throw new Error(`Module factory returned ${typeof TOPS} instead of function. asm.js validation likely failed.\nGenerated code:\n${asmCode}`);
                }
                
                const exports = TOPS(stdlib, foreign, heap);
                
                if (!exports || typeof exports !== 'object') {
                    throw new Error(`TOPS() returned ${typeof exports} instead of exports object`);
                }
                
                exports._heap = heap;
                exports._views = {
                    HEAP8: new Int8Array(heap), HEAPU8: new Uint8Array(heap),
                    HEAP16: new Int16Array(heap), HEAPU16: new Uint16Array(heap),
                    HEAP32: new Int32Array(heap), HEAPU32: new Uint32Array(heap),
                    HEAPF32: new Float32Array(heap), HEAPF64: new Float64Array(heap),
                };
                return { exports, heap, stdlib };
            } catch (e) {
                console.error('❌ Module instantiation failed:', e.message);
                console.error('Generated asm.js code:\n', asmCode);
                throw e;
            }
        }

        // Float comparison with precision awareness
        function valuesMatch(actual, expected, typeHint = null) {
            if (typeof actual === 'bigint' && typeof expected === 'bigint') return actual === expected;
            if (typeof actual === 'bigint' || typeof expected === 'bigint') { 
                try { return BigInt(actual) === BigInt(expected); } catch { return false; } 
            }
            
            if (typeof actual === 'number' && typeof expected === 'number') {
                if (isNaN(actual) && isNaN(expected)) return true;
                if (!isFinite(actual) && !isFinite(expected)) return (actual > 0) === (expected > 0);
                
                if (typeHint === 'float4') {
                    const a32 = Math.fround(actual);
                    const e32 = Math.fround(expected);
                    return Math.abs(a32 - e32) < 1e-6;
                }
                return Math.abs(actual - expected) < 1e-10;
            }
            
            return actual === expected;
        }

        // Heap dump utility for pointer debugging
        function dumpHeapRange(exports, startAddr, byteCount, label = '') {
            const views = exports._views;
            if (!views) return 'No heap views available';
            
            const lines = [];
            if (label) lines.push(`// ${label}`);
            
            for (let i = 0; i < byteCount; i += 16) {
                const addr = startAddr + i;
                const hex = [];
                const ascii = [];
                for (let j = 0; j < 16 && i + j < byteCount; j++) {
                    const val = views.HEAPU8[addr + j];
                    hex.push(val.toString(16).padStart(2, '0'));
                    ascii.push(val >= 32 && val < 127 ? String.fromCharCode(val) : '.');
                }
                lines.push(`0x${addr.toString(16).padStart(4, '0')}: ${hex.join(' ')}  |${ascii.join('')}|`);
            }
            return lines.join('\n');
        }

        async function runTest(test, index) {
            const result = { 
                name: test.name, 
                code: test.code, 
                index, 
                status: test.skip ? 'skip' : 'fail', 
                errorMsg: null, 
                actualVal: null, 
                asmCode: null, 
                testFn: test.test,
                heapDump: null,
                expected: test.expected,
                typeHint: test.typeHint
            };
            
            if (test.skip) {
                console.log(`⏭️  Skipped: ${test.name}`);
                return result;
            }
            
            window.testCodeMap[index] = test.code;
            
            try {
                const compileResult = TopsAsmJSCompiler.compile(test.code, { heapSize: 65536 });
                const asmCode = compileResult.code;
                result.asmCode = asmCode;
                
                // ✅ FIX: Store asm.js code in global map for copying
                window.asmCodeMap[index] = asmCode;
                
                const { exports } = instantiateAsmModule(asmCode);
                
                console.log(`Test "${test.name}" - exports keys:`, Object.keys(exports));
                
                try { 
                    result.actualVal = test.test(exports); 
                    if (result.actualVal instanceof Promise) {
                        result.actualVal = await result.actualVal;
                    }
                } catch (execError) { 
                    result.actualVal = execError.message || String(execError); 
                }
                
                if (test.dumpHeap && exports._views) {
                    result.heapDump = dumpHeapRange(exports, 0, 256, `Heap after "${test.name}"`);
                    console.log(result.heapDump);
                }
                
                if (test.test === "caught error") { 
                    result.status = "fail"; 
                    result.errorMsg = "Expected compilation error but passed"; 
                }
                else if (test.test === "any") { 
                    result.status = "pass"; 
                }
                else if (valuesMatch(result.actualVal, test.expected, test.typeHint)) { 
                    result.status = "pass"; 
                }
                else { 
                    result.status = "fail"; 
                    result.errorMsg = "Value mismatch"; 
                }
            } catch (e) {
                if (test.test === "caught error") { 
                    result.status = "pass"; 
                    result.errorMsg = e.message; 
                }
                else { 
                    result.status = "fail"; 
                    result.errorMsg = e.message; 
                }
            }
            return result;
        }

        async function runSuite() {
            const container = document.getElementById('results-container');
            const statsElement = document.getElementById('stats');
            const checks = checkGlobals();
            showDebugInfo(checks);
            
            const allOk = checks.every(c => c.ok);
            if (!allOk) {
                showError(`<p>Required globals not found. Check your file exports:</p><pre><code>// topsUnitTests.js should have:\nvar tests = [ ... ];\n\n// topsAsmJSCompiler.js should have:\nclass TopsAsmJSCompiler {\n  static compile(source, options) { ... }\n}\nwindow.TopsAsmJSCompiler = TopsAsmJSCompiler;</code></pre>`, checks);
                return;
            }
            
            const activeTests = tests.filter(t => !t.skip);
            statsElement.innerHTML = `<b style="color:#4caf50">✅ Ready</b> - Running ${activeTests.length}/${tests.length} tests...`;
            
            let passedCount = 0, failedCount = 0, skippedCount = 0, results = [];
            console.log(`🚀 Starting asm.js test suite: ${activeTests.length} active / ${tests.length} total tests`);
            
            for (let i = 0; i < tests.length; i++) {
                const test = tests[i];
                const result = await runTest(test, i);
                
                if (result.status === "pass") passedCount++; 
                else if (result.status === "fail") failedCount++; 
                else if (result.status === "skip") skippedCount++;
                
                results.push(result);
                
                if (i % 10 === 0 || i === tests.length - 1) {
                    statsElement.innerHTML = `<b style="color:#4caf50">${passedCount} Passed</b> | <b style="color:#f44336">${failedCount} Failed</b> | <b style="color:#607d8b">${skippedCount} Skipped</b> | Progress: ${i + 1}/${tests.length}`;
                }
            }
            
            container.innerHTML = results.sort((a, b) => {
                const order = { fail: 0, skip: 1, pass: 2 };
                return order[a.status] - order[b.status];
            }).map(r => {
                const safeCode = r.code ? r.code.replace(/`/g, '\\`').replace(/\${/g, '\\${') : "";
                
                let detailedErr = r.errorMsg || "Unknown Error";
                if (r.status === "fail" && r.testFn !== "caught error" && r.testFn !== "any") {
                    detailedErr += ` | Exp: ${r.expected ?? 'N/A'} | Act: ${r.actualVal ?? 'N/A'}`;
                    if (r.typeHint) detailedErr += ` [${r.typeHint}]`;
                }
                const escapedErr = detailedErr.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                const heapDumpHtml = r.heapDump ? `<div class="heap-dump"><pre>${r.heapDump}</pre></div>` : '';
                
                const expectedDisplay = r.expected !== undefined 
                    ? `${r.expected}${r.typeHint ? ` <small>(${r.typeHint})</small>` : ''}`
                    : 'N/A';
                
                // ✅ FIX: Reference asm code by index instead of embedding
                const asmBtn = r.asmCode 
                    ? `<button class="copy-btn asm" onclick="copyText(${r.index}, 'asm')">Copy asm.js</button>` 
                    : '';
                
                return `<div class="test-card ${r.status}">
                    <div class="header">
                        <div>
                            <span class="status-badge ${r.status}">${r.status}</span> 
                            <strong>${r.name}</strong>
                        </div>
                        <div class="btn-group">
                            <button class="copy-btn" onclick="copyText(${r.index}, 'test')">Code</button>
                            ${asmBtn}
                            ${r.status === 'fail' ? `<button class="copy-btn" onclick="copyText(\`${escapedErr}\`, 'error')">Error</button>` : ''}
                        </div>
                    </div>
                    <pre>${r.code.trim()}</pre>
                    <div class="info-box">
                        ${r.testFn === "caught error" 
                            ? `<div><span class="label">Compiler:</span> ${r.errorMsg}</div>` 
                            : r.status === 'skip'
                                ? `<div><span class="label">Status:</span> Test skipped</div>`
                                : `<div><span class="label">Expected:</span> ${expectedDisplay}</div>
                                   <div><span class="label">Actual:</span> ${r.actualVal ?? '---'}</div>
                                   ${r.status === 'fail' && r.errorMsg !== 'Value mismatch' ? `<div><span class="label">Error:</span> ${r.errorMsg}</div>` : ''}`
                        }
                        ${heapDumpHtml}
                    </div>
                </div>`;
            }).join('');
            
            const total = tests.length;
            const active = total - skippedCount;
            const pct = active > 0 ? ((passedCount / active) * 100).toFixed(1) : '0.0';
            statsElement.innerHTML = `<b style="color:#4caf50">${passedCount} Passed</b> | <b style="color:#f44336">${failedCount} Failed</b> | <b style="color:#607d8b">${skippedCount} Skipped</b> | <b style="color:#ff9800">${pct}% of active</b>`;
            
            console.log(`✅ Test suite complete: ${passedCount}/${active} passed (${pct}%), ${skippedCount} skipped`);
        }

        window.addEventListener('load', () => {
            console.log('📦 Tops asm.js test runner loaded');
            console.log('tests:', typeof tests, Array.isArray(tests) ? `(${tests.length} items)` : '');
            console.log('TopsAsmJSCompiler:', typeof TopsAsmJSCompiler);
            console.log('integerCast helper:', typeof integerCast);
            
            setTimeout(() => {
                runSuite().catch(err => {
                    console.error('Test suite failed to start:', err);
                    document.getElementById('stats').innerHTML = `<b style="color:#f44336">Failed: ${err.message}</b>`;
                });
            }, 100);
        });
    </script>
</body>
</html>
