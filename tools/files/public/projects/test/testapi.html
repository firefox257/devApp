<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Test Page</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #f8f9fa; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        button { padding: 0.5rem 1rem; margin: 0.25rem; cursor: pointer; background: #0d6efd; color: white; border: none; border-radius: 4px; font-weight: 500; }
        button:hover:not(:disabled) { background: #0b5ed7; }
        button:disabled { background: #adb5bd; cursor: not-allowed; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 4px; overflow-x: auto; min-height: 80px; max-height: 250px; font-size: 0.9rem; }
        input { padding: 0.5rem; width: calc(100% - 80px); margin-right: 0.5rem; border: 1px solid #ced4da; border-radius: 4px; }
        .status { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; vertical-align: middle; }
        .status.connected { background: #198754; color: white; }
        .status.disconnected { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>🚀 Server Test Console</h1>
    
    <!-- API Test -->
    <div class="card">
        <h2>📡 API Test (<code>/helloworld.api.js</code>)</h2>
        <button onclick="testApi()">Fetch Hello</button>
        <pre id="apiOutput">Click "Fetch Hello" to test...</pre>
    </div>

    <!-- WebSocket Test -->
    <div class="card">
        <h2>🔌 WebSocket Test (<code>/helloworld.ws.js</code>)</h2>
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
            <button id="connectBtn" onclick="connectWs()">Connect</button>
            <button id="disconnectBtn" onclick="disconnectWs()" disabled>Disconnect</button>
            <span id="wsStatus" class="status disconnected">Disconnected</span>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <input type="text" id="wsInput" placeholder="Type message to echo..." disabled>
            <button id="sendBtn" onclick="sendWs()" disabled>Send</button>
        </div>
        <pre id="wsLog" style="margin-top:1rem;">Waiting for connection...</pre>
    </div>

    <script>
        // ===== API =====
        async function testApi() {
            const out = document.getElementById('apiOutput');
            out.textContent = 'Loading...';
            try {
                const res = await fetch('/public/projects/test/helloworld.api.js');
                const data = await res.json();
                out.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                out.textContent = `Error: ${err.message}`;
            }
        }

        // ===== WEBSOCKET =====
        let ws = null;
        const wsLog = document.getElementById('wsLog');
        const wsStatus = document.getElementById('wsStatus');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const wsInput = document.getElementById('wsInput');
        const sendBtn = document.getElementById('sendBtn');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            wsLog.textContent += `[${time}] ${msg}\n`;
            wsLog.scrollTop = wsLog.scrollHeight;
        }

        function connectWs() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}/public/projects/test/helloworld.ws.js`;
            
            wsLog.textContent = `Connecting to ${url}...\n`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                wsStatus.textContent = 'Connected';
                wsStatus.className = 'status connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                wsInput.disabled = false;
                sendBtn.disabled = false;
                log('✅ Connected');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`📥 ${JSON.stringify(data, null, 2)}`);
                } catch {
                    log(`📥 ${event.data}`);
                }
            };

            ws.onclose = (e) => {
                wsStatus.textContent = 'Disconnected';
                wsStatus.className = 'status disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                wsInput.disabled = true;
                sendBtn.disabled = true;
                log(`❌ Closed (code: ${e.code})`);
                ws = null;
            };

            ws.onerror = () => log('⚠️ Connection error');
        }

        function disconnectWs() {
            if (ws) ws.close(1000, 'Client requested');
        }

        function sendWs() {
            if (ws?.readyState === WebSocket.OPEN) {
                const msg = wsInput.value.trim();
                if (msg) {
                    ws.send(JSON.stringify({ text: msg }));
                    log(`📤 Sent: ${msg}`);
                    wsInput.value = '';
                }
            }
        }
        wsInput.addEventListener('keypress', e => e.key === 'Enter' && sendWs());
    </script>
</body>
</html>
