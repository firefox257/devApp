<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Three.js Wizard</title>
<style>
  body { margin: 0; overflow: hidden; background: #0a0a1a; font-family: sans-serif; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #c9b7ff;
    background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 6px;
    font-size: 13px; pointer-events: none;
  }
</style>
</head>
<body>
<div id="info">🧙 Drag to orbit • Scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- Scene setup ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 8, 25);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 100);
camera.position.set(4, 3.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.5, 0);

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0x404070, 0.6));

const moonLight = new THREE.DirectionalLight(0xaaaaff, 0.8);
moonLight.position.set(5, 10, 5);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(1024, 1024);
moonLight.shadow.camera.left = -6;
moonLight.shadow.camera.right = 6;
moonLight.shadow.camera.top = 6;
moonLight.shadow.camera.bottom = -6;
scene.add(moonLight);

const rimLight = new THREE.DirectionalLight(0xff88ff, 0.3);
rimLight.position.set(-5, 3, -3);
scene.add(rimLight);

// ---------- Ground ----------
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(10, 48),
  new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ---------- Wizard group ----------
const wizard = new THREE.Group();
scene.add(wizard);

// Materials
const robeMat   = new THREE.MeshStandardMaterial({ color: 0x2a1a5e, roughness: 0.7 });
const robeDark  = new THREE.MeshStandardMaterial({ color: 0x1a0f3e, roughness: 0.8 });
const skinMat   = new THREE.MeshStandardMaterial({ color: 0xf2c9a0, roughness: 0.6 });
const beardMat  = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.9 });
const hatMat    = new THREE.MeshStandardMaterial({ color: 0x1a0f3e, roughness: 0.6 });
const staffMat  = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.8 });
const goldMat   = new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.9, roughness: 0.2 });
const eyeMat    = new THREE.MeshStandardMaterial({ color: 0x000000 });

// Robe (body) - tapered cylinder
const robe = new THREE.Mesh(
  new THREE.CylinderGeometry(0.35, 0.9, 2.2, 24),
  robeMat
);
robe.position.y = 1.1;
robe.castShadow = true;
robe.receiveShadow = true;
wizard.add(robe);

// Robe bottom trim
const trim = new THREE.Mesh(
  new THREE.TorusGeometry(0.9, 0.05, 8, 32),
  goldMat
);
trim.rotation.x = Math.PI / 2;
trim.position.y = 0.02;
wizard.add(trim);

// Belt
const belt = new THREE.Mesh(
  new THREE.TorusGeometry(0.55, 0.06, 8, 32),
  goldMat
);
belt.rotation.x = Math.PI / 2;
belt.position.y = 1.3;
wizard.add(belt);

// Belt buckle
const buckle = new THREE.Mesh(
  new THREE.BoxGeometry(0.2, 0.2, 0.08),
  goldMat
);
buckle.position.set(0, 1.3, 0.55);
wizard.add(buckle);

// Head
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.38, 24, 24),
  skinMat
);
head.position.y = 2.5;
head.castShadow = true;
wizard.add(head);

// Eyes
[-0.12, 0.12].forEach(x => {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), eyeMat);
  eye.position.set(x, 2.55, 0.32);
  wizard.add(eye);
});

// Eyebrows (bushy)
[-0.12, 0.12].forEach(x => {
  const brow = new THREE.Mesh(
    new THREE.BoxGeometry(0.14, 0.04, 0.06),
    beardMat
  );
  brow.position.set(x, 2.65, 0.34);
  wizard.add(brow);
});

// Nose
const nose = new THREE.Mesh(
  new THREE.ConeGeometry(0.06, 0.15, 12),
  skinMat
);
nose.rotation.x = -Math.PI / 2;
nose.position.set(0, 2.45, 0.4);
wizard.add(nose);

// ===== LONG TRIANGULAR CHIN BEARD =====
// The beard group so we can animate it together
const beardGroup = new THREE.Group();
beardGroup.position.set(0, 2.2, 0.3); // anchored at the chin
wizard.add(beardGroup);

// Chin anchor - small sphere blending beard to chin
const chinAnchor = new THREE.Mesh(
  new THREE.SphereGeometry(0.14, 16, 16),
  beardMat
);
chinAnchor.scale.set(1.2, 0.7, 0.9);
chinAnchor.position.set(0, 0, 0);
beardGroup.add(chinAnchor);

// Main triangular beard - a long cone with 3 sides for a flat triangular look
// Wide at the chin, tapering to a sharp point at the bottom
const chinBeardGeo = new THREE.ConeGeometry(0.18, 1.6, 3, 1);
// Rotate so the flat triangular face faces forward
chinBeardGeo.rotateY(Math.PI / 6);
const chinBeard = new THREE.Mesh(chinBeardGeo, beardMat);
chinBeard.position.set(0, -0.85, 0.02);
chinBeard.castShadow = true;
beardGroup.add(chinBeard);

// A slightly wider smooth overlay cone to soften the triangular edges
const chinBeardSmooth = new THREE.Mesh(
  new THREE.ConeGeometry(0.16, 1.5, 16, 1),
  beardMat
);
chinBeardSmooth.position.set(0, -0.8, 0.02);
chinBeardSmooth.castShadow = true;
beardGroup.add(chinBeardSmooth);

// Beard tip - small rounded point at the very bottom
const beardTip = new THREE.Mesh(
  new THREE.SphereGeometry(0.04, 8, 8),
  beardMat
);
beardTip.position.set(0, -1.6, 0.02);
beardGroup.add(beardTip);

// Small cheek tufts connecting chin beard to face
[-0.12, 0.12].forEach(x => {
  const tuft = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 8, 8),
    beardMat
  );
  tuft.scale.set(0.8, 1.2, 0.7);
  tuft.position.set(x, 0.05, -0.02);
  beardGroup.add(tuft);
});

// Mustache (sits above the chin beard, on the face)
[-0.09, 0.09].forEach(x => {
  const must = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 12, 12),
    beardMat
  );
  must.scale.set(1.5, 0.5, 0.8);
  must.position.set(x, 2.33, 0.38);
  wizard.add(must);
});

// Hat brim
const brim = new THREE.Mesh(
  new THREE.CylinderGeometry(0.7, 0.7, 0.06, 32),
  hatMat
);
brim.position.y = 2.8;
brim.castShadow = true;
wizard.add(brim);

// Hat cone
const hat = new THREE.Mesh(
  new THREE.ConeGeometry(0.45, 1.1, 32),
  hatMat
);
hat.position.y = 3.35;
hat.rotation.z = 0.15;
hat.castShadow = true;
wizard.add(hat);

// Hat band
const hatBand = new THREE.Mesh(
  new THREE.TorusGeometry(0.44, 0.04, 8, 32),
  goldMat
);
hatBand.rotation.x = Math.PI / 2;
hatBand.position.y = 2.9;
wizard.add(hatBand);

// Hat star
const star = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.08, 0),
  goldMat
);
star.position.set(0, 2.9, 0.45);
wizard.add(star);

// Arms (sleeves)
const leftArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.18, 1.0, 16),
  robeMat
);
leftArm.position.set(-0.45, 1.7, 0);
leftArm.rotation.z = 0.4;
leftArm.castShadow = true;
wizard.add(leftArm);

const rightArm = new THREE.Mesh(
  new THREE.CylinderGeometry(0.12, 0.18, 1.0, 16),
  robeMat
);
rightArm.position.set(0.55, 1.8, 0.2);
rightArm.rotation.z = -0.6;
rightArm.rotation.x = -0.3;
rightArm.castShadow = true;
wizard.add(rightArm);

// Hands
const leftHand = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 16, 16),
  skinMat
);
leftHand.position.set(-0.75, 1.35, 0);
wizard.add(leftHand);

const rightHand = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 16, 16),
  skinMat
);
rightHand.position.set(0.85, 1.55, 0.45);
wizard.add(rightHand);

// Feet (peeking from robe)
[-0.25, 0.25].forEach(x => {
  const foot = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.1, 0.35),
    robeDark
  );
  foot.position.set(x, 0.05, 0.1);
  foot.castShadow = true;
  wizard.add(foot);
});

// ---------- Staff ----------
const staffGroup = new THREE.Group();
staffGroup.position.set(0.85, 0, 0.45);
wizard.add(staffGroup);

const staff = new THREE.Mesh(
  new THREE.CylinderGeometry(0.05, 0.07, 3.2, 12),
  staffMat
);
staff.position.y = 1.6;
staff.castShadow = true;
staffGroup.add(staff);

// Staff top ornament (twisted roots)
for (let i = 0; i < 4; i++) {
  const root = new THREE.Mesh(
    new THREE.TorusGeometry(0.12, 0.03, 8, 16, Math.PI),
    staffMat
  );
  root.position.y = 3.15;
  root.rotation.y = (i / 4) * Math.PI * 2;
  root.rotation.x = 0.3;
  staffGroup.add(root);
}

// Glowing orb
const orbMat = new THREE.MeshStandardMaterial({
  color: 0x88ddff,
  emissive: 0x44aaff,
  emissiveIntensity: 1.5,
  roughness: 0.2,
  metalness: 0.3
});
const orb = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.18, 1),
  orbMat
);
orb.position.y = 3.25;
staffGroup.add(orb);

const orbGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.28, 16, 16),
  new THREE.MeshBasicMaterial({
    color: 0x66ccff,
    transparent: true,
    opacity: 0.25
  })
);
orbGlow.position.y = 3.25;
staffGroup.add(orbGlow);

const orbLight = new THREE.PointLight(0x66ccff, 2, 6);
orbLight.position.y = 3.25;
staffGroup.add(orbLight);

// ---------- Magical particles ----------
const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const velocities = [];
for (let i = 0; i < particleCount; i++) {
  positions[i*3]   = 0;
  positions[i*3+1] = 3.25;
  positions[i*3+2] = 0;
  velocities.push({
    x: (Math.random() - 0.5) * 0.02,
    y: Math.random() * 0.02 + 0.01,
    z: (Math.random() - 0.5) * 0.02,
    life: Math.random()
  });
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particleMat = new THREE.PointsMaterial({
  color: 0xaaddff,
  size: 0.06,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
staffGroup.add(particles);

// ---------- Animation ----------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle floating
  wizard.position.y = Math.sin(t * 1.5) * 0.08;
  wizard.rotation.y = Math.sin(t * 0.3) * 0.15;

  // Beard sway - the whole chin beard swings gently
  beardGroup.rotation.z = Math.sin(t * 1.2) * 0.05;
  beardGroup.rotation.x = Math.sin(t * 0.8) * 0.03;

  // Orb pulsing
  const pulse = 1 + Math.sin(t * 3) * 0.15;
  orb.scale.setScalar(pulse);
  orbGlow.scale.setScalar(pulse * 1.2);
  orbLight.intensity = 1.5 + Math.sin(t * 3) * 0.8;
  orb.rotation.y = t;

  // Star twinkle
  star.rotation.y = t * 2;
  star.scale.setScalar(0.9 + Math.sin(t * 4) * 0.15);

  // Particles
  const pos = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const v = velocities[i];
    v.life += 0.01;
    pos[i*3]   += v.x;
    pos[i*3+1] += v.y;
    pos[i*3+2] += v.z;
    if (v.life > 1) {
      v.life = 0;
      pos[i*3]   = 0;
      pos[i*3+1] = 3.25;
      pos[i*3+2] = 0;
      v.x = (Math.random() - 0.5) * 0.02;
      v.y = Math.random() * 0.02 + 0.01;
      v.z = (Math.random() - 0.5) * 0.02;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ---------- Resize ----------
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
