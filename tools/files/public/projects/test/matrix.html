<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0F0;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
        }

        .screen {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0F0;
            padding: 25px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 0 20px #0F0, inset 0 0 20px #0F0;
            border-radius: 5px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 20px;
            color: #0F0;
            text-shadow: 0 0 10px #0F0;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: #0F0;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .input-group input {
            width: 100%;
            background: black;
            border: 1px solid #0F0;
            color: #0F0;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 5px #0F0;
            border-radius: 3px;
        }

        .input-group input:focus {
            background: #001100;
            box-shadow: 0 0 15px #0F0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0F0;
            color: black;
            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px #0F0;
            border-radius: 3px;
        }

        button:hover {
            background: black;
            color: #0F0;
            box-shadow: 0 0 20px #0F0;
        }

        button:active {
            transform: scale(0.98);
        }

        .dashboard {
            width: 100%;
            max-width: 100%;
            padding: 10px;
        }

        .dashboard-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #0F0;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .dashboard-title {
            font-size: 18px;
            text-shadow: 0 0 10px #0F0;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .user-info {
            font-size: 11px;
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #0F0;
            padding: 12px 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            border-radius: 3px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 9px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0F0;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 10px;
            border-radius: 3px;
        }

        .log-entry {
            margin-bottom: 4px;
            opacity: 0.8;
            word-break: break-word;
        }

        .log-entry::before {
            content: "> ";
        }

        .logout-btn {
            margin-top: 15px;
            width: auto;
            padding: 10px 30px;
            font-size: 14px;
        }

        .log-container::-webkit-scrollbar {
            width: 4px;
        }
        .log-container::-webkit-scrollbar-track {
            background: #001100;
        }
        .log-container::-webkit-scrollbar-thumb {
            background: #0F0;
        }

        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .stat-card {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px;
            }
            
            .stat-value {
                margin-bottom: 0;
            }
            
            .stat-label {
                font-size: 11px;
            }
            
            .login-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <div class="scanlines"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-header">SYSTEM ACCESS</div>
            <form id="login-form">
                <div class="input-group">
                    <label>USERNAME</label>
                    <input type="text" id="username" placeholder="Enter ID" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" placeholder="Enter Key" required autocomplete="off">
                </div>
                <button type="submit">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
        <div class="dashboard">
            <div class="dashboard-header">
                <div class="dashboard-title">NEURAL NETWORK<br>INTERFACE</div>
                <div class="user-info">USER: <span id="display-user">ADMIN</span> | STATUS: CONNECTED</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-nodes">8,432</div>
                    <div class="stat-label">Active Nodes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-data">847 TB</div>
                    <div class="stat-label">Data Processed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-threat">0</div>
                    <div class="stat-label">Threat Level</div>
                </div>
            </div>

            <div class="log-container" id="system-log">
                <div class="log-entry">System initialization complete...</div>
                <div class="log-entry">Connecting to main server...</div>
                <div class="log-entry">Encryption keys verified.</div>
                <div class="log-entry">Access granted.</div>
            </div>

            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <script>
        // --- Matrix Rain Animation ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const baseFontSize = 14;
        const columns = 20;
        const verticalSpacing = 7;
        const columnsData = [];

        function initColumns() {
            columnsData.length = 0;
            const centerX = canvas.width / 2;
            
            for (let i = 0; i < columns; i++) {
                const xPos = (canvas.width / columns) * i + (canvas.width / columns / 2);
                const distFromCenter = Math.abs(xPos - centerX) / centerX;
                const depth = 1 - distFromCenter;
                
                columnsData.push({
                    x: xPos,
                    depth: depth,
                    y: Math.random() * canvas.height,
                    speed: 1.5 + (depth * 2.5),
                    fontSize: baseFontSize * (0.4 + depth * 0.6),
                    opacity: 0.3 + depth * 0.7
                });
            }
        }

        initColumns();

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < columnsData.length; i++) {
                const col = columnsData[i];
                ctx.font = `${col.fontSize}px monospace`;
                
                const green = Math.floor(180 + col.depth * 75);
                ctx.fillStyle = `rgba(0, ${green}, 0, ${col.opacity * 0.6})`;

                const streakLength = Math.floor(1 + col.depth * 1);
                
                for (let j = 0; j < streakLength; j++) {
                    const char = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    const charY = col.y - (j * col.fontSize * verticalSpacing);
                    
                    if (charY > -100 && charY < canvas.height) {
                        ctx.fillText(char, col.x, charY);
                    }
                }

                col.y += col.speed;

                if (col.y - (streakLength * col.fontSize * verticalSpacing) > canvas.height + 100) {
                    col.y = -100;
                }
            }
        }

        setInterval(draw, 40);

        window.addEventListener('resize', () => {
            resizeCanvas();
            initColumns();
        });

        // --- SPA Logic ---

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loginForm = document.getElementById('login-form');
        const displayUser = document.getElementById('display-user');
        const systemLog = document.getElementById('system-log');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            
            loginScreen.classList.remove('active');
            dashboardScreen.classList.add('active');
            
            displayUser.textContent = username.toUpperCase();
            
            startSystemLogs();
        });

        function logout() {
            dashboardScreen.classList.remove('active');
            loginScreen.classList.add('active');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            systemLog.innerHTML = `
                <div class="log-entry">System initialization complete...</div>
                <div class="log-entry">Connecting to main server...</div>
                <div class="log-entry">Encryption keys verified.</div>
                <div class="log-entry">Access granted.</div>
            `;
        }

        const logMessages = [
            "Scanning network...",
            "Firewall active.",
            "Packet trace complete.",
            "Uplink established.",
            "Data stream stable.",
            "Analyzing traffic...",
            "No anomalies detected.",
            "Memory flush complete.",
            "System check: OK",
            "Syncing time protocols...",
            "User auth refreshed.",
            "Loading pathways..."
        ];

        function addLog(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            systemLog.appendChild(entry);
            systemLog.scrollTop = systemLog.scrollHeight;
        }

        function startSystemLogs() {
            setInterval(() => {
                const randomMsg = logMessages[Math.floor(Math.random() * logMessages.length)];
                addLog(randomMsg);
            }, 2000);
        }
    </script>
</body>
</html>
