<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Matrix Rain Canvas ── */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* ── Scanline Overlay ── */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
        }

        /* ── Login Container ── */
        .login-container {
            position: relative;
            z-index: 2;
            width: 420px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #0f0;
            border-radius: 8px;
            box-shadow:
                0 0 15px rgba(0, 255, 0, 0.3),
                0 0 60px rgba(0, 255, 0, 0.1),
                inset 0 0 15px rgba(0, 255, 0, 0.05);
            animation: containerAppear 1s ease-out, borderPulse 3s ease-in-out infinite;
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        @keyframes borderPulse {
            0%, 100% {
                box-shadow:
                    0 0 15px rgba(0, 255, 0, 0.3),
                    0 0 60px rgba(0, 255, 0, 0.1),
                    inset 0 0 15px rgba(0, 255, 0, 0.05);
            }
            50% {
                box-shadow:
                    0 0 25px rgba(0, 255, 0, 0.5),
                    0 0 80px rgba(0, 255, 0, 0.2),
                    inset 0 0 25px rgba(0, 255, 0, 0.1);
            }
        }

        /* ── Glitch Title ── */
        .login-title {
            text-align: center;
            color: #0f0;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            position: relative;
            animation: titleFlicker 4s infinite;
        }

        .login-title::before,
        .login-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .login-title::before {
            color: #f00;
            animation: glitchLeft 2s infinite;
            clip-path: inset(0 0 60% 0);
        }

        .login-title::after {
            color: #00f;
            animation: glitchRight 2.5s infinite;
            clip-path: inset(40% 0 0 0);
        }

        @keyframes glitchLeft {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-3px, 1px); }
            94% { transform: translate(3px, -1px); }
            96% { transform: translate(-2px, 2px); }
            98% { transform: translate(2px, -2px); }
        }

        @keyframes glitchRight {
            0%, 85%, 100% { transform: translate(0); }
            87% { transform: translate(3px, -1px); }
            89% { transform: translate(-3px, 1px); }
            91% { transform: translate(2px, 2px); }
            93% { transform: translate(-2px, -2px); }
        }

        @keyframes titleFlicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            96% { opacity: 0.6; }
            97% { opacity: 1; }
        }

        .subtitle {
            text-align: center;
            color: rgba(0, 255, 0, 0.5);
            font-size: 12px;
            margin-bottom: 30px;
            letter-spacing: 3px;
            animation: subtitleType 2s steps(30) 0.5s both;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #0f0;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes subtitleType {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* ── Input Groups ── */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #0f0;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: labelFadeIn 0.5s ease-out;
        }

        .input-group:nth-child(1) label { animation-delay: s; }
        .input-group:nth-child(2) label { animation-delay: 1.2s; }

        @keyframes labelFadeIn {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 4px;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            animation: inputAppear 0.5s ease-out both;
        }

        .input-group:nth-child(1) input { animation-delay: 1.1s; }
        .input-group:nth-child(2) input { animation-delay: 1.3s; }

        @keyframes inputAppear {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

 .input-group input::placeholder {
            color: rgba(0, 255, 0, 0.25);
        }

        .input-group input:focus {
            border-color: #0f0;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2), inset 0 0 10px rgba(0, 255, 0, 0.05);
        }

        /* ── Decorative Corner Brackets ── */
        .input-group::before,
        .input-group::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: #0f0;
            border-style: solid;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .input-group::before {
            top: 30px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .input-group::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .input-group:focus-within::before,
        .input-group:focus-within::after {
            opacity: 1;
        }

        /* ── Login Button ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #0f0;
            border-radius: 4px;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: btnAppear 0.5s ease-out 1.5s both;
        }

        @keyframes btnAppear {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 255, 0, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .login-btn:hover {
            background: rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            text-shadow: 0 0 8px #0f0;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* ── Extra Links ── */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            animation: linksAppear 0.5s ease-out 1.7s both;
        }

        @keyframes linksAppear {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .extra-links a {
            color: rgba(0, 255, 0, 0.5);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
        }

        .extra-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #0f0;
            transition: width 0.3s;
        }

        .extra-links a:hover {
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        .extra-links a:hover::after {
            width: 100%;
        }

        /* ── Terminal Cursor ── */
        .terminal-line {
            margin-top: 25px;
            color: rgba(0, 255, 0, 0.4);
            font-size: 11px;
            text-align: center;
            animation: terminalBlink 1s step-end infinite;
        }

        @keyframes terminalBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── Floating Particles ── */
        .particle {
            position: fixed;
            color: #0f0;
            font-size: 14px;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) rotate(360deg);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 25px;
            }

            .login-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <!-- Matrix Rain Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Scanline Overlay -->
    <div class="scanlines"></div>

    <!-- Floating Particles Container -->
    <div id="particles"></div>

    <!-- Login Form -->
    <div class="login-container">
        <h1 class="login-title" data-text="SYSTEM LOGIN">SYSTEM LOGIN</h1>
        <p class="subtitle">> ACCESS THE MAINFRAME_</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">// USERNAME</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your alias..."
                    autocomplete="off"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">// PASSWORD</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••••"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                [ INITIALIZE CONNECTION ]
            </button>
        </form>

        <div class="extra-links">
            <a href="#">> Forgot credentials?</a>
            <a href="#">> Request access</a>
        </div>

        <div class="terminal-line">AWAITING INPUT █</div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        //  MATRIX RAIN ANIMATION
        // ═══════════════════════════════════════════
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const matrixChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*(){}[]|;:<>?/~';
        const charArray = matrixChars.split('');

        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);

        // Each column gets a random starting y position and speed
        const drops = [];
        const speeds = [];
        const brightness = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
            speeds[i] = Math.random() * 0.5 + 0.5;
            brightness[i] = Math.random();
        }

        function drawMatrix() {
            // Semi-transparent black to create fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Brightness variation
                const green = Math.floor(150 + brightness[i] * 105);
                const alpha = 0.6 + brightness[i] * 0.4;

                // Head character (brighter / white-green)
                if (Math.random() >0.95 {
                    ctx.fillStyle = `rgba(180, 255, 180, ${alpha})`;
                    ctx.font = `bold ${fontSize}px monospace`;
                } else {
                    ctx.fillStyle = `rgba(0, ${green}, 0, ${alpha})`;
                    ctx.font = `${fontSize}px monospace`;
                }

                ctx.fillText(char, x, y);

                // Reset drop when it goes off screen
                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                    speeds[i] = Math.random() * 0.5 + 0.5;
                    brightness[i] = Math.random();
                }

                drops[i] += speeds[i];
            }
        }

        setInterval(drawMatrix, 40);

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const newColumns = Math.floor(canvas.width / fontSize);
            for (let i = columns; i < newColumns; i++) {
                drops[i] = Math.random() * -100;
                speeds[i] = Math.random() * 0.5 + 0.5;
                brightness[i] = Math.random();
            }
        });

        // ═══════════════════════════════════════════
        //  FLOATING PARTICLES
        // ═══════════════════════════════════════════
        function createParticles() {
            const container = document.getElementById('particles');
            const chars = '01アイウエオカキクケコ';

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('span');
                particle.classList.add('particle');
                particle.textContent = chars[Math.floor(Math.random() * chars.length)];
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.fontSize = (Math.random() * 12 + 10) + 'px';
                container.appendChild(particle);
            }
        }

        createParticles();

        // ═══════════════════════════════════════════
        //  LOGIN HANDLER
        // ═══════════════════════════════════════════
        function handleLogin(e) {
            e.preventDefault();

            const btn = document.querySelector('.login-btn');
            const username = document.getElementById('username').value;

            btn.textContent = '[ CONNECTING... ]';
            btn.style.pointerEvents = 'none';

            // Simulate connection
            setTimeout(() => {
                btn.textContent = `[ WELCOME, ${username.toUpperCase()} ]`;
                btn.style.background = 'rgba(0, 255, 0, 0.2)';
                btn.style.boxShadow = '0 0 30px rgba(0, 255, 0, 0.5)';

                // Flash effect
                document.body.style.transition = 'background 0.1s';
                document.body.style.background = '#0a2a0a';
                setTimeout(() => {
                    document.body.style.background = '#000';
                }, 150);

                setTimeout(() => {
                    alert(`Access Granted.\n\nWelcome to the Matrix, ${username}.`);
                    btn.textContent = '[ INITIALIZE CONNECTION ]';
                    btn.style.background = 'transparent';
                    btn.style.boxShadow = 'none';
                    btn.style.pointerEvents = 'auto';
                    document.getElementById('loginForm').reset();
                }, 1000);
            }, 1500);
        }

        // ═══════════════════════════════════════════
        //  TYPING SOUND EFFECT (Visual)
        // ═══════════════════════════════════════
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', () => {
                input.style.textShadow = '0 0 8px #0f0';
                setTimeout(() => {
                    input.style.textShadow = 'none';
                }, 100);
            });
        });
    </script>
</body>
</html>
