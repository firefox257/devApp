<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Scroller - Single ContentEditable</title>
    <style>
        :root {
            --line-height: 20px;
            --font-family: 'Courier New', Courier, monospace;
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #121212;
            font-family: sans-serif;
            color: white;
        }

        .editor-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            border: 1px solid #444;
            background-color: var(--bg-color);
            overflow: auto;
            border-radius: 4px;
        }

        .editor-content {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: var(--line-height);
            color: var(--text-color);
            white-space: pre;
            word-wrap: normal;
            overflow-wrap: normal;
            outline: none;
            cursor: text;
            min-height: 100%;
        }

        .line {
            display: block;
            min-height: var(--line-height);
            height: var(--line-height);
        }

        .spacer {
            pointer-events: none;
        }

        .stats {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }

        ::selection {
            background: #264f78;
            color: white;
        }
    </style>
</head>
<body>

    <h3>Virtual Scroller - Single ContentEditable Div (1M Lines)</h3>
    <div class="stats" id="stats">Lines: 0 | Rendered: 0 | Cursor: 0:0</div>

    <div class="editor-wrapper" id="editorWrapper">
        <div class="editor-content" id="editorContent" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const TOTAL_LINES = 1000000;
        const LINE_HEIGHT = 20;
        const BUFFER_LINES = 10;

        const editorWrapper = document.getElementById('editorWrapper');
        const editorContent = document.getElementById('editorContent');
        const statsEl = document.getElementById('stats');

        let linesArray = [];
        let cursorLine = 0;
        let cursorCol = 0;
        let isComposing = false;
        let isUpdating = false;

        function initializeText() {
            console.time("Initialize Text");
            linesArray = new Array(TOTAL_LINES).fill(0).map((_, i) => 
                `Line ${i + 1}: This is sample text for line number ${i + 1}.`
            );
            console.timeEnd("Initialize Text");
            
            editorContent.style.height = `${TOTAL_LINES * LINE_HEIGHT}px`;
            renderVisibleLines();
            updateStats();
            
            setTimeout(() => {
                editorContent.focus();
                setCursor(0, 0);
            }, 100);
        }

        function getVisibleRange() {
            const scrollTop = editorWrapper.scrollTop;
            const viewportHeight = editorWrapper.clientHeight;
            
            const startLine = Math.floor(scrollTop / LINE_HEIGHT);
            const visibleCount = Math.ceil(viewportHeight / LINE_HEIGHT);
            
            return {
                start: Math.max(0, startLine - BUFFER_LINES),
                end: Math.min(linesArray.length, startLine + visibleCount + BUFFER_LINES),
                scrollTop
            };
        }

        function saveCursor() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return { line: cursorLine, col: cursorCol };
            
            const range = selection.getRangeAt(0);
            let node = range.startContainer;
            
            while (node && node !== editorContent) {
                if (node.classList && node.classList.contains('line')) {
                    const lineIndex = parseInt(node.dataset.lineIndex);
                    if (!isNaN(lineIndex)) {
                        return { line: lineIndex, col: range.startOffset };
                    }
                }
                node = node.parentNode;
            }
            
            return { line: cursorLine, col: cursorCol };
        }

        function restoreCursor(savedPos) {
            if (!savedPos) return;
            
            const range = getVisibleRange();
            
            if (savedPos.line >= range.start && savedPos.line < range.end) {
                const relativeIndex = savedPos.line - range.start;
                const lineElement = editorContent.children[relativeIndex + 1];
                
                if (lineElement && lineElement.classList.contains('line')) {
                    const textNode = lineElement.firstChild;
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        const validCol = Math.min(savedPos.col, textNode.textContent.length);
                        const newRange = document.createRange();
                        newRange.setStart(textNode, validCol);
                        newRange.collapse(true);
                        
                        const selection = window.getSelection();
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        
                        cursorLine = savedPos.line;
                        cursorCol = validCol;
                        return true;
                    }
                }
            }
            
            cursorLine = savedPos.line;
            cursorCol = savedPos.col;
            return false;
        }

        function setCursor(line, col) {
            const range = getVisibleRange();
            
            if (line >= range.start && line < range.end) {
                const relativeIndex = line - range.start;
                const lineElement = editorContent.children[relativeIndex + 1];
                
                if (lineElement && lineElement.classList.contains('line')) {
                    const textNode = lineElement.firstChild;
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        const validCol = Math.min(col, textNode.textContent.length);
                        const newRange = document.createRange();
                        newRange.setStart(textNode, validCol);
                        newRange.collapse(true);
                        
                        const selection = window.getSelection();
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        
                        cursorLine = line;
                        cursorCol = validCol;
                        return true;
                    }
                }
            }
            
            cursorLine = line;
            cursorCol = col;
            return false;
        }

        // KEY FIX: Accept optional cursor position parameter
        function renderVisibleLines(forceCursorPos = null) {
            if (isUpdating) return;
            isUpdating = true;
            
            // Only save cursor if we're not being given a new position
            const savedCursor = forceCursorPos ? null : saveCursor();
            
            const range = getVisibleRange();
            const fragment = document.createDocumentFragment();
            
            // Top spacer
            const topSpacer = document.createElement('div');
            topSpacer.className = 'spacer';
            topSpacer.style.height = `${range.start * LINE_HEIGHT}px`;
            fragment.appendChild(topSpacer);
            
            // Visible lines
            for (let i = range.start; i < range.end; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                lineDiv.dataset.lineIndex = i;
                
                const textNode = document.createTextNode(linesArray[i] || '');
                lineDiv.appendChild(textNode);
                
                if (!linesArray[i]) lineDiv.classList.add('empty');
                fragment.appendChild(lineDiv);
            }
            
            // Bottom spacer
            const bottomLines = linesArray.length - range.end;
            if (bottomLines > 0) {
                const bottomSpacer = document.createElement('div');
                bottomSpacer.className = 'spacer';
                bottomSpacer.style.height = `${bottomLines * LINE_HEIGHT}px`;
                fragment.appendChild(bottomSpacer);
            }
            
            // Replace content
            editorContent.innerHTML = '';
            editorContent.appendChild(fragment);
            
            // Restore cursor - use forceCursorPos if provided, otherwise use saved
            if (forceCursorPos) {
                setCursor(forceCursorPos.line, forceCursorPos.col);
            } else if (savedCursor) {
                restoreCursor(savedCursor);
            }
            
            updateStats();
            isUpdating = false;
        }

        function updateStats() {
            const range = getVisibleRange();
            statsEl.textContent = `Lines: ${linesArray.length.toLocaleString()} | Rendered: ${range.end - range.start} | Cursor: ${cursorLine}:${cursorCol}`;
        }

        function syncVisibleLinesToArray() {
            const lineElements = editorContent.querySelectorAll('.line[data-line-index]');
            
            lineElements.forEach(lineEl => {
                const lineIndex = parseInt(lineEl.dataset.lineIndex);
                if (!isNaN(lineIndex) && lineIndex < linesArray.length) {
                    const textNode = lineEl.firstChild;
                    if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                        linesArray[lineIndex] = textNode.textContent;
                    }
                }
            });
        }

        // Handle input events - don't re-render on every keystroke
        editorContent.addEventListener('input', (e) => {
            if (isComposing || isUpdating) return;
            
            // Just sync the array, don't re-render DOM
            syncVisibleLinesToArray();
            
            // Update cursor position from current selection
            const selection = window.getSelection();
            if (selection.rangeCount) {
                const range = selection.getRangeAt(0);
                let node = range.startContainer;
                while (node && node !== editorContent) {
                    if (node.classList && node.classList.contains('line')) {
                        const lineIndex = parseInt(node.dataset.lineIndex);
                        if (!isNaN(lineIndex)) {
                            cursorLine = lineIndex;
                            cursorCol = range.startOffset;
                            break;
                        }
                    }
                    node = node.parentNode;
                }
            }
            
            updateStats();
        });

        // Handle Enter key
        editorContent.addEventListener('keydown', (e) => {
            if (isComposing || isUpdating) return;
            
            if (e.key === 'Enter') {
                e.preventDefault();
                
                // Get current cursor position BEFORE changes
                const currentCursor = saveCursor();
                syncVisibleLinesToArray();
                
                const currentLineText = linesArray[currentCursor.line] || '';
                const before = currentLineText.slice(0, currentCursor.col);
                const after = currentLineText.slice(currentCursor.col);
                
                linesArray[currentCursor.line] = before;
                linesArray.splice(currentCursor.line + 1, 0, after);
                
                // NEW cursor position: next line, column 0
                const newCursorLine = currentCursor.line + 1;
                const newCursorCol = 0;
                
                cursorLine = newCursorLine;
                cursorCol = newCursorCol;
                
                editorContent.style.height = `${linesArray.length * LINE_HEIGHT}px`;
                
                // KEY FIX: Pass new cursor position to renderVisibleLines
                renderVisibleLines({ line: newCursorLine, col: newCursorCol });
            }
            
            if (e.key === 'Backspace') {
                if (cursorCol === 0 && cursorLine > 0) {
                    e.preventDefault();
                    
                    syncVisibleLinesToArray();
                    
                    const prevLineText = linesArray[cursorLine - 1] || '';
                    const currentLineText = linesArray[cursorLine] || '';
                    
                    linesArray[cursorLine - 1] = prevLineText + currentLineText;
                    linesArray.splice(cursorLine, 1);
                    
                    // NEW cursor position: previous line, end of merged text
                    const newCursorLine = cursorLine - 1;
                    const newCursorCol = prevLineText.length;
                    
                    cursorLine = newCursorLine;
                    cursorCol = newCursorCol;
                    
                    editorContent.style.height = `${linesArray.length * LINE_HEIGHT}px`;
                    
                    // KEY FIX: Pass new cursor position to renderVisibleLines
                    renderVisibleLines({ line: newCursorLine, col: newCursorCol });
                }
            }
        });

        // Handle composition (IME)
        editorContent.addEventListener('compositionstart', () => { isComposing = true; });
        editorContent.addEventListener('compositionend', () => { 
            isComposing = false;
            syncVisibleLinesToArray();
            renderVisibleLines();
        });

        // Update cursor on selection changes
        editorContent.addEventListener('keyup', () => {
            if (!isComposing && !isUpdating) {
                const savedCursor = saveCursor();
                cursorLine = savedCursor.line;
                cursorCol = savedCursor.col;
                updateStats();
            }
        });

        editorContent.addEventListener('mouseup', () => {
            if (!isComposing && !isUpdating) {
                const savedCursor = saveCursor();
                cursorLine = savedCursor.line;
                cursorCol = savedCursor.col;
                updateStats();
            }
        });

        editorContent.addEventListener('click', () => {
            if (!isComposing && !isUpdating) {
                const savedCursor = saveCursor();
                cursorLine = savedCursor.line;
                cursorCol = savedCursor.col;
                updateStats();
            }
        });

        // Handle scroll
        let scrollTicking = false;
        editorWrapper.addEventListener('scroll', () => {
            if (!scrollTicking) {
                requestAnimationFrame(() => {
                    renderVisibleLines();
                    scrollTicking = false;
                });
                scrollTicking = true;
            }
        });

        // Handle paste
        editorContent.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = e.clipboardData.getData('text/plain');
            const lines = text.split('\n');
            
            const currentCursor = saveCursor();
            syncVisibleLinesToArray();
            
            const currentLineText = linesArray[currentCursor.line] || '';
            const before = currentLineText.slice(0, currentCursor.col);
            const after = currentLineText.slice(currentCursor.col);
            
            const newLines = [];
            if (lines.length === 1) {
                newLines.push(before + lines[0] + after);
            } else {
                newLines.push(before + lines[0]);
                for (let i = 1; i < lines.length - 1; i++) {
                    newLines.push(lines[i]);
                }
                newLines.push(lines[lines.length - 1] + after);
            }
            
            linesArray.splice(currentCursor.line, 1, ...newLines);
            
            const newCursorLine = currentCursor.line + lines.length - 1;
            const newCursorCol = lines[lines.length - 1].length;
            
            cursorLine = newCursorLine;
            cursorCol = newCursorCol;
            
            editorContent.style.height = `${linesArray.length * LINE_HEIGHT}px`;
            renderVisibleLines({ line: newCursorLine, col: newCursorCol });
        });

        editorContent.addEventListener('focus', () => {
            if (!isUpdating) {
                setCursor(cursorLine, cursorCol);
            }
        });

        initializeText();
    </script>
</body>
</html>
