<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Editor - Fixed Merge Cursor</title>
    <style>
        :root {
            --line-height: 24px;
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --selection-bg: #264f78;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        #editor-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
        }

        #scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #444 #1e1e1e;
        }

        #scroll-spacer {
            width: 100%;
        }

        .line {
            position: absolute;
            left: 0;
            width: 100%;
            height: var(--line-height);
            line-height: var(--line-height);
            white-space: pre;
            padding-left: 10px;
            box-sizing: border-box;
            outline: none;
            overflow: hidden;
            background-color: var(--bg-color);
            cursor: text;
        }

        .line:focus {
            background-color: #2a2d2e;
        }

        .line.selected {
            background-color: var(--selection-bg);
        }

        .line.partial-select {
            background-color: var(--bg-color);
        }

        #scroll-container::-webkit-scrollbar {
            width: 10px;
        }
        #scroll-container::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        #scroll-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }

        #stats {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #888;
            z-index: 100;
            pointer-events: none;
        }

        #clipboard-helper {
            position: absolute;
            opacity: 0;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="editor-container">
    <div id="scroll-container">
        <div id="scroll-spacer"></div>
    </div>
    <textarea id="clipboard-helper"></textarea>
    <div id="stats">Lines: 0 | Selected: 0</div>
</div>

<script>
    class VirtualEditor {
        constructor(containerId, totalLines) {
            this.container = document.getElementById(containerId);
            this.scrollContainer = this.container.querySelector('#scroll-container');
            this.scrollSpacer = this.container.querySelector('#scroll-spacer');
            this.clipboardHelper = this.container.querySelector('#clipboard-helper');
            this.stats = document.getElementById('stats');

            this.LINE_HEIGHT = 24;
            this.BUFFER_SIZE = 5;
            this.totalLines = totalLines;
            
            this.linesData = new Array(totalLines).fill(0).map((_, i) => `Line ${i + 1}: press`);
            
            this.renderedLines = new Map();
            this.containerHeight = 0;
            this.lastScrollTop = -1;
            this.isInserting = false;
            
            this.selection = {
                active: false,
                startLine: null,
                startOffset: 0,
                endLine: null,
                endOffset: 0,
                selectedText: ''
            };
            
            this.pendingFocus = null;
            this.focusRetryCount = 0;
            this.maxFocusRetries = 10;
            
            this.isDragging = false;
            this.anchorLine = null;
            this.anchorOffset = 0;

            this.init();
        }

        init() {
            this.updateDimensions();
            this.updateScrollHeight();

            this.scrollContainer.addEventListener('scroll', () => this.onScroll(), { passive: true });
            
            let scrollTimeout;
            this.scrollContainer.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => this.snapToLine(), 150);
            }, { passive: true });

            this.container.addEventListener('mousedown', (e) => this.onMouseDown(e));
            document.addEventListener('mousemove', (e) => this.onMouseMove(e));
            document.addEventListener('mouseup', (e) => this.onMouseUp(e));
            
            this.container.addEventListener('keydown', (e) => this.onKeyDown(e));
            
            this.container.addEventListener('copy', (e) => this.onCopy(e));
            this.container.addEventListener('cut', (e) => this.onCut(e));
            this.container.addEventListener('paste', (e) => this.onPaste(e));

            window.addEventListener('resize', () => this.updateDimensions());
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => this.updateDimensions());
            }

            this.onScroll();
        }

        updateDimensions() {
            this.containerHeight = this.scrollContainer.clientHeight;
            this.onScroll();
        }

        updateScrollHeight() {
            const totalHeight = this.totalLines * this.LINE_HEIGHT;
            this.scrollSpacer.style.height = `${totalHeight}px`;
        }

        onScroll() {
            if (this.isInserting) return;

            const scrollTop = this.scrollContainer.scrollTop;

            if (Math.abs(scrollTop - this.lastScrollTop) < this.LINE_HEIGHT / 2) {
                return;
            }
            this.lastScrollTop = scrollTop;

            const startIndex = Math.floor(scrollTop / this.LINE_HEIGHT);
            const endIndex = Math.ceil((scrollTop + this.containerHeight) / this.LINE_HEIGHT);

            const renderStart = Math.max(0, startIndex - this.BUFFER_SIZE);
            const renderEnd = Math.min(this.totalLines, endIndex + this.BUFFER_SIZE);

            this.renderVisibleLines(renderStart, renderEnd);
        }

        snapToLine() {
            // Don't snap during edits or when restoring focus
            if (this.isInserting || this.pendingFocus) return;
            
            const scrollTop = this.scrollContainer.scrollTop;
            const nearestLine = Math.round(scrollTop / this.LINE_HEIGHT);
            const snapTop = nearestLine * this.LINE_HEIGHT;

            if (Math.abs(scrollTop - snapTop) > 2) {
                this.scrollContainer.scrollTop = snapTop;
            }
        }

        getLineFromTarget(target) {
            let el = target;
            while (el && !el.classList.contains('line')) {
                el = el.parentElement;
            }
            return el;
        }

        getOffsetInLine(lineEl, clientX) {
            const rect = lineEl.getBoundingClientRect();
            const x = clientX - rect.left - 10;
            const text = lineEl.textContent;
            const charWidth = 8.4;
            let offset = Math.floor(x / charWidth);
            offset = Math.max(0, Math.min(offset, text.length));
            return offset;
        }

        onMouseDown(e) {
            if (e.button !== 0) return;
            
            const lineEl = this.getLineFromTarget(e.target);
            if (!lineEl) return;
            
            e.preventDefault();
            
            const lineIndex = parseInt(lineEl.dataset.lineIndex);
            const offset = this.getOffsetInLine(lineEl, e.clientX);
            
            this.anchorLine = lineIndex;
            this.anchorOffset = offset;
            this.isDragging = true;
            
            this.updateSelection(lineIndex, offset);
            lineEl.focus();
        }

        onMouseMove(e) {
            if (!this.isDragging) return;
            
            const lineEl = this.getLineFromTarget(e.target);
            if (!lineEl) return;
            
            const lineIndex = parseInt(lineEl.dataset.lineIndex);
            const offset = this.getOffsetInLine(lineEl, e.clientX);
            
            this.updateSelection(lineIndex, offset);
        }

        onMouseUp(e) {
            this.isDragging = false;
        }

        updateSelection(endLine, endOffset) {
            const startLine = this.anchorLine;
            const startOffset = this.anchorOffset;
            
            let actualStartLine, actualStartOffset, actualEndLine, actualEndOffset;
            
            if (startLine < endLine || (startLine === endLine && startOffset <= endOffset)) {
                actualStartLine = startLine;
                actualStartOffset = startOffset;
                actualEndLine = endLine;
                actualEndOffset = endOffset;
            } else {
                actualStartLine = endLine;
                actualStartOffset = endOffset;
                actualEndLine = startLine;
                actualEndOffset = startOffset;
            }
            
            this.selection = {
                active: true,
                startLine: actualStartLine,
                startOffset: actualStartOffset,
                endLine: actualEndLine,
                endOffset: actualEndOffset,
                selectedText: this.getSelectedText()
            };
            
            this.updateSelectionVisuals();
            this.updateStats();
        }

        getSelectedText() {
            if (!this.selection.active) return '';
            
            const { startLine, startOffset, endLine, endOffset } = this.selection;
            
            if (startLine === endLine) {
                return this.linesData[startLine].substring(startOffset, endOffset);
            }
            
            let text = '';
            for (let i = startLine; i <= endLine; i++) {
                const line = this.linesData[i];
                if (i === startLine) {
                    text += line.substring(startOffset);
                } else if (i === endLine) {
                    text += '\n' + line.substring(0, endOffset);
                } else {
                    text += '\n' + line;
                }
            }
            
            return text;
        }

        updateSelectionVisuals() {
            this.renderedLines.forEach((lineEl, index) => {
                const { startLine, endLine, startOffset, endOffset } = this.selection;
                
                lineEl.classList.remove('selected', 'partial-select');
                
                if (index < startLine || index > endLine) {
                    return;
                }
                
                if (index === startLine && index === endLine) {
                    if (startOffset === 0 && endOffset >= this.linesData[index].length) {
                        lineEl.classList.add('selected');
                    } else {
                        lineEl.classList.add('partial-select');
                    }
                } else if (index === startLine) {
                    if (startOffset === 0) {
                        lineEl.classList.add('selected');
                    } else {
                        lineEl.classList.add('partial-select');
                    }
                } else if (index === endLine) {
                    if (endOffset >= this.linesData[index].length) {
                        lineEl.classList.add('selected');
                    } else {
                        lineEl.classList.add('partial-select');
                    }
                } else {
                    lineEl.classList.add('selected');
                }
            });
        }

        clearSelection() {
            this.selection = {
                active: false,
                startLine: null,
                startOffset: 0,
                endLine: null,
                endOffset: 0,
                selectedText: ''
            };
            this.anchorLine = null;
            this.anchorOffset = 0;
            this.updateSelectionVisuals();
            this.updateStats();
        }

        onCopy(e) {
            if (!this.selection.active) return;
            
            e.preventDefault();
            e.stopPropagation();
            
            const text = this.getSelectedText();
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).catch(() => {
                    this.fallbackCopy(text);
                });
            } else {
                this.fallbackCopy(text);
            }
        }

        onCut(e) {
            if (!this.selection.active) return;
            
            e.preventDefault();
            e.stopPropagation();
            
            const text = this.getSelectedText();
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    this.deleteSelection();
                }).catch(() => {
                    this.fallbackCopy(text);
                    this.deleteSelection();
                });
            } else {
                this.fallbackCopy(text);
                this.deleteSelection();
            }
        }

        fallbackCopy(text) {
            this.clipboardHelper.value = text;
            this.clipboardHelper.select();
            document.execCommand('copy');
            this.clipboardHelper.value = '';
        }

        onPaste(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const clipboardData = e.clipboardData || window.clipboardData;
            const pastedText = clipboardData.getData('text');
            
            this.insertTextAtSelection(pastedText);
        }

        deleteSelection() {
            if (!this.selection.active) return;
            
            const { startLine, startOffset, endLine, endOffset } = this.selection;
            
            if (startLine === endLine) {
                const line = this.linesData[startLine];
                this.linesData[startLine] = line.substring(0, startOffset) + line.substring(endOffset);
            } else {
                const firstPart = this.linesData[startLine].substring(0, startOffset);
                const lastPart = this.linesData[endLine].substring(endOffset);
                
                const linesToRemove = endLine - startLine + 1;
                this.linesData.splice(startLine, linesToRemove, firstPart + lastPart);
                this.totalLines -= (linesToRemove - 1);
            }
            
            this.updateScrollHeight();
            this.clearSelection();
            this.onScroll();
            
            setTimeout(() => {
                const lineEl = this.renderedLines.get(startLine);
                if (lineEl) {
                    lineEl.focus();
                    this.setCursorPosition(lineEl, startOffset);
                }
            }, 10);
        }

        insertTextAtSelection(text) {
            if (!this.selection.active) {
                const focusedLine = document.activeElement;
                if (focusedLine && focusedLine.classList.contains('line')) {
                    const lineIndex = parseInt(focusedLine.dataset.lineIndex);
                    const cursorPos = this.getCursorPosition(focusedLine);
                    this.insertTextAtLine(lineIndex, cursorPos, text);
                }
                return;
            }
            
            this.deleteSelection();
            const { startLine, startOffset } = this.selection;
            this.insertTextAtLine(startLine, startOffset, text);
        }

        insertTextAtLine(lineIndex, offset, text) {
            if (text.includes('\n')) {
                const lines = text.split('\n');
                const currentLine = this.linesData[lineIndex];
                const before = currentLine.substring(0, offset);
                const after = currentLine.substring(offset);
                
                const newLines = [];
                newLines.push(before + lines[0]);
                for (let i = 1; i < lines.length - 1; i++) {
                    newLines.push(lines[i]);
                }
                newLines.push(lines[lines.length - 1] + after);
                
                this.linesData.splice(lineIndex, 1, ...newLines);
                this.totalLines += (newLines.length - 1);
            } else {
                const line = this.linesData[lineIndex];
                this.linesData[lineIndex] = line.substring(0, offset) + text + line.substring(offset);
            }
            
            this.updateScrollHeight();
            this.onScroll();
            
            setTimeout(() => {
                const lineEl = this.renderedLines.get(lineIndex);
                if (lineEl) {
                    lineEl.focus();
                    const newPos = offset + text.length;
                    this.setCursorPosition(lineEl, newPos);
                }
            }, 10);
        }

        onKeyDown(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                e.preventDefault();
                this.selectAll();
                return;
            }
            
            if (e.key === 'Escape') {
                e.preventDefault();
                this.clearSelection();
                return;
            }
            
            if (e.key === 'Enter' && (!this.selection.active || this.selection.startLine === this.selection.endLine)) {
                e.preventDefault();
                const focusedLine = document.activeElement;
                if (focusedLine && focusedLine.classList.contains('line')) {
                    const lineIndex = parseInt(focusedLine.dataset.lineIndex);
                    const cursorPos = this.getCursorPosition(focusedLine);
                    this.insertLine(lineIndex, cursorPos);
                }
                return;
            }
            
            if ((e.key === 'Delete' || e.key === 'Backspace') && this.selection.active) {
                e.preventDefault();
                this.deleteSelection();
                return;
            }
            
            // Backspace at start of line - merge with previous line
            if (e.key === 'Backspace' && !this.selection.active) {
                const focusedLine = document.activeElement;
                if (focusedLine && focusedLine.classList.contains('line')) {
                    const lineIndex = parseInt(focusedLine.dataset.lineIndex);
                    const cursorPos = this.getCursorPosition(focusedLine);
                    
                    if (cursorPos === 0 && lineIndex > 0) {
                        e.preventDefault();
                        this.mergeLineWithPrevious(lineIndex);
                        return;
                    }
                }
            }
            
            // Delete at end of line - merge with next line
            if (e.key === 'Delete' && !this.selection.active) {
                const focusedLine = document.activeElement;
                if (focusedLine && focusedLine.classList.contains('line')) {
                    const lineIndex = parseInt(focusedLine.dataset.lineIndex);
                    const cursorPos = this.getCursorPosition(focusedLine);
                    const lineLength = this.linesData[lineIndex].length;
                    
                    if (cursorPos === lineLength && lineIndex < this.totalLines - 1) {
                        e.preventDefault();
                        this.mergeLineWithNext(lineIndex);
                        return;
                    }
                }
            }
        }

        mergeLineWithPrevious(lineIndex) {
            this.isInserting = true;
            
            const previousLineContent = this.linesData[lineIndex - 1];
            const currentLineContent = this.linesData[lineIndex];
            
            // Calculate where cursor should be after merge
            const cursorPosition = previousLineContent.length;
            
            // Merge the lines in data model
            const mergedLine = previousLineContent + currentLineContent;
            
            // Remove current line, update previous line
            this.linesData.splice(lineIndex, 1);
            this.linesData[lineIndex - 1] = mergedLine;
            this.totalLines--;
            
            // Update scroll height
            this.updateScrollHeight();
            
            // Adjust scroll position (content moved up one line)
            const scrollBefore = this.scrollContainer.scrollTop;
            this.scrollContainer.scrollTop = scrollBefore - this.LINE_HEIGHT;
            
            // Clear rendered cache for affected lines (from previous line onwards)
            for (let i = lineIndex - 1; i < this.totalLines; i++) {
                const el = this.renderedLines.get(i);
                if (el && el.parentNode) {
                    el.parentNode.removeChild(el);
                }
                this.renderedLines.delete(i);
            }
            
            // Set pending focus BEFORE resetting isInserting
            this.pendingFocus = {
                lineIndex: lineIndex - 1,
                cursorPosition: cursorPosition
            };
            
            this.isInserting = false;
            
            // Force re-render
            this.onScroll();
            
            // Focus after DOM is fully updated - single rAF is enough with resilient applyPendingFocus
            requestAnimationFrame(() => this.applyPendingFocus());
        }

        mergeLineWithNext(lineIndex) {
            this.isInserting = true;
            
            const currentLineContent = this.linesData[lineIndex];
            const nextLineContent = this.linesData[lineIndex + 1];
            
            // Calculate where cursor should be after merge
            const cursorPosition = currentLineContent.length;
            
            // Merge the lines in data model
            const mergedLine = currentLineContent + nextLineContent;
            
            // Remove next line, update current line
            this.linesData.splice(lineIndex + 1, 1);
            this.linesData[lineIndex] = mergedLine;
            this.totalLines--;
            
            // Update scroll height
            this.updateScrollHeight();
            
            // Clear rendered cache for affected lines
            for (let i = lineIndex; i < this.totalLines; i++) {
                const el = this.renderedLines.get(i);
                if (el && el.parentNode) {
                    el.parentNode.removeChild(el);
                }
                this.renderedLines.delete(i);
            }
            
            // Set pending focus BEFORE resetting isInserting
            this.pendingFocus = {
                lineIndex: lineIndex,
                cursorPosition: cursorPosition
            };
            
            this.isInserting = false;
            
            // Force re-render
            this.onScroll();
            
            // Focus after DOM is fully updated
            requestAnimationFrame(() => this.applyPendingFocus());
        }

        selectAll() {
            this.selection = {
                active: true,
                startLine: 0,
                startOffset: 0,
                endLine: this.totalLines - 1,
                endOffset: this.linesData[this.totalLines - 1].length,
                selectedText: this.getSelectedText()
            };
            this.anchorLine = 0;
            this.anchorOffset = 0;
            this.updateSelectionVisuals();
            this.updateStats();
            
            this.scrollContainer.scrollTop = 0;
            this.onScroll();
        }

        getCursorPosition(element) {
            const sel = window.getSelection();
            if (sel.rangeCount === 0) return 0;
            
            const range = sel.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(element);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            return preCaretRange.toString().length;
        }

        insertLine(lineIndex, cursorPosition) {
            const scrollBeforeInsert = this.scrollContainer.scrollTop;
            this.isInserting = true;

            const currentLine = this.linesData[lineIndex];
            const beforeCursor = currentLine.substring(0, cursorPosition);
            const afterCursor = currentLine.substring(cursorPosition);
            
            this.linesData[lineIndex] = beforeCursor;
            this.linesData.splice(lineIndex + 1, 0, afterCursor);
            this.totalLines++;
            
            this.updateScrollHeight();
            
            const currentLineEl = this.renderedLines.get(lineIndex);
            if (currentLineEl) {
                currentLineEl.textContent = beforeCursor;
            }
            
            const viewportStartLine = Math.floor(scrollBeforeInsert / this.LINE_HEIGHT);
            if (lineIndex >= viewportStartLine) {
                this.scrollContainer.scrollTop = scrollBeforeInsert + this.LINE_HEIGHT;
            } else {
                this.scrollContainer.scrollTop = scrollBeforeInsert;
            }
            
            this.pendingFocus = {
                lineIndex: lineIndex + 1,
                cursorPosition: 0,
                afterCursorText: afterCursor
            };
            
            this.isInserting = false;
            this.onScroll();
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    this.applyPendingFocus();
                });
            });
        }

        applyPendingFocus() {
            if (!this.pendingFocus) return;
            
            const { lineIndex, cursorPosition } = this.pendingFocus;
            const lineEl = this.renderedLines.get(lineIndex);
            
            // Check if element exists AND is connected to DOM
            if (lineEl?.isConnected) {
                // Sync content if needed (prevents race with renderVisibleLines)
                if (lineEl.textContent !== this.linesData[lineIndex]) {
                    lineEl.textContent = this.linesData[lineIndex];
                }
                
                lineEl.focus();
                this.setCursorPosition(lineEl, cursorPosition);
                
                // Verify focus succeeded
                if (document.activeElement === lineEl) {
                    this.pendingFocus = null;
                    this.focusRetryCount = 0;
                } else {
                    this._retryFocus();
                }
            } else {
                // Element not rendered yet - retry
                this._retryFocus();
            }
        }

        _retryFocus() {
            this.focusRetryCount++;
            if (this.focusRetryCount < this.maxFocusRetries) {
                requestAnimationFrame(() => this.applyPendingFocus());
            } else {
                console.warn('Failed to restore cursor after merge');
                this.pendingFocus = null;
                this.focusRetryCount = 0;
            }
        }

        setCursorPosition(element, position) {
            const sel = window.getSelection();
            const range = document.createRange();
            
            // Ensure stable text node
            if (!element.firstChild || element.firstChild.nodeType !== Node.TEXT_NODE) {
                element.textContent = element.textContent || '';
            }
            
            const textNode = element.firstChild;
            if (textNode?.nodeType === Node.TEXT_NODE) {
                const safePos = Math.min(position, textNode.length);
                try {
                    range.setStart(textNode, safePos);
                    range.setEnd(textNode, safePos);
                    sel.removeAllRanges();
                    sel.addRange(range);
                } catch (e) {
                    // Fallback: collapse cursor to end
                    element.focus();
                    range.selectNodeContents(element);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            } else {
                range.selectNodeContents(element);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        updateStats() {
            const selectedLines = this.selection.active 
                ? this.selection.endLine - this.selection.startLine + 1 
                : 0;
            this.stats.textContent = `Total: ${this.totalLines.toLocaleString()} | Selected: ${selectedLines} lines`;
        }

        renderVisibleLines(start, end) {
            const fragment = document.createDocumentFragment();
            const linesToRemove = new Set(this.renderedLines.keys());

            for (let i = start; i < end; i++) {
                linesToRemove.delete(i);

                if (!this.renderedLines.has(i)) {
                    const lineEl = document.createElement('div');
                    lineEl.className = 'line';
                    lineEl.contentEditable = true;
                    lineEl.textContent = this.linesData[i];
                    lineEl.style.top = `${i * this.LINE_HEIGHT}px`;
                    lineEl.dataset.lineIndex = i;
                    
                    lineEl.addEventListener('input', (e) => {
                        if (!this.isInserting) {
                            this.linesData[i] = e.target.textContent;
                        }
                    });

                    this.renderedLines.set(i, lineEl);
                    fragment.appendChild(lineEl);
                } else {
                    const el = this.renderedLines.get(i);
                    if (el && document.activeElement !== el && !this.isInserting) {
                        el.textContent = this.linesData[i];
                    }
                }
            }

            linesToRemove.forEach(index => {
                const el = this.renderedLines.get(index);
                if (el && el.parentNode) {
                    el.parentNode.removeChild(el);
                }
                this.renderedLines.delete(index);
            });

            if (fragment.children.length > 0) {
                this.scrollContainer.appendChild(fragment);
            }

            this.updateSelectionVisuals();
            
            // Try to apply pending focus after render
            if (this.pendingFocus) {
                this.applyPendingFocus();
            }

            this.stats.textContent = `Total: ${this.totalLines.toLocaleString()} | Rendered: ${this.renderedLines.size}`;
        }
    }

    console.time('Init');
    const editor = new VirtualEditor('editor-container', 1000000);
    console.timeEnd('Init');
</script>
