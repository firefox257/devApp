<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legend of Three.js - First Person Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    overflow: hidden; background: #1a2a3a; font-family: 'Segoe UI', sans-serif; 
    touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
  }
  /* FORCE CANVAS TO BE VISIBLE IMMEDIATELY */
  canvas { 
    display: block; position: fixed; top: 0; left: 0; 
    width: 100vw; height: 100vh; z-index: 0; 
  }

  #loading {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 200; color: #f0c040; font-size: 24px; font-weight: bold;
    flex-direction: column; transition: opacity 0.5s;
  }
  #loading .spinner {
    width: 40px; height: 40px; border: 4px solid #333; border-top-color: #f0c040;
    border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #blocker {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; flex-direction: column;
    transition: opacity 0.5s, visibility 0.5s;
    opacity: 1; visibility: visible;
  }
  #blocker.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #blocker h1 {
    color: #f0c040; font-size: 36px;
    text-shadow: 0 0 20px #f0c040, 0 0 40px #a07800;
    margin-bottom: 15px; letter-spacing: 4px; text-align: center;
  }
  #blocker p { color: #ccc; font-size: 16px; margin: 5px 0; text-align: center; }
  #blocker .start-btn {
    margin-top: 20px; padding: 15px 40px; font-size: 20px;
    background: linear-gradient(180deg, #4a9, #286); color: #fff;
    border: 2px solid #6ca; border-radius: 8px; cursor: pointer;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5); transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #blocker .start-btn:active { transform: scale(0.95); background: linear-gradient(180deg, #5ba, #397); }
  .controls-info { margin-top: 15px; padding: 12px 20px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); text-align: center; }
  .controls-info p { font-size: 13px; color: #aaa; }
  .controls-info span { color: #f0c040; font-weight: bold; }

  #hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 25px; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
  #hud.visible { opacity: 1; }
  #hearts { display: flex; gap: 4px; }
  .heart { width: 28px; height: 28px; }
  .heart svg { width: 100%; height: 100%; }
  #rupee-count { color: #4f4; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #0a0; margin-top: 6px; }
  #rupee-count::before { content: "◆ "; color: #4f4; }
  #score-display { position: fixed; top: 15px; right: 25px; color: #f0c040; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #a07800; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
  #score-display.visible { opacity: 1; }
  #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
  #crosshair.visible { opacity: 0.6; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #fff; }
  #crosshair::before { width: 16px; height: 2px; top: -1px; left: -8px; }
  #crosshair::after { width: 2px; height: 16px; top: -8px; left: -1px; }
  #minimap { position: fixed; bottom: 15px; right: 15px; width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); overflow: hidden; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.5s; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  #minimap.visible { opacity: 1; }
  #minimap canvas { width: 100%; height: 100%; border-radius: 50%; }
  #message { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #f0c040; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px #a07800; z-index: 60; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
  #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 200; }
  #game-over h1 { color: #e44; font-size: 48px; text-shadow: 0 0 30px #a00; }
  #game-over p { color: #aaa; font-size: 18px; margin-top: 12px; }
  #game-over button { margin-top: 20px; padding: 10px 30px; font-size: 18px; background: linear-gradient(180deg, #a44, #822); color: #fff; border: 2px solid #c66; border-radius: 8px; cursor: pointer; }
  #damage-flash { position: fixed; inset: 0; background: rgba(255,0,0,0.3); z-index: 45; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
  #boss-bar { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); width: 250px; z-index: 50; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
  #boss-bar.visible { opacity: 1; }
  #boss-bar .label { color: #e44; font-size: 14px; font-weight: bold; text-align: center; text-shadow: 0 0 10px #a00; }
  #boss-bar .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.7); border-radius: 5px; border: 1px solid #a00; margin-top: 4px; overflow: hidden; }
  #boss-bar .bar-fill { height: 100%; background: linear-gradient(90deg, #e44, #f66); border-radius: 5px; transition: width 0.3s; }
  #wave-info { position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; font-weight: bold; text-shadow: 0 0 15px rgba(255,255,255,0.5); z-index: 55; pointer-events: none; opacity: 0; transition: opacity 0.5s; }

  #touch-controls { display: none; position: fixed; inset: 0; z-index: 40; pointer-events: none; }
  #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 140px; pointer-events: auto; }
  #joystick-base { width: 100%; height: 100%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; position: relative; }
  #joystick-thumb { width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
  #look-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
  #touch-buttons { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
  .touch-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; pointer-events: auto; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .touch-btn:active { background: rgba(255,255,255,0.5); transform: scale(0.95); }
  .touch-btn.primary { width: 70px; height: 70px; background: rgba(240,192,64,0.3); border-color: #f0c040; font-size: 28px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div>LOADING WORLD...</div>

<div id="blocker">
  <h1>⚔️ LEGEND OF THREE.JS ⚔️</h1>
  <p>A First-Person Adventure</p>
  <div class="controls-info">
    <p id="desktop-controls"><span>WASD</span> Move | <span>Mouse</span> Look | <span>Click</span> Attack</p>
    <p id="mobile-controls" style="display:none;"><span>Left Thumb</span> Move | <span>Right Thumb</span> Look</p>
  </div>
  <button class="start-btn" id="startBtn">▶ START ADVENTURE</button>
</div>

<div id="hud">
  <div id="hearts"></div>
  <div id="rupee-count">0</div>
</div>
<div id="score-display">Score: 0</div>
<div id="crosshair"></div>
<div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
<div id="message"></div>
<div id="damage-flash"></div>
<div id="wave-info"></div>
<div id="boss-bar"><div class="label">DARK KNIGHT</div><div class="bar-bg"><div class="bar-fill" id="boss-fill" style="width:100%"></div></div></div>
<div id="game-over"><h1>GAME OVER</h1><p id="final-score"></p><button id="restartBtn">Try Again</button></div>
<div id="touch-controls">
  <div id="joystick-zone"><div id="joystick-base"><div id="joystick-thumb"></div></div></div>
  <div id="look-zone"></div>
  <div id="touch-buttons">
    <div class="touch-btn primary" id="btn-attack">⚔️</div>
    <div class="touch-btn" id="btn-dash">💨</div>
    <div class="touch-btn" id="btn-interact">🤝</div>
  </div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
// ---- SAFETY CHECK ----
if (typeof THREE === 'undefined') {
  document.getElementById('loading').innerHTML = '<h1 style="color:#e44">ERROR</h1><p>Failed to load 3D Engine. Check your internet connection and reload.</p>';
  document.getElementById('blocker').style.display = 'none';
}

// ---- GAME ENGINE ----
const { Scene, PerspectiveCamera, WebGLRenderer, Color, Vector3, Vector2, Euler, Quaternion, AmbientLight, DirectionalLight, PointLight, HemisphereLight, Mesh, MeshStandardMaterial, MeshBasicMaterial, BoxGeometry, SphereGeometry, CylinderGeometry, PlaneGeometry, ConeGeometry, DodecahedronGeometry, Group, CanvasTexture, FogExp2, Clock, TextureLoader, RepeatWrapping, DoubleSide } = THREE;

// ---- GLOBALS ----
const WORLD_SIZE = 200, MAX_HP = 6, SWORD_RANGE = 3.5, SWORD_DAMAGE = 1;
const DASH_COOLDOWN = 1500, DASH_DURATION = 200, DASH_SPEED = 18, WALK_SPEED = 6, SPRINT_SPEED = 10;
const ENEMY_SPAWN_RADIUS = 40;

let scene, camera, renderer, clock;
let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false, isSprinting=false, isDashing=false;
let dashTimer=0, dashDir=new Vector3(), playerVelocity=new Vector3(), playerDirection=new Vector3();
let playerHP=MAX_HP, rupees=0, score=0, gameActive=false, swordSwinging=false, swordCooldown=0, swordGroup;
let enemies=[], particles=[], collectibles=[], worldObjects=[];
let lastDash=0, minimapCtx, bossEnemy=null, waveNumber=0, enemiesKilled=0, bossActive=false;
let pitchObject, yawObject;
let euler = new Euler(0, 0, 0, 'YXZ');
let audioCtx, isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

// Touch state
let joystickActive=false, joystickStart={x:0,y:0}, joystickCurrent={x:0,y:0};
let lookTouchId=null, lookLast={x:0,y:0};

// ---- AUDIO ----
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
}
function playSound(freq, dur, type='square', vol=0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sfxSwing(){ playSound(300,0.15,'sawtooth',0.1); playSound(600,0.1,'square',0.05); }
function sfxHit(){ playSound(150,0.2,'square',0.2); playSound(80,0.3,'sawtooth',0.15); }
function sfxPickup(){ playSound(523,0.1,'sine',0.12); setTimeout(()=>playSound(659,0.1,'sine',0.12),80); setTimeout(()=>playSound(784,0.15,'sine',0.12),160); }
function sfxHeart(){ playSound(440,0.1,'sine',0.12); setTimeout(()=>playSound(554,0.1,'sine',0.12),100); setTimeout(()=>playSound(659,0.1,'sine',0.12),200); setTimeout(()=>playSound(880,0.2,'sine',0.12),300); }
function sfxDmg(){ playSound(100,0.3,'sawtooth',0.25); playSound(80,0.4,'square',0.15); }
function sfxDie(){ playSound(200,0.15,'square',0.15); setTimeout(()=>playSound(150,0.15,'square',0.1),100); setTimeout(()=>playSound(100,0.2,'square',0.08),200); }

// ---- TEXTURES ----
function makeTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); const t=new CanvasTexture(c); t.wrapS=t.wrapT=RepeatWrapping; return t; }
const grassTex = makeTex(256,256,(ctx,w,h)=>{ ctx.fillStyle='#2d5a1e'; ctx.fillRect(0,0,w,h); for(let i=0;i<3000;i++){ const s=Math.random(); ctx.fillStyle=s>0.5?'#3a7a28':'#1e4a12'; ctx.fillRect(Math.random()*w,Math.random()*h,2,2+Math.random()*3); } grassTex.repeat.set(40,40); });
const woodTex = makeTex(64,128,(ctx,w,h)=>{ ctx.fillStyle='#5a3a1a'; ctx.fillRect(0,0,w,h); for(let y=0;y<h;y+=4){ ctx.fillStyle=`rgba(${80+Math.random()*40},${50+Math.random()*30},${20+Math.random()*20},0.5)`; ctx.fillRect(0,y,w,2+Math.random()*2); } });
const stoneTex = makeTex(64,64,(ctx,w,h)=>{ ctx.fillStyle='#777'; ctx.fillRect(0,0,w,h); for(let i=0;i<500;i++){ const v=100+Math.random()*60; ctx.fillStyle=`rgb(${v},${v},${v})`; ctx.fillRect(Math.random()*w,Math.random()*h,2,2); } });

// ---- INIT ----
function init() {
  try {
    scene = new Scene(); scene.background = new Color(0x87CEEB); scene.fog = new FogExp2(0x87CEEB, 0.008);
    camera = new PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
    yawObject = new THREE.Group(); pitchObject = new THREE.Group(); yawObject.add(pitchObject); pitchObject.add(camera); yawObject.position.set(0,1.7,0); scene.add(yawObject);
    
    renderer = new WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true; renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
    document.body.prepend(renderer.domElement); // Force canvas to top of DOM

    clock = new Clock();
    scene.add(new AmbientLight(0x6688aa, 0.5)); scene.add(new HemisphereLight(0x88bbff, 0x445522, 0.6));
    const sun = new DirectionalLight(0xffeedd, 1.2); sun.position.set(50,80,30); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); Object.assign(sun.shadow.camera,{left:-60,right:60,top:60,bottom:-60,near:0.5,far:200}); scene.add(sun);
    
    createSword(); buildWorld(); minimapCtx = document.getElementById('minimap-canvas').getContext('2d');
    
    if(isMobile) {
      document.getElementById('desktop-controls').style.display='none';
      document.getElementById('mobile-controls').style.display='block';
      document.getElementById('touch-controls').style.display='block';
      setupTouchControls();
    }
    
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>document.getElementById('loading').style.display='none', 500);
    
    window.addEventListener('resize', onResize);
    document.addEventListener('keydown', e=>onKey(e,true));
    document.addEventListener('keyup', e=>onKey(e,false));
    window.addEventListener('mousemove', e=>{ if(gameActive && document.pointerLockElement===renderer.domElement) look(e.movementX, e.movementY); });
    renderer.domElement.addEventListener('mousedown', e=>{ if(gameActive && e.button===0 && !swordSwinging && swordCooldown<=0) swingSword(); });
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('startBtn').addEventListener('touchstart', e=>{ e.preventDefault(); startGame(); }, {passive:false});
    document.getElementById('restartBtn').addEventListener('click', restartGame);
    animate();
  } catch(err) {
    console.error(err);
    document.getElementById('loading').innerHTML = `<h1 style="color:#e44">INIT ERROR</h1><p>${err.message}</p>`;
  }
}

function onKey(e, down) {
  switch(e.code){
    case 'KeyW':moveForward=down;break; case 'KeyS':moveBackward=down;break;
    case 'KeyA':moveLeft=down;break; case 'KeyD':moveRight=down;break;
    case 'ShiftLeft':isSprinting=down;break;
    case 'KeyE': if(down) interact(); break;
    case 'Space': if(down && !isDashing && Date.now()-lastDash>DASH_COOLDOWN) dash(); break;
  }
}

function look(dx, dy) {
  euler.setFromQuaternion(pitchObject.quaternion);
  euler.y -= dx * 0.002; euler.x -= dy * 0.002;
  euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
  pitchObject.quaternion.setFromEuler(euler);
}

function dash() { isDashing=true; dashTimer=DASH_DURATION; lastDash=Date.now(); const d=new Vector3(0,0,-1).applyQuaternion(yawObject.quaternion); d.y=0; d.normalize(); dashDir.copy(d); }

function createSword() {
  swordGroup = new Group();
  swordGroup.add(Object.assign(new Mesh(new BoxGeometry(0.04,0.8,0.02), new MeshStandardMaterial({color:0xcccccc,metalness:0.9,roughness:0.2,emissive:0x222222})),{position:new Vector3(0,0.4,0)}));
  swordGroup.add(Object.assign(new Mesh(new BoxGeometry(0.18,0.04,0.06), new MeshStandardMaterial({color:0x886622,metalness:0.7,roughness:0.3})),{position:new Vector3(0,0,0)}));
  swordGroup.add(Object.assign(new Mesh(new CylinderGeometry(0.02,0.02,0.15,8), new MeshStandardMaterial({color:0x5a3a1a})),{position:new Vector3(0,-0.08,0)}));
  swordGroup.add(Object.assign(new Mesh(new SphereGeometry(0.03,8,8), new MeshStandardMaterial({color:0x886622,metalness:0.7,roughness:0.3})),{position:new Vector3(0,-0.16,0)}));
  swordGroup.position.set(0.4,-0.3,-0.5); swordGroup.rotation.set(0.3,-0.2,0.1); camera.add(swordGroup);
}

function buildWorld() {
  const g = new PlaneGeometry(WORLD_SIZE*2,WORLD_SIZE*2,50,50);
  const p = g.attributes.position;
  for(let i=0;i<p.count;i++) { const x=p.getX(i), z=p.getY(i); let h=Math.sin(x*0.05)*Math.cos(z*0.05)*1.5+Math.sin(x*0.1+1)*Math.cos(z*0.08)*0.8+Math.sin(x*0.02)*Math.cos(z*0.03)*3; const d=Math.sqrt(x*x+z*z); if(d<15)h*=d/15; p.setZ(i,h); }
  g.computeVertexNormals();
  const ground = new Mesh(g, new MeshStandardMaterial({map:grassTex,roughness:0.9,color:0x3a7a28}));
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

  const water = new Mesh(new CircleGeometry(12,32), new MeshStandardMaterial({color:0x2266aa,transparent:true,opacity:0.7,roughness:0.1})).rotateX(-Math.PI/2).translateY(0.05).position.set(25,0.05,-20); scene.add(water);

  for(let i=0;i<100;i++) { const x=(Math.random()-0.5)*WORLD_SIZE, z=(Math.random()-0.5)*WORLD_SIZE; if(Math.sqrt(x*x+z*z)<8||Math.abs(x-25)<15&&Math.abs(z+20)<15)continue; createTree(x,z); }
  for(let i=0;i<50;i++) { const x=(Math.random()-0.5)*WORLD_SIZE, z=(Math.random()-0.5)*WORLD_SIZE; createRock(x,z); }
  for(let i=0;i<40;i++) createMushroom((Math.random()-0.5)*WORLD_SIZE,(Math.random()-0.5)*WORLD_SIZE);
  for(let i=0;i<60;i++) createFlower((Math.random()-0.5)*WORLD_SIZE,(Math.random()-0.5)*WORLD_SIZE);
  createRuins(30,0,-30); createRuins(-35,0,25);
  spawnCollectibles(20); spawnWave();
}

function createTree(x,z) {
  const g=new Group(); const h=2+Math.random()*3; const t=new Mesh(new CylinderGeometry(0.2,0.35,h,8), new MeshStandardMaterial({map:woodTex,roughness:0.9})); t.position.y=h/2; t.castShadow=true; g.add(t);
  for(let i=0;i<2;i++) { const r=1.5-i*0.3, h2=1.5-i*0.2; const c=new Mesh(new ConeGeometry(r,h2,8), new MeshStandardMaterial({color:new Color(0.1,0.3+Math.random()*0.3,0.05),roughness:0.8})); c.position.y=h+i*0.8+0.5; c.castShadow=true; g.add(c); }
  g.position.set(x,0,z); scene.add(g); worldObjects.push({x,z,radius:0.5});
}
function createRock(x,z) {
  const s=0.5+Math.random()*1.5; const geo=new DodecahedronGeometry(s,1); const p=geo.attributes.position;
  for(let i=0;i<p.count;i++) { p.setX(i,p.getX(i)+(Math.random()-0.5)*0.2*s); p.setY(i,p.getY(i)*(0.5+Math.random()*0.5)); p.setZ(i,p.getZ(i)+(Math.random()-0.5)*0.2*s); }
  geo.computeVertexNormals(); const sh=0.4+Math.random()*0.3; const r=new Mesh(geo, new MeshStandardMaterial({color:new Color(sh,sh,sh*0.95),roughness:0.9})); r.position.set(x,s*0.3,z); r.rotation.set(Math.random(),Math.random(),Math.random()); r.castShadow=true; r.receiveShadow=true; scene.add(r); worldObjects.push({x,z,radius:s});
}
function createMushroom(x,z) {
  const g=new Group(); g.add(Object.assign(new Mesh(new CylinderGeometry(0.05,0.06,0.2,6), new MeshStandardMaterial({color:0xeeeedd})),{position:new Vector3(0,0.1,0)}));
  const cap=new Mesh(new SphereGeometry(0.12,8,6,0,Math.PI*2,0,Math.PI/2), new MeshStandardMaterial({color:0xcc3333})); cap.position.y=0.2; g.add(cap);
  for(let i=0;i<3;i++) { const s=new Mesh(new SphereGeometry(0.025,4,4), new MeshStandardMaterial({color:0xffffff})); const a=(i/3)*Math.PI*2; s.position.set(Math.cos(a)*0.08,0.25,Math.sin(a)*0.08); g.add(s); }
  g.position.set(x,0,z); scene.add(g);
}
function createFlower(x,z) {
  const g=new Group(); const s=new Mesh(new CylinderGeometry(0.01,0.01,0.3,4), new MeshStandardMaterial({color:0x228822})); s.position.y=0.15; g.add(s);
  const c=[0xff4466,0xffaa22,0xff66cc,0x6644ff,0xffee44,0xff8844][Math.floor(Math.random()*6)];

function swingSword() {
  swordSwinging=true; swordCooldown=400; sfxSwing(); const st=clock.getElapsedTime(); const dur=0.25;
  const anim=()=>{ const t=(clock.getElapsedTime()-st)/dur; if(t>=1){swordGroup.rotation.set(0.3,-0.2,0.1);swordGroup.position.set(0.4,-0.3,-0.5);swordSwinging=false;return;}
  if(t<0.3){const s=t/0.3;swordGroup.rotation.z=0.1-s*0.8;swordGroup.position.x=0.4-s*0.1;} else if(t<0.6){const s=(t-0.3)/0.3;swordGroup.rotation.z=-0.7+s*2.5;swordGroup.position.z=-0.5-s*0.3;} else {const s=(t-0.6)/0.4;swordGroup.rotation.z=1.8-s*1.7;swordGroup.position.z=-0.8+s*0.3;}
  if(t>0.3&&t<0.5) checkSwordHit(); requestAnimationFrame(anim); }; anim();
}
function checkSwordHit() { const pp=yawObject.position.clone(), fw=new Vector3(0,0,-1).applyQuaternion(yawObject.quaternion); enemies.forEach(e=>{ if(e.isDead)return; const to=e.model.position.clone().sub(pp); to.y=0; const d=to.length(); if(d<SWORD_RANGE) { const dot=fw.normalize().dot(to.normalize()); if(dot>0.3) hitEnemy(e); } }); }
function hitEnemy(e) { e.hp-=SWORD_DAMAGE; e.hitFlash=0.2; sfxHit(); const kb=new Vector3().subVectors(e.model.position,yawObject.position); kb.y=0; kb.normalize().multiplyScalar(2); e.model.position.add(kb); spawnParticles(e.model.position.clone().add(new Vector3(0,1,0)),e.type==='boss'?0xff2200:(e.type==='skeleton'?0xddddcc:0x44ff44),8,4); if(e.hp<=0) killEnemy(e); }
function killEnemy(e) { e.isDead=true; e.deathTimer=1.5; sfxDie(); score+=e.xp; enemiesKilled++; spawnParticles(e.model.position.clone().add(new Vector3(0,1,0)),e.type==='boss'?0xff2200:(e.type==='skeleton'?0xddddcc:0x44ff44),20,5);
  const dc=e.type==='boss'?5:1+Math.floor(Math.random()*2); for(let i=0;i<dc;i++) { const a=Math.random()*Math.PI*2, d=1+Math.random()*2; spawnCollectibleAt(e.model.position.x+Math.cos(a)*d, e.model.position.z+Math.sin(a)*d, Math.random()<0.3?'heart':'rupee'); }
  if(e.type==='boss'){bossActive=false;bossEnemy=null;document.getElementById('boss-bar').classList.remove('visible');score+=500;showMessage('✨ BOSS DEFEATED! +500 Score ✨');}
  if(!enemies.some(en=>!en.isDead&&en.type!=='boss')&&!bossActive) setTimeout(()=>{if(gameActive){showMessage(`Wave ${waveNumber} Complete!`);setTimeout(()=>spawnWave(),3000);}},1000);
}

function checkCollision(pos,r=0.5) { if(Math.abs(pos.x)>WORLD_SIZE||Math.abs(pos.z)>WORLD_SIZE)return true; for(const o of worldObjects) { if(Math.sqrt((pos.x-o.x)**2+(pos.z-o.z)**2)<o.radius+r)return true; } return false; }
function getTerrainHeight(x,z) { let h=Math.sin(x*0.05)*Math.cos(z*0.05)*1.5+Math.sin(x*0.1+1)*Math.cos(z*0.08)*0.8+Math.sin(x*0.02)*Math.cos(z*0.03)*3; const d=Math.sqrt(x*x+z*z); if(d<15)h*=d/15; return h; }

// ---- TOUCH SETUP ----
function setupTouchControls() {
  const zone=document.getElementById('joystick-zone'), thumb=document.getElementById('joystick-thumb'), base=document.getElementById('joystick-base');
  const lookZone=document.getElementById('look-zone');
  const btnAtk=document.getElementById('btn-attack'), btnDash=document.getElementById('btn-dash'), btnInt=document.getElementById('btn-interact');

  zone.addEventListener('touchstart', e=>{ e.preventDefault(); joystickActive=true; const t=e.touches[0]; const r=base.getBoundingClientRect(); joystickStart.x=r.left+r.width/2; joystickStart.y=r.top+r.height/2; joystickCurrent.x=t.clientX; joystickCurrent.y=t.clientY; updateJoystick(); }, {passive:false});
  zone.addEventListener('touchmove', e=>{ e.preventDefault(); if(!joystickActive)return; const t=e.touches[0]; joystickCurrent.x=t.clientX; joystickCurrent.y=t.clientY; updateJoystick(); }, {passive:false});
  zone.addEventListener('touchend', e=>{ e.preventDefault(); joystickActive=false; moveForward=moveBackward=moveLeft=moveRight=false; thumb.style.transform='translate(-50%,-50%)'; }, {passive:false});

  lookZone.addEventListener('touchstart', e=>{ e.preventDefault(); if(lookTouchId!==null)return; const t=e.changedTouches[0]; lookTouchId=t.identifier; lookLast.x=t.clientX; lookLast.y=t.clientY; }, {passive:false});
  lookZone.addEventListener('touchmove', e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===lookTouchId) { const dx=t.clientX-lookLast.x, dy=t.clientY-lookLast.y; look(dx,dy); lookLast.x=t.clientX; lookLast.y=t.clientY; } }, {passive:false});
  lookZone.addEventListener('touchend', e=>{ e.preventDefault(); for(const t of e.changedTouches) if(t.identifier===lookTouchId) lookTouchId=null; }, {passive:false});

  const handleBtn=(fn)=>(e)=>{ e.preventDefault(); fn(); };
  btnAtk.addEventListener('touchstart', handleBtn(()=>{ if(gameActive&&!swordSwinging&&swordCooldown<=0) swingSword(); }), {passive:false});
  btnDash.addEventListener('touchstart', handleBtn(()=>{ if(gameActive&&!isDashing&&Date.now()-lastDash>DASH_COOLDOWN) dash(); }), {passive:false});
  btnInt.addEventListener('touchstart', handleBtn(()=>{ if(gameActive) interact(); }), {passive:false});
}
function updateJoystick() {
  const maxDist=45; let dx=joystickCurrent.x-joystickStart.x, dy=joystickCurrent.y-joystickStart.y; const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>maxDist) { dx=dx/dist*maxDist; dy=dy/dist*maxDist; }
  document.getElementById('joystick-thumb').style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  const nx=dx/maxDist, ny=dy/maxDist; moveForward=ny<-0.3; moveBackward=ny>0.3; moveLeft=nx<-0.3; moveRight=nx>0.3; isSprinting=dist>maxDist*0.8;
}

function onResize() { camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight); }
function update() {
  if(!gameActive) { renderer.render(scene,camera); return; }
  const dt=Math.min(clock.getDelta(),0.05), time=clock.getElapsedTime();
  if(swordCooldown>0)swordCooldown-=dt*1000;
  if(!isDashing) { playerVelocity.x-=playerVelocity.x*10*dt; playerVelocity.z-=playerVelocity.z*10*dt; playerDirection.z=Number(moveForward)-Number(moveBackward); playerDirection.x=Number(moveRight)-Number(moveLeft); playerDirection.normalize();
  const fwd=new Vector3(0,0,-1).applyQuaternion(yawObject.quaternion); fwd.y=0; fwd.normalize(); const rgt=new Vector3(1,0,0).applyQuaternion(yawObject.quaternion); rgt.y=0; rgt.normalize();
  if(moveForward||moveBackward)playerVelocity.add(fwd.multiplyScalar(playerDirection.z*(isSprinting?SPRINT_SPEED:WALK_SPEED)*dt*10)); if(moveLeft||moveRight)playerVelocity.add(rgt.multiplyScalar(playerDirection.x*(isSprinting?SPRINT_SPEED:WALK_SPEED)*dt*10));
  } else { dashTimer-=dt*1000; if(dashTimer<=0)isDashing=false; yawObject.position.x+=dashDir.x*DASH_SPEED*dt; yawObject.position.z+=dashDir.z*DASH_SPEED*dt; }
  if(!isDashing) { const np=yawObject.position.clone(); np.x+=playerVelocity.x*dt; if(!checkCollision(np))yawObject.position.x+=playerVelocity.x*dt; else playerVelocity.x=0; np.copy(yawObject.position); np.z+=playerVelocity.z*dt; if(!checkCollision(np))yawObject.position.z+=playerVelocity.z*dt; else playerVelocity.z=0; }
  yawObject.position.y=getTerrainHeight(yawObject.position.x,yawObject.position.z)+1.7;
  if((moveForward||moveBackward||moveLeft||moveRight)&&!isDashing) camera.position.y=Math.sin(time*(isSprinting?10:7))*(isSprinting?0.06:0.04);
  if(!swordSwinging){swordGroup.position.y=-0.3+Math.sin(time*2)*0.01;swordGroup.rotation.z=0.1+Math.sin(time*1.5)*0.02;}
  enemies.forEach(e=>{ if(e.isDead){e.deathTimer-=dt;e.model.scale.y=Math.max(0.01,e.deathTimer/1.5);e.model.rotation.x+=dt*5;if(e.deathTimer<=0)scene.remove(e.model);return;}
  if(e.hitFlash>0){e.hitFlash-=dt;e.model.traverse(c=>{if(c.material){c.material.emissive=new Color(0xff0000);c.material.emissiveIntensity=e.hitFlash*5;}});} else e.model.traverse(c=>{if(c.material&&c.material.emissive){c.material.emissive=new Color(0);c.material.emissiveIntensity=0;}});
  const tp=new Vector3().subVectors(yawObject.position,e.model.position);tp.y=0;const d=tp.length(); if(d<e.aggroRange){e.state='chase';e.model.lookAt(new Vector3(yawObject.position.x,e.model.position.y,yawObject.position.z));}
  if(e.state==='chase'){if(d>1.5){const md=tp.normalize();const np2=e.model.position.clone().add(md.multiplyScalar(e.speed*dt));if(!checkCollision(np2,0.5)){e.model.position.x=np2.x;e.model.position.z=np2.z;}}
  if(d<2.5){e.attackCooldown-=dt;if(e.attackCooldown<=0){takeDamage(e.damage);e.attackCooldown=e.type==='boss'?1:1.5;e.model.position.add(tp.normalize().multiplyScalar(0.5));}}
  if(e.type==='boss'&&Math.random()<0.005&&d<8&&d>3){e.model.position.y=2;setTimeout(()=>{e.model.position.y=0;spawnParticles(e.model.position.clone().add(new Vector3(0,0.5,0)),0xff4400,15,6);if(yawObject.position.distanceTo(e.model.position)<5)takeDamage(2);},500);}
  if(e.type==='boss'&&Math.random()<0.002&&enemies.filter(en=>!en.isDead).length<15){const a=Math.random()*Math.PI*2;spawnEnemy('slime',e.model.position.clone().add(new Vector3(Math.cos(a)*5,0,Math.sin(a)*5)));}
  e.model.position.y=Math.sin(time*3+e.model.id)*0.1; });
  enemies=enemies.filter(e=>!e.isDead||e.deathTimer>0);
  collectibles.forEach(c=>{if(c.collected)return;c.group.position.y=0.8+Math.sin(time*3+c.bobOffset)*0.3;c.group.rotation.y=time*2;if(yawObject.position.distanceTo(new Vector3(c.x,0,c.z))<1.5)collectItem(c);});
  collectibles=collectibles.filter(c=>!c.collected);
  particles.forEach(p=>{p.life-=dt;p.vel.y-=9.8*dt;p.mesh.position.add(p.vel.clone().multiplyScalar(dt));p.mesh.material.opacity=p.life/p.maxLife;p.mesh.scale.setScalar(p.life/p.maxLife);if(p.life<=0)scene.remove(p.mesh);});
  particles=particles.filter(p=>p.life>0);
  if(collectibles.length<8&&Math.random()<0.01)spawnCollectible();
  updateHUD(); updateMinimap();
  const dp=(Math.sin(time*0.01)+1)/2; const sc=new Color().lerpColors(new Color(0x1a1a3a),new Color(0x87CEEB),dp); scene.background=sc; scene.fog.color=sc;
  renderer.render(scene,camera);
}

function animate() { requestAnimationFrame(animate); update(); }
init();
</script>
