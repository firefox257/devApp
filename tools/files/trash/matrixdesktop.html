<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Material Icons OS</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --taskbar-height: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --bg-color: #0d0d0d;
            --window-bg: #0a0a0a;
            --header-bg: #1a1a1a;
            --accent: #00ff41;
            --accent-dim: #008f11;
            --menu-bg: rgba(10, 10, 10, 0.95);
            --icon-color: #00ff41;
            --icon-hover: #00ff41;
            --text-primary: #00ff41;
            --text-secondary: #008f11;
            --border-color: #003300;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            background: #000;
        }

        /* Matrix rain canvas */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .mat-icon {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            display: inline-block;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            color: var(--text-primary);
            vertical-align: middle;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* --- Desktop --- */
        .desktop-area {
            height: calc(100dvh - var(--taskbar-height) - var(--safe-bottom));
            width: 100%;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .icon {
            width: 70px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: rgba(0, 255, 65, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .icon:hover {
            background: rgba(0, 255, 65, 0.2);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .icon:active { 
            background: rgba(0, 255, 65, 0.3); 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .icon .mat-icon { font-size: 32px; margin-bottom: 4px; }
        .icon span { font-size: 11px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- Start Menu --- */
        .start-menu {
            position: absolute;
            bottom: calc(var(--taskbar-height) + var(--safe-bottom) + 10px);
            left: 10px;
            width: 280px;
            background: var(--menu-bg);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px;
            z-index: 2000;
            display: none;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            border: 1px solid var(--accent-dim);
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .menu-header { 
            padding: 10px; 
            border-bottom: 1px solid var(--border-color); 
            margin-bottom: 5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .menu-avatar { 
            width: 36px; 
            height: 36px; 
            background: var(--accent-dim); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: var(--text-primary);
            border: 1px solid var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .menu-list { display: flex; flex-direction: column; gap: 2px; }

        .menu-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            border-radius: 8px; 
            color: var(--text-primary); 
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .menu-item:hover { 
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--accent-dim);
        }

        .menu-item:active { 
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .menu-item .mat-icon { 
            margin-right: 15px; 
            font-size: 20px; 
            color: var(--text-secondary); 
        }

        /* --- Window System --- */
        .window {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 70%;
            background: var(--window-bg);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--accent-dim);
            min-width: 200px;
            min-height: 150px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .window.minimized {
            transform: scale(0.8) translateY(200px);
            opacity: 0;
            pointer-events: none;
        }

        .window-header {
            height: 40px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: grab;
        }

        .window-header:active { cursor: grabbing; }

        .window-title-area { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
        .window-title { font-size: 13px; color: var(--text-primary); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .window-controls { display: flex; gap: 4px; }
        
        .control-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn .mat-icon {
            color: var(--text-primary);
            font-size: 18px;
        }

        .control-btn:hover {
            background: rgba(0, 255, 65, 0.1);
        }

        .control-btn:hover .mat-icon {
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }

        .control-btn:active {
            background: rgba(0, 255, 65, 0.2);
        }

        .control-btn.close-btn:hover {
            background: #ff3333;
        }

        .control-btn.close-btn:hover .mat-icon {
            color: white;
            text-shadow: none;
        }

        .window-content { 
            flex: 1; 
            background: #0a0a0a; 
            color: var(--text-primary); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        /* --- Click Blocker Overlay for Iframes --- */
        .click-blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 100;
            cursor: pointer;
        }

        .click-blocker.hidden {
            display: none;
        }

        .browser-toolbar { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 8px; 
            background: #1a1a1a; 
            border-bottom: 1px solid var(--border-color); 
        }

        .browser-btn { 
            width: 32px; 
            height: 32px; 
            border: 1px solid var(--border-color); 
            background: transparent; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s;
        }

        .browser-btn .mat-icon { color: var(--text-primary); font-size: 18px; }
        .browser-btn:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--accent); }
        .browser-btn:active { background: rgba(0, 255, 65, 0.2); }

        .address-bar { 
            flex: 1; 
            height: 32px; 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 0 12px; 
            font-size: 13px; 
            background: #0a0a0a; 
            color: var(--text-primary);
            outline: none; 
            user-select: text; 
            -webkit-user-select: text;
            font-family: 'Courier New', Courier, monospace;
        }

        .address-bar::placeholder {
            color: var(--text-secondary);
        }

        .iframe-container { flex: 1; position: relative; background: #fff; }
        .web-iframe { width: 100%; height: 100%; border: none; background: white; }
        .content-padding { 
            padding: 15px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            font-size: 14px; 
            line-height: 1.5; 
            flex: 1; 
            color: var(--text-primary);
        }

        .resize-handle { 
            position: absolute; 
            bottom: 0; 
            right: 0; 
            width: 20px; 
            height: 20px; 
            cursor: nwse-resize; 
            z-index: 10; 
            background: linear-gradient(135deg, transparent 50%, var(--accent) 50%); 
            opacity: 0.5; 
        }

        .resize-handle:active { 
            background: linear-gradient(135deg, transparent 50%, var(--accent) 50%); 
            opacity: 1;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* --- Taskbar --- */
        .taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: calc(var(--taskbar-height) + var(--safe-bottom));
            background: rgba(0, 255, 65, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            padding-bottom: var(--safe-bottom);
            z-index: 3000;
            border-top: 1px solid var(--accent-dim);
            box-shadow: 0 -5px 20px rgba(0, 255, 65, 0.1);
        }

        .start-btn { 
            width: 40px; 
            height: 40px; 
            background: transparent; 
            border: none;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 6px; 
            color: var(--text-primary);
            transition: all 0.2s;
            padding: 0;
        }

        .start-btn .mat-icon {
            font-size: 24px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .start-btn:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .start-btn:active, .start-btn.active { 
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        
        .taskbar-apps {
            flex: 1;
            display: flex;
            padding-left: 10px;
            gap: 6px;
            justify-content: flex-start;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            align-items: center;
        }
        .taskbar-apps::-webkit-scrollbar { display: none; }

        .taskbar-item {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            position: relative;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .taskbar-item .mat-icon {
            font-size: 24px;
            line-height: 1;
        }

        .taskbar-item:hover {
            border-color: var(--accent-dim);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .taskbar-item:active { background: rgba(0, 255, 65, 0.2); }
        .taskbar-item.active { 
            background: rgba(0, 255, 65, 0.25); 
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }
        
        .taskbar-item::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            transition: width 0.2s;
            box-shadow: 0 0 5px rgba(0, 255, 65, 0.8);
        }
        .taskbar-item.active::after { width: 16px; border-radius: 2px; }

        .system-tray { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--text-primary);
            font-size: 12px; 
            padding-right: 5px; 
            padding-bottom: 5px; 
            text-align: right; 
            font-family: 'Courier New', Courier, monospace;
        }

        .clock { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            line-height: 1.1; 
            font-weight: 500; 
        }

        #time { 
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        #date { font-size: 10px; opacity: 0.7; }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
            border: 1px solid var(--border-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-dim);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Glitch effect on hover for icons */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .icon:hover .mat-icon {
            animation: glitch 0.3s ease-in-out;
        }

        /* Blinking cursor animation */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- Matrix Rain Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <div class="desktop-area">
        <div class="icon" onclick="appManager.open('This PC', 'desktop_windows', 'pc')">
            <span class="mat-icon">desktop_windows</span>
            <span>This PC</span>
        </div>
        <div class="icon" onclick="appManager.open('Browser', 'public', 'browser')">
            <span class="mat-icon">public</span>
            <span>Browser</span>
        </div>
        <div class="icon" onclick="appManager.open('Settings', 'settings', 'settings')">
            <span class="mat-icon">settings</span>
            <span>Settings</span>
        </div>
        <div class="icon" onclick="appManager.open('Terminal', 'terminal', 'terminal')">
            <span class="mat-icon">terminal</span>
            <span>Terminal</span>
        </div>
        <div class="icon" onclick="appManager.open('Photos', 'photo_library', 'photos')">
            <span class="mat-icon">photo_library</span>
            <span>Photos</span>
        </div>
    </div>

    <div class="start-menu" id="startMenu">
        <div class="menu-header">
            <div class="menu-avatar">U</div>
            <div style="color:var(--text-primary); font-weight:600;">User</div>
        </div>
        <div class="menu-list">
            <div class="menu-item" onclick="appManager.open('Settings', 'settings', 'settings')">
                <span class="mat-icon">settings</span> <span>Settings</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Browser', 'public', 'browser')">
                <span class="mat-icon">public</span> <span>Web Browser</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Calculator', 'calculate', 'calculator')">
                <span class="mat-icon">calculate</span> <span>Calculator</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Terminal', 'terminal', 'terminal')">
                <span class="mat-icon">terminal</span> <span>Terminal</span>
            </div>
            <div class="menu-item" onclick="alert('Shutting down...'); toggleStartMenu()">
                <span class="mat-icon">power_off</span> <span>Shut Down</span>
            </div>
        </div>
    </div>

    <div id="windowsContainer"></div>

    <div class="taskbar">
        <button class="start-btn" id="startBtn" onclick="toggleStartMenu()">
            <span class="mat-icon">windows</span>
        </button>
        
        <div class="taskbar-apps" id="taskbarApps"></div>

        <div class="system-tray">
            <div class="clock">
                <span id="time">12:00</span>
                <span id="date">Oct 24</span>
            </div>
        </div>
    </div>

    <script>
        // === Matrix Rain Animation ===
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const charArray = matrixChars.split('');

        const fontSize = 14;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];

        function initDrops() {
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }
        initDrops();
        window.addEventListener('resize', initDrops);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                
                if (Math.random() > 0.975) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = '#00ff41';
                }

                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }

            requestAnimationFrame(drawMatrix);
        }

        drawMatrix();

        // === Clock Function ===
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // === Start Menu Functions ===
        const startMenu = document.getElementById('startMenu');
        const startBtn = document.getElementById('startBtn');

        function toggleStartMenu() {
            const isVisible = startMenu.style.display === 'block';
            startMenu.style.display = isVisible ? 'none' : 'block';
            startBtn.classList.toggle('active', !isVisible);
        }

        document.addEventListener('click', (e) => {
            if (!startMenu.contains(e.target) && !startBtn.contains(e.target)) {
                startMenu.style.display = 'none';
                startBtn.classList.remove('active');
            }
        });

        const iframeApps = ['browser'];

        const appTemplates = {
            'pc': `<div class="content-padding"><h3 style="color:var(--text-primary);">This PC</h3><p>Storage: 64 GB<br>Memory: 4 GB<br>OS: WebOS v2.0</p></div>`,
            'browser': `
                <div class="browser-toolbar">
                    <button class="browser-btn" onclick="alert('Back')"><span class="mat-icon">arrow_back</span></button>
                    <button class="browser-btn" onclick="alert('Forward')"><span class="mat-icon">arrow_forward</span></button>
                    <button class="browser-btn" onclick="this.parentElement.nextElementSibling.querySelector('iframe').src = this.parentElement.nextElementSibling.querySelector('iframe').src"><span class="mat-icon">refresh</span></button>
                    <input type="text" class="address-bar" placeholder="https://example.com" value="https://example.com" onkeydown="if(event.key==='Enter'){this.parentElement.nextElementSibling.querySelector('iframe').src = this.value}">
                </div>
                <div class="iframe-container">
                    <iframe class="web-iframe" src="https://example.com"></iframe>
                    <div class="click-blocker" onclick="event.stopPropagation();"></div>
                </div>
            `,
            'settings': `<div class="content-padding"><h3 style="color:var(--text-primary);">Settings</h3><p>• Display: 100%<br>• Sound: On<br>• WiFi: Connected</p></div>`,
            'calculator': `<div class="content-padding" style="text-align:center;"><h3 style="color:var(--text-primary);">Calculator</h3><div style="font-size:32px; padding:20px; background:#1a1a1a; border:1px solid var(--border-color); border-radius:8px; margin:10px 0; color:var(--text-primary);">0</div></div>`,
            'terminal': `<div class="content-padding" style="background:#000; color:#00ff41; font-family:monospace;"><p>user@webos:~$ <span style="animation: blink 1s infinite;">_</span></p></div>`,
            'photos': `<div class="content-padding"><h3 style="color:var(--text-primary);">Photos</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"><div style="background:#1a1a1a; border:1px solid var(--border-color); height:60px; border-radius:4px;"></div><div style="background:#1a1a1a; border:1px solid var(--border-color); height:60px; border-radius:4px;"></div><div style="background:#1a1a1a; border:1px solid var(--border-color); height:60px; border-radius:4px;"></div></div></div>`
        };

        const appManager = {
            windows: [],
            zIndexCounter: 100,
            activeWindowId: null,

            open: function(title, iconCode, appType) {
                const id = 'win-' + Date.now();
                const content = appTemplates[appType] || appTemplates['pc'];
                
                const winEl = document.createElement('div');
                winEl.className = 'window';
                winEl.id = id;
                winEl.style.zIndex = ++this.zIndexCounter;
                
                winEl.onmousedown = (e) => this.handleWindowClick(e, id);
                winEl.ontouchstart = (e) => this.handleWindowClick(e, id);
                
                winEl.innerHTML = `
                    <div class="window-header">
                        <div class="window-title-area">
                            <span class="mat-icon" style="font-size: 16px; color:var(--text-secondary);">${iconCode}</span>
                            <div class="window-title">${title}</div>
                        </div>
                        <div class="window-controls">
                            <button class="control-btn min-btn" onclick="appManager.minimize('${id}')" title="Minimize">
                                <span class="mat-icon">remove</span>
                            </button>
                            <button class="control-btn max-btn" onclick="appManager.maximize('${id}')" title="Maximize">
                                <span class="mat-icon">crop_square</span>
                            </button>
                            <button class="control-btn close-btn" onclick="appManager.close('${id}')" title="Close">
                                <span class="mat-icon">close</span>
                            </button>
                        </div>
                    </div>
                    <div class="window-content">${content}</div>
                    <div class="resize-handle" id="resize-${id}"></div>
                `;
                
                document.getElementById('windowsContainer').appendChild(winEl);
                this.initDrag(winEl);
                this.initResize(winEl);

                const taskItem = document.createElement('div');
                taskItem.className = 'taskbar-item active';
                taskItem.id = 'task-' + id;
                taskItem.onclick = () => this.toggle(id);
                taskItem.innerHTML = `<span class="mat-icon">${iconCode}</span>`;
                
                document.getElementById('taskbarApps').appendChild(taskItem);

                this.windows.push({ id, title, iconCode, el: winEl, taskItem: taskItem, appType: appType });
                this.focus(id);
                
                startMenu.style.display = 'none';
                startBtn.classList.remove('active');
            },

            handleWindowClick: function(e, id) {
                if (e.target.closest('.window-controls') || e.target.closest('.resize-handle')) {
                    return;
                }
                
                if (this.activeWindowId !== id) {
                    e.preventDefault();
                    e.stopPropagation();
                    this.focus(id);
                    return false;
                }
            },

            close: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    win.el.remove();
                    win.taskItem.remove();
                    this.windows = this.windows.filter(w => w.id !== id);
                    if (this.activeWindowId === id) this.activeWindowId = null;
                }
            },

            minimize: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    win.el.classList.add('minimized');
                    win.taskItem.classList.remove('active');
                }
            },

            maximize: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    if (win.el.style.width === '100%') {
                        win.el.style.width = '90%';
                        win.el.style.height = '70%';
                        win.el.style.top = '10%';
                        win.el.style.left = '5%';
                    } else {
                        win.el.style.width = '100%';
                        win.el.style.height = 'calc(100dvh - var(--taskbar-height) - var(--safe-bottom))';
                        win.el.style.top = '0';
                        win.el.style.left = '0';
                    }
                    this.focus(id);
                }
            },

            toggle: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (!win) return;

                if (win.el.classList.contains('minimized')) {
                    win.el.classList.remove('minimized');
                    this.focus(id);
                } else {
                    if (this.activeWindowId === id) {
                        this.minimize(id);
                    } else {
                        this.focus(id);
                    }
                }
            },

            focus: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (!win) return;

                win.el.style.zIndex = ++this.zIndexCounter;
                
                this.windows.forEach(w => {
                    w.taskItem.classList.remove('active');
                    if (w.id !== id && iframeApps.includes(w.appType)) {
                        const blocker = w.el.querySelector('.click-blocker');
                        if (blocker) blocker.classList.remove('hidden');
                    }
                });
                
                if (iframeApps.includes(win.appType)) {
                    const blocker = win.el.querySelector('.click-blocker');
                    if (blocker) blocker.classList.add('hidden');
                }
                
                win.taskItem.classList.add('active');
                win.el.classList.remove('minimized');
                this.activeWindowId = id;
            },

            initDrag: function(el) {
                const header = el.querySelector('.window-header');
                let isDragging = false, startX, startY, initialLeft, initialTop;

                const start = (e) => {
                    if(e.target.closest('.window-controls')) return;
                    if(e.target.classList.contains('address-bar')) return;
                    if(e.type === 'touchstart') e.preventDefault();
                    isDragging = true;
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    startX = clientX; startY = clientY;
                    initialLeft = el.offsetLeft; initialTop = el.offsetTop;
                    this.focus(el.id);
                };

                const move = (e) => {
                    if (!isDragging) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    el.style.left = (initialLeft + clientX - startX) + "px";
                    el.style.top = (initialTop + clientY - startY) + "px";
                };

                const end = () => { isDragging = false; };

                header.addEventListener("mousedown", start);
                header.addEventListener("touchstart", start, { passive: false });
                document.addEventListener("mousemove", move);
                document.addEventListener("touchmove", move, { passive: false });
                document.addEventListener("mouseup", end);
                document.addEventListener("touchend", end);
            },

            initResize: function(el) {
                const handle = el.querySelector('.resize-handle');
                let isResizing = false, startW, startH, startMX, startMY;

                const start = (e) => {
                    if(e.type === 'touchstart') e.preventDefault();
                    isResizing = true;
                    startW = parseInt(window.getComputedStyle(el).width, 10);
                    startH = parseInt(window.getComputedStyle(el).height, 10);
                    startMX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    startMY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    this.focus(el.id);
                };

                const move = (e) => {
                    if (!isResizing) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    const newW = startW + (clientX - startMX);
                    const newH = startH + (clientY - startMY);
                    if (newW > 200) el.style.width = newW + "px";
                    if (newH > 150) el.style.height = newH + "px";
                };

                const end = () => { isResizing = false; };

                handle.addEventListener("mousedown", start);
                handle.addEventListener("touchstart", start, { passive: false });
                document.addEventListener("mousemove", move);
                document.addEventListener("touchmove", move, { passive: false });
                document.addEventListener("mouseup", end);
                document.addEventListener("touchend", end);
            }
        };

    </script>
</body>
</html>
