            p.remove();
        });
        this.activePopup = null;
    },
    
    updateTaskbarActiveStates: function() {
        document.querySelectorAll('.taskbar-item').forEach(item => {
            const appId = item.dataset.appId;
            const instances = this.windows.filter(w => w.appId === appId);
            const hasActive = instances.some(w => w.id === this.activeWindowId && !w.el.classList.contains('minimized'));
            if (hasActive) item.classList.add('active', 'system-desktop-taskbar__item--active');
            else item.classList.remove('active', 'system-desktop-taskbar__item--active');
        });
    },
    
    _ensureClickBlocker: function(winEl, isHidden = false) {
        let blocker = winEl.querySelector('.click-blocker');
        if (!blocker) {
            blocker = document.createElement('div');
            blocker.className = 'click-blocker' + (isHidden ? ' hidden' : '');
            const content = winEl.querySelector('.window-content');
            if (content) content.appendChild(blocker);
        } else {
            blocker.classList.toggle('hidden', isHidden);
        }
        return blocker;
    },
    
    open: function(title, iconCode, appType, options = {}) {
        const id = 'win-' + Date.now() + '-' + (options.instanceId || 1);
        const appId = options.appId || `app-${Date.now()}`;
        const instanceId = options.instanceId || 1;
        const content = appTemplates[appType] || `<div class="system-app"><p class="system-text">App template "${appType}" not found.</p></div>`;
        const wasMaximized = this._getSavedMaximized(appId);
        const winEl = document.createElement('div');
        winEl.className = 'window system-desktop-window';
        winEl.id = id;
        this.zIndexCounter = Math.min(this.zIndexCounter + 1, 2999);
        winEl.style.zIndex = this.zIndexCounter;
        winEl.style.setProperty('--window-z-index', this.zIndexCounter);
        
        if (wasMaximized) {
            winEl.style.width = '100%'; winEl.style.height = 'calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom))'; winEl.style.top = '0'; winEl.style.left = '0'; winEl.classList.add('maximized', 'system-desktop-window--maximized');
        } else {
            let size = this._getSavedSize(appId);
            if (!size) size = this._getResponsiveSize(appId);
            const validatedSize = this._clampSizeToFit(size.width, size.height);
            winEl.style.width = validatedSize.width + 'px'; winEl.style.height = validatedSize.height + 'px';
            const taskbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-taskbar-height')) || 50;
            const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-safe-bottom')) || 20;
            const availableHeight = window.innerHeight - taskbarHeight - safeBottom;
            winEl.style.left = Math.max(10, (window.innerWidth - validatedSize.width) / 2) + 'px';
            winEl.style.top = Math.max(10, (availableHeight - validatedSize.height) / 2) + 'px';
        }
        
        winEl.onmousedown = (e) => this.handleWindowClick(e, id);
        winEl.ontouchstart = (e) => this.handleWindowClick(e, id);
        
        const displayTitle = title;
        
        winEl.innerHTML = `<div class="window-header system-desktop-window__header">
            <div class="window-title-area">
                <span class="material-icons" style="font-size:16px;color:var(--system-text-dim);">${iconCode}</span>
                <div class="window-title system-desktop-window__title" id="title-${id}" title="${displayTitle}">${displayTitle}</div>
            </div>
            <div class="window-controls system-desktop-window__controls">
                <span class="icon-btn material-icons" onclick="event.stopPropagation(); appManager.minimize('${id}')">remove</span>
                <span class="icon-btn material-icons" onclick="event.stopPropagation(); appManager.maximize('${id}')">crop_square</span>
                <span class="icon-btn close-btn material-icons" onclick="event.stopPropagation(); appManager.close('${id}')">close</span>
            </div>
        </div>
        <div class="window-content system-desktop-window__content" style="position:relative;">${content}</div>
        <div class="resize-handle" id="resize-${id}"></div>`;
        
        document.getElementById('windowsContainer').appendChild(winEl);
        this.initDrag(winEl);
        this.initResize(winEl, appId);
        
        this._ensureClickBlocker(winEl, true);
        
        const taskItem = this._getOrCreateTaskbarItem(appId, iconCode, title);
        
        setTimeout(() => { this.updateTaskbarScrollButtons(); this.scrollToTaskItem(taskItem); }, 50);
        
        this.windows.push({ id, title, iconCode, el: winEl, taskItem, appType, appId, instanceId });
        this.focus(id);
        
        // 🎯 Initialize Console App if opened
        if (appType === 'capture-console') this.initConsoleWindow(id);
        else if (appType === 'settings') this.initSettingsWindow(id);
    },
    
    openIframeApp: function(title, iconCode, appUrl, options = {}) {

        const appId = options.appId || `app-${Date.now()}`;
        const instanceId = options.instanceId || 1;
        const sandbox = options.sandbox || 'allow-scripts allow-same-origin allow-forms';

        const winEl = document.createElement('div');
        winEl.className = 'window system-desktop-window';
        winEl.id = id;
        this.zIndexCounter = Math.min(this.zIndexCounter + 1, 2999);

        if (wasMaximized) {
            winEl.style.width = '100%'; winEl.style.height = 'calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom))'; winEl.style.top = '0'; winEl.style.left = '0'; winEl.classList.add('maximized', 'system-desktop-window--maximized');
        } else {
            let size = this._getSavedSize(appId);
            if (!size) size = this._getResponsiveSize(appId);
            const validatedSize = this._clampSizeToFit(size.width, size.height);
            winEl.style.width = validatedSize.width + 'px'; winEl.style.height = validatedSize.height + 'px';
            const taskbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-taskbar-height')) || 50;
            const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-safe-bottom')) || 20;
            const availableHeight = window.innerHeight - taskbarHeight - safeBottom;
            winEl.style.left = Math.max(10, (window.innerWidth - validatedSize.width) / 2) + 'px';
            winEl.style.top = Math.max(10, (availableHeight - validatedSize.height) / 2) + 'px';
        }
        winEl.onmousedown = (e) => this.handleWindowClick(e, id);
        winEl.ontouchstart = (e) => this.handleWindowClick(e, id);
        
        const displayTitle = title;
        
        winEl.innerHTML = `<div class="window-header system-desktop-window__header">
            <div class="window-title-area">
                <span class="material-icons" style="font-size:16px;color:var(--system-text-dim);">${iconCode}</span>
                <div class="window-title system-desktop-window__title" id="title-${id}" title="${displayTitle}">${displayTitle}</div>
            </div>
            <div class="window-controls system-desktop-window__controls">
                <span class="icon-btn material-icons" onclick="event.stopPropagation(); appManager.minimize('${id}')">remove</span>
                <span class="icon-btn material-icons" onclick="event.stopPropagation(); appManager.maximize('${id}')">crop_square</span>
                <span class="icon-btn close-btn material-icons" onclick="event.stopPropagation(); appManager.close('${id}')">close</span>
            </div>
        </div>
        <div class="window-content system-desktop-window__content" style="padding:0;background:transparent;position:relative;">
            <iframe src="${appUrl}" data-os-app="true" data-app-id="${appId}" data-instance-id="${instanceId}" sandbox="${sandbox}" style="width:100%;height:100%;border:none;background:transparent;pointer-events:auto;" id="iframe-${id}"></iframe>
            <div class="click-blocker"></div>
        </div>
        <div class="resize-handle" id="resize-${id}"></div>`;
        
        document.getElementById('windowsContainer').appendChild(winEl);
        this.initDrag(winEl);
        this.initResize(winEl, appId);
        
        const taskItem = this._getOrCreateTaskbarItem(appId, iconCode, title);
        
        setTimeout(() => {
            this.updateTaskbarScrollButtons();
            this.scrollToTaskItem(taskItem);
            const iframe = winEl.querySelector('iframe');
            if (iframe) {
                // 🎯 Inject console override on load
                iframe.onload = () => {
                    ThemeManager.registerIframeApp(iframe);
                    this._syncIframeTitle(iframe, id, appId, title);
                    this._injectConsoleOverride(iframe, title); // ✅ Console Bridge Injection
                };
                setTimeout(() => {
                    ThemeManager.registerIframeApp(iframe);
                    this._syncIframeTitle(iframe, id, appId, title);
                    this._injectConsoleOverride(iframe, title); // Retry if needed
                }, 500);
            }
        }, 50);
        this.windows.push({ id, title, iconCode, el: winEl, taskItem, appType: 'iframe', appUrl, appId, instanceId });
        this.focus(id);
    },
    
    scrollTaskbar: function(direction) { document.getElementById('taskbarApps')?.scrollBy({ left: direction, behavior: 'smooth' }); },
    scrollToTaskItem: function(taskItem) { const container = document.getElementById('taskbarApps'); if (!container || !taskItem) return; const itemRect = taskItem.getBoundingClientRect(); const containerRect = container.getBoundingClientRect(); if (itemRect.right > containerRect.right || itemRect.left < containerRect.left) { taskItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' }); } },
    updateTaskbarScrollButtons: function() { const taskbarApps = document.getElementById('taskbarApps'), scrollLeftBtn = document.getElementById('scrollLeftBtn'), scrollRightBtn = document.getElementById('scrollRightBtn'); if (!taskbarApps || !scrollLeftBtn || !scrollRightBtn) return; const hasOverflow = taskbarApps.scrollWidth > taskbarApps.clientWidth; if (!hasOverflow) { scrollLeftBtn.classList.remove('visible'); scrollRightBtn.classList.remove('visible'); return; } scrollLeftBtn.classList.toggle('visible', taskbarApps.scrollLeft > 5); scrollRightBtn.classList.toggle('visible', taskbarApps.scrollLeft < (taskbarApps.scrollWidth - taskbarApps.clientWidth - 5)); },
    initSettingsWindow: function(windowId) { const win = this.windows.find(w => w.id === windowId); if (!win) return; setTimeout(() => { const selector = document.getElementById('themeSelector'), applyBtn = document.getElementById('applyThemeBtn'), refreshBtn = document.getElementById('refreshThemesBtn'); if (selector) ThemeManager.populateThemeSelector('themeSelector'); if (applyBtn) applyBtn.onclick = async () => { const selected = selector?.value; if (selected) { applyBtn.disabled = true; applyBtn.textContent = 'Applying...'; const success = await ThemeManager.apply(selected); applyBtn.disabled = false; applyBtn.textContent = 'Apply'; if (success) { applyBtn.textContent = '✓ Applied!'; setTimeout(() => applyBtn.textContent = 'Apply', 1500); } } else { alert('Please select a theme first'); } }; if (refreshBtn) refreshBtn.onclick = async () => { refreshBtn.disabled = true; refreshBtn.innerHTML = '<span class="material-icons" style="font-size:18px;animation:spin 1s linear infinite">refresh</span>'; await ThemeManager.refreshThemeConfig(); refreshBtn.disabled = false; refreshBtn.innerHTML = '<span class="material-icons" style="font-size:18px;">refresh</span>'; }; }, 100); },
    
    _syncIframeTitle: function(iframe, windowId, appId, fallbackTitle) {
        try {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            if (iframeDoc?.title && iframeDoc.title.trim()) {
                this._updateWindowTitle(windowId, iframeDoc.title.trim());
                try {
                    const titleEl = iframeDoc.querySelector('title');
                    if (titleEl) {
                        const observer = new MutationObserver(() => { if (iframeDoc.title && iframeDoc.title.trim() !== this.windows.find(w => w.id === windowId)?.title) { this._updateWindowTitle(windowId, iframeDoc.title.trim()); } });
                        observer.observe(titleEl, { childList: true, characterData: true });
                        const win = this.windows.find(w => w.id === windowId);
                        if (win) win.titleObserver = observer;
                    }
                } catch (e) {}
            }
        } catch (e) {}
    },
    _updateWindowTitle: function(windowId, newTitle) {
        const win = this.windows.find(w => w.id === windowId);
        if (!win) return;
        const titleEl = document.getElementById(`title-${windowId}`);
        if (titleEl) { titleEl.textContent = newTitle; titleEl.title = newTitle; }
        win.title = newTitle;
        if (win.taskItem) win.taskItem.title = newTitle;
    },
    
    handleWindowClick: function(e, id) { if (e.target.closest('.window-controls') || e.target.closest('.resize-handle') || e.target.classList.contains('address-bar')) return; if (this.activeWindowId !== id) { e.preventDefault(); e.stopPropagation(); this.focus(id); return false; } },
    
    close: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (win) { 
            if (win.titleObserver) { win.titleObserver.disconnect(); delete win.titleObserver; }
            if (win.onClose) { try { win.onClose(); } catch(e){} }
            win.el.remove(); 
            const appId = win.appId;
            this.windows = this.windows.filter(w => w.id !== id); 
            if (this.activeWindowId === id) this.activeWindowId = null; 
            const remainingInstances = this.windows.filter(w => w.appId === appId);
            const taskItem = document.querySelector(`.taskbar-item[data-app-id="${appId}"]`);
            if (remainingInstances.length === 0 && taskItem) { taskItem.remove(); } 
            else if (taskItem) { this._updateGroupIndicator(taskItem, remainingInstances.length); }
            this._closeAllPopups();
            setTimeout(() => this.updateTaskbarScrollButtons(), 50); 
        } 
    },
    
    minimize: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (win) { 
            win.el.classList.add('minimized', 'system-desktop-window--minimized');
            const blocker = win.el.querySelector('.click-blocker');
            if (blocker) blocker.classList.add('hidden');
            this.updateTaskbarActiveStates();
        } 
    },
    
    maximize: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (!win) return; 
        const isCurrentlyMaximized = win.el.classList.contains('maximized') || win.el.classList.contains('system-desktop-window--maximized'); 
        if (isCurrentlyMaximized) { 
            const size = this._getSavedSize(win.appId) || this._getResponsiveSize(win.appId); 
            const validatedSize = this._clampSizeToFit(size.width, size.height); 
            win.el.style.width = validatedSize.width + 'px'; 
            win.el.style.height = validatedSize.height + 'px'; 
            win.el.style.top = Math.max(10, (window.innerHeight - validatedSize.height) / 2) + 'px'; 
            win.el.style.left = Math.max(10, (window.innerWidth - validatedSize.width) / 2) + 'px'; 
            win.el.classList.remove('maximized', 'system-desktop-window--maximized'); 
            if (win.appId) this._saveMaximized(win.appId, false); 
        } else { 
            win.el.style.width = '100%'; 
            win.el.style.height = 'calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom))'; 
            win.el.style.top = '0'; 
            win.el.style.left = '0'; 
            win.el.classList.add('maximized', 'system-desktop-window--maximized'); 
            if (win.appId) this._saveMaximized(win.appId, true); 
        } 
        this.focus(id); 
    },
    
    toggle: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (!win) return; 
        if (win.el.classList.contains('minimized')) { win.el.classList.remove('minimized', 'system-desktop-window--minimized'); this.focus(id); } 
        else { if (this.activeWindowId === id) this.minimize(id); else this.focus(id); } 
    },
    
    focus: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (!win) return; 
        this.ensureWindowInBounds(id); 
        this.zIndexCounter = Math.min(this.zIndexCounter + 1, 2999);
        win.el.style.zIndex = this.zIndexCounter;
        win.el.style.setProperty('--window-z-index', this.zIndexCounter);
        this.windows.forEach(w => { 
            w.taskItem.classList.remove('active', 'system-desktop-taskbar__item--active');
            if (w.id !== id) { const blocker = w.el.querySelector('.click-blocker'); if (blocker) blocker.classList.remove('hidden'); }
            if (w.id === id) { const blocker = w.el.querySelector('.click-blocker'); if (blocker) blocker.classList.add('hidden'); }
        }); 
        win.taskItem.classList.add('active', 'system-desktop-taskbar__item--active'); 
        win.el.classList.remove('minimized', 'system-desktop-window--minimized'); 
        this.activeWindowId = id; 
        this.scrollToTaskItem(win.taskItem); 
        this.updateTaskbarActiveStates();
    },
    
    initDrag: function(el) { 
        const header = el.querySelector('.window-header'); 
        let isDragging = false, startX, startY, initialLeft, initialTop; 
        const getBounds = () => { const taskbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-taskbar-height')) || 50; const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-safe-bottom')) || 20; return { maxWidth: window.innerWidth, maxHeight: window.innerHeight - taskbarHeight - safeBottom - 10 }; }; 
        const start = (e) => { if(e.target.closest('.window-controls') || e.target.classList.contains('address-bar')) return; if(e.type === 'touchstart') e.preventDefault(); isDragging = true; const clientX = e.type.includes('mouse') ? e.clientX : e.touches?.[0]?.clientX; const clientY = e.type.includes('mouse') ? e.clientY : e.touches?.[0]?.clientY; startX = clientX; startY = clientY; initialLeft = el.offsetLeft; initialTop = el.offsetTop; this.focus(el.id); }; 
        const move = (e) => { if (!isDragging) return; if(e.type === 'touchmove') e.preventDefault(); const clientX = e.type.includes('mouse') ? e.clientX : e.touches?.[0]?.clientX; const clientY = e.type.includes('mouse') ? e.clientY : e.touches?.[0]?.clientY; let newLeft = initialLeft + (clientX - startX), newTop = initialTop + (clientY - startY); const { maxWidth, maxHeight } = getBounds(); const winRect = el.getBoundingClientRect(); const minWidth = Math.min(100, winRect.width), minHeight = 40; newLeft = Math.max(-winRect.width + minWidth, Math.min(newLeft, maxWidth - minWidth)); newTop = Math.max(0, Math.min(newTop, maxHeight - minHeight)); el.style.left = newLeft + "px"; el.style.top = newTop + "px"; }; 
        const end = () => { isDragging = false; }; 
        header.addEventListener("mousedown", start); header.addEventListener("touchstart", start, { passive: false }); document.addEventListener("mousemove", move); document.addEventListener("touchmove", move, { passive: false }); document.addEventListener("mouseup", end); document.addEventListener("touchend", end); 
    },
    
    initResize: function(el, appId) {
        const handle = el.querySelector('.resize-handle');
        let isResizing = false, startW, startH, startMX, startMY;
        const start = (e) => { if(e.type === 'touchstart') e.preventDefault(); isResizing = true; startW = parseInt(window.getComputedStyle(el).width, 10); startH = parseInt(window.getComputedStyle(el).height, 10); startMX = e.type.includes('mouse') ? e.clientX : e.touches?.[0]?.clientX; startMY = e.type.includes('mouse') ? e.clientY : e.touches?.[0]?.clientY; this.focus(el.id); };
        const move = (e) => { if (!isResizing) return; if(e.type === 'touchmove') e.preventDefault(); const clientX = e.type.includes('mouse') ? e.clientX : e.touches?.[0]?.clientX; const clientY = e.type.includes('mouse') ? e.clientY : e.touches?.[0]?.clientY; const newW = startW + (clientX - startMX), newH = startH + (clientY - startMY); if (newW > 200) el.style.width = newW + "px"; if (newH > 150) el.style.height = newH + "px"; };
        const end = () => { if (!isResizing) return; isResizing = false; if (appId && !el.classList.contains('maximized') && !el.classList.contains('system-desktop-window--maximized')) { const width = parseInt(el.style.width, 10); const height = parseInt(el.style.height, 10); const validatedSize = this._clampSizeToFit(width, height); this._debounce(() => { this._saveSize(appId, validatedSize.width, validatedSize.height); }, 300, 'resize-save-' + appId); } };
        handle.addEventListener("mousedown", start); handle.addEventListener("touchstart", start, { passive: false }); document.addEventListener("mousemove", move); document.addEventListener("touchmove", move, { passive: false }); document.addEventListener("mouseup", end); document.addEventListener("touchend", end); 
    }
};

window.addEventListener('message', (e) => {
    if (e.data?.type === 'themeRequest') { ThemeManager.broadcastThemeToApps(ThemeManager.currentTheme); return; }
    if (e.data?.type === 'appReady' && e.data.appId) { const iframe = document.querySelector(`iframe[data-app-id="${e.data.appId}"]`); if (iframe) ThemeManager.registerIframeApp(iframe); return; }
});

window.addEventListener('orientationchange', () => { appManager._closeAllPopups(); setTimeout(() => { appManager.windows.forEach(win => { if (win.el.classList.contains('maximized') || win.el.classList.contains('system-desktop-window--maximized')) return; const size = appManager._getResponsiveSize(win.appId); const el = win.el; const validatedSize = appManager._clampSizeToFit(parseInt(el.style.width, 10), parseInt(el.style.height, 10)); el.style.width = validatedSize.width + 'px'; el.style.height = validatedSize.height + 'px'; const taskbarHeight = 50; const safeBottom = 20; const availableHeight = window.innerHeight - taskbarHeight - safeBottom; el.style.left = Math.max(10, (window.innerWidth - validatedSize.width) / 2) + 'px'; el.style.top = Math.max(10, (availableHeight - validatedSize.height) / 2) + 'px'; }); }, 100); });

window.addEventListener('resize', () => { appManager._closeAllPopups(); setTimeout(() => { appManager.windows.forEach(win => { if (win.el.classList.contains('maximized') || win.el.classList.contains('system-desktop-window--maximized')) return; const el = win.el; const currentW = parseInt(el.style.width, 10); const currentH = parseInt(el.style.height, 10); const validatedSize = appManager._clampSizeToFit(currentW, currentH); if (validatedSize.wasResized) { el.style.width = validatedSize.width + 'px'; el.style.height = validatedSize.height + 'px'; const taskbarHeight = 50; const safeBottom = 20; const availableHeight = window.innerHeight - taskbarHeight - safeBottom; el.style.left = Math.max(10, (window.innerWidth - validatedSize.width) / 2) + 'px'; el.style.top = Math.max(10, (availableHeight - validatedSize.height) / 2) + 'px'; } }); appManager.updateTaskbarScrollButtons(); }, 100); });

document.getElementById('taskbarApps')?.addEventListener('scroll', () => appManager.updateTaskbarScrollButtons());
setTimeout(() => appManager.updateTaskbarScrollButtons(), 100);
window.addEventListener('themeChanged', (e) => { console.log(`🎨 Theme changed: ${e.detail.theme}`); });

if ('fonts' in document) { document.fonts.load('12px "Material Icons"').catch(() => console.warn('⚠ Material Icons font failed to load.')); }

if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); AppRegistry.init(); }); } else { ThemeManager.init(); AppRegistry.init(); }
