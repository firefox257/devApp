<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Material Icons OS</title>

<!-- === LOCAL MATERIAL ICONS FONT === -->
<style id="material-icons-font">
@font-face {
  font-family: 'Material Icons';
  src: url('/system/fonts/MaterialIcons-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: block;
}
</style>

<!-- === CORE SYSTEM VARIABLES (:root) === -->
<style id="system-variables">
:root {
	/* FLUID SIZING & SPACING */
	--system-taskbar-height: clamp(44px, 8vh, 50px);
	--system-safe-bottom: env(safe-area-inset-bottom, 12px);
	--system-bg: #004e92;
	--system-window-bg: #ffffff;
	--system-header-bg: #e8e8e8;
	--system-accent: #0078d4;
	--system-accent-dim: #005a9e;
	--system-highlight: #4da3ff;
	--system-text: #333;
	--system-text-dim: #666;
	--system-text-on-accent: #ffffff;
	--system-border: #ccc;
	--system-border-hover: #999;
	--system-menu-bg: rgba(30, 30, 30, 0.95);
	--system-radius: clamp(6px, 1.5vw, 8px);
	--system-radius-lg: clamp(10px, 2vw, 16px);
	--system-shadow: 0 2px 10px rgba(0,0,0,0.15);
	--system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	--system-font-mono: 'Courier New', Courier, monospace;
	--system-success: #4caf50;
	--system-warning: #ffc107;
	--system-danger: #f44336;
	--system-info: #2196f3;
	
	/* ICON & UI VARIABLES */
	--system-icon-size: clamp(28px, 6vw, 32px);
	--system-icon-border: none;
	--system-icon-border-hover: 1px solid rgba(255,255,255,0.2);
	--system-icon-bg: transparent;
	--system-icon-bg-hover: rgba(255, 255, 255, 0.15);
	--system-taskbar-glow: none;
	--system-window-glow: none;
	--system-icon-glow: none;
	--system-start-menu-blur: 15px;
	--system-taskbar-blur: 15px;
	--system-start-menu-title-icon: var(--system-accent);
	
	/* ✨ Z-INDEX LAYER SYSTEM (v2.7+) */
	--z-background: 0;
	--z-canvas-back: 100;
	--z-desktop-icons: 1000;
	--z-canvas-front: 1500;
	--z-windows-base: 2000;
	--z-windows-max: 2999;
	--z-taskbar: 3000;
	--z-context-menus: 3500;
	--z-modals: 4000;
	
	/* ✨ MYSTIC REALM: Optional sparkle layer toggles */
	--mystic-enable-back-sparkles: 1;
	--mystic-enable-front-sparkles: 1;
	--mystic-front-sparkles-opacity: 0.6;
}

/* ✅ FIXED: Removed global touch-action: none - was blocking iOS scroll! */
* { 
    box-sizing: border-box; 
    user-select: none; 
    -webkit-user-select: none; 
    -webkit-tap-highlight-color: transparent; 
}

/* ✅ Apply touch-action: none ONLY to draggable/interactive elements */
.window-header, .resize-handle, .icon, .system-desktop-icon, 
.taskbar-item, .start-btn, .system-btn-icon, .icon-btn,
.start-menu-category, .start-menu-app {
    touch-action: none;
}

#themeCanvas { 
	position: fixed !important; 
	top: 0 !important; 
	left: 0 !important; 
	width: 100% !important; 
	height: 100% !important; 
	z-index: var(--z-canvas-back, 100) !important; 
	pointer-events: none !important; 
	background: transparent !important; 
	display: none; 
}

/* ✨ FRONT SPARKLE LAYER CONTAINER */
#mysticFrontLayer {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	z-index: var(--z-canvas-front, 1500);
	pointer-events: none;
	overflow: hidden;
	display: none;
}

#mysticFrontLayer .rune-sparkle {
	position: absolute;
	font-size: 20px;
	color: var(--system-highlight, #c77dff);
	text-shadow: 0 0 10px var(--system-accent, #9d4edd), 
	             0 0 20px var(--system-highlight, #c77dff);
	animation: rune-sparkle 1.5s ease-out forwards;
	opacity: var(--mystic-front-sparkles-opacity, 0.6);
	will-change: transform, opacity;
	pointer-events: none;
}

@keyframes rune-sparkle {
	0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
	20% { opacity: 1; }
	80% { opacity: 0.8; }
	100% { opacity: 0; transform: scale(1.8) rotate(180deg) translateY(-20px); }
}

body { 
	margin: 0; 
	padding: 0; 
	font-family: var(--system-font); 
	overflow: hidden; 
	height: 100dvh; 
	width: 100vw; 
	background-color: var(--system-bg) !important; 
	transition: background 0.3s ease; 
	position: relative; 
	color: var(--system-text); 
	z-index: var(--z-background, 0); 
	font-size: var(--system-font-size-base, 14px); 
	touch-action: pan-y;
	-webkit-overflow-scrolling: touch;
}

.material-icons { 
	font-family: 'Material Icons' !important; 
	font-weight: normal !important; 
	font-style: normal !important; 
	font-size: 24px !important; 
	line-height: 1 !important; 
	letter-spacing: normal !important; 
	text-transform: none !important; 
	display: inline-flex !important; 
	align-items: center !important; 
	justify-content: center !important; 
	white-space: nowrap !important; 
	word-wrap: normal !important; 
	direction: ltr !important; 
	-webkit-font-feature-settings: 'liga' !important; 
	font-feature-settings: 'liga' !important; 
	-webkit-font-smoothing: antialiased !important; 
	color: var(--system-text); 
	vertical-align: middle; 
	transition: color 0.2s, text-shadow 0.2s; 
}

.icon-btn, .system-btn-icon, .taskbar-scroll-btn, .start-btn { 
	display: inline-flex !important; 
	align-items: center !important; 
	justify-content: center !important; 
	text-align: center !important; 
	vertical-align: middle !important; 
	font-family: 'Material Icons' !important; 
	font-weight: normal !important; 
	font-style: normal !important; 
	line-height: 1 !important; 
	letter-spacing: normal !important; 
	text-transform: none !important; 
	white-space: nowrap !important; 
	word-wrap: normal !important; 
	direction: ltr !important; 
	-webkit-font-feature-settings: 'liga' !important; 
	font-feature-settings: 'liga' !important; 
	-webkit-font-smoothing: antialiased !important; 
	cursor: pointer; 
	transition: all 0.2s ease; 
	background: transparent; 
	border: none; 
	color: var(--system-text); 
}
.icon-btn, .system-btn-icon { 
	width: clamp(28px, 6vw, 32px); 
	height: clamp(28px, 6vw, 32px); 
	border-radius: var(--system-radius); 
	font-size: clamp(16px, 4vw, 18px) !important; 
}
.taskbar-scroll-btn { 
	width: clamp(28px, 6vw, 32px); 
	height: var(--system-taskbar-height); 
	border-radius: var(--system-radius); 
	font-size: clamp(16px, 4vw, 18px) !important; 
	background: rgba(255,255,255,0.1); 
}
.start-btn { 
	width: clamp(36px, 8vw, 40px); 
	height: clamp(36px, 8vw, 40px); 
	border-radius: var(--system-radius); 
	font-size: clamp(20px, 5vw, 24px) !important; 
}
.icon-btn:active, .system-btn-icon:active, .taskbar-scroll-btn:active, .start-btn:active { 
	background: rgba(0,0,0,0.15); 
	transform: scale(0.95); 
}
.icon-btn.close-btn:active { 
	background: #e81123 !important; 
	color: white !important; 
}
.taskbar-scroll-btn { 
	opacity: 0; 
	pointer-events: none; 
}
.taskbar-scroll-btn.visible { 
	opacity: 1; 
	pointer-events: auto; 
}

/* === TOUCH OPTIMIZATION === */
@media (hover: none) and (pointer: coarse) {
	.icon:active, .system-desktop-icon:active { 
		background: var(--system-icon-bg-hover) !important; 
		transform: scale(0.96) !important; 
	}
	.taskbar-item:active, .system-desktop-taskbar__item:active { 
		background: rgba(255,255,255,0.15) !important; 
		transform: scale(0.95) !important; 
	}
	.menu-item:active, .system-desktop-start-menu__item:active { 
		background: rgba(255,255,255,0.1) !important; 
	}
}

/* === DESKTOP AREA & GRID === */
.desktop-area, .system-desktop__container { 
	height: calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom)); 
	width: 100%; 
	padding: clamp(6px, 1.5vw, 10px); 
	display: flex; 
	flex-wrap: wrap; 
	align-content: flex-start; 
	gap: clamp(4px, 1vw, 8px); 
	position: relative; 
	z-index: var(--z-desktop-icons, 1000);
	overflow: hidden; 
}
.system-desktop__grid { 
	display: grid; 
	grid-template-columns: repeat(auto-fill, minmax(clamp(56px, 14vw, 70px), 1fr)); 
	gap: clamp(4px, 1vw, 8px); 
	align-content: start; 
}

/* === DESKTOP ICONS === */
.icon, .system-desktop-icon { 
	width: clamp(56px, 14vw, 70px); 
	height: clamp(68px, 16vw, 80px); 
	display: flex; 
	flex-direction: column; 
	align-items: center; 
	justify-content: center; 
	border-radius: var(--system-radius); 
	color: var(--system-text); 
	text-shadow: 0 1px 2px rgba(0,0,0,0.8); 
	cursor: pointer; 
	background: var(--system-icon-bg); 
	border: var(--system-icon-border); 
	transition: all 0.2s ease; 
	padding: clamp(4px, 0.5vw, 6px);
	position: relative;
	z-index: var(--z-desktop-icons, 1000);
}
.icon:active, .system-desktop-icon:active { 
	background: var(--system-icon-bg-hover); 
}
.icon .material-icons, .system-desktop-icon__icon { 
	font-size: var(--system-icon-size); 
	margin-bottom: clamp(2px, 0.5vw, 4px); 
	color: var(--system-text); 
}
.icon span, .system-desktop-icon__label { 
	font-size: clamp(10px, 2vw, 11px); 
	text-align: center; 
	width: 100%; 
	overflow: hidden; 
	text-overflow: ellipsis; 
	white-space: nowrap; 
	color: var(--system-text); 
	line-height: 1.2; 
}

/* === START MENU === */
.start-menu, .system-desktop-start-menu { 
	position: absolute; 
	bottom: calc(var(--system-taskbar-height) + var(--system-safe-bottom) + clamp(6px, 1.5vw, 10px)); 
	left: clamp(8px, 2vw, 10px); 
	width: min(320px, 92vw); 
	background: var(--system-menu-bg); 
	backdrop-filter: blur(var(--system-start-menu-blur)); 
	-webkit-backdrop-filter: blur(var(--system-start-menu-blur)); 
	border-radius: var(--system-radius-lg); 
	padding: 0; 
	z-index: var(--z-context-menus, 3500);
	display: none; 
	box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
	border: 1px solid rgba(255,255,255,0.1); 
	animation: slideUp 0.2s ease-out; 
	overflow: hidden; 
	max-height: min(70vh, 650px);
}
@keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* === START MENU HEADER === */
.start-menu-header, .system-desktop-start-menu__header {
	display: flex;
	align-items: center;
	gap: clamp(6px, 1.5vw, 8px);
	padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px);
	border-bottom: 1px solid var(--system-border);
	background: var(--system-header-bg);
	border-radius: var(--system-radius-lg) var(--system-radius-lg) 0 0;
	min-height: clamp(44px, 10vw, 52px);
}

.start-menu-back { display: none !important; background: transparent !important; border: none !important; color: var(--system-text) !important; padding: 4px !important; cursor: pointer; width: 32px; height: 32px; }
.start-menu-back.visible { display: flex !important; }
.start-menu-back:active { background: rgba(255,255,255,0.1) !important; border-radius: 4px; }

.start-menu-title { flex: 1; font-weight: 600; color: var(--system-text); text-align: center; font-size: clamp(13px, 3vw, 15px); display: flex; align-items: center; justify-content: center; gap: clamp(4px, 1vw, 6px); min-width: 0; }
.start-menu-title-icon { font-size: clamp(16px, 4vw, 18px) !important; color: var(--system-start-menu-title-icon); flex-shrink: 0; vertical-align: middle; transition: color 0.2s ease; }
#startMenuTitleText { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: clamp(140px, 50vw, 220px); }

.start-menu-close { background: transparent !important; border: none !important; color: var(--system-text-dim) !important; padding: 4px !important; cursor: pointer; flex-shrink: 0; width: 32px; height: 32px; }
.start-menu-close:active { color: var(--system-danger) !important; border-radius: 4px; }

/* === START MENU CONTENT === */
.start-menu-content, .system-desktop-start-menu__content { 
    max-height: calc(70vh - 60px); 
    overflow-y: auto; 
    overflow-x: hidden; 
    padding: clamp(4px, 1vw, 8px) clamp(2px, 0.5vw, 4px); 
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
}

.start-menu-category { display: flex; align-items: center; gap: clamp(8px, 2vw, 12px); padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 16px); border-radius: var(--system-radius); cursor: pointer; transition: background 0.2s ease; margin: clamp(2px, 0.5vw, 4px) clamp(4px, 1vw, 8px); min-height: 44px; }
.start-menu-category:active { background: rgba(255,255,255,0.1); }
.start-menu-category .material-icons { font-size: clamp(20px, 5vw, 24px); color: var(--system-accent); min-width: 24px; }
.start-menu-category-info { flex: 1; min-width: 0; }
.start-menu-category-name { font-weight: 600; color: var(--system-text); font-size: clamp(12px, 2.5vw, 14px); }
.start-menu-category-desc { font-size: clamp(10px, 2vw, 11px); color: var(--system-text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.start-menu-category-count { font-size: clamp(10px, 2vw, 11px); color: var(--system-text-dim); background: rgba(255,255,255,0.1); padding: clamp(1px, 0.5vw, 2px) clamp(4px, 1vw, 8px); border-radius: 10px; margin-left: clamp(4px, 1vw, 8px); }

.start-menu-app { display: flex; align-items: center; gap: clamp(8px, 2vw, 12px); padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 16px); border-radius: var(--system-radius); cursor: pointer; transition: background 0.2s ease; margin: clamp(1px, 0.5vw, 2px) clamp(4px, 1vw, 8px); min-height: 44px; }
.start-menu-app:active { background: rgba(255,255,255,0.1); }
.start-menu-app .material-icons { font-size: clamp(18px, 4.5vw, 20px); color: var(--system-text-dim); min-width: 20px; }
.start-menu-app-name { flex: 1; font-size: clamp(12px, 2.5vw, 13px); color: var(--system-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.start-menu-app-desc { font-size: clamp(10px, 2vw, 11px); color: var(--system-text-dim); display: none; }
.start-menu-app:active .start-menu-app-desc { display: block; }

.start-menu-section-header { padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px) clamp(2px, 0.5vw, 4px); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: clamp(9px, 2vw, 11px); color: var(--system-text-dim); }

.start-menu-empty { text-align: center; padding: clamp(20px, 5vw, 30px) clamp(16px, 4vw, 20px); color: var(--system-text-dim); }
.start-menu-empty .material-icons { font-size: clamp(32px, 8vw, 40px); color: var(--system-border); margin-bottom: 12px; }

.start-menu-content { animation: fadeIn 0.15s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 400px) {
	.start-menu, .system-desktop-start-menu { width: 96vw; left: 2vw; }
	.start-menu-category-desc { display: none !important; }
	.start-menu-title { justify-content: flex-start; padding-left: 2px; }
	#startMenuTitleText { max-width: clamp(120px, 45vw, 160px); }
}

/* === WINDOWS CONTAINER & WINDOWS === */
#windowsContainer, .system-desktop__windows-container { 
	position: absolute; 
	top: 0; 
	left: 0; 
	width: 100%; 
	height: calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom)); 
	overflow: hidden; 
	pointer-events: none; 
	z-index: var(--z-windows-base, 2000);
}
#windowsContainer > .window { pointer-events: auto; }

.window, .system-desktop-window { 
	position: absolute; 
	top: max(5vh, 20px); 
	left: max(2vw, 10px); 
	width: min(90vw, 1000px); 
	height: min(75vh, 750px); 
	background: var(--system-window-bg); 
	border-radius: var(--system-radius-lg); 
	box-shadow: var(--system-window-glow), var(--system-shadow); 
	display: flex; 
	flex-direction: column; 
	overflow: hidden; 
	border: 1px solid var(--system-border); 
	min-width: clamp(280px, 90vw, 320px); 
	min-height: clamp(200px, 60vh, 280px); 
	transition: transform 0.2s, opacity 0.2s; 
	z-index: var(--window-z-index, 2000);
}

/* ✅ FIXED: Minimized windows block ALL pointer events */
.window.minimized, 
.system-desktop-window--minimized,
.window.minimized *, 
.system-desktop-window--minimized * {
    pointer-events: none !important;
    user-select: none !important;
    -webkit-user-select: none !important;
}

.window.minimized, .system-desktop-window--minimized { transform: scale(0.8) translateY(150px); opacity: 0; pointer-events: none; }
.window.maximized, .system-desktop-window--maximized { width: 100vw !important; height: calc(100dvh - var(--system-taskbar-height) - var(--system-safe-bottom)) !important; top: 0 !important; left: 0 !important; border-radius: 0 !important; min-width: 100% !important; min-height: 100% !important; }

.window-header, .system-desktop-window__header { height: clamp(36px, 8vw, 40px); background: var(--system-header-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(8px, 2vw, 10px); border-bottom: 1px solid var(--system-border); cursor: grab; }
.window-header:active, .system-desktop-window__header:active { cursor: grabbing; }
.window-title-area { display: flex; align-items: center; gap: clamp(6px, 1.5vw, 8px); flex: 1; overflow: hidden; }
.window-title, .system-desktop-window__title { font-size: clamp(12px, 2.5vw, 13px); color: var(--system-text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.window-controls, .system-desktop-window__controls { display: flex; gap: clamp(2px, 0.5vw, 4px); align-items: center; }
.window-content, .system-desktop-window__content { flex: 1; background: var(--system-window-bg); color: var(--system-text); overflow: hidden; display: flex; flex-direction: column; position: relative; }

/* ✅ FIXED: Click-blocker covers entire content area */
.click-blocker { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: transparent; 
    z-index: 100; 
    cursor: default;
    pointer-events: auto;
}
.click-blocker.hidden { display: none; }

.resize-handle { position: absolute; bottom: 0; right: 0; width: clamp(16px, 4vw, 20px); height: clamp(16px, 4vw, 20px); cursor: nwse-resize; z-index: 10; background: linear-gradient(135deg, transparent 50%, var(--system-accent) 50%); opacity: 0.5; transition: opacity 0.2s; }
.resize-handle:active { opacity: 1; box-shadow: 0 0 15px rgba(0, 120, 212, 0.6); }

/* === TASKBAR - VERTICALLY CENTERED & THEME-COMPLIANT === */
.taskbar, .system-desktop-taskbar { 
	position: absolute !important; 
	bottom: 0 !important; 
	width: 100% !important; 
	height: calc(var(--system-taskbar-height) + var(--system-safe-bottom)); 
	background: rgba(20, 20, 20, 0.9); 
	backdrop-filter: blur(var(--system-taskbar-blur)); 
	-webkit-backdrop-filter: blur(var(--system-taskbar-blur)); 
	display: flex; 
	align-items: center !important; 
	justify-content: space-between; 
	padding: 0 clamp(6px, 2vw, 10px); 
	padding-bottom: var(--system-safe-bottom); 
	z-index: var(--z-taskbar, 3000) !important;
	border-top: 1px solid rgba(255,255,255,0.1); 
	box-shadow: var(--system-taskbar-glow); 
}
.start-btn, .system-desktop-taskbar__start-btn { flex-shrink: 0; padding: 0 !important; margin: 0 !important; }
.taskbar-apps-wrapper, .system-desktop-taskbar__apps-wrapper { 
	flex: 1; 
	display: flex; 
	align-items: center !important; 
	padding-left: clamp(4px, 1vw, 10px); 
	padding-right: clamp(4px, 1vw, 10px); 
	gap: clamp(4px, 1vw, 6px); 
	position: relative; 
	overflow: hidden; 
}
.taskbar-apps, .system-desktop-taskbar__apps { display: flex; gap: clamp(4px, 1vw, 6px); overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; padding: clamp(2px, 0.5vw, 3px) 0; }
.taskbar-apps::-webkit-scrollbar { display: none; }
.taskbar-item, .system-desktop-taskbar__item { 
	min-width: clamp(36px, 8vw, 44px); 
	height: clamp(36px, 8vw, 44px); 
	display: flex; 
	align-items: center; 
	justify-content: center; 
	border-radius: clamp(4px, 1vw, 6px); 
	position: relative; 
	color: var(--system-text); 
	cursor: pointer; 
	background: rgba(255,255,255,0.05); 
	border: 1px solid rgba(255,255,255,0.1); 
	flex-shrink: 0; 
	transition: all 0.2s ease; 
}
.taskbar-item:active, .system-desktop-taskbar__item:active { background: rgba(255,255,255,0.2); transform: scale(0.95); }
.taskbar-item.active, .system-desktop-taskbar__item--active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); }

/* === TASKBAR GROUPED INDICATOR === */
.taskbar-item.grouped {
    position: relative;
}

.taskbar-group-indicator {
    position: absolute;
    bottom: 2px;
    right: 2px;
    font-size: 8px;
    background: var(--system-accent);
    color: var(--system-text-on-accent);
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 600;
    pointer-events: none;
}

/* === TASKBAR INSTANCE GROUP POPUP === */
.taskbar-instance-popup {
    position: absolute;
    bottom: calc(var(--system-taskbar-height) + var(--system-safe-bottom) + 8px);
    left: 0;
    background: var(--system-menu-bg, rgba(30, 30, 30, 0.95)) !important;
    backdrop-filter: blur(var(--system-taskbar-blur, 15px));

<!-- === THEME MANAGER v3.0 === -->
<script>
const ThemeManager = {
	configUrl: 'themes.json', baseUrl: '', currentTheme: null, themeConfig: null,
	activeCleanup: null, themeScriptEl: null,
	themeLinkEl: document.getElementById('theme-stylesheet'),
	canvas: document.getElementById('themeCanvas'),
	themeIntervals: [], themeTimeouts: [], themeAnimationFrames: [],

	getSystemVariables() {
		const root = document.documentElement; const style = getComputedStyle(root);
		const varNames = ['--system-bg','--system-window-bg','--system-header-bg','--system-accent','--system-accent-dim','--system-highlight','--system-text','--system-text-dim','--system-text-on-accent','--system-border','--system-border-hover','--system-menu-bg','--system-radius','--system-radius-lg','--system-shadow','--system-font','--system-font-mono','--system-taskbar-height','--system-safe-bottom','--system-success','--system-warning','--system-danger','--system-info','--system-icon-border','--system-icon-border-hover','--system-icon-bg','--system-icon-bg-hover','--system-taskbar-glow','--system-window-glow','--system-icon-glow','--system-start-menu-blur','--system-taskbar-blur','--system-start-menu-title-icon',
		'--z-background','--z-canvas-back','--z-desktop-icons','--z-canvas-front','--z-windows-base','--z-windows-max','--z-taskbar','--z-context-menus','--z-modals'];
		const vars = {};
		for (const name of varNames) vars[name] = style.getPropertyValue(name).trim();
		return vars;
	},

	broadcastThemeToApps(themeId = this.currentTheme) {
		if (!themeId) return;
		const systemVars = this.getSystemVariables();
		document.querySelectorAll('iframe[data-os-app]').forEach(iframe => {
				try {
					const targetOrigin = iframe.src?.startsWith('http') ? new URL(iframe.src).origin : window.location.origin;
					iframe.contentWindow.postMessage({ 
                        type: 'themeUpdate', 
                        themeId, 
                        variables: systemVars, 
                        timestamp: Date.now(),
                        appId: iframe.dataset.appId,
                        instanceId: iframe.dataset.instanceId
                    }, targetOrigin);
				} catch (e) { console.warn('⚠ Could not sync theme to iframe:', e); }
			});
	},

	registerIframeApp(iframe) {
		if (!iframe.hasAttribute('data-os-app')) iframe.setAttribute('data-os-app', 'true');
		setTimeout(() => this.broadcastThemeToApps(this.currentTheme), 100);
	},

	initAppMessageListener() {
		window.addEventListener('message', (e) => {
				if (e.data?.type === 'themeRequest') this.broadcastThemeToApps(this.currentTheme);
				if (e.data?.type === 'appReady' && e.data.appId) {
					const iframe = document.querySelector(`iframe[data-app-id="${e.data.appId}"]`);
					if (iframe) this.registerIframeApp(iframe);
				}
			});
	},

	async init() {
		console.log('🔧 ThemeManager.init() starting');
		try {
			const response = await fetch(this.configUrl, { cache: 'no-store' });
			if (!response.ok) throw new Error(`HTTP ${response.status}`);
			this.themeConfig = await response.json();
			console.log('✓ Theme config loaded:', Object.keys(this.themeConfig));

			const savedTheme = this.getSavedThemePreference();
			const urlParams = new URLSearchParams(window.location.search);
			const requestedTheme = urlParams.get('theme');
			const themeToApply = requestedTheme || (savedTheme && this.themeConfig[savedTheme] ? savedTheme : 'default');

			await this.apply(themeToApply);
			this.initAppMessageListener();
		} catch (error) {
			console.error('✗ Failed to load theme config:', error);
			this.applyFallback();
		}
	},

	async apply(themeId) {
		if (!this.themeConfig?.[themeId]) { console.warn(`✗ Theme "${themeId}" not found`); return false; }
		const theme = this.themeConfig[themeId];
		console.log(`→ Applying theme: ${theme.name} (${themeId})`);

		await this.cleanup();
		
		document.documentElement.setAttribute('data-theme', 'default');
		document.body.setAttribute('data-theme', 'default');
		document.body.style.background = '';
		document.body.style.backgroundColor = 'var(--system-bg)';
		
		void document.body.offsetHeight;
		
		document.documentElement.setAttribute('data-theme', themeId);
		document.body.setAttribute('data-theme', themeId);
		
		await this.loadCSS(theme.css);
		setTimeout(() => { document.body.style.background = ''; document.body.style.backgroundColor = 'var(--system-bg)'; }, 100);
		this.canvas.style.display = theme.canvas ? 'block' : 'none';
		const ctx = this.canvas.getContext('2d');
		if (ctx) { ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
		if (theme.script) {
			console.log(`→ Loading script: ${theme.script}`);
			this.activeCleanup = await this.loadScript(theme.script);
			console.log(`✓ Script loaded, cleanup ready`);
		} else {
			this.activeCleanup = null;
		}

		this.currentTheme = themeId;
		this.saveThemePreference(themeId);
		this.broadcastThemeToApps(themeId);
		window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: themeId, config: theme } }));
		console.log(`✓ Theme applied: ${theme.name}`);
		return true;
	},

	async loadCSS(cssPath) {
		return new Promise((resolve, reject) => {
			const oldLink = document.getElementById('theme-stylesheet');
			if (oldLink && oldLink.parentNode) {
				oldLink.parentNode.removeChild(oldLink);
				void document.body.offsetHeight;
			}
			if (!cssPath) { resolve(); return; }
			const newLink = document.createElement('link');
			newLink.id = 'theme-stylesheet';
			newLink.rel = 'stylesheet';
			newLink.href = this.baseUrl + cssPath + '?t=' + Date.now();
			newLink.onload = () => {
				this.themeLinkEl = newLink;
				setTimeout(resolve, 50);
			};
			newLink.onerror = reject;
			document.head.appendChild(newLink);
		});
	},

	async loadScript(scriptPath) {
		return new Promise(async (resolve) => {
			if (typeof this.activeCleanup === 'function' || typeof window.ThemeCleanup === 'function') {
				console.log('🧹 Waiting for previous script cleanup...');
				
				const cleanupConfirmed = new Promise((confirmResolve) => {
					let cleanupDone = false;
					
					const markDone = () => {
						if (!cleanupDone) {
							cleanupDone = true;
							confirmResolve();
						}
					};
					
					if (typeof this.activeCleanup === 'function') {
						try {
							this.activeCleanup();
							markDone();
						} catch (e) {
							console.warn('⚠ activeCleanup error:', e);
							markDone();
						}
					}
					
					if (typeof window.ThemeCleanup === 'function') {
						try {
							window.ThemeCleanup();
							markDone();
						} catch (e) {
							console.warn('⚠ window.ThemeCleanup error:', e);
							markDone();
						}
						delete window.ThemeCleanup;
					}
					
					setTimeout(markDone, 100);
				});
				
				await cleanupConfirmed;
				console.log('✓ Previous script cleanup confirmed');
			}
			
			if (this.themeScriptEl) {
				this.themeScriptEl.remove();
				this.themeScriptEl = null;
			}
			
			if (!scriptPath) { 
				this.activeCleanup = null;
				resolve(null); 
				return; 
			}
			
			this.themeScriptEl = document.createElement('script');
			this.themeScriptEl.src = this.baseUrl + scriptPath + '?t=' + Date.now();
			this.themeScriptEl.async = true;
			
			this.themeScriptEl.onload = () => {
				let cleanupFn = null;
				if (typeof window.ThemeCleanup === 'function') {
					cleanupFn = window.ThemeCleanup;
					delete window.ThemeCleanup;
				}
				this.activeCleanup = cleanupFn;
				console.log('✓ New script loaded, cleanup function captured');
				resolve(cleanupFn);
			};
			
			this.themeScriptEl.onerror = () => {
				console.error(`❌ Failed to load script: ${scriptPath}`);
				this.activeCleanup = null;
				resolve(null);
			};
			
			document.head.appendChild(this.themeScriptEl);
		});
	},

	async cleanup() {
		console.log('🧹 ThemeManager.cleanup() starting');
		
		this.themeAnimationFrames.forEach(id => { try { cancelAnimationFrame(id); } catch(e) {} });
		this.themeAnimationFrames = [];
		this.themeIntervals.forEach(id => { try { clearInterval(id); } catch(e) {} });
		this.themeIntervals = [];
		this.themeTimeouts.forEach(id => { try { clearTimeout(id); } catch(e) {} });
		this.themeTimeouts = [];
		
		if (typeof this.activeCleanup === 'function') {
			console.log('🧹 Executing activeCleanup function...');
			try {
				this.activeCleanup();
			} catch (e) {
				console.warn('⚠ Cleanup function error:', e);
			}
			this.activeCleanup = null;
		}
		
		if (typeof window.ThemeCleanup === 'function') {
			console.log('🧹 Executing window.ThemeCleanup...');
			try {
				window.ThemeCleanup();
			} catch (e) {
				console.warn('⚠ window.ThemeCleanup error:', e);
			}
			delete window.ThemeCleanup;
		}
		
		if (this.themeScriptEl) {
			console.log('🧹 Removing theme script element');
			this.themeScriptEl.remove();
			this.themeScriptEl = null;
		}
		
		try {
			const ctx = this.canvas?.getContext('2d');
			if (ctx && this.canvas) {
				ctx.setTransform(1, 0, 0, 1, 0, 0);
				ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
				console.log('🧹 Canvas cleared');
			}
		} catch (e) {
			console.warn('⚠ Canvas clear error:', e);
		}
		this.canvas.style.display = 'none';
		
		const inlineStyle = document.getElementById('theme-inline');
		if (inlineStyle) inlineStyle.textContent = '';
		
		const frontLayer = document.getElementById('mysticFrontLayer');
		if (frontLayer) frontLayer.style.display = 'none';
		
		void document.body.offsetHeight;
		
		console.log('🧹 ThemeManager.cleanup() complete');
	},

	registerCleanup(cleanupFn) { if (typeof cleanupFn === 'function') { if (!window.ThemeCleanupRegistry) window.ThemeCleanupRegistry = []; window.ThemeCleanupRegistry.push(cleanupFn); } },
	trackAnimation(id) { this.themeAnimationFrames.push(id); },
	trackInterval(id) { this.themeIntervals.push(id); },
	trackTimeout(id) { this.themeTimeouts.push(id); },

	applyFallback() { document.documentElement.setAttribute('data-theme', 'default'); document.body.setAttribute('data-theme', 'default'); this.canvas.style.display = 'none'; this.currentTheme = 'default'; },
	getAvailableThemes() { if (!this.themeConfig) return []; return Object.entries(this.themeConfig).map(([id, config]) => ({ id, name: config.name || id, description: config.description || '', canvas: config.canvas || false })); },
	async populateThemeSelector(selectElementId) { const select = document.getElementById(selectElementId); if (!select) return; if (!this.themeConfig) { select.innerHTML = '<option value="">Loading...</option>'; setTimeout(() => this.populateThemeSelector(selectElementId), 500); return; } select.innerHTML = ''; for (const [id, config] of Object.entries(this.themeConfig)) { const opt = document.createElement('option'); opt.value = id; opt.textContent = config.name || id; if (id === this.currentTheme) opt.selected = true; select.appendChild(opt); } },
	saveThemePreference(themeId) { try { localStorage.setItem('os-preferred-theme', themeId); } catch (e) { console.warn('⚠ Could not save theme:', e); } },
	getSavedThemePreference() { try { return localStorage.getItem('os-preferred-theme'); } catch (e) { return null; } },
	async refreshThemeConfig() { try { const response = await fetch(this.configUrl + '?t=' + Date.now(), { cache: 'no-store' }); if (!response.ok) throw new Error(`HTTP ${response.status}`); this.themeConfig = await response.json(); this.populateThemeSelector('themeSelector'); return true; } catch (error) { alert('Could not reload themes. Check console.'); return false; } }
};

if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ThemeManager.init()); } else { ThemeManager.init(); }
</script>

<!-- === DESKTOP MANAGER === -->
<script>
const DesktopManager = {
	STORAGE_KEY: 'os-desktop-items-v2',
	
	getItems() {
		try {
			const saved = localStorage.getItem(this.STORAGE_KEY);
			return saved ? JSON.parse(saved) : [];
		} catch (e) {
			console.warn('⚠ Could not load desktop items:', e);
			return [];
		}
	},
	
	saveItems(items) {
		try {
			localStorage.setItem(this.STORAGE_KEY, JSON.stringify(items));
			return true;
		} catch (e) {
			console.warn('⚠ Could not save desktop items:', e);
			return false;
		}
	},
	
	addToDesktop(appId) {
		const items = this.getItems();
		if (!items.includes(appId)) {
			items.push(appId);
			this.saveItems(items);
			console.log(`✓ Added ${appId} to desktop`);
			return true;
		}
		return false;
	},
	
	removeFromDesktop(appId) {
		const items = this.getItems().filter(id => id !== appId);
		this.saveItems(items);
		console.log(`✓ Removed ${appId} from desktop`);
	},
	
	isOnDesktop(appId) {
		return this.getItems().includes(appId);
	},
	
	clear() {
		localStorage.removeItem(this.STORAGE_KEY);
	}
};
</script>

<!-- === LONG PRESS UTILITY === -->
<script>
function setupLongPress(element, callbacks, options = {}) {
	const {
		duration = 500,
		onLongPress,
		onShortPress,
		onMove,
		preventContextMenu = true
	} = callbacks;
	
	let timer = null;
	let isLongPress = false;
	let isPressed = false;
	let startX = 0, startY = 0;
	const moveThreshold = 10;
	
	const start = (e) => {
		if (element.dataset.longPressDisabled === 'true') return;
		isPressed = true;
		isLongPress = false;
		const point = e.type.includes('touch') ? e.touches[0] : e;
		startX = point.clientX;
		startY = point.clientY;
		timer = setTimeout(() => {
			if (isPressed) {
				isLongPress = true;
				if (onLongPress) onLongPress(e);
				if (navigator.vibrate) navigator.vibrate(10);
			}
		}, duration);
	};
	
	const end = (e) => {
		if (timer) clearTimeout(timer);
		timer = null;
		if (isPressed && !isLongPress) {
			if (onShortPress) onShortPress(e);
		}
		isPressed = false;
		isLongPress = false;
	};
	
	const cancel = () => {
		if (timer) clearTimeout(timer);
		timer = null;
		isPressed = false;
		isLongPress = false;
	};
	
	const move = (e) => {
		if (!isPressed || !timer) return;
		const point = e.type.includes('touch') ? e.touches[0] : e;
		const dx = Math.abs(point.clientX - startX);
		const dy = Math.abs(point.clientY - startY);
		if (dx > moveThreshold || dy > moveThreshold) {
			cancel();
			if (onMove) onMove(e);
		}
	};
	
	element.addEventListener('mousedown', start);
	element.addEventListener('mouseup', end);
	element.addEventListener('mouseleave', cancel);
	element.addEventListener('mousemove', move);
	element.addEventListener('touchstart', start, { passive: true });
	element.addEventListener('touchend', end);
	element.addEventListener('touchcancel', cancel);
	element.addEventListener('touchmove', move, { passive: true });
	
	if (preventContextMenu) {
		element.addEventListener('contextmenu', (e) => {
			if (isLongPress) {
				e.preventDefault();
				e.stopPropagation();
				return false;
			}
		});
	}
	
	return () => {
		element.removeEventListener('mousedown', start);
		element.removeEventListener('mouseup', end);
		element.removeEventListener('mouseleave', cancel);
		element.removeEventListener('mousemove', move);
		element.removeEventListener('touchstart', start);
		element.removeEventListener('touchend', end);
		element.removeEventListener('touchcancel', cancel);
		element.removeEventListener('touchmove', move);
	};
}
</script>

<!-- === CONTEXT MENU === -->
<script>
const ContextMenu = {
	currentMenu: null,
	
	show(x, y, items, onSelect, onClose) {
		this.hide();
		const menu = document.createElement('div');
		menu.className = 'system-menu desktop-context-menu';
		menu.style.cssText = `
			position: fixed;
			left: ${Math.min(x, window.innerWidth - 200)}px;
			top: ${Math.min(y, window.innerHeight - 100)}px;
			z-index: var(--z-context-menus, 3500);
			min-width: 180px;
			max-width: 95vw;
		`;
		menu.id = 'desktop-context-menu';
		
		items.forEach(item => {
			const el = document.createElement('div');
			el.className = 'system-menu-item';
			el.innerHTML = `
				<span class="material-icons" style="font-size:18px;color:var(--system-text-dim)">${item.icon || 'circle'}</span>
				<span>${item.label}</span>
			`;
			if (item.danger) {
				el.style.color = 'var(--system-danger)';
			}
			el.onclick = (e) => {
				e.stopPropagation();
				this.hide();
				if (onSelect) onSelect(item.value, item);
			};
			menu.appendChild(el);
		});
		
		document.body.appendChild(menu);
		this.currentMenu = menu;
		
		const closeHandler = (e) => {
			if (e.key === 'Escape' || !menu.contains(e.target)) {
				this.hide();
				if (onClose) onClose();
				document.removeEventListener('click', closeHandler);
				document.removeEventListener('keydown', closeHandler);
			}
		};
		setTimeout(() => {
			document.addEventListener('click', closeHandler);
			document.addEventListener('keydown', closeHandler);
		}, 0);
		
		return menu;
	},
	
	hide() {
		if (this.currentMenu) {
			this.currentMenu.remove();
			this.currentMenu = null;
		}
	}
};
</script>

<!-- === APP REGISTRY === -->
<script>
const AppRegistry = {
	configUrl: 'apps.json',
	categories: [],
	apps: [],
	loaded: false,
	menuState: { currentView: 'root', history: [] },
	
	async init() {
		try {
			const response = await fetch(this.configUrl, { cache: 'no-store' });
			if (!response.ok) throw new Error(`HTTP ${response.status}`);
			const config = await response.json();
			this.categories = config.categories || [];
			this.apps = config.apps || [];
			this.loaded = true;
			console.log(`✓ AppRegistry: Loaded ${this.categories.length} categories, ${this.apps.length} apps`);
			this.renderDesktop();
			this.renderStartMenu('root');
			window.addEventListener('themeChanged', () => this.renderDesktop());
		} catch (error) {
			console.error('✗ AppRegistry: Failed to load apps.json:', error);
			this.renderError();
		}
	},
	
	renderDesktop() {
		const container = document.getElementById('desktopIcons');
		const loadingEl = document.getElementById('appsLoading');
		if (!container) return;
		if (loadingEl) loadingEl.remove();
		container.innerHTML = '';
		
		const desktopItemIds = DesktopManager.getItems();
		const desktopApps = this.apps.filter(app => 
			app.enabled && 
			app.type !== 'category' && 
			desktopItemIds.includes(app.id)
		).sort((a, b) => (a.order || 999) - (b.order || 999));
		
		if (desktopApps.length === 0) {
			container.innerHTML = '';
			return;
		}
		
		desktopApps.forEach(app => {
			const icon = document.createElement('div');
			icon.className = 'icon system-desktop-icon';
			icon.dataset.appId = app.id;
			icon.setAttribute('role', 'button');
			icon.setAttribute('tabindex', '0');
			icon.setAttribute('aria-label', `${app.name}, long-press for options`);
			icon.innerHTML = `
				<span class="material-icons system-desktop-icon__icon">${app.icon}</span>
				<span class="system-desktop-icon__label">${app.name}</span>`;
			
			const launch = () => this.launchApp(app);
			
			const onLongPress = (e) => {
				if (e) e.preventDefault();
				const point = e.type.includes('touch') ? e.touches[0] : e;
				
				const appConfig = AppRegistry.getAppById(app.id);
				const allowMultiple = appConfig?.allowMultipleInstances === true;
				const existingInstances = appManager.windows.filter(w => w.appId === app.id);
				
				const menuItems = [
					{ label: 'Remove from Desktop', icon: 'delete_outline', value: 'remove', danger: true }
				];
				
				if (allowMultiple) {
					menuItems.unshift({ 
						label: existingInstances.length > 0 
							? `Open another ${app.name}` 
							: `Open ${app.name}`, 
						icon: 'flip_to_front', 
						value: 'open-instance' 
					});
				}
				
				ContextMenu.show(
					point.clientX,
					point.clientY,
					menuItems,
					(action) => {
						if (action === 'remove') {
							DesktopManager.removeFromDesktop(app.id);
							this.renderDesktop();
						} else if (action === 'open-instance') {
							this.launchApp(app);
						}
					}
				);
			};
			
			const onShortPress = () => launch();
			
			setupLongPress(icon, { onLongPress, onShortPress, preventContextMenu: true });
			
			icon.onkeydown = (e) => { 
				if (e.key === 'Enter' || e.key === ' ') { 
					e.preventDefault(); 
					e.stopPropagation();
					launch(); 
				} 
			};
			
			container.appendChild(icon);
		});
	},
	
	renderStartMenu(view = 'root') {
		const content = document.getElementById('startMenuContent');
		const titleIcon = document.getElementById('startMenuTitleIcon');
		const titleText = document.getElementById('startMenuTitleText');
		const backBtn = document.getElementById('startMenuBack');
		const header = document.getElementById('startMenuHeader');
		if (!content) return;
		
		if (backBtn) {
			if (view === 'root') { backBtn.classList.remove('visible'); backBtn.setAttribute('aria-hidden', 'true'); }
			else { backBtn.classList.add('visible'); backBtn.setAttribute('aria-hidden', 'false'); }
		}
		
		if (view === 'root') {
			if (titleIcon) titleIcon.textContent = 'apps';
			if (titleText) titleText.textContent = 'Start';
			if (header) header.classList.remove('start-menu-header--category');
			this.menuState.currentView = 'root';
			this._renderRootMenu(content);
		} else {
			const category = this.categories.find(c => c.id === view);
			if (!category) { console.warn(`Category not found: ${view}`); return this.renderStartMenu('root'); }
			if (titleIcon) titleIcon.textContent = category.icon || 'folder';
			if (titleText) titleText.textContent = category.name;
			if (header) header.classList.add('start-menu-header--category');
			this.menuState.currentView = view;
			this._renderCategoryMenu(content, category);
		}
	},
	
	_renderRootMenu(container) {
		container.innerHTML = '';
		const sortedCategories = [...this.categories].sort((a, b) => (a.order || 999) - (b.order || 999));
		if (sortedCategories.length > 0) {
			const catHeader = document.createElement('div'); catHeader.className = 'start-menu-section-header'; catHeader.textContent = 'Categories'; container.appendChild(catHeader);
			sortedCategories.forEach(category => {
				const appCount = this.apps.filter(a => a.enabled && a.categoryId === category.id).length;
				if (appCount === 0) return;
				const item = document.createElement('div'); item.className = 'start-menu-category system-desktop-start-menu__category';
				item.onclick = (e) => { e.stopPropagation(); this.renderStartMenu(category.id); };
				item.innerHTML = `<span class="material-icons">${category.icon || 'folder'}</span><div class="start-menu-category-info"><div class="start-menu-category-name">${category.name}</div>${category.description ? `<div class="start-menu-category-desc">${category.description}</div>` : ''}</div><span class="start-menu-category-count">${appCount}</span><span class="material-icons" style="color: var(--system-text-dim); margin-left: 4px;">chevron_right</span>`;
				container.appendChild(item);
			});
		}
		const uncategorizedApps = this.apps.filter(app => app.enabled && !app.categoryId && app.type !== 'category').sort((a, b) => (a.order || 999) - (b.order || 999));
		if (uncategorizedApps.length > 0) {
			if (sortedCategories.length > 0) { const divider = document.createElement('hr'); divider.className = 'system-divider'; divider.style.cssText = 'margin: 12px 8px; border-color: var(--system-border);'; container.appendChild(divider); }
			const appHeader = document.createElement('div'); appHeader.className = 'start-menu-section-header'; appHeader.textContent = sortedCategories.length > 0 ? 'Other Apps' : 'Apps'; container.appendChild(appHeader);
			uncategorizedApps.forEach(app => { this._createAppMenuItem(app).forEach(el => container.appendChild(el)); });
		}
		if (sortedCategories.length === 0 && uncategorizedApps.length === 0) {
			container.innerHTML = `<div class="start-menu-empty"><span class="material-icons">apps_outage</span><p class="system-text">No apps available</p></div>`;
		}
	},
	
	_renderCategoryMenu(container, category) {
		container.innerHTML = '';
		const categoryApps = this.apps.filter(app => app.enabled && app.categoryId === category.id && app.type !== 'category').sort((a, b) => (a.order || 999) - (b.order || 999));
		if (categoryApps.length === 0) { container.innerHTML = `<div class="start-menu-empty"><span class="material-icons">folder_open</span><p class="system-text">No apps in this category</p></div>`; return; }
		categoryApps.forEach(app => { this._createAppMenuItem(app).forEach(el => container.appendChild(el)); });
	},
	
	_createAppMenuItem(app) {
		const items = [];
		const item = document.createElement('div'); 
		item.className = 'start-menu-app system-desktop-start-menu__item'; 
		item.dataset.appId = app.id; 
		item.setAttribute('role', 'button'); 
		item.setAttribute('tabindex', '0');
		
		const onDesktop = DesktopManager.isOnDesktop(app.id);
		const desktopIndicator = onDesktop 
			? `<span class="material-icons" style="color:var(--system-success);font-size:16px;">check_circle</span>` 
			: '';
			
		item.innerHTML = `
			<span class="material-icons">${app.icon}</span>
			<div style="flex:1; min-width:0;">
				<div class="start-menu-app-name">${app.name} ${desktopIndicator}</div>
				${app.description ? `<div class="start-menu-app-desc">${app.description}</div>` : ''}
			</div>`;
		
		const launch = (e) => { if (e) e.stopPropagation(); this.launchApp(app); };
		
		const onLongPress = (e) => {
			if (e) e.preventDefault();
			
			const appConfig = AppRegistry.getAppById(app.id);
			const allowMultiple = appConfig?.allowMultipleInstances === true;
			const onDesktop = DesktopManager.isOnDesktop(app.id);
			
			const menuItems = [];
			
			if (!onDesktop) {
				menuItems.push({ label: 'Add to Desktop', icon: 'add_to_home_screen', value: 'add' });
			}
			
			if (allowMultiple) {
				menuItems.push({ label: 'Open new instance', icon: 'flip_to_front', value: 'new-instance' });
			}
			
			if (menuItems.length === 0) return;
			
			const point = e.type.includes('touch') ? e.touches[0] : e;
			ContextMenu.show(
				point.clientX, point.clientY,
				menuItems,
				(action) => {
					if (action === 'add') {
						DesktopManager.addToDesktop(app.id);
						const indicator = item.querySelector('.material-icons:last-child');
						if (indicator && indicator.textContent !== 'check_circle') {
							indicator.textContent = 'check_circle';
							indicator.style.color = 'var(--system-success)';
						}
						if (document.getElementById('startMenu')?.style.display === 'block') {
							this.renderDesktop();
						}
					} else if (action === 'new-instance') {
						AppRegistry.launchApp(app);
					}
				}
			);
		};
		
		const onShortPress = (e) => launch(e);
		
		if (app.type !== 'category') {
			setupLongPress(item, { onLongPress, onShortPress, preventContextMenu: true });
			item.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); launch(e); } };
		} else {
			item.onclick = (e) => { e.stopPropagation(); this.renderStartMenu(app.id); };
			item.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); this.renderStartMenu(app.id); } };
		}
		
		items.push(item); 
		return items;
	},
	
	navigateMenu(view) { this.renderStartMenu(view); },
	
	launchApp(app) {
		console.log(`🚀 Launching: ${app.name} (${app.id})`);
		
		const allowMultiple = app.allowMultipleInstances === true;
		
		if (!allowMultiple) {
			const existingWindow = appManager.windows.find(w => w.appId === app.id);
			if (existingWindow) {
				appManager.focus(existingWindow.id);
				if (existingWindow.el.classList.contains('minimized')) {
					existingWindow.el.classList.remove('minimized', 'system-desktop-window--minimized');
				}
				return;
			}
		}
		
		if (app.type === 'iframe') { 
			appManager.openIframeApp(app.name, app.icon, app.url, { 
				appId: app.id, 
				sandbox: app.sandbox, 
				permissions: app.permissions,
				instanceId: ++appManager.instanceCounter
			}); 
		} 
		else if (app.type === 'template') { 
			appManager.open(app.name, app.icon, app.template, { 
				appId: app.id,
				instanceId: ++appManager.instanceCounter
			}); 
		} 
		else if (app.type === 'external') { 
			window.open(app.url, '_blank', 'noopener,noreferrer'); 
		}
		
		const startMenu = document.getElementById('startMenu'); 
		const startBtn = document.getElementById('startBtn');
		if (startMenu) startMenu.style.display = 'none';
		if (startBtn) startBtn.classList.remove('active');
	},
	
	renderError() {
		const container = document.getElementById('desktopIcons'); const loadingEl = document.getElementById('appsLoading'); const menuContent = document.getElementById('startMenuContent');
		const errorMsg = `<span class="material-icons system-icon-lg" style="color: var(--system-danger);">error_outline</span><p class="system-text-dim">Failed to load apps</p><button class="system-btn system-btn-sm system-mt-2" onclick="AppRegistry.init()">Retry</button>`;
		if (loadingEl) loadingEl.innerHTML = errorMsg;
		if (container && !container.querySelector('.system-empty')) { container.innerHTML = `<div class="system-empty" style="grid-column: 1/-1;">${errorMsg}</div>`; }
		if (menuContent) { menuContent.innerHTML = `<div class="start-menu-empty">${errorMsg}</div>`; }
	},
	getAppById(id) { return this.apps.find(app => app.id === id); },
	getCategoryById(id) { return this.categories.find(cat => cat.id === id); }
};
</script>

        startMenu.style.display = 'none'; 
        startBtn?.classList.remove('active'); 
        AppRegistry.menuState = { currentView: 'root', history: [] }; 
        AppRegistry.renderStartMenu('root'); 
    } 
	else { 
        AppRegistry.renderStartMenu('root');

        startBtn?.classList.add('active');

}

// === 🎯 CAPTURE CONSOLE: Global Interceptor System ===
const ConsoleCapture = {
    logs: [],
    maxLogs: 500,
    isPaused: false,
    listeners: [],
    originalConsole: { log: console.log, warn: console.warn, error: console.error },
    
    init() {
        this.overrideConsoleMethods();
        this.setupIframeMessageListener();
        console.log('[CaptureConsole] Initialized');
    },
    
    overrideConsoleMethods() {
        const self = this;
        ['log', 'warn', 'error'].forEach(method => {
            console[method] = function(...args) {
                self.originalConsole[method].apply(console, args);
                if (!self.isPaused) {
                    self.addLog({
                        type: method,
                        source: 'desktop',
                        sourceName: 'desktop',
                        message: self.formatArgs(args),
                        timestamp: new Date(),
                        raw: args
                    });
                }
            };
        });
    },
    
    formatArgs(args) {
        return args.map(arg => {
            try { return typeof arg === 'object' && arg !== null ? JSON.stringify(arg, (k,v)=>typeof v==='function'?'[Function]':v instanceof Error?v.toString():v) : String(arg); } 
            catch(e) { return '[Object]'; }
        }).join(' ');
    },
    
    addLog(entry) {
        if (this.logs.length >= this.maxLogs) this.logs.shift();
        this.logs.push(entry);
        this.listeners.forEach(cb => { try { cb(entry); } catch(e) {} });
        window.dispatchEvent(new CustomEvent('consoleLogCaptured', { detail: entry }));
    },
    
    setupIframeMessageListener() {
        window.addEventListener('message', (e) => {
            if (e.data?.type === 'consoleLog' && e.data.payload) {
                const { level, message, appName, timestamp } = e.data.payload;
                if (['log','warn','error'].includes(level)) {
                    this.addLog({
                        type: level,
                        source: 'iframe',
                        sourceName: appName || 'unknown-app',
                        message: String(message).slice(0, 2000),
                        timestamp: timestamp ? new Date(timestamp) : new Date(),
                        raw: message,
                        origin: e.origin
                    });
                }
            }
        });
    },
    
    registerListener(callback) {
        this.listeners.push(callback);
        return [...this.logs];
    },
    
    unregisterListener(callback) {
        this.listeners = this.listeners.filter(fn => fn !== callback);
    },
    
    clear() {
        this.logs = [];
        this.listeners.forEach(cb => { try { cb({ type: 'clear' }); } catch(e) {} });
        window.dispatchEvent(new CustomEvent('consoleLogsCleared'));
    },
    
    togglePause() {
        this.isPaused = !this.isPaused;
        return this.isPaused;
    },
    
    getStats() {
        return {
            total: this.logs.length,
            log: this.logs.filter(l => l.type === 'log').length,
            warn: this.logs.filter(l => l.type === 'warn').length,
            error: this.logs.filter(l => l.type === 'error').length
        };
    }
};

if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => ConsoleCapture.init()); } else { ConsoleCapture.init(); }

const appManager = {
    windows: [],

    _maximizedStorageKey: 'os-window-maximized-',

    // === HELPER: Escape HTML for XSS safety ===
    _escapeHtml: function(text) {
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    },
    
    // === HELPER: Inject console override into iframe (same-origin only) ===
    _injectConsoleOverride: function(iframe, appName) {
        try {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow?.document;
            if (!iframeDoc || iframeDoc.querySelector('script[data-console-bridge]')) return false;
            
            const safeName = appName.replace(/'/g, "\\'");
            const overrideCode = `(function(appName){
                if(window.__consoleOverrideInstalled) return;
                window.__consoleOverrideInstalled = true;
                const __orig = {log:console.log,warn:console.warn,error:console.error};
                const fmt = a=>a.map(x=>{try{return typeof x==='object'&&x!==null?JSON.stringify(x,(k,v)=>typeof v==='function'?'[Fn]':v instanceof Error?v.toString():v):String(x)}catch(e){return'[Obj]'}}).join(' ');
                ['log','warn','error'].forEach(l=>{
                    console[l]=function(...args){
                        try{window.parent.postMessage({type:'consoleLog',payload:{level:l,message:fmt(args),appName:appName,timestamp:Date.now()}},'*')}catch(e){}
                        __orig[l].apply(console,args);
                    }
                });
                console.log('[ConsoleBridge] Installed for "'+appName+'"');
            })('`+safeName+`');`;
            
            const script = iframeDoc.createElement('script');
            script.setAttribute('data-console-bridge', 'true');
            script.textContent = overrideCode;
            iframeDoc.head.appendChild(script);
            return true;
        } catch(e) { return false; }
    },
    
    // === CONSOLE APP INITIALIZATION (UPDATED) ===
    initConsoleWindow: function(windowId) {
        const win = this.windows.find(w => w.id === windowId);
        if (!win) return;
        const outputEl = win.el.querySelector('#consoleOutput');
        const clearBtn = win.el.querySelector('#consoleClearBtn');
        const pauseBtn = win.el.querySelector('#consolePauseBtn');
        const autoScrollEl = win.el.querySelector('#consoleAutoScroll');
        const countEl = win.el.querySelector('#consoleCount');
        if (!outputEl) return;
        
        // ✨ Filter & Copy State
        const filterSelect = win.el.querySelector('#consoleAppFilter');
        let currentFilter = 'all';
        const knownApps = new Set(['desktop']);
        
        // ✨ Helper: Visual feedback for copy button
        const showCopyFeedback = (message, color) => {
            const btn = win.el.querySelector('#consoleCopyBtn');
            const icon = btn.querySelector('#consoleCopyIcon');
            const text = btn.querySelector('#consoleCopyText');
            if (!icon || !text) return;
            const origIcon = icon.textContent, origText = text.textContent;
            icon.textContent = message.startsWith('✓') ? 'check' : message.startsWith('✗') ? 'error' : 'info';
            icon.style.color = color;
            text.textContent = message;
            setTimeout(() => { icon.textContent = origIcon; icon.style.color = ''; text.textContent = origText; }, 2000);
        };
        
        // ✨ Filter Logic
        const updateFilterOptions = () => {
            if (!filterSelect) return;
            const val = filterSelect.value;
            filterSelect.innerHTML = '<option value="all">All Apps</option>';
            Array.from(knownApps).sort().forEach(app => {
                filterSelect.innerHTML += `<option value="${app}">${app}</option>`;
            });
            filterSelect.value = knownApps.has(val) ? val : 'all';
        };
        
        const applyFilter = (sourceFilter) => {
            currentFilter = sourceFilter;
            const entries = outputEl.querySelectorAll('.console-log-entry');
            let visibleCount = 0;
            entries.forEach(entry => {
                const entrySource = entry.dataset.source || 'desktop';
                const show = (sourceFilter === 'all') || (entrySource === sourceFilter);
                entry.style.display = show ? '' : 'none';
                if (show) visibleCount++;
            });
            if (countEl) {
                const stats = ConsoleCapture.getStats();
                countEl.textContent = `${visibleCount}/${stats.total} shown`;
                countEl.title = `Filtered: ${sourceFilter === 'all' ? 'all' : sourceFilter}`;
            }
            if (autoScrollEl?.checked && visibleCount > 0) {
                outputEl.scrollTop = outputEl.scrollHeight;
            }
        };
        
        if (filterSelect) {
            filterSelect.addEventListener('change', (e) => applyFilter(e.target.value));
        }
        
        // ✨ Copy Logic - FIXED to respect filters reliably
        const copyToClipboard = async () => {
            const entries = outputEl.querySelectorAll('.console-log-entry');
            // Use offsetParent check - hidden elements have offsetParent === null
            const visibleEntries = Array.from(entries).filter(entry => entry.offsetParent !== null);
            
            if (visibleEntries.length === 0) return showCopyFeedback('⚠️ No visible logs', '#ffc107');
            
            const lines = visibleEntries.map(entry => {
                const src = entry.dataset.source || '';
                const msg = entry.dataset.message || '';
                const ts = entry.dataset.timestamp || '';
                return `[${ts}] [${src}] ${msg}`;
            });
            
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(lines.join('\n'));
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = lines.join('\n');
                    ta.style.cssText = 'position:fixed;left:-9999px;';
                    document.body.appendChild(ta);
                    ta.focus(); ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
                showCopyFeedback('✓ Copied ' + visibleEntries.length + ' lines!', '#4caf50');
                if (navigator.vibrate) navigator.vibrate(10);
            } catch(err) {
                console.error('✗ Clipboard error:', err);
                showCopyFeedback('✗ Failed', '#f44336');
            }
        };
        
        const copyBtn = win.el.querySelector('#consoleCopyBtn');
        if (copyBtn) {
            copyBtn.onclick = (e) => { e.stopPropagation(); copyToClipboard(); };
            copyBtn.addEventListener('contextmenu', e => e.preventDefault());
        }
        
        // ✨ Log Renderer - UPDATED with per-line copy button
        const renderLogEntry = (entry) => {
            if (entry.type === 'clear') {
                outputEl.innerHTML = '<div class="console-welcome system-text-dim" style="padding:16px;text-align:center;"><span class="material-icons" style="font-size:32px;display:block;margin-bottom:8px;">check_circle</span>All logs cleared</div>';
                knownApps.clear();
                knownApps.add('desktop');
                updateFilterOptions();
                if (countEl) countEl.textContent = '0 messages';
                return;
            }
            const welcome = outputEl.querySelector('.console-welcome');
            if (welcome) welcome.remove();
            
            const div = document.createElement('div');
            div.className = `console-log-entry ${entry.type} ${entry.source === 'desktop' ? 'desktop' : 'iframe-app'}`;
            
            const sourceName = entry.source === 'desktop' ? 'desktop' : (entry.sourceName || 'unknown');
            const time = entry.timestamp.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            div.dataset.source = sourceName;
            div.dataset.message = entry.message;
            div.dataset.timestamp = time;
            
            // ✨ Per-line copy button
            const copyBtn = document.createElement('span');
            copyBtn.className = 'material-icons console-line-copy';
            copyBtn.textContent = 'content_copy';
            copyBtn.title = 'Copy this line';
            copyBtn.setAttribute('aria-label', 'Copy log line to clipboard');
            copyBtn.onclick = async (e) => {
                e.stopPropagation();
                try {
                    const lineText = `[${time}] [${sourceName}] ${entry.message}`;
                    if (navigator.clipboard?.writeText) {
                        await navigator.clipboard.writeText(lineText);
                    } else {
                        const ta = document.createElement('textarea');
                        ta.value = lineText;
                        ta.style.cssText = 'position:fixed;left:-9999px;';
                        document.body.appendChild(ta);
                        ta.focus(); ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                    }
                    // Visual feedback
                    copyBtn.textContent = 'check';
                    copyBtn.style.color = 'var(--system-success, #4caf50)';
                    setTimeout(() => {
                        copyBtn.textContent = 'content_copy';
                        copyBtn.style.color = '';
                    }, 1200);
                    if (navigator.vibrate) navigator.vibrate(5);
                } catch(err) {
                    console.error('✗ Line copy failed:', err);
                    copyBtn.textContent = 'error';
                    copyBtn.style.color = 'var(--system-danger, #f44336)';
                    setTimeout(() => {
                        copyBtn.textContent = 'content_copy';
                        copyBtn.style.color = '';
                    }, 1500);
                }
            };
            
            div.innerHTML = `
                <span class="console-source ${entry.source === 'desktop' ? 'desktop' : 'iframe'}">[${this._escapeHtml(sourceName)}]</span>
                <span class="console-message">${this._escapeHtml(entry.message)}</span>
                <span class="console-timestamp">${time}</span>
            `;
            
            // ✨ Append copy button after content
            div.appendChild(copyBtn);
            
            knownApps.add(sourceName);
            updateFilterOptions();
            outputEl.appendChild(div);
            applyFilter(currentFilter);
        };
        
        const listener = (entry) => renderLogEntry(entry);
        const existingLogs = ConsoleCapture.registerListener(listener);
        existingLogs.forEach(renderLogEntry);
        
        if (clearBtn) clearBtn.onclick = (e) => { e.stopPropagation(); ConsoleCapture.clear(); };
        if (pauseBtn) {
            pauseBtn.onclick = (e) => {
                e.stopPropagation();
                const paused = ConsoleCapture.togglePause();
                pauseBtn.innerHTML = `<span class="material-icons" style="font-size:14px;">${paused ? 'play_arrow' : 'pause'}</span> ${paused ? 'Resume' : 'Pause'}`;
            };
        }
        if (autoScrollEl) {
            autoScrollEl.onchange = () => { if (autoScrollEl.checked) outputEl.scrollTop = outputEl.scrollHeight; };
        }
        
        updateFilterOptions();
        applyFilter('all');
        win.onClose = () => { ConsoleCapture.unregisterListener(listener); };
    },

    _getDesktopBounds: function() { 
        const taskbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-taskbar-height')) || 50; 
        const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-safe-bottom')) || 20; 
        const padding = 20; 
        return { 
            maxWidth: window.innerWidth - padding, 
            maxHeight: window.innerHeight - taskbarHeight - safeBottom - padding, 
            minWidth: 280, 
            minHeight: 200 
        }; 
    },
    
    _clampSizeToFit: function(width, height) { 
        const bounds = this._getDesktopBounds(); 
        const clampedWidth = Math.min(Math.max(width, bounds.minWidth), bounds.maxWidth); 
        const clampedHeight = Math.min(Math.max(height, bounds.minHeight), bounds.maxHeight); 
        const wasResized = (width !== clampedWidth || height !== clampedHeight); 
        if (wasResized) console.log(`📐 Clamped window size: ${width}x${height} → ${clampedWidth}x${clampedHeight}`); 
        return { width: clampedWidth, height: clampedHeight, wasResized }; 
    },
    
    _getSavedSize: function(appId) { 
        try { 
            const key = this._sizeStorageKey + appId; 
            const saved = localStorage.getItem(key); 
            if (saved) { 
                const size = JSON.parse(saved); 
                if (size.w > 100 && size.h > 100) return { width: size.w, height: size.h }; 
            } 
        } catch (e) { 
            console.warn(`⚠ Could not load saved size for ${appId}:`, e); 
        } 
        return null; 
    },
    
    _saveSize: function(appId, width, height) { 
        try { 
            const key = this._sizeStorageKey + appId; 
            localStorage.setItem(key, JSON.stringify({ w: width, h: height, ts: Date.now() })); 
        } catch (e) { 
            console.warn(`⚠ Could not save size for ${appId}:`, e); 
        } 
    },
    
    _getSavedMaximized: function(appId) { 
        try { 
            const key = this._maximizedStorageKey + appId; 
            return localStorage.getItem(key) === 'true'; 
        } catch (e) { 
            return false; 
        } 
    },
    
    _saveMaximized: function(appId, isMaximized) { 
        try { 
            localStorage.setItem(this._maximizedStorageKey + appId, isMaximized ? 'true' : 'false'); 
        } catch (e) {} 
    },
    
    _getResponsiveSize: function(appId) { 
        const bounds = this._getDesktopBounds(); 
        const isMobile = window.innerWidth <= 768; 
        return { 
            width: Math.max(bounds.minWidth, Math.min(isMobile ? Math.floor(bounds.maxWidth * 0.95) : Math.floor(bounds.maxWidth * 0.85), bounds.maxWidth)), 
            height: Math.max(bounds.minHeight, Math.min(isMobile ? Math.floor(bounds.maxHeight * 0.75) : Math.floor(bounds.maxHeight * 0.70), bounds.maxHeight)) 
        }; 
    },
    
    _debounce: function(fn, delay, key) { 
        if (this._debounceTimers[key]) clearTimeout(this._debounceTimers[key]); 
        this._debounceTimers[key] = setTimeout(() => { fn(); delete this._debounceTimers[key]; }, delay); 
    },
    
    resetWindowState: function(appId) { 
        localStorage.removeItem(this._sizeStorageKey + appId); 
        localStorage.removeItem(this._maximizedStorageKey + appId); 
        const win = this.windows.find(w => w.appId === appId); 
        if (win) { 
            const size = this._getResponsiveSize(appId); 
            win.el.style.width = size.width + 'px'; 
            win.el.style.height = size.height + 'px'; 
            win.el.classList.remove('maximized', 'system-desktop-window--maximized'); 
            const taskbarHeight = 50; 
            const safeBottom = 20; 
            const availableHeight = window.innerHeight - taskbarHeight - safeBottom; 
            win.el.style.left = Math.max(10, (window.innerWidth - size.width) / 2) + 'px'; 
            win.el.style.top = Math.max(10, (availableHeight - size.height) / 2) + 'px'; 
        } 
    },
    
    ensureWindowInBounds: function(id) { 
        const win = this.windows.find(w => w.id === id); 
        if (!win) return; 
        const el = win.el; 
        const bounds = this._getDesktopBounds(); 
        const rect = el.getBoundingClientRect(); 
        let corrected = false; 
        if (rect.right < bounds.minWidth || rect.left > bounds.maxWidth - bounds.minWidth) { 
            el.style.left = Math.max(0, Math.min((bounds.maxWidth - rect.width) / 2, bounds.maxWidth - bounds.minWidth)) + 'px'; 
            corrected = true; 
        } 
        if (rect.bottom < bounds.minHeight || rect.top > bounds.maxHeight - bounds.minHeight) { 
            el.style.top = Math.max(0, Math.min((bounds.maxHeight - rect.height) / 2, bounds.maxHeight - bounds.minHeight)) + 'px'; 
            corrected = true; 
        } 
        return corrected; 
    },
    
    _getOrCreateTaskbarItem: function(appId, iconCode, title) {
        const existingItem = document.querySelector(`.taskbar-item[data-app-id="${appId}"]`);
        if (existingItem) {
            const instances = this.windows.filter(w => w.appId === appId);
            this._updateGroupIndicator(existingItem, instances.length);
            return existingItem;
        }
        
        const taskItem = document.createElement('div');
        taskItem.className = 'taskbar-item system-desktop-taskbar__item active grouped';
        taskItem.dataset.appId = appId;
        taskItem.onclick = (e) => {
            e.stopPropagation();
            this._handleTaskbarClick(appId, taskItem, e);
        };
        taskItem.innerHTML = `<span class="material-icons">${iconCode}</span>`;
        document.getElementById('taskbarApps').appendChild(taskItem);
        
        return taskItem;
    },
    
    _updateGroupIndicator: function(taskItem, count) {
        let indicator = taskItem.querySelector('.taskbar-group-indicator');
        if (count > 1) {
            if (!indicator) {
                indicator = document.createElement('span');
                indicator.className = 'taskbar-group-indicator';
                taskItem.appendChild(indicator);
            }
            indicator.textContent = count;
            taskItem.classList.add('grouped');
        } else {
            if (indicator) indicator.remove();
            taskItem.classList.remove('grouped');
        }
    },
    
    _handleTaskbarClick: function(appId, taskItem, event) {
        const instances = this.windows.filter(w => w.appId === appId);
        
        if (instances.length === 1) {
            const win = instances[0];
            if (this.activeWindowId === win.id && !win.el.classList.contains('minimized')) {
                this.minimize(win.id);
            } else {
                this.focus(win.id);
                if (win.el.classList.contains('minimized')) {
                    win.el.classList.remove('minimized', 'system-desktop-window--minimized');
                }
            }
        } else {
            this._toggleInstancePopup(appId, taskItem, instances, event);
        }
        
        this.updateTaskbarActiveStates();
    },
    
    _toggleInstancePopup: function(appId, taskItem, instances, event) {
        const existingPopup = document.querySelector(`.taskbar-instance-popup[data-app-id="${appId}"]`);
        
        if (existingPopup) {
            existingPopup.remove();
            this.activePopup = null;
            return;
        }
        
        this._closeAllPopups();
        
        const popup = document.createElement('div');
        popup.className = 'taskbar-instance-popup visible';
        popup.dataset.appId = appId;
        
        popup.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
        popup.addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive: true });
        popup.addEventListener('touchend', (e) => { e.stopPropagation(); }, { passive: true });
        popup.addEventListener('click', (e) => { e.stopPropagation(); });
        
        const itemRect = taskItem.getBoundingClientRect();
        const taskbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-taskbar-height')) || 50;
        const safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--system-safe-bottom')) || 0;
        
        popup.style.left = Math.max(8, itemRect.left - 100) + 'px';
        popup.style.bottom = (taskbarHeight + safeBottom + 8) + 'px';
        popup.style.maxHeight = 'calc(60vh - ' + (taskbarHeight + safeBottom + 20) + 'px)';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'taskbar-instance-popup-content';
        contentDiv.setAttribute('role', 'list');
        
        let touchStartY = 0, touchStartX = 0, didScroll = false;
        const scrollThreshold = 10;
        
        contentDiv.addEventListener('touchstart', (e) => { const touch = e.touches[0]; touchStartY = touch.clientY; touchStartX = touch.clientX; didScroll = false; }, { passive: true });
        contentDiv.addEventListener('touchmove', (e) => { const touch = e.touches[0]; const dy = Math.abs(touch.clientY - touchStartY); const dx = Math.abs(touch.clientX - touchStartX); if (dy > scrollThreshold || dx > scrollThreshold) didScroll = true; }, { passive: true });
        contentDiv.addEventListener('touchend', (e) => { e.stopPropagation(); }, { passive: true });
        
        const minItemHeight = 52;
        const estimatedHeight = instances.length * minItemHeight;
        if (estimatedHeight > 300) contentDiv.style.minHeight = '300px';
        
        instances.forEach((win, index) => {
            const isActive = win.id === this.activeWindowId;
            const item = document.createElement('div');
            item.className = `taskbar-instance-item${isActive ? ' active' : ''}`;
            item.setAttribute('role', 'listitem');
            item.setAttribute('tabindex', '0');
            item.style.minHeight = '48px';
            
            item.innerHTML = `
                <span class="material-icons" aria-hidden="true">${win.iconCode}</span>
                <span class="taskbar-instance-item-title" title="${win.title}">${win.title}</span>
                <span class="material-icons taskbar-instance-item-close" 
                      onclick="event.stopPropagation(); appManager.close('${win.id}')"
                      aria-label="Close">close</span>
            `;
            
            const activateItem = () => {
                this.focus(win.id);
                if (win.el.classList.contains('minimized')) win.el.classList.remove('minimized', 'system-desktop-window--minimized');
                this._closeAllPopups();
            };
            
            item.addEventListener('touchend', (e) => { if (!didScroll) { e.preventDefault(); e.stopPropagation(); activateItem(); } }, { passive: false });
            item.addEventListener('click', (e) => { e.stopPropagation(); activateItem(); });
            item.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); activateItem(); } };
            
            contentDiv.appendChild(item);
        });
        
        popup.appendChild(contentDiv);
        document.body.appendChild(popup);
        this.activePopup = popup;
        
        void popup.offsetHeight;
        this._updateScrollIndicators(popup, contentDiv);
        
        let scrollTimeout;
        const scrollHandler = () => { if (scrollTimeout) cancelAnimationFrame(scrollTimeout); scrollTimeout = requestAnimationFrame(() => { this._updateScrollIndicators(popup, contentDiv); }); };
        contentDiv.addEventListener('scroll', scrollHandler, { passive: true });
        
        setTimeout(() => {
            let touchStartedInside = false;
            const touchStartHandler = (e) => { touchStartedInside = popup.contains(e.target) || taskItem.contains(e.target); };

    _updateScrollIndicators: function(popup, contentDiv) {
        if (!popup || !contentDiv) return;
        const { scrollTop, scrollHeight, clientHeight } = contentDiv;
        const isScrollable = scrollHeight > clientHeight + 5;
        const canScrollUp = scrollTop > 10;
        const canScrollDown = scrollTop < (scrollHeight - clientHeight - 10);
        popup.classList.toggle('scrollable-top', isScrollable && canScrollUp);
        popup.classList.toggle('scrollable-bottom', isScrollable && canScrollDown);
    },
    
    _closeAllPopups: function() {

            const contentDiv = p.querySelector('.taskbar-instance-popup-content');
