<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Material Icons OS</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --taskbar-height: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --bg-color: #004e92;
            --window-bg: #ffffff;
            --header-bg: #e8e8e8;
            --accent: #0078d4;
            --menu-bg: rgba(30, 30, 30, 0.95);
            --icon-color: #333;
            --icon-hover: #000;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            background-size: cover;
        }

        .mat-icon {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            display: inline-block;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            color: white;
            vertical-align: middle;
        }

        /* --- Desktop --- */
        .desktop-area {
            height: calc(100dvh - var(--taskbar-height) - var(--safe-bottom));
            width: 100%;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .icon {
            width: 70px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        .icon:active { background: rgba(255, 255, 255, 0.15); }
        .icon .mat-icon { font-size: 32px; margin-bottom: 4px; }
        .icon span { font-size: 11px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- Start Menu --- */
        .start-menu {
            position: absolute;
            bottom: calc(var(--taskbar-height) + var(--safe-bottom) + 10px);
            left: 10px;
            width: 280px;
            background: var(--menu-bg);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px;
            z-index: 2000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.2s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .menu-header { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .menu-avatar { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .menu-list { display: flex; flex-direction: column; gap: 2px; }
        .menu-item { display: flex; align-items: center; padding: 12px; border-radius: 8px; color: white; cursor: pointer; }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        .menu-item .mat-icon { margin-right: 15px; font-size: 20px; color: #ccc; }

        /* --- Window System --- */
        .window {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 70%;
            background: var(--window-bg);
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 200px;
            min-height: 150px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .window.minimized {
            transform: scale(0.8) translateY(200px);
            opacity: 0;
            pointer-events: none;
        }

        .window-header {
            height: 40px;
            background: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid #ccc;
            cursor: grab;
        }
        .window-header:active { cursor: grabbing; }

        .window-title-area { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
        .window-title { font-size: 13px; color: #333; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .window-controls { display: flex; gap: 4px; }
        
        .control-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn .mat-icon {
            color: #333;
            font-size: 18px;
        }

        .control-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        .control-btn:hover .mat-icon {
            color: #000;
        }

        .control-btn:active {
            background: rgba(0,0,0,0.2);
        }

        .control-btn.close-btn:hover {
            background: #e81123;
        }

        .control-btn.close-btn:hover .mat-icon {
            color: white;
        }

        .window-content { flex: 1; background: white; color: #333; overflow: hidden; display: flex; flex-direction: column; position: relative; }

        /* --- Click Blocker Overlay for Iframes --- */
        .click-blocker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 100;
            cursor: pointer;
        }

        .click-blocker.hidden {
            display: none;
        }

        .browser-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
        .browser-btn { width: 32px; height: 32px; border: none; background: transparent; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .browser-btn .mat-icon { color: #555; font-size: 18px; }
        .browser-btn:active { background: #e0e0e0; }
        .address-bar { flex: 1; height: 32px; border: 1px solid #ccc; border-radius: 16px; padding: 0 12px; font-size: 13px; background: white; outline: none; user-select: text; -webkit-user-select: text; }
        .iframe-container { flex: 1; position: relative; background: white; }
        .web-iframe { width: 100%; height: 100%; border: none; background: white; }
        .content-padding { padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; font-size: 14px; line-height: 1.5; flex: 1; }

        .resize-handle { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; cursor: nwse-resize; z-index: 10; background: linear-gradient(135deg, transparent 50%, #666 50%); opacity: 0.5; }
        .resize-handle:active { background: linear-gradient(135deg, transparent 50%, var(--accent) 50%); opacity: 1; }

        /* --- Taskbar --- */
        .taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: calc(var(--taskbar-height) + var(--safe-bottom));
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 10px;
            padding-bottom: var(--safe-bottom);
            z-index: 3000;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .start-btn { width: 40px; height: 40px; background: transparent; border: none; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: white; }
        .start-btn:active, .start-btn.active { background: rgba(255,255,255,0.15); }
        
        .taskbar-apps {
            flex: 1;
            display: flex;
            padding-left: 10px;
            gap: 6px;
            justify-content: flex-start;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .taskbar-apps::-webkit-scrollbar { display: none; }

        .taskbar-item {
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            position: relative;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .taskbar-item:active { background: rgba(255,255,255,0.2); }
        .taskbar-item.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); }
        
        .taskbar-item::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            transition: width 0.2s;
        }
        .taskbar-item.active::after { width: 16px; border-radius: 2px; }

        .system-tray { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: white; 
            font-size: 12px; 
            padding-right: 5px; 
            padding-bottom: 5px; 
            text-align: right; 
        }
        .clock { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            line-height: 1.1; 
            font-weight: 500; 
        }
        #date { font-size: 10px; opacity: 0.7; }

    </style>
</head>
<body>

    <div class="desktop-area">
        <div class="icon" onclick="appManager.open('This PC', 'desktop_windows', 'pc')">
            <span class="mat-icon">desktop_windows</span>
            <span>This PC</span>
        </div>
        <div class="icon" onclick="appManager.open('Browser', 'public', 'browser')">
            <span class="mat-icon">public</span>
            <span>Browser</span>
        </div>
        <div class="icon" onclick="appManager.open('Settings', 'settings', 'settings')">
            <span class="mat-icon">settings</span>
            <span>Settings</span>
        </div>
        <div class="icon" onclick="appManager.open('Terminal', 'terminal', 'terminal')">
            <span class="mat-icon">terminal</span>
            <span>Terminal</span>
        </div>
        <div class="icon" onclick="appManager.open('Photos', 'photo_library', 'photos')">
            <span class="mat-icon">photo_library</span>
            <span>Photos</span>
        </div>
    </div>

    <div class="start-menu" id="startMenu">
        <div class="menu-header">
            <div class="menu-avatar">U</div>
            <div style="color:white; font-weight:600;">User</div>
        </div>
        <div class="menu-list">
            <div class="menu-item" onclick="appManager.open('Settings', 'settings', 'settings')">
                <span class="mat-icon">settings</span> <span>Settings</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Browser', 'public', 'browser')">
                <span class="mat-icon">public</span> <span>Web Browser</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Calculator', 'calculate', 'calculator')">
                <span class="mat-icon">calculate</span> <span>Calculator</span>
            </div>
            <div class="menu-item" onclick="appManager.open('Terminal', 'terminal', 'terminal')">
                <span class="mat-icon">terminal</span> <span>Terminal</span>
            </div>
            <div class="menu-item" onclick="alert('Shutting down...'); toggleStartMenu()">
                <span class="mat-icon">power_off</span> <span>Shut Down</span>
            </div>
        </div>
    </div>

    <div id="windowsContainer"></div>

    <div class="taskbar">
        <button class="start-btn" id="startBtn" onclick="toggleStartMenu()">
            <span class="mat-icon">windows</span>
        </button>
        
        <div class="taskbar-apps" id="taskbarApps"></div>

        <div class="system-tray">
            <div class="clock">
                <span id="time">12:00</span>
                <span id="date">Oct 24</span>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const startMenu = document.getElementById('startMenu');
        const startBtn = document.getElementById('startBtn');

        function toggleStartMenu() {
            const isVisible = startMenu.style.display === 'block';
            startMenu.style.display = isVisible ? 'none' : 'block';
            startBtn.classList.toggle('active', !isVisible);
        }

        document.addEventListener('click', (e) => {
            if (!startMenu.contains(e.target) && !startBtn.contains(e.target)) {
                startMenu.style.display = 'none';
                startBtn.classList.remove('active');
            }
        });

        // Apps that use iframes and need click blocker
        const iframeApps = ['browser'];

        const appTemplates = {
            'pc': `<div class="content-padding"><h3>This PC</h3><p>Storage: 64 GB<br>Memory: 4 GB<br>OS: WebOS v2.0</p></div>`,
            'browser': `
                <div class="browser-toolbar">
                    <button class="browser-btn" onclick="alert('Back')"><span class="mat-icon">arrow_back</span></button>
                    <button class="browser-btn" onclick="alert('Forward')"><span class="mat-icon">arrow_forward</span></button>
                    <button class="browser-btn" onclick="this.parentElement.nextElementSibling.querySelector('iframe').src = this.parentElement.nextElementSibling.querySelector('iframe').src"><span class="mat-icon">refresh</span></button>
                    <input type="text" class="address-bar" placeholder="https://example.com" value="https://example.com" onkeydown="if(event.key==='Enter'){this.parentElement.nextElementSibling.querySelector('iframe').src = this.value}">
                </div>
                <div class="iframe-container">
                    <iframe class="web-iframe" src="https://example.com"></iframe>
                    <div class="click-blocker" onclick="event.stopPropagation();"></div>
                </div>
            `,
            'settings': `<div class="content-padding"><h3>Settings</h3><p>• Display: 100%<br>• Sound: On<br>• WiFi: Connected</p></div>`,
            'calculator': `<div class="content-padding" style="text-align:center;"><h3>Calculator</h3><div style="font-size:32px; padding:20px; background:#f0f0f0; border-radius:8px; margin:10px 0;">0</div></div>`,
            'terminal': `<div class="content-padding" style="background:#1a1a1a; color:#0f0; font-family:monospace;"><p>user@webos:~$ _</p></div>`,
            'photos': `<div class="content-padding"><h3>Photos</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"><div style="background:#ddd; height:60px; border-radius:4px;"></div><div style="background:#ccc; height:60px; border-radius:4px;"></div><div style="background:#bbb; height:60px; border-radius:4px;"></div></div></div>`
        };

        const appManager = {
            windows: [],
            zIndexCounter: 100,
            activeWindowId: null,

            open: function(title, iconCode, appType) {
                const id = 'win-' + Date.now();
                const content = appTemplates[appType] || appTemplates['pc'];
                
                const winEl = document.createElement('div');
                winEl.className = 'window';
                winEl.id = id;
                winEl.style.zIndex = ++this.zIndexCounter;
                
                // Add mousedown/touchstart to window to bring to front
                winEl.onmousedown = (e) => this.handleWindowClick(e, id);
                winEl.ontouchstart = (e) => this.handleWindowClick(e, id);
                
                winEl.innerHTML = `
                    <div class="window-header">
                        <div class="window-title-area">
                            <span class="mat-icon" style="font-size: 16px; color:#555;">${iconCode}</span>
                            <div class="window-title">${title}</div>
                        </div>
                        <div class="window-controls">
                            <button class="control-btn min-btn" onclick="appManager.minimize('${id}')" title="Minimize">
                                <span class="mat-icon">remove</span>
                            </button>
                            <button class="control-btn max-btn" onclick="appManager.maximize('${id}')" title="Maximize">
                                <span class="mat-icon">crop_square</span>
                            </button>
                            <button class="control-btn close-btn" onclick="appManager.close('${id}')" title="Close">
                                <span class="mat-icon">close</span>
                            </button>
                        </div>
                    </div>
                    <div class="window-content">${content}</div>
                    <div class="resize-handle" id="resize-${id}"></div>
                `;
                
                document.getElementById('windowsContainer').appendChild(winEl);
                this.initDrag(winEl);
                this.initResize(winEl);

                const taskItem = document.createElement('div');
                taskItem.className = 'taskbar-item active';
                taskItem.id = 'task-' + id;
                taskItem.onclick = () => this.toggle(id);
                taskItem.innerHTML = `<span class="mat-icon">${iconCode}</span>`;
                
                document.getElementById('taskbarApps').appendChild(taskItem);

                this.windows.push({ id, title, iconCode, el: winEl, taskItem: taskItem, appType: appType });
                this.focus(id);
                
                // Close start menu when app is opened
                startMenu.style.display = 'none';
                startBtn.classList.remove('active');
            },

            handleWindowClick: function(e, id) {
                // Don't interfere with window controls or resize handle
                if (e.target.closest('.window-controls') || e.target.closest('.resize-handle')) {
                    return;
                }
                
                // If window is not active, bring it to front and prevent click from propagating
                if (this.activeWindowId !== id) {
                    e.preventDefault();
                    e.stopPropagation();
                    this.focus(id);
                    return false;
                }
                // If already active, let the click through to interact with content
            },

            close: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    win.el.remove();
                    win.taskItem.remove();
                    this.windows = this.windows.filter(w => w.id !== id);
                    if (this.activeWindowId === id) this.activeWindowId = null;
                }
            },

            minimize: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    win.el.classList.add('minimized');
                    win.taskItem.classList.remove('active');
                }
            },

            maximize: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (win) {
                    if (win.el.style.width === '100%') {
                        win.el.style.width = '90%';
                        win.el.style.height = '70%';
                        win.el.style.top = '10%';
                        win.el.style.left = '5%';
                    } else {
                        win.el.style.width = '100%';
                        win.el.style.height = 'calc(100dvh - var(--taskbar-height) - var(--safe-bottom))';
                        win.el.style.top = '0';
                        win.el.style.left = '0';
                    }
                    this.focus(id);
                }
            },

            toggle: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (!win) return;

                if (win.el.classList.contains('minimized')) {
                    win.el.classList.remove('minimized');
                    this.focus(id);
                } else {
                    if (this.activeWindowId === id) {
                        this.minimize(id);
                    } else {
                        this.focus(id);
                    }
                }
            },

            focus: function(id) {
                const win = this.windows.find(w => w.id === id);
                if (!win) return;

                win.el.style.zIndex = ++this.zIndexCounter;
                
                this.windows.forEach(w => {
                    w.taskItem.classList.remove('active');
                    // Show click blocker on all OTHER windows that have iframes
                    if (w.id !== id && iframeApps.includes(w.appType)) {
                        const blocker = w.el.querySelector('.click-blocker');
                        if (blocker) blocker.classList.remove('hidden');
                    }
                });
                
                // Hide click blocker on the focused window if it has an iframe
                if (iframeApps.includes(win.appType)) {
                    const blocker = win.el.querySelector('.click-blocker');
                    if (blocker) blocker.classList.add('hidden');
                }
                
                win.taskItem.classList.add('active');
                win.el.classList.remove('minimized');
                this.activeWindowId = id;
            },

            initDrag: function(el) {
                const header = el.querySelector('.window-header');
                let isDragging = false, startX, startY, initialLeft, initialTop;

                const start = (e) => {
                    if(e.target.closest('.window-controls')) return;
                    if(e.target.classList.contains('address-bar')) return;
                    if(e.type === 'touchstart') e.preventDefault();
                    isDragging = true;
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    startX = clientX; startY = clientY;
                    initialLeft = el.offsetLeft; initialTop = el.offsetTop;
                    this.focus(el.id);
                };

                const move = (e) => {
                    if (!isDragging) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    el.style.left = (initialLeft + clientX - startX) + "px";
                    el.style.top = (initialTop + clientY - startY) + "px";
                };

                const end = () => { isDragging = false; };

                header.addEventListener("mousedown", start);
                header.addEventListener("touchstart", start, { passive: false });
                document.addEventListener("mousemove", move);
                document.addEventListener("touchmove", move, { passive: false });
                document.addEventListener("mouseup", end);
                document.addEventListener("touchend", end);
            },

            initResize: function(el) {
                const handle = el.querySelector('.resize-handle');
                let isResizing = false, startW, startH, startMX, startMY;

                const start = (e) => {
                    if(e.type === 'touchstart') e.preventDefault();
                    isResizing = true;
                    startW = parseInt(window.getComputedStyle(el).width, 10);
                    startH = parseInt(window.getComputedStyle(el).height, 10);
                    startMX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    startMY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    this.focus(el.id);
                };

                const move = (e) => {
                    if (!isResizing) return;
                    if(e.type === 'touchmove') e.preventDefault();
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    const newW = startW + (clientX - startMX);
                    const newH = startH + (clientY - startMY);
                    if (newW > 200) el.style.width = newW + "px";
                    if (newH > 150) el.style.height = newH + "px";
                };

                const end = () => { isResizing = false; };

                handle.addEventListener("mousedown", start);
                handle.addEventListener("touchstart", start, { passive: false });
                document.addEventListener("mousemove", move);
                document.addEventListener("touchmove", move, { passive: false });
                document.addEventListener("mouseup", end);
                document.addEventListener("touchend", end);
            }
        };

    </script>
</body>
</html>
