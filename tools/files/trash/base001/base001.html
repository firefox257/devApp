<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLVM WASM Runner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }
        .panel { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        input, textarea { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #444; color: #0f0; border-radius: 4px; font-family: monospace; margin-bottom: 10px; }
        button { padding: 10px 18px; margin-right: 8px; cursor: pointer; background: #0066cc; color: #fff; border: none; border-radius: 4px; font-weight: bold; }
        button:hover:not(:disabled) { background: #0088ff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.danger { background: #cc3333; }
        button.danger:hover:not(:disabled) { background: #ee4444; }
        #console { background: #000; border: 1px solid #333; border-radius: 4px; padding: 10px; height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; line-height: 1.3; }
        .log-info { color: #0ff; } .log-error { color: #f66; } .log-success { color: #6f6; }
        .status { padding: 10px; text-align: center; margin-bottom: 15px; border-radius: 4px; background: #333; color: #ff0; font-weight: bold; }
        .status.ready { background: #2a4; color: #fff; }
        .status.error { background: #622; color: #f66; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 LLVM WASM Runner</h1>
        <div id="status" class="status">⏳ Loading...</div>
        
        <div class="panel">
            <label>LLVM Arguments:</label>
            <input type="text" id="llvmArgs" value="--version" placeholder="--version">
            <label>Input Files (JSON):</label>
            <textarea id="inputFiles" rows="5" placeholder='{"test.cpp": "int main() { return 0; }"}'>{ "hello.cpp": "#include <iostream>\nint main() { std::cout << \"Hello!\" << std::endl; return 0; }" }</textarea>
            <div>
                <button id="runBtn" disabled>▶ Run LLVM</button>
                <button id="clearBtn" class="danger">🗑 Clear</button>
                <button id="copyBtn">📋 Copy</button>
            </div>
        </div>
        
        <div id="console"></div>
    </div>

    <script type="module">
        import trampolines from './trampoline-module.js';

        const consoleEl = document.getElementById('console');
        const statusEl = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const argsInput = document.getElementById('llvmArgs');
        const filesInput = document.getElementById('inputFiles');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // ========== ENVIRONMENT ==========
        class Environment {
            constructor() {
                this.args = ['yowasp-llvm'];
                this.vars = {};
                this.exports = {
                    monotonicClock: { now: () => BigInt(Math.floor(performance.now() * 1e6)) },
                    wallClock: { now: () => ({ seconds: BigInt(Date.now()/1000), nanoseconds: (Date.now()%1000)*1e6 }) },
                    random: { getRandomBytes: (n) => crypto.getRandomValues(new Uint8Array(Number(n))) },
                    io: { Error: class extends Error {}, InputStream: class { read() { throw {tag:'closed'} } }, OutputStream: class { checkWrite() { return 4096; } write() {} }, poll: () => new Uint32Array(0) },
                    cli: { exit: (s) => { throw { type: 'exit', code: s.tag === 'ok' ? 0 : 1 }; }, getArguments: () => this.args, getEnvironment: () => Object.entries(this.vars), getStdin: () => new this.exports.io.InputStream(), getStdout: () => new this.exports.io.OutputStream(), getStderr: () => new this.exports.io.OutputStream(), getTerminalStdin: () => null, getTerminalStdout: () => null, getTerminalStderr: () => null },
                    fs: { Descriptor: class { constructor(e){this.entry=e} getType(){return 'regular-file'} stat(){return {type:'regular-file',linkCount:1,size:0}} statAt(){return this.stat()} openAt(){return new this.constructor({type:'regular-file'})} readDirectory(){return {type:'directory-stream'}} }, DirectoryEntryStream: class {}, filesystemErrorCode: () => null, getDirectories: () => [[new this.fs.Descriptor({ type: 'directory' }), '/']] }
                };
            }
        }

        // ========== INSTANTIATION (Exact bundle.js pattern) ==========
        async function instantiateWasm() {
            const fetchWasm = (url) => fetch(url).then(WebAssembly.compileStreaming);
            const [m0, m1, m2, m3] = await Promise.all([fetchWasm('./llvm.core.wasm'), fetchWasm('./llvm.core2.wasm'), fetchWasm('./llvm.core3.wasm'), fetchWasm('./llvm.core4.wasm')]);
            const env = new Environment();
            const imports = { runtime: env.exports };

            // Generator matches bundle.js exactly
            const gen = (function* init() {
                let exports0, exports1, exports2, exports3;
                
                ({ exports: exports0 } = yield WebAssembly.instantiate(yield m2, {}));
                ({ exports: exports1 } = yield WebAssembly.instantiate(yield m0, {
                    wasi_snapshot_preview1: {
                        args_get: exports0["0"], args_sizes_get: exports0["1"], clock_time_get: exports0["4"], environ_get: exports0["2"],
                        environ_sizes_get: exports0["3"], fd_close: exports0["5"], fd_fdstat_get: exports0["6"], fd_filestat_get: exports0["7"],
                        fd_filestat_set_size: exports0["8"], fd_filestat_set_times: exports0["9"], fd_pread: exports0["10"],
                        fd_prestat_dir_name: exports0["12"], fd_prestat_get: exports0["11"], fd_read: exports0["13"],
                        fd_readdir: exports0["14"], fd_seek: exports0["15"], fd_write: exports0["16"],
                        path_create_directory: exports0["17"], path_filestat_get: exports0["18"], path_link: exports0["19"],
                        path_open: exports0["20"], path_readlink: exports0["21"], path_remove_directory: exports0["22"],
                        path_rename: exports0["23"], path_symlink: exports0["24"], path_unlink_file: exports0["25"],
                        poll_oneoff: exports0["26"], proc_exit: exports0["27"], random_get: exports0["28"]
                    }
                }));

                const cliT = trampolines.createCliTrampolines(env, null, null);
                const clockT = trampolines.createClockTrampolines(env);

                // Use __main_module__ to match the explicit WASM validation error
                ({ exports: exports2 } = yield WebAssembly.instantiate(yield m1, {
                    __main_module__: { _start: exports1._start },
                    env: { memory: exports1.memory },
                    "wasi:cli/environment@0.2.3": { "get-arguments": exports0["29"], "get-environment": exports0["30"] },
                    "wasi:cli/exit@0.2.3": { exit: cliT.trampoline16 },
                    "wasi:cli/stderr@0.2.3": { "get-stderr": cliT.trampoline11 },
                    "wasi:cli/stdin@0.2.3": { "get-stdin": cliT.trampoline14 },
                    "wasi:cli/stdout@0.2.3": { "get-stdout": cliT.trampoline15 },

                    "wasi:cli/terminal-stdin@0.2.3": { "get-terminal-stdin": exports0["64"] },
                    "wasi:cli/terminal-stdout@0.2.3": { "get-terminal-stdout": exports0["65"] },
                    "wasi:clocks/monotonic-clock@0.2.3": { now: clockT.trampoline0, "subscribe-duration": clockT.trampoline6, "subscribe-instant": clockT.trampoline7 },
                    "wasi:clocks/wall-clock@0.2.3": { now: exports0["31"] },
                    "wasi:filesystem/preopens@0.2.3": { "get-directories": exports0["63"] },
                    "wasi:filesystem/types@0.2.3": {
                        "[method]descriptor.append-via-stream": exports0["47"], "[method]descriptor.create-directory-at": exports0["38"],
                        "[method]descriptor.get-flags": exports0["32"], "[method]descriptor.get-type": exports0["33"],
                        "[method]descriptor.link-at": exports0["39"], "[method]descriptor.metadata-hash": exports0["34"],
                        "[method]descriptor.metadata-hash-at": exports0["37"], "[method]descriptor.open-at": exports0["53"],
                        "[method]descriptor.read": exports0["49"], "[method]descriptor.read-directory": exports0["50"],
                        "[method]descriptor.read-via-stream": exports0["45"], "[method]descriptor.readlink-at": exports0["40"],
                        "[method]descriptor.remove-directory-at": exports0["41"], "[method]descriptor.rename-at": exports0["42"],
                        "[method]descriptor.set-size": exports0["35"], "[method]descriptor.set-times": exports0["48"],
                        "[method]descriptor.stat": exports0["51"], "[method]descriptor.stat-at": exports0["52"],
                        "[method]descriptor.symlink-at": exports0["43"], "[method]descriptor.unlink-file-at": exports0["44"],
                        "[method]descriptor.write-via-stream": exports0["46"], "[method]directory-entry-stream.read-directory-entry": exports0["54"],
                        "[resource-drop]descriptor": trampolines.trampoline5, "[resource-drop]directory-entry-stream": trampolines.trampoline1,
                        "filesystem-error-code": exports0["36"]
                    },
                    "wasi:io/error@0.2.3": { "[resource-drop]error": trampolines.trampoline3 },
                    "wasi:io/poll@0.2.3": { "[resource-drop]pollable": trampolines.trampoline10, poll: exports0["61"] },
                    "wasi:io/streams@0.2.3": {
                        "[method]input-stream.blocking-read": exports0["56"], "[method]input-stream.read": exports0["55"],
                        "[method]input-stream.subscribe": trampolines.trampoline9, "[method]output-stream.blocking-flush": exports0["60"],
                        "[method]output-stream.blocking-write-and-flush": exports0["59"], "[method]output-stream.check-write": exports0["57"],
                        "[method]output-stream.subscribe": trampolines.trampoline8, "[method]output-stream.write": exports0["58"],
                        "[resource-drop]input-stream": trampolines.trampoline4, "[resource-drop]output-stream": trampolines.trampoline2

                }));

                const runFunc = exports2["wasi:cli/run@0.2.3#run"];
                return { run: runFunc, env };
            })();

            let promise, resolve, reject;
            function runNext(value) {
                try {
                    let done;
                    do { ({ value, done } = gen.next(value)); } while (!(value instanceof Promise) && !done);
                    if (done) { if (resolve) return resolve(value); else return value; }
                    if (!promise) promise = new Promise((_resolve, _reject) => (resolve = _resolve, reject = _reject));
                    value.then((nextVal) => done ? resolve() : runNext(nextVal), reject);
                } catch (e) { if (reject) reject(e); else throw e; }
            }
            runNext(null);
            return promise;
        }

        // ========== APP LOGIC ==========
        let ctx = null;
        async function runLLVM() {
            if (!ctx) return;
            const args = (argsInput.value || '--version').trim().split(/\s+/).filter(Boolean);
            const files = JSON.parse(filesInput.value || '{}');
            log(`🚀 Running: ${args.join(' ')}`, 'info');
            
            ctx.env.args = ['yowasp-llvm', ...args];
            const lineBuf = (fn) => { let buf = new Uint8Array(); return (b) => { if(!b)return; let n=new Uint8Array(buf.length+b.length); n.set(buf); n.set(b,buf.length); buf=n; let nl=-1; while(true){const x=buf.indexOf(10,nl+1);if(x===-1)break;fn(new TextDecoder().decode(buf.subarray(nl+1,x)));nl=x;} buf=buf.subarray(nl+1); }; };
            ctx.env.stdout = lineBuf(l => log(l, 'info'));
            ctx.env.stderr = lineBuf(l => log(l, 'error'));
            
            try {
                ctx.run();
                log('✅ Execution completed', 'success');
            } catch (e) {
                if (e.type !== 'exit') log(`❌ ${e.message}`, 'error');
                else log(`ℹ️ Exited with code ${e.code}`, 'info');
            }
        }

        async function init() {
            try {
                ctx = await instantiateWasm();
                statusEl.className = 'status ready';
                statusEl.textContent = '✅ Ready';
                runBtn.disabled = false;
                log('✅ System ready', 'success');
            } catch (e) { 
                statusEl.className = 'status error';
                statusEl.textContent = '❌ Init failed';
                log(`❌ ${e.message}`, 'error');
            }
        }

        runBtn.onclick = runLLVM;
        clearBtn.onclick = () => consoleEl.innerHTML = '';
        copyBtn.onclick = async () => { try { await navigator.clipboard.writeText(consoleEl.innerText); } catch(e){} };
        setTimeout(init, 100);
    </script>
</body>
</html>
